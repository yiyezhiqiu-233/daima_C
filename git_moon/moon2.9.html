<script>
/* ==================== 像素化文字渲染系统 ==================== */
var PixelFont = {
    // 离屏Canvas用于大字体渲染
    bigCanvas: null,
    bigCtx: null,
    scale: 4, // 放大倍数
    
    init: function() {
        this.bigCanvas = document.createElement('canvas');
        this.bigCanvas.width = 320 * this.scale;
        this.bigCanvas.height = 180 * this.scale;
        this.bigCtx = this.bigCanvas.getContext('2d');
    },
    
    // 渲染像素化文字，返回像素数据数组
    // text: 文字内容
    // fontSize: 目标像素大小（实际渲染会放大）
    // color: 文字颜色
    // 返回: { width, height, pixels: [[x,y,color], ...] }
    renderText: function(text, fontSize, color, outlineColor) {
        if (!this.bigCanvas) this.init();
        
        var actualFontSize = fontSize * this.scale;
        this.bigCtx.clearRect(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        
        // 设置字体
        this.bigCtx.font = 'bold ' + actualFontSize + 'px "Microsoft YaHei", "SimHei", sans-serif';
        this.bigCtx.textAlign = 'center';
        this.bigCtx.textBaseline = 'middle';
        
        var textX = this.bigCanvas.width / 2;
        var textY = this.bigCanvas.height / 2;
        
        // 绘制描边
        if (outlineColor) {
            this.bigCtx.strokeStyle = outlineColor;
            this.bigCtx.lineWidth = actualFontSize * 0.15;
            this.bigCtx.lineJoin = 'round';
            this.bigCtx.strokeText(text, textX, textY);
        }
        
        // 绘制文字
        this.bigCtx.fillStyle = color;
        this.bigCtx.fillText(text, textX, textY);
        
        // 获取像素数据
        var imgData = this.bigCtx.getImageData(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        var data = imgData.data;
        
        // 采样并生成像素数组
        var pixels = [];
        var scale = this.scale;
        var targetWidth = Math.ceil(this.bigCanvas.width / scale);
        var targetHeight = Math.ceil(this.bigCanvas.height / scale);
        
        for (var y = 0; y < targetHeight; y++) {
            for (var x = 0; x < targetWidth; x++) {
                // 采样点
                var sx = Math.floor(x * scale + scale / 2);
                var sy = Math.floor(y * scale + scale / 2);
                var idx = (sy * this.bigCanvas.width + sx) * 4;
                
                var r = data[idx];
                var g = data[idx + 1];
                var b = data[idx + 2];
                var a = data[idx + 3];
                
                // RGB最大值判断阈值
                var maxRGB = Math.max(r, g, b);
                
                // 如果透明度足够且有颜色
                if (a > 128 && maxRGB > 50) {
                    // 判断是描边还是填充
                    var isOutline = maxRGB < 100;
                    var pixelColor = isOutline ? outlineColor : color;
                    pixels.push({ x: x, y: y, color: pixelColor, isOutline: isOutline });
                }
            }
        }
        
        // 计算实际边界
        var minX = targetWidth, maxX = 0, minY = targetHeight, maxY = 0;
        pixels.forEach(function(p) {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
        });
        
        // 裁剪到实际内容区域
        var croppedPixels = pixels.map(function(p) {
            return { x: p.x - minX, y: p.y - minY, color: p.color, isOutline: p.isOutline };
        });
        
        return {
            width: maxX - minX + 1,
            height: maxY - minY + 1,
            pixels: croppedPixels,
            offsetX: minX,
            offsetY: minY
        };
    }
};

/* ==================== 关卡开始提示 ==================== */
var LevelStartEffect = {
    active: false,
    timer: 0,
    duration: 180, // 帧数（约3秒，更长展示时间）
    titleText: null,
    hintText: null,
    tipText: null,
    titleX: 0,
    titleY: 0,
    hintX: 0,
    hintY: 0,
    tipX: 0,
    tipY: 0,
    
    show: function(level) {
        // 渲染关卡标题（如"第一关"）
        var levelTitle = '第' + ['一', '二', '三', '四'][level.id - 1] + '关';
        this.titleText = PixelFont.renderText(
            levelTitle,
            12,
            '#ffcc00',
            '#1a1a1a'
        );
        
        // 关卡提示文字使用zpix像素字体（如"击杀吭哧二将"）
        this.hintStr = level.hint || '击杀所有敌人';
        this.hintColor = '#ffdd44';
        this.hintText = null; // 使用canvas直接绘制，带发光效果
        
        // 渲染操作提示小字
        this.tipText = PixelFont.renderText(
            'WASD移动 撞击击杀',
            6,
            '#aabbcc',
            '#0a0a0a'
        );
        
        // 计算居中位置
        this.titleX = Math.floor((320 - this.titleText.width) / 2);
        this.titleY = 60;
        this.hintX = 160; // 居中
        this.hintY = 85;
        this.tipX = Math.floor((320 - this.tipText.width) / 2);
        this.tipY = 105;
        
        this.active = true;
        this.timer = 0;
    },
    
    hide: function() {
        this.active = false;
        // 保留文本对象，以便在初始展示后绘制缩小的任务提示
    },
    
    update: function() {
        if (!this.active) return;
        this.timer++;
        if (this.timer >= this.duration) {
            this.active = false;
        }
    },
    
    draw: function(ctx) {
        if (!this.titleText) return;
        
        // 计算动画进度
        var progress = this.timer / this.duration;
        
        if (this.active) {
            // 初始展示阶段
            var fadeIn = Math.min(1, this.timer / 20);
            var fadeOut = progress > 0.6 ? (1 - progress) / 0.4 : 1;
            var alpha = fadeIn * fadeOut;
            
            // 绘制标题像素文字
            ctx.globalAlpha = alpha;
            this.titleText.pixels.forEach(function(p) {
                ctx.fillStyle = p.isOutline ? '#1a1a1a' : p.color;
                ctx.fillRect(this.titleX + p.x, this.titleY + p.y, 1, 1);
            }.bind(this));
            
            // 绘制提示文字（zpix像素字体，带发光）
            if (this.hintStr) {
                ctx.font = 'bold 10px zpix, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // 发光效果：多层阴影模拟CSS text-shadow
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 6;
                ctx.fillStyle = this.hintColor;
                ctx.fillText(this.hintStr, this.hintX, this.hintY);
                ctx.fillText(this.hintStr, this.hintX, this.hintY);
                ctx.shadowBlur = 12;
                ctx.fillText(this.hintStr, this.hintX, this.hintY);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = this.hintColor;
                ctx.fillText(this.hintStr, this.hintX, this.hintY);
                ctx.textAlign = 'left';
            }
            
            // 绘制闪烁的小字提示
            if (this.tipText) {
                var tipAlpha = alpha * (0.5 + 0.5 * Math.sin(this.timer * 0.15));
                ctx.globalAlpha = tipAlpha;
                this.tipText.pixels.forEach(function(p) {
                    ctx.fillStyle = p.isOutline ? '#0a0a0a' : p.color;
                    ctx.fillRect(this.tipX + p.x, this.tipY + p.y, 1, 1);
                }.bind(this));
            }
        } else {
            // 缩小并移动到右边偏上阶段
            ctx.globalAlpha = 1;
            
            // 缩小提示文字移到左下角（zpix像素字体，带发光）
            if (this.hintStr) {
                ctx.font = 'bold 11px zpix, monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                // 发光效果
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 4;
                ctx.fillStyle = this.hintColor;
                ctx.fillText(this.hintStr, 5, 175);
                ctx.fillText(this.hintStr, 5, 175);
                ctx.shadowBlur = 8;
                ctx.fillText(this.hintStr, 5, 175);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = this.hintColor;
                ctx.fillText(this.hintStr, 5, 175);
            }
        }
        
        ctx.globalAlpha = 1;
    }
};

function saveGame() {
    var saveData = {
        currentLevel: state.currentLevel,

    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    showSaveIndicator();
}

        try {
            var saveData = JSON.parse(saved);

}

function px(n) { return Math.floor(n); }

function drawPxCircle(cx, cy, r, color) {
    cx = px(cx); cy = px(cy); ctx.fillStyle = color;
    for (var dy = -r; dy <= r; dy++)
        for (var dx = -r; dx <= r; dx++)
            if (dx*dx+dy*dy <= r*r) ctx.fillRect(cx+dx, cy+dy, 1, 1);
}

function hasLineOfSight(x1, y1, x2, y2) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var dist = Math.hypot(dx, dy);
    if (dist < 1) return true;
    
    var steps = Math.ceil(dist / 3);
    for (var i = 1; i < steps; i++) {
        var t = i / steps;
        var checkX = x1 + dx * t;
        var checkY = y1 + dy * t;
        
        for (var j = 0; j < state.covers.length; j++) {
            var cv = state.covers[j];
            if (checkX >= cv.x && checkX <= cv.x + cv.w &&
                checkY >= cv.y && checkY <= cv.y + cv.h) {
                return false;
            }
        }
    }
    return true;
}

var shake = {x:0,y:0,intensity:0,frames:0};
function triggerShake(i,f){shake.intensity=i;shake.frames=f;}
function updateShake(){
    if(shake.frames>0){shake.x=(Math.random()-0.5)*shake.intensity*2;shake.y=(Math.random()-0.5)*shake.intensity*2;shake.frames--;}
    else{shake.x=0;shake.y=0;}
}

var ambientParts = [];
function initAmbient(){
    ambientParts=[];
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    var count = isSnow ? 80 : 25;
    for(var i=0;i<count;i++){
        var rx=Math.random()*level.width;
        var ry;
        if(isSnow){
            ry=Math.random()*180;
        }else{
            ry=level.tunnelTop+Math.random()*(level.tunnelBot-level.tunnelTop);
        }
        ambientParts.push({
            x:rx, y:ry,
            vx:(Math.random()-0.5)*(isSnow?0.4:0.15),
            vy:isSnow?(Math.random()*0.6+0.3):(Math.random()-0.5)*0.06,
            phase:Math.random()*Math.PI*2,
            bright:Math.random()>0.6,
            size:isSnow?(Math.random()>0.7?2:1):1
        });
    }
}
function updateAmbient(){
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    ambientParts.forEach(function(p){
        p.x+=p.vx+Math.sin(p.phase)*(isSnow?0.12:0.05);
        p.y+=p.vy;
        p.phase+=0.02;
        if(isSnow){
            if(p.y>185||p.x<-10||p.x>level.width+10){
                p.x=Math.random()*level.width;
                p.y=-5-Math.random()*20;
                p.phase=Math.random()*Math.PI*2;
            }
        }else{
            if(p.y<level.tunnelTop||p.y>level.tunnelBot||p.x<-5||p.x>level.width+5){
                p.x=Math.random()*level.width;
                p.y=level.tunnelTop+Math.random()*(level.tunnelBot-level.tunnelTop);
                p.phase=Math.random()*Math.PI*2;
            }
        }
    });
}
function drawAmbient(){
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    ambientParts.forEach(function(p){
        if(isSnow){
            var a=0.5+Math.sin(p.phase)*0.3;
            ctx.fillStyle='rgba(210,225,255,'+a+')';
            ctx.fillRect(px(p.x),px(p.y),p.size,p.size);
            if(p.size>1){
                ctx.globalAlpha=a*0.4;
                ctx.fillRect(px(p.x)+1,px(p.y),1,1);
                ctx.globalAlpha=1;
            }
        }else{
            var a=0.3+Math.sin(p.phase)*0.25;
            if(p.bright){
                ctx.fillStyle='rgba(212,175,55,'+a+')';ctx.fillRect(px(p.x),px(p.y),1,1);
                ctx.fillStyle='rgba(212,175,55,'+(a*0.3)+')';ctx.fillRect(px(p.x)-1,px(p.y),1,1);ctx.fillRect(px(p.x)+1,px(p.y),1,1);
            }else{
                ctx.fillStyle='rgba(180,170,140,'+(a*0.5)+')';ctx.fillRect(px(p.x),px(p.y),1,1);
            }
        }
    });
}

/* ==================== 关卡背景渲染 ==================== */
var bgCanvas = document.createElement('canvas');
bgCanvas.width=320;bgCanvas.height=180;
var bgCtx = bgCanvas.getContext('2d');

function renderLevelBG(level) {
    var c = bgCtx;
    var w = level.width;
    // 调整bgCanvas宽度以适配宽地图
    if (bgCanvas.width !== w) bgCanvas.width = w;
    
    if (level.id === 1) {
        renderSnowBG(c, w);
        return;
    }
    
    if (level.id === 2) {
        renderL2BG(c, w);
        return;
    }
    
    // === 以下为原始关卡背景渲染（第2-4关） ===
    c.fillStyle='#0a0a0e';c.fillRect(0,0,w,180);
    
    // 绘制上下墙壁
    var t = level.tunnelTop;
    var b = level.tunnelBot;
    
    // 上墙
    c.fillStyle='#222226';c.fillRect(0,0,w,t);
    c.fillStyle='#2a2a2e';c.fillRect(0,0,w,t-4);
    c.fillStyle='#2e2e32';c.fillRect(0,0,w,t-10);
    // 下墙
    c.fillStyle='#222226';c.fillRect(0,b,w,180-b);
    c.fillStyle='#2a2a2e';c.fillRect(0,b+4,w,180-b-4);
    c.fillStyle='#2e2e32';c.fillRect(0,b+10,w,180-b-10);
    
    // 墙壁纹理
    c.fillStyle='#1a1a1e';
    for(var i=0;i<w;i+=14){c.fillRect(i,t-2,10,2);c.fillRect(i,b,10,2);}
    c.fillStyle='#3a3a3e';
    for(var i=0;i<w;i+=14){c.fillRect(i+1,t-1,8,1);c.fillRect(i+1,b,8,1);}
    c.fillStyle='#40404a';
    for(var i=0;i<w;i+=3){c.fillRect(i,t,2,1);c.fillRect(i,b-1,2,1);}
    
    // 墙壁装饰
    c.fillStyle='#28282c';
    for(var i=0;i<w;i+=28){
        var h1=Math.floor(Math.random()*6)+2;
        c.fillRect(i,t-10-h1,2,h1);
        c.fillRect(i+10,t-8-Math.floor(Math.random()*5),2,Math.floor(Math.random()*5)+2);
        var h2=Math.floor(Math.random()*6)+2;
        c.fillRect(i,b+10,2,h2);
        c.fillRect(i+10,b+8,2,Math.floor(Math.random()*5)+2);
    }
    
    // 壁龛
    var niches=[80, 160, 240];
    niches.forEach(function(nx){
        c.fillStyle='#0a0a0e';c.fillRect(nx,t-35,16,30);c.fillRect(nx+16,t-30,12,22);
        c.fillStyle='#14141a';c.fillRect(nx+3,t-30,10,22);
    });
    
    // 关卡隔断墙（左右两侧）
    c.fillStyle='#3a3a42';
    c.fillRect(0, t, 8, b - t);
    c.fillRect(312, t, 8, b - t);
    
    // 隔断墙装饰
    c.fillStyle='#4a4a52';
    c.fillRect(0, t, 8, 3);
    c.fillRect(0, b - 3, 8, 3);
    c.fillRect(312, t, 8, 3);
    c.fillRect(312, b - 3, 8, 3);
    
    // 门框效果（入口和出口标记）
    c.fillStyle='#2a2a2e';
    c.fillRect(0, t + 8, 4, b - t - 16);
    c.fillRect(316, t + 8, 4, b - t - 16);
}

/* ==================== 第一关雪夜背景 ==================== */
function renderSnowBG(c, w) {
    // 雪地覆盖整个画面（无天空）
    // 整个画面都是白茫茫的雪地，带微微的夜间色调
    var h = 180; // 画布总高度
    
    // 雪地底色 - 从上到下略有深浅变化，营造夜间雪原感
    c.fillStyle='#a8b0c4';
    c.fillRect(0,0,w,h);
    
    // 顶部稍微偏暗（夜间远方雪地）
    c.fillStyle='#98a0b4';
    c.fillRect(0,0,w,h*0.25);
    
    // 中上部分渐变过渡
    c.fillStyle='#a0a8bc';
    c.fillRect(0,h*0.25,w,h*0.15);
    
    // 中下部分稍微亮一些（近处雪地反光）
    c.fillStyle='#b8c0d4';
    c.fillRect(0,h*0.6,w,h*0.2);
    
    // 底部高光
    c.fillStyle='#c0c8dc';
    c.fillRect(0,h*0.8,w,h*0.2);
    
    // 雪地纹理 - 覆盖整个画面
    for(var i=0;i<w*8;i++){
        var tx=Math.floor(Math.random()*w);
        var ty=Math.floor(Math.random()*h);
        if(Math.random()>0.4){
            c.fillStyle=Math.random()>0.5?'#a0a8bc':'#c0c8dc';
            c.fillRect(tx,ty,1,1);
        }
    }
    
    // 雪地闪光点 - 覆盖整个画面
    for(var i=0;i<w;i++){
        c.fillStyle=Math.random()>0.5?'#dce4ff':'#c8d4f0';
        c.fillRect(Math.floor(Math.random()*w),Math.floor(Math.random()*h),1,1);
    }
    
    // 雪堆/雪丘 - 散布在整个画面
    for(var x=0;x<w;x+=25){
        var dh=Math.floor(Math.random()*6)+2;
        var dw=Math.floor(Math.random()*20)+10;
        var dy=Math.floor(Math.random()*(h-20))+5;
        c.fillStyle='#c8d0e4';
        c.fillRect(x,dy,dw,dh+1);
    }
    
    // 额外的大雪丘
    c.fillStyle='#d0d8ec';
    for(var x=10;x<w;x+=60){
        var dh=Math.floor(Math.random()*4)+2;
        var dy=Math.floor(Math.random()*(h-30))+10;
        c.fillRect(x,dy,Math.floor(Math.random()*15)+10,dh);
    }
    
    // 小雪堆装饰
    c.fillStyle='#d8e0f0';
    for(var x=20;x<w;x+=80+Math.floor(Math.random()*60)){
        var dw=Math.floor(Math.random()*10)+5;
        var dh=Math.floor(Math.random()*4)+2;
        var dy=Math.floor(Math.random()*(h-20))+5;
        c.fillRect(x,dy,dw,dh);
    }
    
    // 地面上的小石头/半埋在雪中的岩石 - 稀疏分布
    c.fillStyle='#8890a0';
    for(var x=80;x<w;x+=90+Math.floor(Math.random()*70)){
        var rw=Math.floor(Math.random()*3)+2;
        var rh=Math.floor(Math.random()*2)+1;
        var ry=h*0.5+Math.floor(Math.random()*h*0.4);
        c.fillRect(x,ry,rw,rh);
        c.fillStyle='#a0a8b8';
        c.fillRect(x,ry-1,rw,1);
        c.fillStyle='#8890a0';
    }
    
    // 微弱的月光照射效果（雪地上的反光带）
    c.globalAlpha=0.03;
    c.fillStyle='#e0e8ff';
    c.fillRect(Math.floor(w*0.3),0,w*0.4,h);
    c.globalAlpha=1;
}

/* ==================== 第二关背景：圆形暗室 + 暗道 ==================== */
function renderL2BG(c, w) {
    var h = 180;
    var t = 50, b = 130; // tunnelTop, tunnelBot
    
    c.fillStyle='#0a0a0e'; c.fillRect(0,0,w,h);
    
    // === 圆形暗室 (x: 0~305, 圆心 152, 90, 半径 120) ===
    var cx = 140, cy = 90, R = 90;
    
    // 圆形房间地面
    c.fillStyle='#181820';
    for (var dx = -R; dx <= R; dx++) {
        for (var dy = -R; dy <= R; dy++) {
            if (dx*dx+dy*dy <= R*R) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    
    // 地面纹理
    for (var i = 0; i < 600; i++) {
        var ang = Math.random() * Math.PI * 2;
        var rad = Math.random() * (R - 10);
        var tx = cx + Math.cos(ang) * rad;
        var ty = cy + Math.sin(ang) * rad;
        c.fillStyle = Math.random() > 0.5 ? '#141418' : '#1e1e26';
        c.fillRect(Math.floor(tx), Math.floor(ty), 1, 1);
    }
    
    // 圆形墙壁 - 多层描边营造厚度
    c.fillStyle='#2a2a32';
    for (var dx = -R-2; dx <= R+2; dx++) {
        for (var dy = -R-2; dy <= R+2; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= (R+2)*(R+2) && d2 > R*R) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    // 外层墙壁加深
    c.fillStyle='#1a1a22';
    for (var dx = -R-4; dx <= R+4; dx++) {
        for (var dy = -R-4; dy <= R+4; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= (R+4)*(R+4) && d2 > (R+2)*(R+2)) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    // 墙壁高光边缘
    c.fillStyle='#35353e';
    for (var dx = -R; dx <= R; dx++) {
        for (var dy = -R; dy <= R; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= R*R && d2 > (R-2)*(R-2)) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    
    // 门口缺口（右侧，连接暗道）- 升降石门通道
    var doorGapY = t, doorGapH = b - t;
    for (var dy = 0; dy < doorGapH; dy++) {
        c.fillStyle='#181820';
        c.fillRect(200, doorGapY + dy, 30, 1);
    }
    // 门框两侧石壁（带凹槽，让石门在其中升降）
    // 左侧门框
    c.fillStyle='#2a2a32';
    c.fillRect(198, doorGapY, 3, doorGapH);
    c.fillStyle='#3a3a42';
    c.fillRect(198, doorGapY, 3, 2);
    c.fillRect(198, doorGapY + doorGapH - 2, 3, 2);
    // 右侧门框
    c.fillStyle='#2a2a32';
    c.fillRect(229, doorGapY, 3, doorGapH);
    c.fillStyle='#3a3a42';
    c.fillRect(229, doorGapY, 3, 2);
    c.fillRect(229, doorGapY + doorGapH - 2, 3, 2);
    // 门框凹槽阴影（内部更深色，表示升降轨道）
    c.fillStyle='#101016';
    for (var dy = 0; dy < doorGapH; dy++) {
        c.fillRect(201, doorGapY + dy, 1, 1);
        c.fillRect(228, doorGapY + dy, 1, 1);
    }
    // 门口顶部横梁（石门缩回的区域）
    c.fillStyle='#3a3a44';
    c.fillRect(196, t - 5, 38, 5);
    c.fillStyle='#44444e';
    c.fillRect(197, t - 4, 36, 1);
    // 顶部横梁石纹
    c.fillStyle='#4e4e58';
    c.fillRect(196, t - 3, 36, 1);
    c.fillStyle='#323240';
    c.fillRect(200, t - 2, 28, 1);
    // 顶部横梁苔藓（石门缩回区域常年潮湿，长满苔藓）
    c.fillStyle='#3a6a30';
    c.fillRect(198, t - 5, 4, 2);
    c.fillRect(210, t - 5, 3, 2);
    c.fillRect(222, t - 4, 5, 2);
    c.fillStyle='#2d5a26';
    c.fillRect(200, t - 4, 2, 1);
    c.fillRect(215, t - 5, 2, 1);
    c.fillRect(228, t - 4, 2, 2);
    c.fillStyle='#4a7a40';
    c.fillRect(199, t - 3, 3, 1);
    c.fillRect(218, t - 4, 2, 1);
    // 门框侧面苔藓（从顶部蔓延下来）
    c.fillStyle='#3a6a30';
    c.fillRect(198, t, 2, 6);
    c.fillRect(230, t, 2, 4);
    c.fillStyle='#2d5a26';
    c.fillRect(198, t + 8, 1, 3);
    c.fillRect(230, t + 6, 1, 3);
    c.fillStyle='#4a7a40';
    c.fillRect(199, t + 3, 1, 2);
    // 门口底部石槛
    c.fillStyle='#3a3a44';
    c.fillRect(196, b, 38, 3);
    c.fillStyle='#44444e';
    c.fillRect(197, b + 1, 36, 1);
    // 石槛上的磨损痕迹
    c.fillStyle='#4a4a54';
    for (var sx = 200; sx < 228; sx += 4) {
        c.fillRect(sx, b, 2, 1);
    }
    // 石槛底部少量苔藓
    c.fillStyle='#2d5a26';

    c.fillRect(220, b + 2, 4, 1);
    c.fillStyle='#356530';
    c.fillRect(206, b + 3, 2, 1);
    c.fillRect(230, b + 2, 2, 1);
    
    // 火把位置（圆形房间内壁4个方向）
    var torchPositions = [
        { x: cx - R + 4, y: cy },        // 左
        { x: cx + R - 4, y: cy },         // 右（门口附近）
        { x: cx, y: cy - R + 4 },        // 上
        { x: cx, y: cy + R - 4 }         // 下
    ];
    torchPositions.forEach(function(tp) {
        drawTorchOnBG(c, tp.x, tp.y);
    });
    
    // 额外火把（上下壁中间位置，增加照明感）
    drawTorchOnBG(c, cx - 60, cy - R + 4);
    drawTorchOnBG(c, cx + 60, cy - R + 4);
    drawTorchOnBG(c, cx - 60, cy + R - 4);
    drawTorchOnBG(c, cx + 60, cy + R - 4);
    
    // 火把光照效果（暖色渐变）
    c.globalAlpha = 0.04;

    for (var i = 0; i < torchPositions.length; i++) {
        drawPxCircleOn(c, torchPositions[i].x, torchPositions[i].y, 35, '#ff8844');
    }
    c.globalAlpha = 0.02;
    c.fillStyle = '#ff6622';
    for (var i = 0; i < torchPositions.length; i++) {
        drawPxCircleOn(c, torchPositions[i].x, torchPositions[i].y, 60, '#ff6622');
    }
    c.globalAlpha = 1;
    
    // === 暗道 (x: 305~960) ===
    // 上墙
    c.fillStyle='#222226'; c.fillRect(230, 0, w-230, t);
    c.fillStyle='#2a2a2e'; c.fillRect(230, 0, w-230, t-4);
    c.fillStyle='#2e2e32'; c.fillRect(230, 0, w-230, t-10);
    // 下墙
    c.fillStyle='#222226'; c.fillRect(230, b, w-230, h-b);
    c.fillStyle='#2a2a2e'; c.fillRect(230, b+4, w-230, h-b-4);
    c.fillStyle='#2e2e32'; c.fillRect(230, b+10, w-230, h-b-10);
    
    // 暗道墙壁纹理

// 在bgCtx上绘制火把（静态部分）
function drawTorchOnBG(c, tx, ty) {
    // 火把支架
    c.fillStyle='#4a3a28';
    c.fillRect(tx-1, ty, 3, 4);
    c.fillStyle='#5c4a33';
    c.fillRect(tx, ty-2, 1, 3);
    // 火焰底座
    c.fillStyle='#8b6914';
    c.fillRect(tx-1, ty-1, 3, 2);
}

// 在指定context上绘制像素圆（用于背景渲染）
function drawPxCircleOn(c, cx2, cy2, r, color) {
    cx2 = Math.floor(cx2); cy2 = Math.floor(cy2);
    c.fillStyle = color;
    for (var dy = -r; dy <= r; dy++) {
        for (var dx = -r; dx <= r; dx++) {
            if (dx*dx+dy*dy <= r*r) {
                c.fillRect(cx2+dx, cy2+dy, 1, 1);
            }
        }
    }
}

/* ==================== 第二关升降石门系统 ==================== */
var StoneDoor = {
    active: false,
    x: 0, y: 0, w: 10, h: 80,   // 石门范围，从顶部降下
    openProgress: 1.0,    // 1.0=完全打开(升起), 0.0=完全关闭(降下)
    closing: false,
    closeTimer: 0,
    closeDelay: 15,        // 关卡开始后多久开始关门（帧数）
    closed: false,
    // 苔藓装饰（预生成随机位置，避免每帧随机）
    mossPatches: [],
    
    init: function(config) {
        this.active = true;
        this.x = config.x;
        this.y = config.y;
        this.w = config.w;
        this.h = config.h;
        this.openProgress = 1.0;
        this.closing = false;
        this.closeTimer = 0;
        this.closeDelay = config.closeDelay || 15;
        this.closed = false;
        // 预生成苔藓位置
        this.mossPatches = [];
        for (var i = 0; i < 12; i++) {
            this.mossPatches.push({
                ox: Math.floor(Math.random() * (this.w - 2)),
                oy: Math.floor(Math.random() * 6),  // 苔藓集中在门顶部
                w: Math.floor(Math.random() * 3) + 1,
                h: Math.floor(Math.random() * 2) + 1,
                shade: Math.random() > 0.5 ? '#3a6a30' : '#2d5a26'
            });
        }
        // 侧边苔藓
        for (var i = 0; i < 6; i++) {
            this.mossPatches.push({
                ox: Math.random() > 0.5 ? 0 : this.w - 1,
                oy: Math.floor(Math.random() * 10),
                w: 1,
                h: Math.floor(Math.random() * 3) + 1,
                shade: Math.random() > 0.5 ? '#4a7a40' : '#356530'
            });
        }
    },
    
    update: function() {
        if (!this.active) return;
        if (!this.closed) {
            this.closeTimer++;
            if (this.closeTimer >= this.closeDelay && !this.closing) {
                this.closing = true;
            }
            if (this.closing && this.openProgress > 0) {
                // 石门从上方降下，先快后慢更自然
                var spd = this.openProgress > 0.5 ? 0.022 : 0.018;
                // 时间静止状态下，石门关闭速度大幅减缓
                if (state.timeStopped) spd *= 0.15;
                this.openProgress -= spd;
                if (this.openProgress <= 0) {
                    this.openProgress = 0;
                    this.closed = true;
                    // 检查玩家是否还在门内侧（圆形房间侧）
                    if (state.player && state.player.x + state.player.w < this.x + this.w) {
                        // 玩家未能通过石门，滚石锁定追杀
                        RollingBoulder.startHunting();
                    } else {
                        // 玩家已通过，触发滚石堵门
                        RollingBoulder.startRolling();
                    }
                    triggerShake(5, 18);
                }
            }
        }
    },
    
    // 石门当前已降下的高度
    getCurrentHeight: function() {
        return Math.floor(this.h * (1 - this.openProgress));
    },
    
    // 升降石门：单块从上方降下，返回一个碰撞矩形
    getCollisionRects: function() {
        if (this.openProgress >= 1) return null;
        var curH = this.getCurrentHeight();
        if (curH < 1) return null;
        return [
            { x: this.x, y: this.y, w: this.w, h: curH }
        ];
    },
    
    isBlocking: function() {
        // 门降下超过一半就视为阻挡
        return this.active && this.openProgress < 0.5;
    },
    
    draw: function() {
        if (!this.active || this.openProgress >= 1) return;
        var curH = this.getCurrentHeight();
        if (curH < 1) return;
        
        var x = px(this.x), y = px(this.y);
        var doorW = this.w;
        
        // === 苔藓层（门的最顶部，覆盖在石面之上）===
        // 苔藓只画在已降下的区域顶部
        this.mossPatches.forEach(function(mp) {
            if (mp.oy < curH) {
                ctx.fillStyle = mp.shade;
                ctx.fillRect(x + mp.ox, y + mp.oy, mp.w, mp.h);
            }
        });
        // 苔藓边缘 drip（沿门边缘滴落的少量苔藓）
        if (curH > 6) {
            ctx.fillStyle='#3a6a30';
            ctx.fillRect(x, y + 4, 1, 3);
            ctx.fillRect(x + doorW - 1, y + 6, 1, 2);
            ctx.fillStyle='#2d5a26';
            ctx.fillRect(x + 2, y + 5, 1, 4);
        }
        // 底部苔藓蔓延效果
        if (curH > 12) {
            ctx.fillStyle='#2a5020';
            ctx.fillRect(x + 1, y + 10, 2, 2);
            ctx.fillStyle='#356530';
            ctx.fillRect(x + doorW - 2, y + 8, 2, 1);
        }
        
        // === 石门主体 ===
        ctx.fillStyle='#4a4a52';
        ctx.fillRect(x, y, doorW, curH);
        
        // 石砖纹理（水平砖缝）
        ctx.fillStyle='#5a5a62';
        for (var dy = 0; dy < curH; dy += 8) {
            ctx.fillRect(x, y + dy, doorW, 1);
        }
        // 砖缝阴影
        ctx.fillStyle='#3a3a42';
        for (var dy = 4; dy < curH; dy += 8) {
            ctx.fillRect(x + 1, y + dy, doorW - 2, 1);
        }
        
        // 垂直砖缝（交错排列）
        ctx.fillStyle='#3a3a40';
        for (var dy = 0; dy < curH; dy += 8) {
            var offset = (dy % 16 === 0) ? 3 : Math.floor(doorW / 2);
            ctx.fillRect(x + offset, y + dy, 1, Math.min(8, curH - dy));
        }
        
        // 金属加固条（横向铁带）
        ctx.fillStyle='#6a6a6e';
        if (curH > 4) {
            ctx.fillRect(x - 1, y + 2, doorW + 2, 2);  // 顶部铁带
        }
        if (curH > 20) {
            ctx.fillRect(x - 1, y + Math.floor(curH * 0.6), doorW + 2, 2);  // 中部铁带
        }
        // 铁带铆钉
        ctx.fillStyle='#7a7a7e';
        if (curH > 4) {
            ctx.fillRect(x, y + 2, 1, 2);
            ctx.fillRect(x + doorW - 1, y + 2, 1, 2);
        }
        if (curH > 20) {
            var bandY = y + Math.floor(curH * 0.6);
            ctx.fillRect(x, bandY, 1, 2);
            ctx.fillRect(x + doorW - 1, bandY, 1, 2);
        }
        
        // 左右边框高光
        ctx.fillStyle='#5a5a64';
        ctx.fillRect(x, y, 1, curH);
        ctx.fillStyle='#3a3a42';
        ctx.fillRect(x + doorW - 1, y, 1, curH);
        
        // 底部边缘（石门下缘磨损效果）
        ctx.fillStyle='#585860';
        ctx.fillRect(x, y + curH - 1, doorW, 1);
        ctx.fillStyle='#6a6a70';
        ctx.fillRect(x + 1, y + curH - 1, doorW - 2, 1);
        
        // 关闭时的震动/火花效果
        if (this.closing && this.openProgress > 0 && this.openProgress < 0.08) {
            ctx.fillStyle='rgba(180,180,200,0.12)';
            ctx.fillRect(x - 1, y - 1, doorW + 2, curH + 2);
        }
        // 石尘粒子（关门过程中）
        if (this.closing && this.openProgress < 0.3 && this.openProgress > 0.02) {
            ctx.fillStyle='rgba(100,100,110,0.2)';
            ctx.fillRect(x + Math.floor(Math.random() * doorW), y + curH, 1, 1);
            ctx.fillRect(x + Math.floor(Math.random() * doorW), y + curH - 1, 1, 1);
        }
    },
    
    reset: function() {
        this.active = false;
        this.openProgress = 1.0;
        this.closing = false;
        this.closeTimer = 0;
        this.closed = false;
        this.mossPatches = [];
    }
};

        this.speed = 0.3;
    },
    
    // 玩家未通过石门时调用：滚石锁定追杀玩家
    startHunting: function() {
        if (!this.active || this.rolling) return;
        this.rolling = true;
        this.hunting = true;
        this.speed = 0.5;
        triggerShake(8, 10);
    },
    
    update: function() {
        if (!this.active || !this.rolling || this.settled) return;
        
        if (this.hunting && state.player) {
            // === 锁定追杀模式：滚石朝玩家位置移动 ===
            var pcx = state.player.x + state.player.w / 2;
            var pcy = state.player.y + state.player.h / 2;
            var dx = pcx - this.x;
            var dy = pcy - this.y;
            var dist = Math.hypot(dx, dy);
            if (dist > 0.5) {
                // 加速追赶，确保比玩家快
                this.speed = Math.min(this.speed + 0.02, 3.0);
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
            this.rotation += this.speed * 3;
        } else {
            // === 正常模式：直线滚向石门 ===
            this.speed = Math.min(this.speed + 0.008, 1.5);
            this.x += this.speed;
            this.rotation += this.speed * 3;
            
            // 到达石门位置则停止
            if (this.x >= this.targetX - this.radius) {
                this.x = this.targetX - this.radius;
                this.settled = true;
                this.rolling = false;
                triggerShake(5, 12);
            }
        }
        
        // 检测玩家碰撞（被滚石碾压 = 淘汰）
        if (state.player) {
            var px2 = state.player.x + state.player.w / 2;
            var py2 = state.player.y + state.player.h / 2;
            var dist = Math.hypot(px2 - this.x, py2 - this.y);
            if (dist < this.radius + 5) {
                if (hasRewind) {
                    triggerRewind();
                } else {
                    respawnAtCheckpoint();
                }
            }
        }
    },
    
    getCollisionRect: function() {
        if (!this.active || !this.settled) return null;
        return {
            x: this.x - this.radius,
            y: this.y - this.radius,
            w: this.radius * 2,
            h: this.radius * 2
        };
    },
    
    draw: function() {
        if (!this.active) return;
        var bx = px(this.x), by = px(this.y), r = this.radius;
        
        // 阴影
        ctx.fillStyle='rgba(0,0,0,0.3)';
        for(var dy=-r; dy<=r; dy++){
            for(var dx=-r; dx<=r; dx++){
                if(dx*dx+dy*dy<=r*r){
                    ctx.fillRect(bx+dx, by+dy+r+2, 1, 1);
                }
            }
        }
        
        // 滚石本体
        for(var dy=-r; dy<=r; dy++){
            for(var dx=-r; dx<=r; dx++){
                if(dx*dx+dy*dy<=r*r){
                    // 根据旋转角度产生纹理偏移
                    var texOff = Math.sin(dx*0.3+this.rotation)*Math.cos(dy*0.3+this.rotation);
                    var shade = texOff > 0 ? '#5a5a5a' : '#4a4a4a';
                    ctx.fillStyle = shade;
                    ctx.fillRect(bx+dx, by+dy, 1, 1);
                }
            }
        }
        
        // 高光
        ctx.fillStyle='#6a6a6a';
        ctx.fillRect(bx-3, by-4, 3, 3);
        ctx.fillStyle='#707070';
        ctx.fillRect(bx-3, by-4, 1, 1);
        
        // 裂纹纹理
        var crackAngle = this.rotation * 0.5;
        for(var i=0; i<3; i++){
            var ca = crackAngle + i * 2.1;
            for(var cd=2; cd<r-2; cd++){
                var crx = bx + Math.cos(ca)*cd;
                var cry = by + Math.sin(ca)*cd;
                if((crx-bx)*(crx-bx)+(cry-by)*(cry-by) <= r*r){
                    ctx.fillStyle='#3a3a3a';
                    ctx.fillRect(Math.floor(crx), Math.floor(cry), 1, 1);
                }
            }
        }
        
        // 滚动时的灰尘效果
        if (this.rolling && !this.settled) {
            for(var i=0; i<2; i++){
                ctx.fillStyle='rgba(100,100,100,0.3)';
                ctx.fillRect(bx-r-2-Math.floor(Math.random()*5), by+r-2+Math.floor(Math.random()*4)-2, 2, 2);
            }
        }
    },
    
    reset: function() {
        this.active = false;
        this.rolling = false;
        this.settled = false;
        this.speed = 0;
        this.rotation = 0;
    }
};

// 将颜色向血红色混合
function bloodBlend(hex, ratio) {
    if (!ratio || ratio <= 0) return hex;
    if (ratio >= 1) ratio = 1;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    // 目标血色：深暗红
    var br = 110, bg = 10, bb = 10;
    var nr = Math.round(r + (br - r) * ratio);
    var ng = Math.round(g + (bg - g) * ratio);
    var nb = Math.round(b + (bb - b) * ratio);
    return '#' + ((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
}

// 击杀敌人时调用（仅第二关有效）
function onEnemyKilledL2() {
    if (state.currentLevel === 2 && state.l2TotalEnemies > 0) {

// 血液粒子系统（在玩家身上滴落）
var bloodDrips = [];
function updateBloodDrips() {
    if (state.bloodLevel <= 0) {
        bloodDrips = [];
        return;
    }
    // 按照血迹等级概率生成新血滴
    if (state.isMoving && Math.random() < state.bloodLevel * 0.3) {
        bloodDrips.push({
            x: state.player.x + Math.random()*8,
            y: state.player.y + 10 + Math.random()*2,
            vy: 0.15 + Math.random()*0.2,
            life: 25 + Math.floor(Math.random()*15),
            maxLife: 40
        });
    }
    // 更新现有血滴
    for (var i = bloodDrips.length - 1; i >= 0; i--) {
        bloodDrips[i].y += bloodDrips[i].vy;
        bloodDrips[i].life--;
        if (bloodDrips[i].life <= 0) {
            bloodDrips.splice(i, 1);
        }
    }
}
function drawBloodDrips() {
    for (var i = 0; i < bloodDrips.length; i++) {
        var d = bloodDrips[i];
        var alpha = Math.max(0, d.life / d.maxLife) * 0.7;
        ctx.fillStyle = 'rgba(160,15,15,' + alpha + ')';
        ctx.fillRect(px(d.x), px(d.y), 1, 1);
        ctx.fillStyle = 'rgba(130,10,10,' + (alpha*0.5) + ')';
        ctx.fillRect(px(d.x)-1, px(d.y)+1, 1, 1);
    }
}

function Entity(x,y,w,h,color){this.x=x;this.y=y;this.w=w;this.h=h;this.color=color;this.vx=0;this.vy=0;}

function Player(x,y){
    Entity.call(this,x,y,8,12,PAL.white);
    this.speed=PLAYER_SPEED_NORMAL;this.facingRight=true;this.animTimer=0;this.animFrame=0;
}
Player.prototype.update=function(){
    this.speed=state.timeStopped?PLAYER_SPEED_STOP:PLAYER_SPEED_NORMAL;
    this.vx=0;this.vy=0;
    if(state.keys['w'])this.vy=-this.speed;
    if(state.keys['s'])this.vy=this.speed;
    if(state.keys['a']){this.vx=-this.speed;this.facingRight=false;}
    if(state.keys['d']){this.vx=this.speed;this.facingRight=true;}
    var nx=this.x+this.vx,ny=this.y+this.vy;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    // 石门碰撞检测（第二关，升降石门从上方降下）
    if(!blocked && StoneDoor.active){
        var sdRects=StoneDoor.getCollisionRects();
        if(sdRects){
            for(var si=0;si<sdRects.length;si++){
                var sr=sdRects[si];
                if(nx<sr.x+sr.w&&nx+this.w>sr.x&&ny<sr.y+sr.h&&ny+this.h>sr.y){
                    blocked=true;break;
                }
            }
        }
    }
    // 滚石碰撞检测（第二关，已停下的滚石作为障碍）
    if(!blocked){
        var br=RollingBoulder.getCollisionRect();
        if(br && nx<br.x+br.w&&nx+this.w>br.x&&ny<br.y+br.h&&ny+this.h>br.y){
            blocked=true;
        }
    }
    if(!blocked){this.x=nx;this.y=ny;}
    
    // 关卡边界限制（考虑隔断墙）
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x=Math.max(10, Math.min(maxX - this.w, this.x));
    // 第二关：小密室区域使用独立边界
    if (state.currentLevel === 2) {
        var srLeft = 1065, srRight = 1115, srEntryLeft = 1068, srEntryRight = 1096;
        var inRoomArea = (this.x + this.w > srLeft && this.x < srRight);
        var inEntryArea = (this.x + this.w > srEntryLeft && this.x < srEntryRight);
        if (inRoomArea || inEntryArea) {
            this.y = Math.max(8, Math.min(level.tunnelBot - this.h, this.y));
        } else {
            this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
        }
    } else {
        this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
    }
    
    // 第二关：圆形房间边界（左侧区域时，限制在圆内，但门口缺口除外）
    if (state.currentLevel === 2 && this.x + this.w/2 < 230) {
        var rcx = 140, rcy = 90, R = 86;
        var pcx = this.x + this.w/2, pcy = this.y + this.h/2;
        // 门口缺口区域（x>195 且 y在通道范围内）不受圆形边界限制
        if (pcx > 195 && pcy > 52 && pcy < 128) {
            // 在门口通道内，不应用圆形边界
        } else {
            var distFromCenter = Math.hypot(pcx - rcx, pcy - rcy);
            if (distFromCenter + 6 > R) {
                var ang = Math.atan2(pcy - rcy, pcx - rcx);
                this.x = rcx + Math.cos(ang) * (R - 6) - this.w/2;
                this.y = rcy + Math.sin(ang) * (R - 6) - this.h/2;
            }
        }
    }
    state.isMoving=(this.vx!==0||this.vy!==0);
    if(state.isMoving){this.animTimer++;if(this.animTimer%6===0)this.animFrame=(this.animFrame+1)%4;}
    else{this.animFrame=0;this.animTimer=0;}
};

    // 裤腿（受血迹影响）
    ctx.fillStyle=bl ? bloodBlend('#2a2420', bl) : '#2a2420';
    if(leg){ctx.fillRect(x+1,y+10,2,2);ctx.fillRect(x+5,y+10,2,2);}
    else{ctx.fillRect(x+2,y+10,2,2);ctx.fillRect(x+4,y+10,2,2);}
    // 剑（轻微受血迹影响）
    var sx=f>0?x+8:x-2;
    ctx.fillStyle=bl ? bloodBlend('#b0b8c0', bl * 0.3) : '#b0b8c0';ctx.fillRect(sx,y-3+bob,1,11);
    ctx.fillStyle=bl ? bloodBlend(PAL.darkGold, bl * 0.3) : PAL.darkGold;ctx.fillRect(sx-1,y+5+bob,3,1);
    ctx.fillStyle=bl ? bloodBlend('#e0e8f0', bl * 0.3) : '#e0e8f0';ctx.fillRect(sx,y-3+bob,1,2);
    
    // 第二关：血迹斑驳效果（在衣服上随机位置绘制血斑点）
    if (bl > 0) {
        // 使用确定性随机种子保证血斑位置稳定
        var seed = state.l2KilledEnemies * 7;
        var spotCount = Math.floor(bl * 8); // 最多8个血斑
        for (var si = 0; si < spotCount; si++) {
            var ps = (seed + si * 13) % 100;
            var spx = x + (ps % 8);
            var spy = y + 3 + bob + Math.floor(ps / 8) % 7;
            // 深色血斑
            ctx.fillStyle = 'rgba(90,5,5,' + (0.4 + bl * 0.4) + ')';
            ctx.fillRect(spx, spy, 1, 1);
            if (si % 2 === 0) {
                ctx.fillStyle = 'rgba(120,10,10,' + (0.3 + bl * 0.3) + ')';
                ctx.fillRect(spx + 1, spy, 1, 1);
            }
        }
    }
    
    if(state.timeStopped&&state.isMoving){
        ctx.globalAlpha=0.2;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+1,y+bob,6,10);
        ctx.globalAlpha=0.08;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+(f>0?-3:5),y+bob,6,10);
        ctx.globalAlpha=1;
    }
    
    // 第二关：绘制血滴效果
    if (bl > 0) drawBloodDrips();
};

Enemy.prototype.update=function(){

        if(this.marked)return;
        if(!state.isMoving)return;
        this.doPatrol();this.doPushBack();this.doShooting();return;
    }
    this.doPatrol();this.doShooting();

Enemy.prototype.doPatrol=function(){
    this.moveTimer--;
    if(this.moveTimer<=0){var a=Math.random()*Math.PI*2;this.dirX=Math.cos(a);this.dirY=Math.sin(a);this.moveTimer=Math.random()*100+50;}
    var nx=this.x+this.dirX*this.moveSpeed,ny=this.y+this.dirY*this.moveSpeed;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    if(!blocked){this.x=nx;this.y=ny;}
    else{this.dirX=-this.dirX+(Math.random()-0.5)*0.5;this.dirY=-this.dirY+(Math.random()-0.5)*0.5;var len=Math.hypot(this.dirX,this.dirY)||1;this.dirX/=len;this.dirY/=len;this.moveTimer=Math.random()*40+20;}
    this.clampBounds();
};
Enemy.prototype.doPushBack=function(){
    var dx=this.x+4-(state.player.x+4),dy=this.y+6-(state.player.y+6);
    var dist=Math.hypot(dx,dy)||1;
    if(dist<PUSH_RANGE){var force=PUSH_FORCE*(1-dist/PUSH_RANGE);this.x+=(dx/dist)*force;this.y+=(dy/dist)*force;this.clampBounds();this.pushFlash=4;if(state.globalTick%3===0)state.effects.push({x:this.x+Math.random()*8,y:this.y+Math.random()*12,life:10,maxLife:10,type:'push-spark'});}
};
Enemy.prototype.doShooting=function(){
    this.shootCooldown--;
    if(this.shootCooldown<=0){
        var dx = state.player.x - this.x;
        var dy = state.player.y - this.y;
        var dist = Math.hypot(dx, dy);
        
        if(dist <= ATTACK_RANGE){
            this.shootKnife();
        }
        this.shootCooldown=Math.random()*200+180;
    }
    this.alertTimer=this.shootCooldown<25?(this.alertTimer+1)%12:0;
};

Enemy.prototype.drawPrediction=function(){
    var self=this;
    var simX=this.x,simY=this.y;
    var level = LEVELS[state.currentLevel - 1];
    for(var s=0;s<40;s++){
        var nx2=simX+this.dirX*this.moveSpeed;
        var ny2=simY+this.dirY*this.moveSpeed;
        if(ny2<level.tunnelTop||ny2+self.h>level.tunnelBot)break;
        var hit=false;
        state.covers.forEach(function(cv){if(nx2<cv.x+cv.w&&nx2+self.w>cv.x&&ny2<cv.y+cv.h&&ny2+self.h>cv.y)hit=true;});
        if(hit)break;
        simX=nx2;simY=ny2;
    }
    simX=Math.max(10,Math.min(level.width-18-self.w,simX));
    simY=Math.max(level.tunnelTop,Math.min(level.tunnelBot-self.h,simY));
    var predX=simX,predY=simY;
    var dx=predX-this.x,dy=predY-this.y;
    var dist=Math.hypot(dx,dy);
    if(dist>3){
        for(var s=3;s<dist;s+=3){
            var t=s/dist;
            var lx=px(this.x+4+dx*t);
            var ly=px(this.y+6+dy*t);
            var la=0.32*(1-t*0.65);
            if(Math.floor(s/3)%2===0){
                ctx.fillStyle='rgba(0,210,210,'+la+')';ctx.fillRect(lx,ly,1,1);
                ctx.fillStyle='rgba(0,210,210,'+(la*0.3)+')';ctx.fillRect(lx-1,ly,1,1);ctx.fillRect(lx+1,ly,1,1);
            }else{
                ctx.fillStyle='rgba(0,180,180,'+(la*0.5)+')';ctx.fillRect(lx,ly,1,1);
            }
        }
    }
    var pulse=0.18+Math.sin(state.globalTick*0.1)*0.07;
    ctx.globalAlpha=pulse;
    drawSimpleEnemy(predX,predY,this.variant,false);
    ctx.globalAlpha=1;
};

Enemy.prototype.drawBigRedX=function(x,y){
    var cx=x+4,cy=y+6,pulse=Math.sin(state.globalTick*0.12)*0.25+0.75;
    ctx.globalAlpha=pulse;
    ctx.fillStyle='rgba(255,20,20,0.1)';ctx.fillRect(x-4,y-5,16,18);

    ctx.globalAlpha=1;
};

/* ==================== 快速巡逻敌人（第二关新暗道） ==================== */
function FastPatrolEnemy(x, y, patrolX1, patrolX2, patrolY) {
    Entity.call(this, x, y, 8, 12, '#cc3333');
    this.moveSpeed = 0.7;
    this.shootCooldown = Math.random() * 30 + 20;
    this.variant = Math.floor(Math.random() * 3);
    this.alertTimer = 0;
    this.marked = false;
    this.pushFlash = 0;
    this.patrolX1 = patrolX1;
    this.patrolX2 = patrolX2;
    this.patrolY = patrolY;
    this.patrolDir = 1;
    this.dirX = 1;
    this.dirY = 0;
    this.knifeInitSpd = 1.8;
    this.knifeAccel = 0.06;
    this.knifeMaxSpd = 5.5;
    this.kniveCount = 3;
    this.knifeSpread = 0.25;
    this.burstCount = 0;        // 连续射击计数
    this.burstMax = 3;          // 每轮最多连射3次
    this.burstCooldown = 100;   // 连射3次后的强制冷却时间（帧）
}
FastPatrolEnemy.prototype = Object.create(Enemy.prototype);
FastPatrolEnemy.prototype.constructor = FastPatrolEnemy;

FastPatrolEnemy.prototype.doPatrol = function() {
    var targetX = this.patrolDir > 0 ? this.patrolX2 : this.patrolX1;
    this.dirX = this.patrolDir;
    this.dirY = 0;
    
    var nx = this.x + this.dirX * this.moveSpeed;
    if (nx >= this.patrolX2) {
        this.patrolDir = -1;
        nx = this.patrolX2;
    } else if (nx <= this.patrolX1) {
        this.patrolDir = 1;
        nx = this.patrolX1;
    }
    
    var ny = this.patrolY;
    var blocked = false;
    state.covers.forEach(function(cv) {
        if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
    }.bind(this));
    
    if (!blocked) {
        this.x = nx;
        this.y = ny;
    } else {
        this.patrolDir = -this.patrolDir;
    }
    this.clampBounds();
};

FastPatrolEnemy.prototype.doShooting = function() {
    this.shootCooldown--;
    if (this.shootCooldown <= 0) {
        var dx = state.player.x - this.x;
        var dy = state.player.y - this.y;
        var dist = Math.hypot(dx, dy);
        if (dist <= ATTACK_RANGE) {
            this.shootKnife();
            this.burstCount++;
            // 连续发射burstMax次后，强制冷却
            if (this.burstCount >= this.burstMax) {
                this.shootCooldown = this.burstCooldown;
                this.burstCount = 0;
            } else {
                this.shootCooldown = Math.random() * 30 + 20;
            }
        } else {
            this.shootCooldown = Math.random() * 30 + 20;
        }
    }
    this.alertTimer = 0;
};

FastPatrolEnemy.prototype.shootKnife = function() {
    var dx = state.player.x - this.x;
    var dy = state.player.y - this.y;
    var baseAngle = Math.atan2(dy, dx);
    var count = this.kniveCount;
    var spread = this.knifeSpread;
    for (var i = 0; i < count; i++) {
        var offsetAngle = (i - (count - 1) / 2) * spread;
        var angle = baseAngle + offsetAngle;
        var knife = new Knife(this.x + 4, this.y + 4, Math.cos(angle), Math.sin(angle));
        knife.speed = this.knifeInitSpd;
        knife.customAccel = this.knifeAccel;
        knife.customMaxSpd = this.knifeMaxSpd;
        state.projectiles.push(knife);
    }
};

// 始终盾牌面向玩家，不发射飞刀，只能从背面击杀
function ShieldDefender(x, y, name, armorColor, isTall) {
    Entity.call(this, x, y, isTall ? 10 : 8, isTall ? 16 : 12, armorColor);
    this.name = name;
    this.armorColor = armorColor;
    this.isTall = isTall;
    this.marked = false;
    this.pushFlash = 0;
    this.hitFlash = 0;
    // 盾牌始终朝向左边（-1=盾在右边，面向左，挡住左侧攻击）
    this.shieldDir = -1;
    this.moveSpeed = 0.15;
    // 寻找搭档的引用
    this.partner = null;
}
ShieldDefender.prototype = Object.create(Enemy.prototype);
ShieldDefender.prototype.constructor = ShieldDefender;

ShieldDefender.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;
    if (state.timeStopped) {
        if (this.marked) return;
        // 时间静止时不做任何事（不发射飞刀）
        return;
    }
    
    // 盾牌始终朝向左边
    this.shieldDir = -1;
    
    // 主动靠近玩家
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    // 与玩家保持一定距离
    var approachSpeed = 0.3;
    if (dist > 40) {
        var moveX = (dx / dist) * approachSpeed;
        var moveY = (dy / dist) * approachSpeed * 0.6; // 垂直移动稍慢
        
        var nx = this.x + moveX;
        var ny = this.y + moveY;
        
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        
        if (!blocked) { this.x = nx; this.y = ny; }
    } else if (dist < 30) {
        // 太近了，稍微后退
        var retreatX = (-dx / dist) * approachSpeed * 0.5;
        var nx = this.x + retreatX;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; }
    }
    
    this.clampBounds();
};

ShieldDefender.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

    } else {

        ctx.fillRect(x + 2, y + h - 4, 2, 4);
        ctx.fillRect(x + w - 4, y + h - 4, 2, 4);
    } else {
        ctx.fillRect(x + 2, y + h - 2, 2, 2);
        ctx.fillRect(x + w - 4, y + h - 2, 2, 2);
    }
    
    // 盾牌 - 根据shieldDir决定方向
    var shieldW = 5;
    var shieldH = this.isTall ? 12 : 9;
    var shieldX, shieldY = y;
    if (this.shieldDir === 1) {
        // 盾在左边（面向右）
        shieldX = x - 4;
    } else {
        // 盾在右边（面向左）
        shieldX = x + w - 1;
    }
    
    // 盾牌主体
    ctx.fillStyle = this.armorColor === 'black' ? '#3a3a42' : '#d0d0c8';
    ctx.fillRect(shieldX, shieldY, shieldW, shieldH);
    // 盾牌边框
    ctx.fillStyle = this.armorColor === 'black' ? '#5a5a62' : '#a0a098';
    ctx.fillRect(shieldX, shieldY, 1, shieldH);
    ctx.fillRect(shieldX + shieldW - 1, shieldY, 1, shieldH);
    ctx.fillRect(shieldX, shieldY, shieldW, 1);
    ctx.fillRect(shieldX, shieldY + shieldH - 1, shieldW, 1);
    // 盾牌中心装饰
    ctx.fillStyle = this.armorColor === 'black' ? '#2a2a32' : '#b8b8b0';
    ctx.fillRect(shieldX + 2, shieldY + Math.floor(shieldH/2) - 1, 1, 3);
    ctx.fillRect(shieldX + 1, shieldY + Math.floor(shieldH/2), 3, 1);
    
    // 名字
    ctx.fillStyle = this.armorColor === 'black' ? '#aaccff' : '#ffcc88';
    ctx.font = '7px zpix, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, x + w / 2, y - 7);
    ctx.textAlign = 'left';
    
    if (this.marked) {
        var cx = x + w / 2;
        var cy = y + h / 2;
        var pulse = Math.sin(state.globalTick * 0.12) * 0.25 + 0.75;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff1111';
        for (var d = -6; d <= 6; d++) {
            ctx.fillRect(cx + d, cy + d, 2, 1);
            ctx.fillRect(cx + d, cy - d, 2, 1);
        }
        ctx.globalAlpha = 1;
    }
};

// 判断玩家是否在哧吭的背面
ShieldDefender.prototype.isPlayerBehind = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var myCenterX = this.x + this.w / 2;
    // 盾牌面向的方向的反方向即为背面
    if (this.shieldDir === 1) {
        // 盾在左，面向右，背面是左边
        return playerCenterX < myCenterX - 4;
    } else {
        // 盾在右，面向左，背面是右边
        return playerCenterX > myCenterX + 4;
    }
};

/* ==================== 盾兵·吭哧（攻击型搭档） ==================== */
// 发射飞刀，始终紧跟在哧吭后面
function ShieldPartner(x, y, name, armorColor, isTall) {
    Entity.call(this, x, y, isTall ? 10 : 8, isTall ? 16 : 12, armorColor);
    this.name = name;
    this.armorColor = armorColor;
    this.isTall = isTall;
    this.marked = false;
    this.pushFlash = 0;
    this.hitFlash = 0;
    this.shootCooldown = Math.random() * 150 + 100;
    this.alertTimer = 0;
    this.moveSpeed = 0.3;
    this.moveTimer = Math.random() * 80 + 40;
    var angle = Math.random() * Math.PI * 2;
    this.dirX = Math.cos(angle);
    this.dirY = Math.sin(angle);
    // 搭档引用（防御者）
    this.defender = null;
    // 跟随偏移
    this.followOffsetX = -20;
    this.followOffsetY = 0;
}
ShieldPartner.prototype = Object.create(Enemy.prototype);
ShieldPartner.prototype.constructor = ShieldPartner;

ShieldPartner.prototype.chasePlayer = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    if (dist > 25) {
        var speed = 0.35;
        var nx = this.x + (dx / dist) * speed;
        var ny = this.y + (dy / dist) * speed * 0.6;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; this.y = ny; }
    }
    this.clampBounds();
};

ShieldPartner.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;
    if (state.timeStopped) {
        if (this.marked) return;
        if (!state.isMoving) return;
        this.doShooting();
        return;
    }
    
    // 如果有搭档，始终跟随在搭档后方（右侧，因为盾牌朝左）
    if (this.defender && state.enemies.indexOf(this.defender) !== -1) {
        var def = this.defender;
        // 始终跟在搭档右侧（盾牌背面）
        var followDist = 16;
        var targetX = def.x + def.w + followDist;
        var targetY = def.y + (def.h - this.h) / 2;
        
        var dx = targetX - this.x;
        var dy = targetY - this.y;
        var dist = Math.hypot(dx, dy);
        
        if (dist > 2) {
            var speed = Math.min(0.6, dist * 0.12);
            var nx = this.x + (dx / dist) * speed;
            var ny = this.y + (dy / dist) * speed;
            var blocked = false;
            state.covers.forEach(function(cv) {
                if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
            }.bind(this));
            if (!blocked) { this.x = nx; this.y = ny; }
        }
        this.clampBounds();
    } else {
        // 搭档已死，主动追击玩家
        this.chasePlayer();
    }
    
    this.doShooting();
};

ShieldPartner.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

ShieldPartner.prototype.draw = function() {

    if (this.isTall) {
        ctx.fillRect(x + 2, y + h - 4, 2, 4);
        ctx.fillRect(x + w - 4, y + h - 4, 2, 4);
    } else {
        ctx.fillRect(x + 2, y + h - 2, 2, 2);

    ctx.fillRect(x + w + 2, y + 4, 1, 1);
    
    // 警觉标记
    if (this.alertTimer > 0 && this.alertTimer < 8 && !this.marked) {
        var level = LEVELS[state.currentLevel - 1];
        var alertY = y - 6; if (alertY < level.tunnelTop) alertY = level.tunnelTop;
        ctx.fillStyle = PAL.gold;
        ctx.fillRect(x + 3, alertY, 2, 1);
        ctx.fillRect(x + 2, alertY + 1, 4, 1);
        ctx.fillRect(x + 2, alertY + 2, 1, 1);
        ctx.fillRect(x + 5, alertY + 2, 1, 1);
    }
    
    // 名字
    ctx.fillStyle = this.armorColor === 'black' ? '#aaccff' : '#ffcc88';
    ctx.font = '7px zpix, monospace';

    if (this.marked) {

        var pulse = Math.sin(state.globalTick * 0.12) * 0.25 + 0.75;

        for (var d = -6; d <= 6; d++) {
            ctx.fillRect(cx + d, cy + d, 2, 1);

};

function Knife(x,y,dirX,dirY){
    this.x=x;this.y=y;this.dirX=dirX;this.dirY=dirY;this.speed=KNIFE_INIT_SPD;this.trail=[];this.alive=true;this.age=0;
}
Knife.prototype.update=function(){
    if(state.timeStopped&&!state.isMoving)return;
    var maxSpd = this.customMaxSpd || KNIFE_MAX_SPD;
    var accel = this.customAccel || KNIFE_ACCEL;
    this.speed=Math.min(this.speed+accel,maxSpd);
    this.x+=this.dirX*this.speed;this.y+=this.dirY*this.speed;this.age++;
    this.trail.push({x:this.x,y:this.y,speed:this.speed});
    if(this.trail.length>6)this.trail.shift();
    var level = LEVELS[state.currentLevel - 1];
    if(this.y<level.tunnelTop||this.y>level.tunnelBot){
        this.alive=false;return;
    }
    if(this.x<-10||this.x>level.width+10)this.alive=false;
};
Knife.prototype.draw=function(){
    this.trail.forEach(function(t,i){var ratio=(i+1)/this.trail.length;var sr=Math.min(t.speed/KNIFE_MAX_SPD,1);ctx.fillStyle='rgba(192,192,192,'+(ratio*sr*0.4)+')';ctx.fillRect(px(t.x),px(t.y),1,1);}.bind(this));
    var x=px(this.x),y=px(this.y),sr=Math.min(this.speed/KNIFE_MAX_SPD,1);
    var spin=this.age*0.35,cos=Math.cos(spin),sin=Math.sin(spin);
    var dx1=px(cos),dy1=px(sin),dx2=px(-cos),dy2=px(-sin);
    ctx.fillStyle='#d0d0d0';ctx.fillRect(x,y,1,1);ctx.fillRect(x+dx1,y+dy1,1,1);ctx.fillRect(x+dx2,y+dy2,1,1);
    ctx.fillStyle='#f0f0f0';ctx.fillRect(x+dx1*2,y+dy1*2,1,1);
};

function DyingEnemy(x,y,variant){

function DyingScarecrow(x,y){

DyingScarecrow.prototype.update=function(){

        var s=this.straws[i];
        s.dx+=s.vx*0.3;s.dy+=s.vy*0.3;s.vy+=0.06;s.life--;
    }
};
DyingScarecrow.prototype.draw=function(){
