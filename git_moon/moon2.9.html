        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        
        // 文字在稻草人左边，垂直居中于稻草人列
        var textX = this.scarecrowX - 8;
        var textY = 80;
        
        // 微弱呼吸动画
        var breath = 0.8 + 0.2 * Math.sin(state.globalTick * 0.05);
        ctx.globalAlpha = breath;
        
        // 半透明黑色背景
        var metrics = ctx.measureText(text);
        var tw = metrics.width;
        var th = 9;
        var padX = 4, padY = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(textX - tw - padX, textY - th / 2 - padY, tw + padX * 2, th + padY * 2);
        
        // 黄色文字，无描边，与画面中其他黄色一致
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(text, textX, textY);
        
        ctx.restore();
    }
};

/* ==================== 盾卫接近提示文字系统 ==================== */
var ShieldEnemyHint = {
    active: false,
    timer: 0,
    duration: 300, // 5秒（60fps * 5）
    triggered: false, // 只触发一次
    targetX: 0,
    targetY: 0,
    
    check: function() {
        if (state.currentLevel !== 1) { this.active = false; return; }
        if (!state.player) { this.active = false; return; }
        if (this.triggered) {
            if (!this.active) return;
            // 盾卫全部被击杀则立即消失
            var hasShield = false;
            for (var i = 0; i < state.enemies.length; i++) {
                if (state.enemies[i] instanceof ShieldDefender || state.enemies[i] instanceof ShieldPartner) {
                    hasShield = true; break;
                }
            }
            if (!hasShield) { this.active = false; return; }
            this.timer++;
            if (this.timer >= this.duration) {
                this.active = false;
            } else {
                this.updateTargetPosition();
            }
            return;
        }
        // 寻找存活的盾卫（ShieldDefender 或 ShieldPartner），检查是否进入画面
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                // 判断盾卫是否在摄像机可视范围内
                if (e.x + e.w > camera.x && e.x < camera.x + 320) {
                    this.triggered = true;
                    this.active = true;
                    this.timer = 0;
                    this.updateTargetPosition();
                    return;
                }
            }
        }
    },
    
    updateTargetPosition: function() {
        // 找到存活的盾卫来跟随
        var shieldEnemy = null;
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                shieldEnemy = e;
                break;
            }
        }
        if (shieldEnemy) {
            this.targetX = shieldEnemy.x + shieldEnemy.w / 2;
            this.targetY = shieldEnemy.y - 8;
        }
    },
    
    draw: function() {
        if (!this.active) return;
        
        var text = '注意盾牌。移动的靶子也是靶子';
        ctx.save();
        ctx.font = 'bold 9px "Microsoft YaHei", "SimHei", "PingFang SC", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        
        // 文字跟随盾卫位置
        var textX = this.targetX + 10;
        var textY = this.targetY;
        
        // 淡入淡出效果
        var fadeIn = Math.min(1, this.timer / 20);
        var fadeOut = this.timer > (this.duration - 30) ? (this.duration - this.timer) / 30 : 1;
        var alpha = fadeIn * fadeOut;
        
        ctx.globalAlpha = alpha;
        
        // 半透明黑色背景
        var metrics = ctx.measureText(text);
        var tw = metrics.width;
        var th = 9;
        var padX = 4, padY = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(textX - padX, textY - th - padY, tw + padX * 2, th + padY * 2);
        
        // 黄色文字
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(text, textX, textY);
        
        ctx.restore();
    },
    
    reset: function() {
        this.active = false;
        this.timer = 0;
        this.triggered = false;
    }
};

function drawSimpleEnemy(x,y,v,marked){
    var ex=px(x),ey=px(y);var robeC,robeD;
    if(v===0){robeC=PAL.cinnabar;robeD=PAL.darkCinn;}
    else if(v===1){robeC=PAL.ninja;robeD=PAL.ninjaDark;}
    else{robeC='#703030';robeD='#502020';}
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(ex-1,ey+11,10,2);
    ctx.fillStyle=v===0?PAL.darkCinn:v===1?PAL.ninjaDark:'#3a2020';
    ctx.fillRect(ex-1,ey-1,10,2);ctx.fillRect(ex+1,ey-3,6,2);
    ctx.fillStyle=PAL.darkSkin;ctx.fillRect(ex+1,ey+1,6,2);
    ctx.fillStyle=robeC;ctx.fillRect(ex,ey+3,8,4);
    ctx.fillStyle=robeD;ctx.fillRect(ex+3,ey+3,2,4);ctx.fillRect(ex+1,ey+7,6,3);
    ctx.fillRect(ex+2,ey+10,2,2);ctx.fillRect(ex+4,ey+10,2,2);
}

/* ==================== 关卡管理 ==================== */
function loadLevel(levelId) {
    var level = LEVELS[levelId - 1];
    if (!level) {
        gameWin();
        return;
    }
    
    state.currentLevel = levelId;
    state.enemies = [];
    state.pearls = [];
    state.projectiles = [];
    state.dyingEnemies = [];
    state.covers = [];
    state.scarecrows = [];
    state.scarecrowKilled = 0;
    state.scarecrowInitialCount = 0;
    
    // 血迹染色系统：第二关开始计数，通关后永久保持满血状态
    if (level.id === 2) {
        state.l2TotalEnemies = level.enemies.length;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    } else if (level.id > 2) {
        // 第三关及以后：保持第二关结束时的满血状态（bloodLevel=1）
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        if (state.bloodLevel < 1) state.bloodLevel = 1;
        bloodDrips = [];
    } else {
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    }
    
    // 重置盾卫接近提示
    ShieldEnemyHint.reset();
    
    // 设置玩家位置
    var startPos = state.lastCheckpoint || level.playerStart;
    if (state.player) {
        state.player.x = startPos.x;
        state.player.y = startPos.y;
    } else {
        state.player = new Player(startPos.x, startPos.y);
    }
    
    // 加载敌人
    var defenderRef = null;
    var partnerRef = null;
    level.enemies.forEach(function(e) {
        if (e.type === 'ShieldGuard') {
            var enemy = new ShieldGuard(e.x, e.y, e.name, e.armor, e.tall);
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldDefender') {
            var enemy = new ShieldDefender(e.x, e.y, e.name, e.armor, e.tall);
            defenderRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldPartner') {
            var enemy = new ShieldPartner(e.x, e.y, e.name, e.armor, e.tall);
            partnerRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'FastPatrolEnemy') {
            var enemy = new FastPatrolEnemy(e.x, e.y, e.patrolX1, e.patrolX2, e.patrolY);
            state.enemies.push(enemy);
        } else {
            var enemy = new Enemy(e.x, e.y);
            state.enemies.push(enemy);
        }
    });
    
    // 建立搭档关系
    if (defenderRef && partnerRef) {
        defenderRef.partner = partnerRef;
        partnerRef.defender = defenderRef;
    }
    
    // 加载障碍物
    level.covers.forEach(function(c) {
        state.covers.push(new Cover(c.x, c.y, c.w, c.h, c.side, c.invisible));
    });
    
    // 第一关：加载稻草人（阻挡玩家前进的稻草人墙）
    if (level.id === 1 && level.scarecrowRow) {
        scarecrowCoverIndices = [];
        var row = level.scarecrowRow;
        state.scarecrowInitialCount = row.count;
        state.scarecrowKilled = 0;
        var spacing = (row.yEnd - row.yStart) / (row.count - 1);
        for (var si = 0; si < row.count; si++) {
            var sy = Math.floor(row.yStart + si * spacing);
            var sc = new Scarecrow(row.x, sy);
            state.scarecrows.push(sc);
            // 稻草人作为碰撞体阻挡玩家，记录索引以便击杀时移除
            var coverIdx = state.covers.length;
            state.covers.push(new Cover(row.x, sy - 2, 6, 16, 'top'));
            scarecrowCoverIndices.push(coverIdx);
        }
    } else {
        scarecrowCoverIndices = [];
    }
    
    // 加载珍珠
    level.pearls.forEach(function(p) {
        state.pearls.push({ x: p.x, y: p.y, r: 4, active: true });
    });
    
    // 加载时间回溯道具
    if (level.rewindItem) {
        state.rewindItem = { x: level.rewindItem.x, y: level.rewindItem.y, active: true };
    } else {
        state.rewindItem = { x: 0, y: 0, active: false };
    }
    
    // 加载假马道具
    if (level.fakeHorse) {
        state.fakeHorse = { x: level.fakeHorse.x, y: level.fakeHorse.y, active: true, riding: false, hp: 0, hitFlash: 0 };
    } else {
        state.fakeHorse = null;
    }
    
    // 第二关：初始化石门和滚石
    StoneDoor.reset();
    RollingBoulder.reset();
    if (level.id === 2 && level.stoneDoor) {
        StoneDoor.init(level.stoneDoor);
    }
    if (level.id === 2 && level.boulder) {
        RollingBoulder.init(level.boulder);
    }
    
    // 渲染关卡背景
    renderLevelBG(level);
    
    // 更新UI
    levelNumberEl.innerText = levelId;
    levelNameEl.innerText = level.name;
    
    // 重置状态
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    rewindDisplay.style.display = 'none';
    hasRewind = false;
    stateHistory = [];
    camera.x = 0;
    
    // 初始化环境粒子
    initAmbient();
    
    // 保存游戏
    saveGame();
    
    // 显示关卡开始提示
    LevelStartEffect.show(level);
}

/* ==================== 绿宝石存档点 ==================== */
function drawCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var x = px(level.checkpoint.x);
    var y = px(level.checkpoint.y);
    
    // 判断是否已激活（玩家已触碰）
    var activated = state.lastCheckpoint && 
                    state.lastCheckpoint.x === level.checkpoint.x;
    var pulse = 0.6 + Math.sin(state.globalTick * 0.08) * 0.4;
    
    if (activated) {
        // 激活状态 - 亮绿色
        drawPxCircle(x, y, 5, 'rgba(0,255,136,'+(0.15*pulse)+')');
        drawPxCircle(x, y, 3, 'rgba(0,255,136,'+(0.3*pulse)+')');
        ctx.fillStyle = PAL.emerald;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        ctx.fillStyle = '#aaffcc';
        ctx.fillRect(x,y-1,1,1);
        
        // 粒子效果
        if (state.globalTick % 8 === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
    } else {
        // 未激活状态 - 暗绿色
        drawPxCircle(x, y, 4, 'rgba(0,200,100,0.1)');
        ctx.fillStyle = '#008844';
        ctx.fillRect(x-1,y-1,3,1);ctx.fillRect(x-2,y,5,1);
        ctx.fillRect(x-1,y+1,3,1);
        ctx.fillStyle = '#00aa55';
        ctx.fillRect(x,y,1,1);
    }
}

function checkCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var playerCenterX = state.player.x + 4;
    var playerCenterY = state.player.y + 6;
    var dist = Math.hypot(playerCenterX - level.checkpoint.x, playerCenterY - level.checkpoint.y);
    
    if (dist < 15) {
        // 检查是否是新的存档点
        if (!state.lastCheckpoint || 
            state.lastCheckpoint.x !== level.checkpoint.x ||
            state.lastCheckpoint.y !== level.checkpoint.y) {
            
            state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
            saveGame();
            showCheckpointHint();
            
            // 存档特效
            state.effects.push({
                x: level.checkpoint.x, y: level.checkpoint.y,
                r: 0, type: 'checkpoint-wave'
            });
        }
    }
}

/* ==================== 关卡完成检测 ==================== */
function checkLevelComplete() {
    if (state.enemies.length === 0 && state.dyingEnemies.length === 0 && !state.transitioning) {
        state.transitioning = true;
        
        // 延迟进入下一关
        setTimeout(function() {
            LevelStartEffect.hide();
            if (state.currentLevel < LEVELS.length) {
                state.lastCheckpoint = null; // 新关卡重置存档点
                loadLevel(state.currentLevel + 1);
            } else {
                gameWin();
            }
            state.transitioning = false;
        }, 800); // 缩短延迟时间
    }
}

/* ==================== 时间回溯系统 ==================== */
function captureState(){
    if(stateHistory.length>REWIND_FRAMES+100)stateHistory=stateHistory.slice(-REWIND_FRAMES-50);
    stateHistory.push({
        px:state.player.x,py:state.player.y,fr:state.player.facingRight,
        enemies:state.enemies.map(function(e){
            return{
                x:e.x,y:e.y,marked:e.marked,sc:e.shootCooldown,
                dx:e.dirX,dy:e.dirY,mt:e.moveTimer,v:e.variant,
                shieldHP: e.shieldHP, shieldBroken: e.shieldBroken
            };
        }),
        pearls:state.pearls.map(function(p){return p.active;}),
        rw:state.rewindItem.active,
        ts:state.timeStopped,st:state.stopTimer,
        fh:state.fakeHorse ? {active:state.fakeHorse.active,riding:state.fakeHorse.riding,hp:state.fakeHorse.hp} : null
    });
}

function triggerRewind(){
    if(!hasRewind||stateHistory.length<REWIND_FRAMES){
        respawnAtCheckpoint();
        return;
    }
    isRewinding=true;rewindIndex=stateHistory.length-1;hasRewind=false;
    stopDisplay.style.display='none';markHint.style.display='none';rewindDisplay.style.display='none';
}

function updateRewind(){
    rewindIndex-=REWIND_SPEED;
    var targetIdx=stateHistory.length-1-REWIND_FRAMES;
    if(rewindIndex<=targetIdx){
        rewindIndex=targetIdx;
        var snap=stateHistory[rewindIndex];
        restoreState(snap);
        stateHistory=stateHistory.slice(0,rewindIndex);
        isRewinding=false;
        state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    }
}

function restoreState(snap){
    state.player.x=snap.px;state.player.y=snap.py;state.player.facingRight=snap.fr;
    state.enemies=snap.enemies.map(function(e){
        var en;
        if(e.shieldHP !== undefined) {
            en = new ShieldGuard(e.x, e.y, '', 'black', true);
            en.shieldHP = e.shieldHP;
            en.shieldBroken = e.shieldBroken;
        } else {
            en = new Enemy(e.x,e.y);
            en.variant=e.v;
        }
        en.marked=e.marked;en.shootCooldown=e.sc;en.dirX=e.dx;en.dirY=e.dy;en.moveTimer=e.mt;
        return en;
    });
    snap.pearls.forEach(function(a,i){if(i<state.pearls.length)state.pearls[i].active=a;});
    state.rewindItem.active=snap.rw;
    if(snap.rw){hasRewind=false;rewindDisplay.style.display='none';}
    state.timeStopped=snap.ts;state.stopTimer=snap.st;
    if(state.timeStopped){stopDisplay.style.display='block';updateStopUI();}else{stopDisplay.style.display='none';}
    // 恢复假马状态
    if(snap.fh && state.fakeHorse){
        state.fakeHorse.active=snap.fh.active;
        state.fakeHorse.riding=snap.fh.riding;
        state.fakeHorse.hp=snap.fh.hp;
        state.fakeHorse.hitFlash=0;
    }
    state.projectiles=[];state.dyingEnemies=[];state.running=true;
    msgScreen.style.display='none';
}

function drawRewindFrame(){
    var idx=Math.max(0,Math.min(rewindIndex,stateHistory.length-1));
    var snap=stateHistory[idx];if(!snap)return;
    ctx.drawImage(bgCanvas,0,0);
    state.covers.forEach(function(c){c.draw();});
    var px2=px(snap.px),py2=px(snap.py);
    ctx.fillStyle=PAL.straw;ctx.fillRect(px2-2,py2-2,12,2);
    ctx.fillStyle=PAL.skin;ctx.fillRect(px2+1,py2,6,3);
    ctx.fillStyle=PAL.white;ctx.fillRect(px2,py2+3,8,3);
    ctx.fillStyle='#d0c8b8';ctx.fillRect(px2+1,py2+7,6,3);
    ctx.fillStyle='#2a2420';ctx.fillRect(px2+2,py2+10,2,2);ctx.fillRect(px2+4,py2+10,2,2);
    snap.enemies.forEach(function(e){drawSimpleEnemy(e.x,e.y,e.v,e.marked);});
    ctx.fillStyle='rgba(15,25,60,0.5)';ctx.fillRect(camera.x,0,320,180);
}

/* ==================== 碰撞检测 ==================== */
function checkCollisions(){
    for(var ki=state.projectiles.length-1;ki>=0;ki--){
        var knife=state.projectiles[ki];if(!knife.alive)continue;
        if(knife.x<state.player.x+state.player.w&&knife.x+2>state.player.x&&knife.y<state.player.y+state.player.h&&knife.y+2>state.player.y){
            knife.alive=false;
            // 假马护盾：优先扣马HP
            if(state.fakeHorse && state.fakeHorse.riding && state.fakeHorse.hp > 0){
                state.fakeHorse.hp--;
                state.fakeHorse.hitFlash = 10;
                state.effects.push({x:knife.x,y:knife.y,life:8,maxLife:8,type:'horse-hit'});
                triggerShake(1,4);
                if(state.fakeHorse.hp <= 0){
                    breakFakeHorse();
                }
            } else {
                state.effects.push({life:6,maxLife:6,type:'flash'});triggerShake(3,8);
                if(hasRewind){triggerRewind();}
                else{
                    respawnAtCheckpoint();
                }
            }
            return;
        }
        for(var ci=0;ci<state.covers.length;ci++){
            var c=state.covers[ci];
            if(knife.x<c.x+c.w&&knife.x+2>c.x&&knife.y<c.y+c.h&&knife.y+2>c.y){
                state.effects.push({x:knife.x,y:knife.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:6,maxLife:6,type:'spark'});
                knife.alive=false;break;
            }
        }
    }
    
    for(var ei=state.enemies.length-1;ei>=0;ei--){
        var e=state.enemies[ei];
        var collW = e.w || 8;
        var collH = e.h || 12;
        var dist=Math.hypot(e.x+collW/2-(state.player.x+4),e.y+collH/2-(state.player.y+6));
        if(state.timeStopped){
            if(e instanceof ShieldGuard && !e.shieldBroken) continue;
            if(e instanceof ShieldDefender) continue; // 盾卫在时间静止时无法标记/击杀
            if(dist<MARK_RANGE&&!e.marked){
                e.marked=true;markHint.style.display='block';
                var qx=e.x+collW/2,qy=e.y+collH/2;
                state.effects.push({x:qx,y:qy,life:12,maxLife:12,type:'qi-slash'});
                state.effects.push({x:qx,y:qy,r:0,type:'qi-ring'});
                triggerShake(1,4);
            }
        }else{
            if(dist<22){
                var playerCenterX = state.player.x + 4;
                var playerCenterY = state.player.y + 6;
                var enemyCenterX = e.x + collW/2;
                var enemyCenterY = e.y + collH/2;
                
                if(!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)){
                    continue;
                }
                
                if(e instanceof ShieldGuard){
                    if(!e.shieldBroken){
                        e.shieldHP--;
                        e.hitFlash = 8;
                        triggerShake(3,6);
                        state.effects.push({x:e.x-2,y:e.y+collH/2,life:10,maxLife:10,type:'shield-hit'});
                        if(e.shieldHP <= 0){
                            e.shieldBroken = true;
                            triggerShake(4,10);
                        }
                    }else{
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:8,maxLife:8,type:'slash'});
                        state.enemies.splice(ei,1);triggerShake(3,6);onEnemyKilledL2();
                    }
                }else if(e instanceof ShieldDefender){
                    // 哧吭：盾牌面向玩家，只能从背面击杀
                    if(e.isPlayerBehind()){
                        // 从背面击杀！
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:10,maxLife:10,type:'slash'});
                        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,1));
                        state.enemies.splice(ei,1);triggerShake(4,8);onEnemyKilledL2();
                    }else{
                        // 正面被盾牌挡住
                        e.hitFlash = 6;
                        triggerShake(2,4);
                        state.effects.push({x:e.x+(e.shieldDir===1?-4:collW),y:e.y+collH/2,life:8,maxLife:8,type:'shield-hit'});
                    }
                }else{
                    state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                    state.enemies.splice(ei,1);triggerShake(2,5);onEnemyKilledL2();
                }
            }
        }
    }
    
    // 撞击稻草人击杀
    if(state.scarecrows.length > 0 && !state.timeStopped){
        for(var sci=state.scarecrows.length-1;sci>=0;sci--){
            var sc=state.scarecrows[sci];
            var dist=Math.hypot(sc.x+sc.w/2-(state.player.x+4),sc.y+sc.h/2-(state.player.y+6));
            if(dist<18){
                // 击杀稻草人
                state.dyingEnemies.push(new DyingScarecrow(sc.x,sc.y));
                state.effects.push({x:sc.x+sc.w/2,y:sc.y+sc.h/2,life:8,maxLife:8,type:'slash'});
                // 移除稻草人
                state.scarecrows.splice(sci,1);
                state.scarecrowKilled++;
                // 移除对应的碰撞体（注意索引偏移）
                if(sci < scarecrowCoverIndices.length){
                    var coverIdxToRemove = scarecrowCoverIndices[sci];
                    state.covers.splice(coverIdxToRemove,1);
                    // 更新后续索引
                    for(var ci2=sci+1;ci2<scarecrowCoverIndices.length;ci2++){
                        scarecrowCoverIndices[ci2]--;
                    }
                    scarecrowCoverIndices.splice(sci,1);
                }
                triggerShake(2,4);
                break; // 一次只撞一个
            }
        }
    }
    
    // 拾取珍珠
    for(var pi=0;pi<state.pearls.length;pi++){
        var p=state.pearls[pi];
        if(p.active&&Math.hypot(p.x-state.player.x,p.y-state.player.y)<20){
            p.active=false;triggerTimeStop();
        }
    }
    
    // 拾取时间回溯道具
    if(state.rewindItem.active&&Math.hypot(state.rewindItem.x-state.player.x,state.rewindItem.y-state.player.y)<20){
        state.rewindItem.active=false;hasRewind=true;rewindDisplay.style.display='block';
        state.effects.push({life:8,maxLife:8,type:'rewind-flash'});
    }
    
    // 拾取假马道具
    if(state.fakeHorse && state.fakeHorse.active && !state.fakeHorse.riding){
        if(Math.hypot(state.fakeHorse.x-state.player.x,state.fakeHorse.y-state.player.y)<20){
            state.fakeHorse.active = false;
            state.fakeHorse.riding = true;
            state.fakeHorse.hp = FAKE_HORSE_MAX_HP;
            state.fakeHorse.hitFlash = 0;
            // 拾取特效
            for(var fi=0;fi<8;fi++){
                state.effects.push({
                    x:state.fakeHorse.x+(Math.random()-0.5)*8,
                    y:state.fakeHorse.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*1.5,
                    vy:-Math.random()*1.5,
                    life:15,maxLife:15,type:'clay-break'
                });
            }
            triggerShake(1,4);
        }
    }
}

function respawnAtCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    var spawnPos = state.lastCheckpoint || level.playerStart;
    
    state.player.x = spawnPos.x;
    state.player.y = spawnPos.y;
    state.projectiles = [];
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    
    // 重新加载当前关卡
    loadLevel(state.currentLevel);
    
    // 恢复到存档点
    if (state.lastCheckpoint) {
        state.player.x = state.lastCheckpoint.x;
        state.player.y = state.lastCheckpoint.y;
    }
    
    state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    triggerShake(2,8);
}

/* ==================== 时间静止 ==================== */
function triggerTimeStop(){
    state.timeStopped=true;
    state.stopStartTime=performance.now();
    state.stopTimer=STOP_DURATION;
    stopDisplay.style.display='block';markHint.style.display='none';
    state.effects.push({x:state.player.x+4,y:state.player.y+6,r:0,type:'wave'});
    state.effects.push({life:8,maxLife:8,type:'flash'});triggerShake(2,6);
}

function launchMarkedEnemies(){
    var marked=state.enemies.filter(function(e){return e.marked;});
    if(marked.length===0){markHint.style.display='none';return;}
    marked.forEach(function(e){
        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,e.variant));
        state.effects.push({x:e.x+4,y:e.y+6,life:12,maxLife:12,type:'launch-slash'});
    });
    var killedCount = marked.length;
    state.enemies=state.enemies.filter(function(e){return !e.marked;});
    // 第二关血迹：时间静止斩杀也计入
    if (state.currentLevel === 2) {
        for (var k = 0; k < killedCount; k++) onEnemyKilledL2();
    }
    triggerShake(4,10);markHint.style.display='none';
}

function updateStopUI(){
    var secs=Math.ceil(state.stopTimer/1000);
    var pct=(state.stopTimer/STOP_DURATION)*100;
    stopSecondsEl.innerText=secs;stopBarEl.style.width=pct+'%';
}

function drawTimeStopOverlay(){
    var progress=1-state.stopTimer/STOP_DURATION;
    // 深蓝绿色调覆盖，模拟去色效果
    var alpha=Math.max(0, 0.12*(1-progress));
    ctx.fillStyle='rgba(0,60,80,'+alpha+')';
    ctx.fillRect(camera.x,0,320,180);
    // 青色微光
    var alpha2=Math.max(0, 0.06*(1-progress));
    ctx.fillStyle='rgba(0,180,180,'+alpha2+')';
    ctx.fillRect(camera.x,0,320,180);
}

/* ==================== 特效系统 ==================== */
function drawEffects(){
    for(var i=state.effects.length-1;i>=0;i--){
        var eff=state.effects[i];
        if(eff.type==='wave'){
            eff.r+=3;var a=Math.max(0,1-eff.r/120);
            ctx.strokeStyle='rgba(0,204,204,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>120)state.effects.splice(i,1);
        }else if(eff.type==='checkpoint-wave'){
            eff.r+=4;var a=Math.max(0,1-eff.r/80);
            ctx.strokeStyle='rgba(0,255,136,'+(a*0.8)+')';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>80)state.effects.splice(i,1);
        }else if(eff.type==='qi-slash'){
            var p=1-eff.life/eff.maxLife;var size=4+p*14;
            ctx.strokeStyle='rgba(100,200,255,'+((1-p)*0.8)+')';ctx.lineWidth=Math.max(0.5,2-p);
            ctx.beginPath();ctx.moveTo(px(eff.x-size),px(eff.y-size));ctx.lineTo(px(eff.x+size),px(eff.y+size));ctx.stroke();
            ctx.beginPath();ctx.moveTo(px(eff.x+size),px(eff.y-size));ctx.lineTo(px(eff.x-size),px(eff.y+size));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='qi-ring'){
            eff.r+=2.5;var a=Math.max(0,1-eff.r/60);
            ctx.strokeStyle='rgba(80,180,255,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>60)state.effects.splice(i,1);
        }else if(eff.type==='spark'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.92;eff.vy*=0.92;
            ctx.fillStyle='rgba(255,220,120,'+Math.max(0,eff.life/eff.maxLife)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='gem-spark'){
            ctx.fillStyle='rgba(0,255,136,'+(Math.max(0,eff.life/eff.maxLife)*0.7)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='flash'){
            ctx.fillStyle='rgba(200,240,240,'+(eff.life/eff.maxLife*0.3)+')';ctx.fillRect(camera.x,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='rewind-flash'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,180,255,'+(a*0.4)+')';ctx.fillRect(camera.x,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='dying-trail'){
            ctx.fillStyle=eff.color.replace('1)',(Math.max(0,eff.life/eff.maxLife)*0.6)+')');ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='push-spark'){
            ctx.fillStyle='rgba(180,200,220,'+(Math.max(0,eff.life/eff.maxLife)*0.35)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='shield-hit'){
            var p=1-eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,150,255,'+((1-p)*0.8)+')';
            ctx.fillRect(px(eff.x-2),px(eff.y-3),6,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(232,224,208,'+(1-p)+')';ctx.lineWidth=2-p;
            ctx.beginPath();ctx.moveTo(px(eff.x-12),px(eff.y-12));ctx.lineTo(px(eff.x+12),px(eff.y+12));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='launch-slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(255,240,200,'+(1-p)+')';ctx.lineWidth=3-p*2;
            ctx.beginPath();ctx.moveTo(px(eff.x-18),px(eff.y-18));ctx.lineTo(px(eff.x+18),px(eff.y+18));ctx.stroke();
            ctx.strokeStyle='rgba(255,180,80,'+((1-p)*0.7)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(px(eff.x+18),px(eff.y-18));ctx.lineTo(px(eff.x-18),px(eff.y+18));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='death-burst'){
            eff.particles.forEach(function(pt){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;var a=Math.max(0,eff.life/eff.maxLife);ctx.fillStyle=pt.color.replace('1)',a+')');ctx.fillRect(px(pt.x),px(pt.y),1,1);});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='clay-break'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.1;eff.vx*=0.98;
            var a=Math.max(0,eff.life/eff.maxLife);
            var colors=['rgba(139,105,20,','rgba(160,120,40,','rgba(107,78,10,','rgba(90,62,6,'];
            ctx.fillStyle=colors[Math.floor(eff.life)%4]+a+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillRect(px(eff.x+1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='clay-dust'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.96;eff.vy*=0.96;
            var a=Math.max(0,eff.life/eff.maxLife)*0.4;
            ctx.fillStyle='rgba(160,130,80,'+a+')';
            ctx.fillRect(px(eff.x),px(eff.y),2,2);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='horse-hit'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(200,160,60,'+(a*0.5)+')';
            ctx.fillRect(px(eff.x-2),px(eff.y-2),5,5);
            ctx.fillStyle='rgba(255,200,80,'+(a*0.3)+')';
            ctx.fillRect(px(eff.x-1),px(eff.y-1),3,3);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='blood-splatter'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.06;eff.vx*=0.95;
            var a=Math.max(0,eff.life/eff.maxLife);
            ctx.fillStyle='rgba(160,15,15,'+(a*0.8)+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillStyle='rgba(120,8,8,'+(a*0.5)+')';
            ctx.fillRect(px(eff.x-1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }
    }
}

/* ==================== 假马道具系统 ==================== */
var FAKE_HORSE_MAX_HP = 5;

function drawFakeHorseItem(){
    var fh = state.fakeHorse;
    if(!fh || !fh.active) return;
    var floatY = Math.sin(state.globalTick * 0.04) * 1;
    var x = px(fh.x), y = px(fh.y + floatY);
    var pulse = 0.6 + Math.sin(state.globalTick * 0.06) * 0.4;
    // 发光底座
    drawPxCircle(x, y, 5, 'rgba(180,140,80,' + (0.1 * pulse) + ')');
    // 泥土马身体（小型像素马）
    // 身体
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x - 4, y - 1, 8, 4);
    ctx.fillStyle = '#A07828';
    ctx.fillRect(x - 3, y, 6, 2);
    // 头部（朝右）
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x + 4, y - 2, 3, 3);
    ctx.fillStyle = '#A07828';
    ctx.fillRect(x + 5, y - 1, 1, 1);
    // 耳朵
    ctx.fillStyle = '#7A5A10';
    ctx.fillRect(x + 5, y - 3, 1, 1);
    // 眼睛
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 6, y - 2, 1, 1);
    // 腿
    ctx.fillStyle = '#6B4E0A';
    ctx.fillRect(x - 3, y + 3, 1, 2);
    ctx.fillRect(x - 1, y + 3, 1, 2);
    ctx.fillRect(x + 1, y + 3, 1, 2);
    ctx.fillRect(x + 3, y + 3, 1, 2);
    // 尾巴
    ctx.fillStyle = '#5A3E06';
    ctx.fillRect(x - 5, y - 1, 1, 2);
    ctx.fillRect(x - 6, y, 1, 1);
    // 闪烁高光
    if(Math.sin(state.globalTick * 0.1) > 0.3){
        ctx.fillStyle = 'rgba(255,220,120,' + (0.3 * pulse) + ')';
        ctx.fillRect(x - 2, y, 1, 1);
        ctx.fillRect(x + 2, y - 1, 1, 1);
    }
}

function drawRidingHorse(){
    var fh = state.fakeHorse;
    if(!fh || !fh.riding) return;
    var x = px(state.player.x), y = px(state.player.y);
    var f = state.player.facingRight ? 1 : -1;
    var bob = (state.player.animFrame === 1 || state.player.animFrame === 3) ? -1 : 0;
    var leg = (state.player.animFrame === 1 || state.player.animFrame === 3);
    // 受伤闪烁
    if(fh.hitFlash > 0){
        fh.hitFlash--;
        if(fh.hitFlash % 2 === 0) return; // 闪烁效果
    }
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x - 4, y + 12, 16, 2);
    // 马身体
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x - 5, y + 2 + bob, 14, 5);
    ctx.fillStyle = '#A07828';
    ctx.fillRect(x - 4, y + 3 + bob, 12, 3);
    // 马脖子
    ctx.fillStyle = '#8B6914';
    if(f > 0){
        ctx.fillRect(x + 7, y - 1 + bob, 3, 6);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x + 7, y + bob, 2, 4);
    } else {
        ctx.fillRect(x - 6, y - 1 + bob, 3, 6);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x - 5, y + bob, 2, 4);
    }
    // 马头
    ctx.fillStyle = '#8B6914';
    if(f > 0){
        ctx.fillRect(x + 8, y - 3 + bob, 3, 4);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x + 9, y - 2 + bob, 1, 2);
    } else {
        ctx.fillRect(x - 7, y - 3 + bob, 3, 4);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x - 7, y - 2 + bob, 1, 2);
    }
    // 耳朵
    ctx.fillStyle = '#7A5A10';
    if(f > 0){
        ctx.fillRect(x + 9, y - 4 + bob, 1, 1);
        ctx.fillRect(x + 11, y - 4 + bob, 1, 1);
    } else {
        ctx.fillRect(x - 8, y - 4 + bob, 1, 1);
        ctx.fillRect(x - 6, y - 4 + bob, 1, 1);
    }
    // 马眼
    ctx.fillStyle = '#1a1a1a';
    if(f > 0){
        ctx.fillRect(x + 10, y - 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x - 8, y - 3 + bob, 1, 1);
    }
    // 马腿（带行走动画）
    ctx.fillStyle = '#6B4E0A';
    if(leg){
        ctx.fillRect(x - 4, y + 7, 1, 3);
        ctx.fillRect(x - 1, y + 7, 1, 3);
        ctx.fillRect(x + 2, y + 8, 1, 2);
        ctx.fillRect(x + 5, y + 8, 1, 2);
    } else {
        ctx.fillRect(x - 4, y + 8, 1, 2);
        ctx.fillRect(x - 1, y + 8, 1, 2);
        ctx.fillRect(x + 2, y + 7, 1, 3);
        ctx.fillRect(x + 5, y + 7, 1, 3);
    }
    // 尾巴
    ctx.fillStyle = '#5A3E06';
    if(f > 0){
        ctx.fillRect(x - 6, y + 2 + bob, 1, 3);
        ctx.fillRect(x - 7, y + 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x + 7, y + 2 + bob, 1, 3);
        ctx.fillRect(x + 8, y + 3 + bob, 1, 1);
    }
    // 马背裂纹（根据剩余HP显示）
    var cracks = FAKE_HORSE_MAX_HP - fh.hp;
    ctx.fillStyle = '#4A3000';
    if(cracks >= 1) ctx.fillRect(x - 2, y + 3 + bob, 2, 1);
    if(cracks >= 2) ctx.fillRect(x + 3, y + 4 + bob, 1, 2);
    if(cracks >= 3) ctx.fillRect(x, y + 2 + bob, 1, 1);
    if(cracks >= 4) ctx.fillRect(x + 5, y + 3 + bob, 1, 1);
    if(cracks >= 5) ctx.fillRect(x - 3, y + 4 + bob, 2, 1);
    // HP指示器（小方块显示剩余HP）
    for(var hi = 0; hi < FAKE_HORSE_MAX_HP; hi++){
        var hx = x - 5 + hi * 3;
        if(hi < fh.hp){
            ctx.fillStyle = '#c8a040';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
            ctx.fillStyle = '#e8c060';
            ctx.fillRect(hx, y - 6 + bob, 1, 1);
        } else {
            ctx.fillStyle = '#3a2a10';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
        }
    }
}

function breakFakeHorse(){
    var fh = state.fakeHorse;
    if(!fh) return;
    fh.riding = false;
    fh.hp = 0;
    // 破碎特效：泥土碎片飞散
    var cx = state.player.x + 4, cy = state.player.y + 6;
    for(var bi = 0; bi < 20; bi++){
        state.effects.push({
            x: cx + (Math.random() - 0.5) * 12,
            y: cy + (Math.random() - 0.5) * 8,
            vx: (Math.random() - 0.5) * 3,
            vy: -Math.random() * 2.5 - 0.5,
            life: 20 + Math.floor(Math.random() * 15),
            maxLife: 35,
            type: 'clay-break'
        });
    }
    // 灰尘云效果
    for(var di = 0; di < 6; di++){
        state.effects.push({
            x: cx + (Math.random() - 0.5) * 8,
            y: cy + (Math.random() - 0.5) * 4,
            vx: (Math.random() - 0.5) * 1,
            vy: (Math.random() - 0.5) * 0.5 - 0.3,
            life: 25 + Math.floor(Math.random() * 10),
            maxLife: 35,
            type: 'clay-dust'
        });
    }
    triggerShake(3, 10);
}

    msgSub.innerText = '按r重入江湖';

    localStorage.removeItem(SAVE_KEY);
}

/* ==================== 初始化 ==================== */
function init(){
    // 尝试加载存档
    var savedGame = loadGame();
    
    state.keys={};
    state.projectiles=[];
    state.effects=[];
    state.dyingEnemies=[];
    state.running=true;
    state.timeStopped=false;
    state.stopTimer=0;
    state.stopStartTime=0;
    state.globalTick=0;
    state.isMoving=false;
    state.transitioning=false;
    state.bloodLevel=0;
    state.l2TotalEnemies=0;
    state.l2KilledEnemies=0;
    bloodDrips=[];
    
    hasRewind=false;
    isRewinding=false;
    rewindIndex=0;
    stateHistory=[];
    lastFrameTime=performance.now();
    
    msgScreen.style.display='none';
    LevelStartEffect.hide();
    stopDisplay.style.display='none';
    markHint.style.display='none';
    rewindDisplay.style.display='none';
    
    if (savedGame && savedGame.currentLevel) {
        // 从存档加载
        state.lastCheckpoint = savedGame.checkpoint;
        loadLevel(savedGame.currentLevel);
        if (savedGame.checkpoint) {
            state.player.x = savedGame.checkpoint.x;
            state.player.y = savedGame.checkpoint.y;
        }
    } else {
        // 新游戏
        state.lastCheckpoint = null;
        loadLevel(1);
    }
}

/* ==================== 主循环 ==================== */
function gameLoop(currentTime){
    if(!state.running&&!isRewinding)return requestAnimationFrame(gameLoop);
    state.globalTick++;
    
    var deltaTime=currentTime-lastFrameTime;
    lastFrameTime=currentTime;

    // 更新摄像机位置
    updateCamera();

    if(isRewinding){
        updateRewind();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawRewindFrame();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 关卡开始提示阶段：暂停游戏逻辑（玩家无法操控，敌人不会攻击）
    if(LevelStartEffect.active){
        LevelStartEffect.update();
        updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        drawL2Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawCheckpoint();
        state.enemies.forEach(function(e){e.draw();});
        drawEffects();
        drawRidingHorse();
        state.player.draw();
        ctx.restore();
        LevelStartEffect.draw(ctx);
        requestAnimationFrame(gameLoop);return;
    }

    state.player.update();
    captureState();

    if(state.timeStopped){
        var elapsed=performance.now()-state.stopStartTime;
        state.stopTimer=Math.max(0,STOP_DURATION-elapsed);
        updateStopUI();
        if(state.stopTimer<=0){
            state.timeStopped=false;stopDisplay.style.display='none';launchMarkedEnemies();
        }
    }

    state.enemies.forEach(function(e){e.update();});
    state.projectiles.forEach(function(k){k.update();});
    state.projectiles=state.projectiles.filter(function(k){return k.alive;});

    // 第二关：更新石门和滚石
    StoneDoor.update();
    RollingBoulder.update();

    for(var di=state.dyingEnemies.length-1;di>=0;di--){
        state.dyingEnemies[di].update();
        if(state.dyingEnemies[di].isDead()){
            state.dyingEnemies.splice(di,1);
        }
    }

    checkCollisions();
    checkCheckpoint();
    checkLevelComplete();
    updateShake();updateAmbient();updateBloodDrips();

    // 绘制世界空间内容（受摄像机偏移影响）
    ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
    drawBackground();
    state.covers.forEach(function(c){c.draw();});
    // 绘制稻草人（第一关）
    state.scarecrows.forEach(function(sc){sc.draw();});
    // 第二关：绘制石门和滚石
    StoneDoor.draw();
    RollingBoulder.draw();
    // 第二关火把动画
    drawL2Torches();
    drawAmbient();
    state.pearls.forEach(function(p){drawPearl(p);});
    drawRewindItemSprite();
    drawFakeHorseItem();
    drawCheckpoint();
    state.projectiles.forEach(function(k){k.draw();});
    state.enemies.forEach(function(e){e.draw();});
    state.dyingEnemies.forEach(function(de){de.draw();});
    drawEffects();
    drawRidingHorse();
    state.player.draw();
    if(state.timeStopped)drawTimeStopOverlay();
    // 稻草人接近提示（在摄像机空间内绘制）
    ScarecrowHint.check();
    ScarecrowHint.draw();
    // 盾卫接近提示（在摄像机空间内绘制）
    ShieldEnemyHint.check();
    ShieldEnemyHint.draw();
    ctx.restore();

    // 绘制屏幕空间内容（不受摄像机偏移影响）
    LevelStartEffect.draw(ctx);

    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',function(e){
    state.keys[e.key.toLowerCase()]=true;
    if(e.key.toLowerCase()==='r'){
        if(!state.running){
            init();
        }
    }
});
window.addEventListener('keyup',function(e){state.keys[e.key.toLowerCase()]=false;});

init();requestAnimationFrame(gameLoop);
</script>
</body>
</html>
