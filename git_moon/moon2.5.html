<script>
/* ==================== 像素化文字渲染系统 ==================== */
var PixelFont = {
    // 离屏Canvas用于大字体渲染
    bigCanvas: null,
    bigCtx: null,
    scale: 4, // 放大倍数
    
    init: function() {
        this.bigCanvas = document.createElement('canvas');
        this.bigCanvas.width = 320 * this.scale;
        this.bigCanvas.height = 180 * this.scale;
        this.bigCtx = this.bigCanvas.getContext('2d');
    },
    
    // 渲染像素化文字，返回像素数据数组
    // text: 文字内容
    // fontSize: 目标像素大小（实际渲染会放大）
    // color: 文字颜色
    // 返回: { width, height, pixels: [[x,y,color], ...] }
    renderText: function(text, fontSize, color, outlineColor) {
        if (!this.bigCanvas) this.init();
        
        var actualFontSize = fontSize * this.scale;
        this.bigCtx.clearRect(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        
        // 设置字体
        this.bigCtx.font = 'bold ' + actualFontSize + 'px "Microsoft YaHei", "SimHei", sans-serif';
        this.bigCtx.textAlign = 'center';
        this.bigCtx.textBaseline = 'middle';
        
        var textX = this.bigCanvas.width / 2;
        var textY = this.bigCanvas.height / 2;
        
        // 绘制描边
        if (outlineColor) {
            this.bigCtx.strokeStyle = outlineColor;
            this.bigCtx.lineWidth = actualFontSize * 0.15;
            this.bigCtx.lineJoin = 'round';
            this.bigCtx.strokeText(text, textX, textY);
        }
        
        // 绘制文字
        this.bigCtx.fillStyle = color;
        this.bigCtx.fillText(text, textX, textY);
        
        // 获取像素数据
        var imgData = this.bigCtx.getImageData(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        var data = imgData.data;
        
        // 采样并生成像素数组
        var pixels = [];
        var scale = this.scale;
        var targetWidth = Math.ceil(this.bigCanvas.width / scale);
        var targetHeight = Math.ceil(this.bigCanvas.height / scale);
        
        for (var y = 0; y < targetHeight; y++) {
            for (var x = 0; x < targetWidth; x++) {
                // 采样点
                var sx = Math.floor(x * scale + scale / 2);
                var sy = Math.floor(y * scale + scale / 2);
                var idx = (sy * this.bigCanvas.width + sx) * 4;
                
                var r = data[idx];
                var g = data[idx + 1];
                var b = data[idx + 2];
                var a = data[idx + 3];
                
                // RGB最大值判断阈值
                var maxRGB = Math.max(r, g, b);
                
                // 如果透明度足够且有颜色
                if (a > 128 && maxRGB > 50) {
                    // 判断是描边还是填充
                    var isOutline = maxRGB < 100;
                    var pixelColor = isOutline ? outlineColor : color;
                    pixels.push({ x: x, y: y, color: pixelColor, isOutline: isOutline });
                }
            }
        }
        
        // 计算实际边界
        var minX = targetWidth, maxX = 0, minY = targetHeight, maxY = 0;
        pixels.forEach(function(p) {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
        });
        
        // 裁剪到实际内容区域
        var croppedPixels = pixels.map(function(p) {
            return { x: p.x - minX, y: p.y - minY, color: p.color, isOutline: p.isOutline };
        });
        
        return {
            width: maxX - minX + 1,
            height: maxY - minY + 1,
            pixels: croppedPixels,
            offsetX: minX,
            offsetY: minY
        };
    }
};

/* ==================== 关卡开始提示 ==================== */
var LevelStartEffect = {
    active: false,
    timer: 0,
    duration: 120, // 帧数
    titleText: null,
    hintText: null,
    tipText: null,
    titleX: 0,
    titleY: 0,
    hintX: 0,
    hintY: 0,
    tipX: 0,
    tipY: 0,
    
    show: function(level) {
        // 渲染关卡标题（如"第一关"）
        var levelTitle = '第' + ['一', '二', '三', '四'][level.id - 1] + '关';
        this.titleText = PixelFont.renderText(
            levelTitle,
            12,
            '#ffcc00',
            '#1a1a1a'
        );
        
        // 渲染关卡提示（如"击杀吭哧二将"）
        this.hintText = PixelFont.renderText(
            level.hint || '击杀所有敌人',
            10,
            '#ffdd44',
            '#1a1a1a'
        );
        
        // 渲染操作提示小字
        this.tipText = PixelFont.renderText(
            'WASD移动 撞击击杀',
            6,
            '#aabbcc',
            '#0a0a0a'
        );
        
        // 计算居中位置
        this.titleX = Math.floor((320 - this.titleText.width) / 2);
        this.titleY = 60;
        this.hintX = Math.floor((320 - this.hintText.width) / 2);
        this.hintY = 85;
        this.tipX = Math.floor((320 - this.tipText.width) / 2);
        this.tipY = 105;
        
        this.active = true;
        this.timer = 0;
    },
    
    hide: function() {
        this.active = false;
        // 保留文本对象，以便在初始展示后绘制缩小的任务提示
    },
    
    update: function() {
        if (!this.active) return;
        this.timer++;
        if (this.timer >= this.duration) {
            this.active = false;
        }
    },
    
    draw: function(ctx) {
        if (!this.titleText) return;
        
        // 计算动画进度
        var progress = this.timer / this.duration;
        
        if (this.active) {
            // 初始展示阶段
            var fadeIn = Math.min(1, this.timer / 20);
            var fadeOut = progress > 0.6 ? (1 - progress) / 0.4 : 1;
            var alpha = fadeIn * fadeOut;
            
            // 绘制标题像素文字
            ctx.globalAlpha = alpha;
            this.titleText.pixels.forEach(function(p) {
                ctx.fillStyle = p.isOutline ? '#1a1a1a' : p.color;
                ctx.fillRect(this.titleX + p.x, this.titleY + p.y, 1, 1);
            }.bind(this));
            
            // 绘制提示像素文字
            if (this.hintText) {
                this.hintText.pixels.forEach(function(p) {
                    ctx.fillStyle = p.isOutline ? '#1a1a1a' : p.color;
                    ctx.fillRect(this.hintX + p.x, this.hintY + p.y, 1, 1);
                }.bind(this));
            }
            
            // 绘制闪烁的小字提示
            if (this.tipText) {
                var tipAlpha = alpha * (0.5 + 0.5 * Math.sin(this.timer * 0.15));
                ctx.globalAlpha = tipAlpha;
                this.tipText.pixels.forEach(function(p) {
                    ctx.fillStyle = p.isOutline ? '#0a0a0a' : p.color;
                    ctx.fillRect(this.tipX + p.x, this.tipY + p.y, 1, 1);
                }.bind(this));
            }
        } else {
            // 缩小并移动到右边偏上阶段
            ctx.globalAlpha = 1;
            
            // 缩小提示文字并移动到右边偏上
            if (this.hintText) {
                var scale = 0.9;
                var offsetX = 250; // 右移
                var offsetY = 20;  // 上移
                
                // 绘制描边（黑色背景）
                this.hintText.pixels.forEach(function(p) {
                    var drawX = Math.floor(offsetX + p.x * scale);
                    var drawY = Math.floor(offsetY + p.y * scale);
                    ctx.fillStyle = '#000000';
                    // 绘制黑色背景，增强对比度
                    ctx.fillRect(drawX, drawY, 1, 1);
                }.bind(this));
                
                // 绘制文字（金色前景）
                this.hintText.pixels.forEach(function(p) {
                    var drawX = Math.floor(offsetX + p.x * scale);
                    var drawY = Math.floor(offsetY + p.y * scale);
                    ctx.fillStyle = '#ffdd44';
                    // 绘制清晰的金色文字
                    ctx.fillRect(drawX, drawY, 1, 1);
                }.bind(this));
            }
        }
        
        ctx.globalAlpha = 1;
    }
};

/* ==================== 存档系统 ==================== */
var SAVE_KEY = 'moon_blade_save_v2';

function saveGame() {
    var saveData = {
        currentLevel: state.currentLevel,
        playerX: state.player.x,
        playerY: state.player.y,
        hasRewind: hasRewind,
        checkpoint: state.lastCheckpoint,
        timestamp: Date.now()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    showSaveIndicator();
}

function loadGame() {
    var saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
        try {
            var saveData = JSON.parse(saved);
            return saveData;
        } catch(e) {
            return null;
        }
    }
    return null;
}

function showSaveIndicator() {
    var indicator = document.getElementById('save-indicator');
    indicator.style.opacity = '1';
    setTimeout(function() {
        indicator.style.opacity = '0';
    }, 1500);
}

function showCheckpointHint() {
    var hint = document.getElementById('checkpoint-hint');
    hint.style.opacity = '1';

function px(n) { return Math.floor(n); }

function drawPxCircle(cx, cy, r, color) {
    cx = px(cx); cy = px(cy); ctx.fillStyle = color;
    for (var dy = -r; dy <= r; dy++)
        for (var dx = -r; dx <= r; dx++)
            if (dx*dx+dy*dy <= r*r) ctx.fillRect(cx+dx, cy+dy, 1, 1);
}

function hasLineOfSight(x1, y1, x2, y2) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var dist = Math.hypot(dx, dy);
    if (dist < 1) return true;
    
    var steps = Math.ceil(dist / 3);
    for (var i = 1; i < steps; i++) {
        var t = i / steps;
        var checkX = x1 + dx * t;
        var checkY = y1 + dy * t;
        
        for (var j = 0; j < state.covers.length; j++) {
            var cv = state.covers[j];
            if (checkX >= cv.x && checkX <= cv.x + cv.w &&
                checkY >= cv.y && checkY <= cv.y + cv.h) {
                return false;
            }
        }
    }
    return true;
}

}

function Entity(x,y,w,h,color){this.x=x;this.y=y;this.w=w;this.h=h;this.color=color;this.vx=0;this.vy=0;}

function Player(x,y){
    Entity.call(this,x,y,8,12,PAL.white);

}
Player.prototype.update=function(){
    this.speed=state.timeStopped?PLAYER_SPEED_STOP:PLAYER_SPEED_NORMAL;
    this.vx=0;this.vy=0;
    if(state.keys['w'])this.vy=-this.speed;
    if(state.keys['s'])this.vy=this.speed;
    if(state.keys['a']){this.vx=-this.speed;this.facingRight=false;}
    if(state.keys['d']){this.vx=this.speed;this.facingRight=true;}
    var nx=this.x+this.vx,ny=this.y+this.vy;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    if(!blocked){this.x=nx;this.y=ny;}
    
    // 关卡边界限制（考虑隔断墙）
    var level = LEVELS[state.currentLevel - 1];
    this.x=Math.max(10, Math.min(302 - this.w, this.x));
    this.y=Math.max(level.tunnelTop,Math.min(level.tunnelBot-this.h,this.y));
    state.isMoving=(this.vx!==0||this.vy!==0);

    else{this.animFrame=0;this.animTimer=0;}

function Enemy(x,y){
    Entity.call(this,x,y,8,12,PAL.cinnabar);
    this.shootCooldown=Math.random()*200+180;

    var angle=Math.random()*Math.PI*2;
    this.dirX=Math.cos(angle);this.dirY=Math.sin(angle);
}
Enemy.prototype.update=function(){
    if(state.timeStopped){
        if(this.marked)return;
        if(!state.isMoving)return;
        this.doPatrol();this.doPushBack();this.doShooting();return;
    }
    this.doPatrol();this.doShooting();
};
Enemy.prototype.doPatrol=function(){
    this.moveTimer--;
    if(this.moveTimer<=0){var a=Math.random()*Math.PI*2;this.dirX=Math.cos(a);this.dirY=Math.sin(a);this.moveTimer=Math.random()*100+50;}
    var nx=this.x+this.dirX*this.moveSpeed,ny=this.y+this.dirY*this.moveSpeed;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    if(!blocked){this.x=nx;this.y=ny;}
    else{this.dirX=-this.dirX+(Math.random()-0.5)*0.5;this.dirY=-this.dirY+(Math.random()-0.5)*0.5;var len=Math.hypot(this.dirX,this.dirY)||1;this.dirX/=len;this.dirY/=len;this.moveTimer=Math.random()*40+20;}
    this.clampBounds();
};
Enemy.prototype.doPushBack=function(){
    var dx=this.x+4-(state.player.x+4),dy=this.y+6-(state.player.y+6);
    var dist=Math.hypot(dx,dy)||1;
    if(dist<PUSH_RANGE){var force=PUSH_FORCE*(1-dist/PUSH_RANGE);this.x+=(dx/dist)*force;this.y+=(dy/dist)*force;this.clampBounds();this.pushFlash=4;if(state.globalTick%3===0)state.effects.push({x:this.x+Math.random()*8,y:this.y+Math.random()*12,life:10,maxLife:10,type:'push-spark'});}
};
Enemy.prototype.doShooting=function(){
    this.shootCooldown--;
    if(this.shootCooldown<=0){
        var dx = state.player.x - this.x;
        var dy = state.player.y - this.y;
        var dist = Math.hypot(dx, dy);
        
        if(dist <= ATTACK_RANGE){
            this.shootKnife();
        }
        this.shootCooldown=Math.random()*200+180;
    }
    this.alertTimer=this.shootCooldown<25?(this.alertTimer+1)%12:0;
};
Enemy.prototype.clampBounds=function(){
    var level = LEVELS[state.currentLevel - 1];
    this.x=Math.max(10,Math.min(302-this.w,this.x));
    this.y=Math.max(level.tunnelTop,Math.min(level.tunnelBot-this.h,this.y));
};
Enemy.prototype.shootKnife=function(){
    var dx=state.player.x-this.x,dy=state.player.y-this.y;
    var angle=Math.atan2(dy,dx);
    state.projectiles.push(new Knife(this.x+4,this.y+4,Math.cos(angle),Math.sin(angle)));
};
Enemy.prototype.draw=function(){
    var x=px(this.x),y=px(this.y),v=this.variant;

Enemy.prototype.drawPrediction=function(){
    var self=this;
    var simX=this.x,simY=this.y;
    var level = LEVELS[state.currentLevel - 1];
    for(var s=0;s<40;s++){
        var nx2=simX+this.dirX*this.moveSpeed;
        var ny2=simY+this.dirY*this.moveSpeed;
        if(ny2<level.tunnelTop||ny2+self.h>level.tunnelBot)break;
        var hit=false;
        state.covers.forEach(function(cv){if(nx2<cv.x+cv.w&&nx2+self.w>cv.x&&ny2<cv.y+cv.h&&ny2+self.h>cv.y)hit=true;});
        if(hit)break;
        simX=nx2;simY=ny2;
    }
    simX=Math.max(10,Math.min(302-self.w,simX));
    simY=Math.max(level.tunnelTop,Math.min(level.tunnelBot-self.h,simY));
    var predX=simX,predY=simY;
    var dx=predX-this.x,dy=predY-this.y;
    var dist=Math.hypot(dx,dy);
    if(dist>3){
        for(var s=3;s<dist;s+=3){
            var t=s/dist;
            var lx=px(this.x+4+dx*t);
            var ly=px(this.y+6+dy*t);
            var la=0.32*(1-t*0.65);
            if(Math.floor(s/3)%2===0){
                ctx.fillStyle='rgba(0,210,210,'+la+')';ctx.fillRect(lx,ly,1,1);
                ctx.fillStyle='rgba(0,210,210,'+(la*0.3)+')';ctx.fillRect(lx-1,ly,1,1);ctx.fillRect(lx+1,ly,1,1);
            }else{
                ctx.fillStyle='rgba(0,180,180,'+(la*0.5)+')';ctx.fillRect(lx,ly,1,1);
            }
        }
    }
    var pulse=0.18+Math.sin(state.globalTick*0.1)*0.07;
    ctx.globalAlpha=pulse;
    drawSimpleEnemy(predX,predY,this.variant,false);
    ctx.globalAlpha=1;
};

        ctx.fillRect(x + 2, y + h - 4, 2, 4);
        ctx.fillRect(x + w - 4, y + h - 4, 2, 4);
    } else {
        ctx.fillRect(x + 2, y + h - 2, 2, 2);
        ctx.fillRect(x + w - 4, y + h - 2, 2, 2);
    }
    
    if (!this.shieldBroken) {
        var shieldX = x - 4;
        var shieldY = y;
        var shieldW = 5;
        var shieldH = this.isTall ? 12 : 9;
        
        ctx.fillStyle = this.armorColor === 'black' ? '#3a3a42' : '#d0d0c8';
        ctx.fillRect(shieldX, shieldY, shieldW, shieldH);
        
        ctx.fillStyle = this.armorColor === 'black' ? '#5a5a62' : '#a0a098';
        ctx.fillRect(shieldX, shieldY, 1, shieldH);
        ctx.fillRect(shieldX + shieldW - 1, shieldY, 1, shieldH);
        ctx.fillRect(shieldX, shieldY, shieldW, 1);
        ctx.fillRect(shieldX, shieldY + shieldH - 1, shieldW, 1);
        
        if (this.shieldHP === 1) {
            ctx.fillStyle = '#ff6666';
            ctx.fillRect(shieldX + 1, shieldY + shieldH / 2, 3, 1);
            ctx.fillRect(shieldX + 2, shieldY + shieldH / 2 - 1, 1, 3);
        }
    }
    
    ctx.fillStyle = this.armorColor === 'black' ? '#aaccff' : '#ffcc88';
    ctx.font = '7px zpix, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, x + w / 2, y - 7);
    ctx.textAlign = 'left';
    
    if (this.marked) {
        var cx = x + w / 2;
        var cy = y + h / 2;
        var pulse = Math.sin(state.globalTick * 0.12) * 0.25 + 0.75;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff1111';
        for (var d = -6; d <= 6; d++) {
            ctx.fillRect(cx + d, cy + d, 2, 1);
            ctx.fillRect(cx + d, cy - d, 2, 1);
        }
        ctx.globalAlpha = 1;
    }
};

function Knife(x,y,dirX,dirY){
    this.x=x;this.y=y;this.dirX=dirX;this.dirY=dirY;this.speed=KNIFE_INIT_SPD;this.trail=[];this.alive=true;this.age=0;
}
Knife.prototype.update=function(){
    if(state.timeStopped&&!state.isMoving)return;
    this.speed=Math.min(this.speed+KNIFE_ACCEL,KNIFE_MAX_SPD);
    this.x+=this.dirX*this.speed;this.y+=this.dirY*this.speed;this.age++;
    this.trail.push({x:this.x,y:this.y,speed:this.speed});
    if(this.trail.length>6)this.trail.shift();
    var level = LEVELS[state.currentLevel - 1];
    if(this.y<level.tunnelTop||this.y>level.tunnelBot){
        this.alive=false;return;
    }
    if(this.x<-10||this.x>330)this.alive=false;
};
Knife.prototype.draw=function(){
    this.trail.forEach(function(t,i){var ratio=(i+1)/this.trail.length;var sr=Math.min(t.speed/KNIFE_MAX_SPD,1);ctx.fillStyle='rgba(192,192,192,'+(ratio*sr*0.4)+')';ctx.fillRect(px(t.x),px(t.y),1,1);}.bind(this));
    var x=px(this.x),y=px(this.y),sr=Math.min(this.speed/KNIFE_MAX_SPD,1);
    var spin=this.age*0.35,cos=Math.cos(spin),sin=Math.sin(spin);
    var dx1=px(cos),dy1=px(sin),dx2=px(-cos),dy2=px(-sin);
    ctx.fillStyle='#d0d0d0';ctx.fillRect(x,y,1,1);ctx.fillRect(x+dx1,y+dy1,1,1);ctx.fillRect(x+dx2,y+dy2,1,1);
    ctx.fillStyle='#f0f0f0';ctx.fillRect(x+dx1*2,y+dy1*2,1,1);
};

function DyingEnemy(x,y,variant){
    this.x=x;this.y=y;this.variant=variant;this.w=8;this.h=12;
    this.vx=(Math.random()>0.5?1:-1)*(2.5+Math.random()*2);this.vy=-2.5-Math.random()*2;
    this.life=35;this.maxLife=35;this.spinPhase=0;
}
DyingEnemy.prototype.update=function(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=0.12;this.spinPhase+=0.3;this.life--;
};
DyingEnemy.prototype.draw=function(){
    var alpha=Math.max(0,this.life/this.maxLife);var x=px(this.x),y=px(this.y),wobble=Math.sin(this.spinPhase)*2;
    ctx.globalAlpha=alpha;var col=this.variant===1?PAL.ninja:PAL.cinnabar;var colD=this.variant===1?PAL.ninjaDark:PAL.darkCinn;
    ctx.fillStyle=col;ctx.fillRect(x+wobble,y,this.w,this.h);ctx.fillStyle=colD;ctx.fillRect(x+wobble+2,y+2,this.w-4,this.h-4);
    ctx.globalAlpha=1;
};
DyingEnemy.prototype.isDead=function(){return this.life<=0;};

function Cover(x,y,w,h,side){this.x=x;this.y=y;this.w=w;this.h=h;this.side=side;}
Cover.prototype.draw=function(){
    var x=px(this.x),y=px(this.y),w=this.w,h=this.h;
    ctx.fillStyle=PAL.stone;ctx.fillRect(x,y,w,h);
    if(this.side==='top'){
        ctx.fillStyle='#2a2a2e';ctx.fillRect(x,y,w,1);
        ctx.fillStyle=PAL.lightStone;ctx.fillRect(x,y+h-1,w,1);
        ctx.fillStyle='#605850';ctx.fillRect(x,y+h-2,w,1);
    }else{
        ctx.fillStyle=PAL.lightStone;ctx.fillRect(x,y,w,1);
        ctx.fillStyle='#605850';ctx.fillRect(x,y+1,w,1);
        ctx.fillStyle='#2a2a2e';ctx.fillRect(x,y+h-1,w,1);
    }
    ctx.fillStyle='#4a4840';ctx.fillRect(x,y,1,h);
    ctx.fillStyle='#2a2820';ctx.fillRect(x+w-1,y,1,h);
};

function drawSimpleEnemy(x,y,v,marked){
    var ex=px(x),ey=px(y);var robeC,robeD;
    if(v===0){robeC=PAL.cinnabar;robeD=PAL.darkCinn;}
    else if(v===1){robeC=PAL.ninja;robeD=PAL.ninjaDark;}
    else{robeC='#703030';robeD='#502020';}
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(ex-1,ey+11,10,2);
    ctx.fillStyle=v===0?PAL.darkCinn:v===1?PAL.ninjaDark:'#3a2020';
    ctx.fillRect(ex-1,ey-1,10,2);ctx.fillRect(ex+1,ey-3,6,2);
    ctx.fillStyle=PAL.darkSkin;ctx.fillRect(ex+1,ey+1,6,2);
    ctx.fillStyle=robeC;ctx.fillRect(ex,ey+3,8,4);
    ctx.fillStyle=robeD;ctx.fillRect(ex+3,ey+3,2,4);ctx.fillRect(ex+1,ey+7,6,3);
    ctx.fillRect(ex+2,ey+10,2,2);ctx.fillRect(ex+4,ey+10,2,2);
}

/* ==================== 关卡管理 ==================== */
function loadLevel(levelId) {
    var level = LEVELS[levelId - 1];
    if (!level) {
        gameWin();
        return;
    }
    
    state.currentLevel = levelId;
    state.enemies = [];
    state.pearls = [];
    state.projectiles = [];
    state.dyingEnemies = [];
    state.covers = [];
    
    // 设置玩家位置
    var startPos = state.lastCheckpoint || level.playerStart;
    if (state.player) {
        state.player.x = startPos.x;
        state.player.y = startPos.y;
    } else {
        state.player = new Player(startPos.x, startPos.y);
    }
    
    // 加载敌人
    level.enemies.forEach(function(e) {
        if (e.type === 'ShieldGuard') {
            state.enemies.push(new ShieldGuard(e.x, e.y, e.name, e.armor, e.tall));
        } else {
            var enemy = new Enemy(e.x, e.y);
            state.enemies.push(enemy);
        }
    });
    
    // 加载障碍物
    level.covers.forEach(function(c) {
        state.covers.push(new Cover(c.x, c.y, c.w, c.h, c.side));
    });
    
    // 加载珍珠
    level.pearls.forEach(function(p) {
        state.pearls.push({ x: p.x, y: p.y, r: 4, active: true });
    });
    
    // 加载时间回溯道具
    if (level.rewindItem) {
        state.rewindItem = { x: level.rewindItem.x, y: level.rewindItem.y, active: true };
    } else {
        state.rewindItem = { x: 0, y: 0, active: false };
    }
    
    // 渲染关卡背景
    renderLevelBG(level);
    
    // 更新UI
    levelNumberEl.innerText = levelId;
    levelNameEl.innerText = level.name;
    
    // 重置状态
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    rewindDisplay.style.display = 'none';
    hasRewind = false;
    stateHistory = [];
    
    // 初始化环境粒子
    initAmbient();
    
    // 保存游戏
    saveGame();
    
    // 显示关卡开始提示
    LevelStartEffect.show(level);
}

/* ==================== 绿宝石存档点 ==================== */
function drawCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var x = px(level.checkpoint.x);
    var y = px(level.checkpoint.y);
    
    // 判断是否已激活（玩家已触碰）
    var activated = state.lastCheckpoint && 
                    state.lastCheckpoint.x === level.checkpoint.x;
    var pulse = 0.6 + Math.sin(state.globalTick * 0.08) * 0.4;
    
    if (activated) {
        // 激活状态 - 亮绿色
        drawPxCircle(x, y, 5, 'rgba(0,255,136,'+(0.15*pulse)+')');
        drawPxCircle(x, y, 3, 'rgba(0,255,136,'+(0.3*pulse)+')');
        ctx.fillStyle = PAL.emerald;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        ctx.fillStyle = '#aaffcc';
        ctx.fillRect(x,y-1,1,1);
        
        // 粒子效果
        if (state.globalTick % 8 === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
    } else {
        // 未激活状态 - 暗绿色
        drawPxCircle(x, y, 4, 'rgba(0,200,100,0.1)');
        ctx.fillStyle = '#008844';
        ctx.fillRect(x-1,y-1,3,1);ctx.fillRect(x-2,y,5,1);
        ctx.fillRect(x-1,y+1,3,1);
        ctx.fillStyle = '#00aa55';
        ctx.fillRect(x,y,1,1);
    }
}

function checkCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var playerCenterX = state.player.x + 4;
    var playerCenterY = state.player.y + 6;
    var dist = Math.hypot(playerCenterX - level.checkpoint.x, playerCenterY - level.checkpoint.y);
    
    if (dist < 15) {
        // 检查是否是新的存档点
        if (!state.lastCheckpoint || 
            state.lastCheckpoint.x !== level.checkpoint.x ||
            state.lastCheckpoint.y !== level.checkpoint.y) {
            
            state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
            saveGame();
            showCheckpointHint();
            
            // 存档特效
            state.effects.push({
                x: level.checkpoint.x, y: level.checkpoint.y,
                r: 0, type: 'checkpoint-wave'
            });
        }
    }
}

/* ==================== 关卡完成检测 ==================== */
function checkLevelComplete() {
    if (state.enemies.length === 0 && state.dyingEnemies.length === 0 && !state.transitioning) {
        state.transitioning = true;
        
        // 延迟进入下一关
        setTimeout(function() {
            LevelStartEffect.hide();
            if (state.currentLevel < LEVELS.length) {
                state.lastCheckpoint = null; // 新关卡重置存档点
                loadLevel(state.currentLevel + 1);
            } else {
                gameWin();
            }
            state.transitioning = false;
        }, 800); // 缩短延迟时间
    }
}

/* ==================== 时间回溯系统 ==================== */
function captureState(){
    if(stateHistory.length>REWIND_FRAMES+100)stateHistory=stateHistory.slice(-REWIND_FRAMES-50);
    stateHistory.push({
        px:state.player.x,py:state.player.y,fr:state.player.facingRight,
        enemies:state.enemies.map(function(e){
            return{
                x:e.x,y:e.y,marked:e.marked,sc:e.shootCooldown,
                dx:e.dirX,dy:e.dirY,mt:e.moveTimer,v:e.variant,
                shieldHP: e.shieldHP, shieldBroken: e.shieldBroken
            };
        }),
        pearls:state.pearls.map(function(p){return p.active;}),
        rw:state.rewindItem.active,
        ts:state.timeStopped,st:state.stopTimer
    });
}

function triggerRewind(){
    if(!hasRewind||stateHistory.length<REWIND_FRAMES){
        respawnAtCheckpoint();
        return;
    }
    isRewinding=true;rewindIndex=stateHistory.length-1;hasRewind=false;
    stopDisplay.style.display='none';markHint.style.display='none';rewindDisplay.style.display='none';
}

function updateRewind(){
    rewindIndex-=REWIND_SPEED;
    var targetIdx=stateHistory.length-1-REWIND_FRAMES;
    if(rewindIndex<=targetIdx){
        rewindIndex=targetIdx;
        var snap=stateHistory[rewindIndex];
        restoreState(snap);
        stateHistory=stateHistory.slice(0,rewindIndex);
        isRewinding=false;
        state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    }
}

function restoreState(snap){
    state.player.x=snap.px;state.player.y=snap.py;state.player.facingRight=snap.fr;
    state.enemies=snap.enemies.map(function(e){
        var en;
        if(e.shieldHP !== undefined) {
            en = new ShieldGuard(e.x, e.y, '', 'black', true);
            en.shieldHP = e.shieldHP;
            en.shieldBroken = e.shieldBroken;
        } else {
            en = new Enemy(e.x,e.y);
            en.variant=e.v;
        }
        en.marked=e.marked;en.shootCooldown=e.sc;en.dirX=e.dx;en.dirY=e.dy;en.moveTimer=e.mt;
        return en;
    });
    snap.pearls.forEach(function(a,i){if(i<state.pearls.length)state.pearls[i].active=a;});
    state.rewindItem.active=snap.rw;
    if(snap.rw){hasRewind=false;rewindDisplay.style.display='none';}
    state.timeStopped=snap.ts;state.stopTimer=snap.st;
    if(state.timeStopped){stopDisplay.style.display='block';updateStopUI();}else{stopDisplay.style.display='none';}
    state.projectiles=[];state.dyingEnemies=[];state.running=true;
    msgScreen.style.display='none';
}

function drawRewindFrame(){
    var idx=Math.max(0,Math.min(rewindIndex,stateHistory.length-1));
    var snap=stateHistory[idx];if(!snap)return;
    ctx.drawImage(bgCanvas,0,0);
    state.covers.forEach(function(c){c.draw();});
    var px2=px(snap.px),py2=px(snap.py);
    ctx.fillStyle=PAL.straw;ctx.fillRect(px2-2,py2-2,12,2);
    ctx.fillStyle=PAL.skin;ctx.fillRect(px2+1,py2,6,3);
    ctx.fillStyle=PAL.white;ctx.fillRect(px2,py2+3,8,3);
    ctx.fillStyle='#d0c8b8';ctx.fillRect(px2+1,py2+7,6,3);
    ctx.fillStyle='#2a2420';ctx.fillRect(px2+2,py2+10,2,2);ctx.fillRect(px2+4,py2+10,2,2);
    snap.enemies.forEach(function(e){drawSimpleEnemy(e.x,e.y,e.v,e.marked);});
    ctx.fillStyle='rgba(15,25,60,0.5)';ctx.fillRect(0,0,320,180);
}

/* ==================== 碰撞检测 ==================== */
function checkCollisions(){
    for(var ki=state.projectiles.length-1;ki>=0;ki--){
        var knife=state.projectiles[ki];if(!knife.alive)continue;
        if(knife.x<state.player.x+state.player.w&&knife.x+2>state.player.x&&knife.y<state.player.y+state.player.h&&knife.y+2>state.player.y){
            knife.alive=false;state.effects.push({life:6,maxLife:6,type:'flash'});triggerShake(3,8);
            if(hasRewind){triggerRewind();}
            else{
                respawnAtCheckpoint();
            }
            return;
        }
        for(var ci=0;ci<state.covers.length;ci++){
            var c=state.covers[ci];
            if(knife.x<c.x+c.w&&knife.x+2>c.x&&knife.y<c.y+c.h&&knife.y+2>c.y){
                state.effects.push({x:knife.x,y:knife.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:6,maxLife:6,type:'spark'});
                knife.alive=false;break;
            }
        }
    }
    
    for(var ei=state.enemies.length-1;ei>=0;ei--){
        var e=state.enemies[ei];
        var collW = e.w || 8;
        var collH = e.h || 12;
        var dist=Math.hypot(e.x+collW/2-(state.player.x+4),e.y+collH/2-(state.player.y+6));
        if(state.timeStopped){
            if(e instanceof ShieldGuard && !e.shieldBroken) continue;
            if(dist<MARK_RANGE&&!e.marked){
                e.marked=true;markHint.style.display='block';
                var qx=e.x+collW/2,qy=e.y+collH/2;
                state.effects.push({x:qx,y:qy,life:12,maxLife:12,type:'qi-slash'});
                state.effects.push({x:qx,y:qy,r:0,type:'qi-ring'});
                triggerShake(1,4);
            }
        }else{
            if(dist<22){
                var playerCenterX = state.player.x + 4;
                var playerCenterY = state.player.y + 6;
                var enemyCenterX = e.x + collW/2;
                var enemyCenterY = e.y + collH/2;
                
                if(!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)){
                    continue;
                }
                
                if(e instanceof ShieldGuard){
                    if(!e.shieldBroken){
                        e.shieldHP--;
                        e.hitFlash = 8;
                        triggerShake(3,6);
                        state.effects.push({x:e.x-2,y:e.y+collH/2,life:10,maxLife:10,type:'shield-hit'});
                        if(e.shieldHP <= 0){
                            e.shieldBroken = true;
                            triggerShake(4,10);
                        }
                    }else{
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:8,maxLife:8,type:'slash'});
                        state.enemies.splice(ei,1);triggerShake(3,6);
                    }
                }else{
                    state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                    state.enemies.splice(ei,1);triggerShake(2,5);
                }
            }
        }
    }
    
    // 拾取珍珠
    for(var pi=0;pi<state.pearls.length;pi++){
        var p=state.pearls[pi];
        if(p.active&&Math.hypot(p.x-state.player.x,p.y-state.player.y)<20){
            p.active=false;triggerTimeStop();
        }
    }
    
    // 拾取时间回溯道具
    if(state.rewindItem.active&&Math.hypot(state.rewindItem.x-state.player.x,state.rewindItem.y-state.player.y)<20){
        state.rewindItem.active=false;hasRewind=true;rewindDisplay.style.display='block';
        state.effects.push({life:8,maxLife:8,type:'rewind-flash'});
    }
}

function respawnAtCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    var spawnPos = state.lastCheckpoint || level.playerStart;
    
    state.player.x = spawnPos.x;
    state.player.y = spawnPos.y;
    state.projectiles = [];
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    
    // 重新加载当前关卡
    loadLevel(state.currentLevel);
    
    // 恢复到存档点
    if (state.lastCheckpoint) {
        state.player.x = state.lastCheckpoint.x;
        state.player.y = state.lastCheckpoint.y;
    }
    
    state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    triggerShake(2,8);
}

/* ==================== 时间静止 ==================== */
function triggerTimeStop(){
    state.timeStopped=true;
    state.stopStartTime=performance.now();
    state.stopTimer=STOP_DURATION;
    stopDisplay.style.display='block';markHint.style.display='none';
    state.effects.push({x:state.player.x+4,y:state.player.y+6,r:0,type:'wave'});
    state.effects.push({life:8,maxLife:8,type:'flash'});triggerShake(2,6);
}

function launchMarkedEnemies(){
    var marked=state.enemies.filter(function(e){return e.marked;});
    if(marked.length===0){markHint.style.display='none';return;}
    marked.forEach(function(e){
        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,e.variant));
        state.effects.push({x:e.x+4,y:e.y+6,life:12,maxLife:12,type:'launch-slash'});
    });
    state.enemies=state.enemies.filter(function(e){return !e.marked;});
    triggerShake(4,10);markHint.style.display='none';
}

function updateStopUI(){
    var secs=Math.ceil(state.stopTimer/1000);
    var pct=(state.stopTimer/STOP_DURATION)*100;
    stopSecondsEl.innerText=secs;stopBarEl.style.width=pct+'%';
}

function getTimeStopFilter(){
    if(!state.timeStopped)return 'none';
    var progress=1-state.stopTimer/STOP_DURATION;
    return 'grayscale('+Math.max(0,1-progress)+') saturate('+(0.15+progress*0.85)+') brightness('+(0.65+progress*0.35)+')';
}

function drawTimeStopOverlay(){
    var progress=1-state.stopTimer/STOP_DURATION;
    var alpha=Math.max(0,0.08*(1-progress));
    ctx.fillStyle='rgba(0,180,180,'+alpha+')';ctx.fillRect(0,0,320,180);
}

/* ==================== 特效系统 ==================== */
function drawEffects(){
    for(var i=state.effects.length-1;i>=0;i--){
        var eff=state.effects[i];
        if(eff.type==='wave'){
            eff.r+=3;var a=Math.max(0,1-eff.r/120);
            ctx.strokeStyle='rgba(0,204,204,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>120)state.effects.splice(i,1);
        }else if(eff.type==='checkpoint-wave'){
            eff.r+=4;var a=Math.max(0,1-eff.r/80);
            ctx.strokeStyle='rgba(0,255,136,'+(a*0.8)+')';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>80)state.effects.splice(i,1);
        }else if(eff.type==='qi-slash'){
            var p=1-eff.life/eff.maxLife;var size=4+p*14;
            ctx.strokeStyle='rgba(100,200,255,'+((1-p)*0.8)+')';ctx.lineWidth=Math.max(0.5,2-p);
            ctx.beginPath();ctx.moveTo(px(eff.x-size),px(eff.y-size));ctx.lineTo(px(eff.x+size),px(eff.y+size));ctx.stroke();
            ctx.beginPath();ctx.moveTo(px(eff.x+size),px(eff.y-size));ctx.lineTo(px(eff.x-size),px(eff.y+size));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='qi-ring'){
            eff.r+=2.5;var a=Math.max(0,1-eff.r/60);
            ctx.strokeStyle='rgba(80,180,255,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>60)state.effects.splice(i,1);
        }else if(eff.type==='spark'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.92;eff.vy*=0.92;
            ctx.fillStyle='rgba(255,220,120,'+Math.max(0,eff.life/eff.maxLife)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='gem-spark'){
            ctx.fillStyle='rgba(0,255,136,'+(Math.max(0,eff.life/eff.maxLife)*0.7)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='flash'){
            ctx.fillStyle='rgba(200,240,240,'+(eff.life/eff.maxLife*0.3)+')';ctx.fillRect(0,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='rewind-flash'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,180,255,'+(a*0.4)+')';ctx.fillRect(0,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='dying-trail'){
            ctx.fillStyle=eff.color.replace('1)',(Math.max(0,eff.life/eff.maxLife)*0.6)+')');ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='push-spark'){
            ctx.fillStyle='rgba(180,200,220,'+(Math.max(0,eff.life/eff.maxLife)*0.35)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='shield-hit'){
            var p=1-eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,150,255,'+((1-p)*0.8)+')';
            ctx.fillRect(px(eff.x-2),px(eff.y-3),6,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(232,224,208,'+(1-p)+')';ctx.lineWidth=2-p;
            ctx.beginPath();ctx.moveTo(px(eff.x-12),px(eff.y-12));ctx.lineTo(px(eff.x+12),px(eff.y+12));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='launch-slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(255,240,200,'+(1-p)+')';ctx.lineWidth=3-p*2;
            ctx.beginPath();ctx.moveTo(px(eff.x-18),px(eff.y-18));ctx.lineTo(px(eff.x+18),px(eff.y+18));ctx.stroke();
            ctx.strokeStyle='rgba(255,180,80,'+((1-p)*0.7)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(px(eff.x+18),px(eff.y-18));ctx.lineTo(px(eff.x-18),px(eff.y+18));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='death-burst'){
            eff.particles.forEach(function(pt){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;var a=Math.max(0,eff.life/eff.maxLife);ctx.fillStyle=pt.color.replace('1)',a+')');ctx.fillRect(px(pt.x),px(pt.y),1,1);});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }
    }
}

function drawBackground(){ctx.drawImage(bgCanvas,0,0);}

function drawPearl(p){
    if(!p.active)return;
    var floatY=Math.sin(state.globalTick*0.05)*1;
    var x=px(p.x),y=px(p.y+floatY);
    var pulse=0.6+Math.sin(state.globalTick*0.08)*0.4;
    drawPxCircle(x,y,4,'rgba(0,204,204,'+(0.15*pulse)+')');
    drawPxCircle(x,y,2,PAL.pearl);
    ctx.fillStyle='#aaffff';ctx.fillRect(x-1,y-1,1,1);
}

function drawRewindItemSprite(){
    if(!state.rewindItem.active)return;
    var floatY=Math.sin(state.globalTick*0.04)*1;
    var x=px(state.rewindItem.x),y=px(state.rewindItem.y+floatY);
    var pulse=0.6+Math.sin(state.globalTick*0.07)*0.4;
    drawPxCircle(x,y,4,'rgba(80,120,240,'+(0.15*pulse)+')');
    ctx.fillStyle='#4488ff';
    ctx.fillRect(x,y-3,1,1);ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
    ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);ctx.fillRect(x-1,y+2,3,1);ctx.fillRect(x,y+3,1,1);
    ctx.fillStyle='#88aaff';ctx.fillRect(x-1,y-1,3,3);
}

/* ==================== 游戏结束 ==================== */
function gameOver(txt){
    state.running=false;
    msgText.innerText=txt;
    msgText.style.color=PAL.cinnabar;
    msgSub.innerText = '按 R 键从存档点复活';
    msgScreen.style.display='block';
}

function gameWin(){
    state.running=false;
    msgText.innerText="事了拂衣去，深藏功与名。";
    msgText.style.color=PAL.gold;
    msgSub.innerText = '按r重入江湖';
    msgScreen.style.display='block';
    // 清除存档
    localStorage.removeItem(SAVE_KEY);
}

/* ==================== 初始化 ==================== */
function init(){
    // 尝试加载存档
    var savedGame = loadGame();
    
    state.keys={};
    state.projectiles=[];
    state.effects=[];
    state.dyingEnemies=[];
    state.running=true;
    state.timeStopped=false;
    state.stopTimer=0;
    state.stopStartTime=0;
    state.globalTick=0;
    state.isMoving=false;
    state.transitioning=false;
    
    hasRewind=false;
    isRewinding=false;
    rewindIndex=0;
    stateHistory=[];
    lastFrameTime=performance.now();
    
    msgScreen.style.display='none';
    LevelStartEffect.hide();
    stopDisplay.style.display='none';
    markHint.style.display='none';
    rewindDisplay.style.display='none';
    
    if (savedGame && savedGame.currentLevel) {
        // 从存档加载
        state.lastCheckpoint = savedGame.checkpoint;
        loadLevel(savedGame.currentLevel);
        if (savedGame.checkpoint) {
            state.player.x = savedGame.checkpoint.x;
            state.player.y = savedGame.checkpoint.y;
        }
    } else {
        // 新游戏
        state.lastCheckpoint = null;
        loadLevel(1);
    }
}

/* ==================== 主循环 ==================== */
function gameLoop(currentTime){
    if(!state.running&&!isRewinding)return requestAnimationFrame(gameLoop);
    state.globalTick++;
    
    var deltaTime=currentTime-lastFrameTime;
    lastFrameTime=currentTime;

    if(isRewinding){
        updateRewind();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x,shake.y);ctx.clearRect(-10,-10,340,200);
        drawRewindFrame();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    state.player.update();
    captureState();

    if(state.timeStopped){
        var elapsed=performance.now()-state.stopStartTime;
        state.stopTimer=Math.max(0,STOP_DURATION-elapsed);
        updateStopUI();
        if(state.stopTimer<=0){
            state.timeStopped=false;stopDisplay.style.display='none';launchMarkedEnemies();
        }
    }

    state.enemies.forEach(function(e){e.update();});
    state.projectiles.forEach(function(k){k.update();});
    state.projectiles=state.projectiles.filter(function(k){return k.alive;});

    for(var di=state.dyingEnemies.length-1;di>=0;di--){
        state.dyingEnemies[di].update();
        if(state.dyingEnemies[di].isDead()){
            state.dyingEnemies.splice(di,1);
        }
    }

    checkCollisions();
    checkCheckpoint();
    checkLevelComplete();
    LevelStartEffect.update();
    updateShake();updateAmbient();

    ctx.save();ctx.translate(shake.x,shake.y);ctx.clearRect(-10,-10,340,200);
    var filterStr=getTimeStopFilter();
    if(filterStr!=='none')ctx.filter=filterStr;
    drawBackground();
    state.covers.forEach(function(c){c.draw();});
    drawAmbient();
    state.pearls.forEach(function(p){drawPearl(p);});
    drawRewindItemSprite();
    drawCheckpoint();
    state.projectiles.forEach(function(k){k.draw();});
    state.enemies.forEach(function(e){e.draw();});
    state.dyingEnemies.forEach(function(de){de.draw();});
    ctx.filter='none';
    drawEffects();
    state.player.draw();
    if(state.timeStopped)drawTimeStopOverlay();
    LevelStartEffect.draw(ctx);
    ctx.restore();

    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',function(e){
    state.keys[e.key.toLowerCase()]=true;
    if(e.key.toLowerCase()==='r'){
        if(!state.running){
            init();
        }
    }
});
window.addEventListener('keyup',function(e){state.keys[e.key.toLowerCase()]=false;});

init();requestAnimationFrame(gameLoop);
</script>
