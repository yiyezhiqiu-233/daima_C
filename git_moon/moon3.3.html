function updateL3Ghost() {
    if (state.currentLevel !== 3) return;

    for (var gi = 0; gi < L3Ghosts.length; gi++) {
        var g = L3Ghosts[gi];
        if (!g.active) continue;

        // 回放完毕后永久停留在原地，不再消失
        if (g.finished) continue;

        // 回放行动完成 → 永久停留在原地
        if (g.actionIndex >= g.totalActions) {
            g.finished = true;
            g.animFrame = 0;
            continue;
        }

        var act = g.actions[g.actionIndex];
        g.actionIndex++;

        // 直接使用录制位置
        var prevX = g.x, prevY = g.y;
        g.x = act.x;
        g.y = act.y;
        if (act.fr !== undefined) g.facingRight = act.fr;

        // 动画
        var dx = g.x - prevX, dy = g.y - prevY;
        var isMoving = (dx !== 0 || dy !== 0);
        if (isMoving) { g.animTimer++; if (g.animTimer % 6 === 0) g.animFrame = (g.animFrame + 1) % 4; }
        else { g.animFrame = 0; g.animTimer = 0; }

        var pcx = g.x + 4, pcy = g.y + 6;

        // 替身触发机关
        if (L3Trap.active && L3Trap.isOpen && !g.triggerTrap) {
            if (pcx >= L3Trap.x && pcx <= L3Trap.x + L3Trap.w && pcy > 90 && pcy < 124) {
                g.triggerTrap = true;
                g.fadeOut = true;
                g.fadeTimer = 0;
                triggerShake(3, 10);
                for (var bi = 0; bi < 8; bi++) {
                    state.effects.push({
                        x: g.x + 4 + (Math.random() - 0.5) * 8,
                        y: g.y + 6 + (Math.random() - 0.5) * 8,
                        vx: (Math.random() - 0.5) * 2,
                        vy: -Math.random() * 2 - 0.5,
                        life: 18 + Math.floor(Math.random() * 10),
                        maxLife: 28,
                        type: 'ghost-fade'
                    });
                }
            }
        }

        // 替身击杀敌人（替身撞击敌人与玩家撞击效果一致）
        for (var gei = state.enemies.length - 1; gei >= 0; gei--) {
            var ge = state.enemies[gei];
            var gCollW = ge.w || 8;
            var gCollH = ge.h || 12;
            var gDist = Math.hypot(ge.x + gCollW/2 - pcx, ge.y + gCollH/2 - pcy);
            if (gDist < 22) {
                if (hasLineOfSight(pcx, pcy, ge.x + gCollW/2, ge.y + gCollH/2)) {
                    state.effects.push({x: ge.x + 4, y: ge.y + 6, life: 8, maxLife: 8, type: 'slash'});
                    state.enemies.splice(gei, 1);
                    triggerShake(2, 5);
                    for (var gk = 0; gk < 4; gk++) {
                        state.effects.push({
                            x: pcx + (Math.random() - 0.5) * 6,
                            y: pcy + (Math.random() - 0.5) * 6,
                            vx: (Math.random() - 0.5) * 1.2,
                            vy: (Math.random() - 0.5) * 1.2,
                            life: 10 + Math.floor(Math.random() * 8),
                            maxLife: 18,
                            type: 'ghost-slash'
                        });
                    }
                }
            }
        }

        // 替身检查点激活
        var level = LEVELS[state.currentLevel - 1];
        if (level.checkpoint && !g.triggerTrap) {
            var dist = Math.hypot(level.checkpoint.x - pcx, level.checkpoint.y - pcy);
            if (dist < 15) {
                if (!state.lastCheckpoint || state.lastCheckpoint.x !== level.checkpoint.x) {
                    state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
                    state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
                }
            }
        }
    }
}

var L3RewindAnim = {
    active: false,
    frames: null,      // 倒放的帧序列（从死亡位置回溯到目标位置）
    frameIdx: 0,
    speed: 6,          // 每帧跳过6个录制帧（约6倍速倒退）
    // 回溯完成后要执行的数据（在动画结束时应用）
    pendingGhostX: 0, pendingGhostY: 0, pendingGhostFacing: true,
    pendingGhostActions: null,
    pendingHistIdx: 0,

    start: function(ghostX, ghostY, ghostFacing, ghostActions, histIdx, rewoundFrames) {
        // 收集倒退帧：从当前录制历史的末尾往前取
        this.frames = L3ActionRec.history.slice(0, rewoundFrames).reverse();
        this.frameIdx = 0;
        this.speed = Math.max(3, Math.ceil(rewoundFrames / 60)); // 约1秒内完成倒退
        // 保存回溯完成后需要的数据
        this.pendingGhostX = ghostX;
        this.pendingGhostY = ghostY;
        this.pendingGhostFacing = ghostFacing;
        this.pendingGhostActions = ghostActions;
        this.pendingHistIdx = histIdx;
        this.active = true;
        // 暂停游戏逻辑
        state.running = false;
    },

    update: function() {
        if (!this.active) return;
        this.frameIdx += this.speed;
        // 每隔几帧释放一个回溯粒子特效
        if (this.frameIdx % (this.speed * 4) < this.speed) {
            if (this.frameIdx < this.frames.length) {
                var f = this.frames[Math.min(this.frameIdx, this.frames.length - 1)];
                state.effects.push({
                    x: f.x + 4 + (Math.random() - 0.5) * 6,
                    y: f.y + 6 + (Math.random() - 0.5) * 6,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: -Math.random() * 0.8 - 0.2,
                    life: 12, maxLife: 12,
                    type: 'rewind-particle'
                });
            }
        }
        // 倒退完成
        if (this.frameIdx >= this.frames.length) {
            this.finish();
        }
    },

    finish: function() {
        this.active = false;
        SFX.rewindEnd();
        // 应用回溯结果
        finishL3Rewind(this.pendingGhostX, this.pendingGhostY, this.pendingGhostFacing,
                       this.pendingGhostActions, this.pendingHistIdx);
    },

    getCurrentPos: function() {
        if (!this.frames || this.frames.length === 0) return null;
        var idx = Math.min(this.frameIdx, this.frames.length - 1);
        return this.frames[idx];
    }
};

function finishL3Rewind(ghostX, ghostY, ghostFacing, ghostActions, histIdx) {
    // 累计8次死亡：清除所有替身，重新开始关卡
    if (l3DeathCount >= l3MaxDeaths) {
        hasRewind = false; rewindDisplay.style.display = 'none';
        L3Ghosts = []; l3DeathCount = 0;
        L3ActionRec.reset(); L3RewindAnim.active = false;
        l3DarkPreserve = false;
        loadLevel(state.currentLevel);
        return;
    }

    // 从stateHistory恢复对应时间点的完整世界状态（敌人、陷阱等）
    if (histIdx >= 0 && histIdx < stateHistory.length) {
        var snap = stateHistory[histIdx];
        if (snap.enemies) {
            state.enemies = snap.enemies.map(function(e) {
                var en;
                if (e.et === 'JavelinEnemy') {
                    en = new JavelinEnemy(e.x, e.y, e.px1, e.px2, e.py);
                    en.throwCooldown = e.tc || 0;
                    en.patrolDir = e.pd !== undefined ? e.pd : 1;
                } else if (e.shieldHP !== undefined) {
                    en = new ShieldGuard(e.x, e.y, '', 'black', true);
                    en.shieldHP = e.shieldHP;
                    en.shieldBroken = e.shieldBroken;
                } else {
                    en = new Enemy(e.x, e.y);
                    en.variant = e.v;
                }
                en.marked = e.marked; en.shootCooldown = e.sc;
                en.dirX = e.dx; en.dirY = e.dy; en.moveTimer = e.mt;
                if(e.bc !== undefined) en.burstCount = e.bc;
                if(e.ar !== undefined) en.attackRange = e.ar;
                return en;
            });
        }
        if (snap.trap) {
            L3Trap.timer = snap.trap.t;
            L3Trap.isOpen = snap.trap.io;
            L3Trap.openProgress = snap.trap.op;
            L3Trap.firstApproach = snap.trap.fa;
            L3Trap.playerFalling = false;
            L3Trap.fallTimer = 0;
        }
        if (snap.pearls) snap.pearls.forEach(function(a, i) { if (i < state.pearls.length) state.pearls[i].active = a; });
        stateHistory = stateHistory.slice(0, histIdx);
    }

    // 玩家回到目标位置
    state.player.x = ghostX;
    state.player.y = ghostY;
    state.player.facingRight = ghostFacing;
    state.projectiles = [];
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    state.running = true;
    hasRewind = true;
    var remaining = l3MaxDeaths - l3DeathCount;
    rewindDisplay.innerHTML = '【时间回溯】×' + remaining;
    rewindDisplay.style.display = 'block';
    msgScreen.style.display = 'none';

    state.effects.push({life:15,maxLife:15,type:'rewind-flash'});
    triggerShake(3, 10);
}

    var flicker = Math.sin(seed * 0.2) * 1.5;
    var flicker2 = Math.cos(seed * 0.15) * 1;

    ctx.fillStyle='#ff6622';

        ctx.fillStyle='#ffcc44';
        ctx.fillRect(Math.floor(x+flicker2), Math.floor(y-5+flicker*0.3), 1, 1);

    ctx.globalAlpha = 1;
}

// 将颜色向血红色混合
function bloodBlend(hex, ratio) {
    if (!ratio || ratio <= 0) return hex;
    if (ratio >= 1) ratio = 1;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    // 目标血色：深暗红
    var br = 110, bg = 10, bb = 10;
    var nr = Math.round(r + (br - r) * ratio);
    var ng = Math.round(g + (bg - g) * ratio);
    var nb = Math.round(b + (bb - b) * ratio);
    return '#' + ((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
}

var bloodDrips = [];
function updateBloodDrips() {
    if (state.bloodLevel <= 0) {

        return;

    // 按照血迹等级概率生成新血滴
    if (state.isMoving && Math.random() < state.bloodLevel * 0.3) {
        bloodDrips.push({
            x: state.player.x + Math.random()*8,
            y: state.player.y + 10 + Math.random()*2,
            vy: 0.15 + Math.random()*0.2,
            life: 25 + Math.floor(Math.random()*15),

        });

    // 更新现有血滴
    for (var i = bloodDrips.length - 1; i >= 0; i--) {
        bloodDrips[i].y += bloodDrips[i].vy;
        bloodDrips[i].life--;
        if (bloodDrips[i].life <= 0) {
            bloodDrips.splice(i, 1);
        }
    }

}

function Entity(x,y,w,h,color){this.x=x;this.y=y;this.w=w;this.h=h;this.color=color;this.vx=0;this.vy=0;}

function Player(x,y){
    Entity.call(this,x,y,8,12,PAL.white);
    this.speed=PLAYER_SPEED_NORMAL;this.facingRight=true;this.animTimer=0;this.animFrame=0;
}
Player.prototype.update=function(){
    this.speed=state.timeStopped?PLAYER_SPEED_STOP:PLAYER_SPEED_NORMAL;
    // 第四关：雪地减速区域（深雪/泥泞地带）
    if(state.currentLevel===4 && state.slowZones && !state.timeStopped){
        var pcx=this.x+this.w/2, pcy=this.y+this.h/2;
        for(var si=0;si<state.slowZones.length;si++){
            var sz=state.slowZones[si];
            if(pcx>sz.x && pcx<sz.x+sz.w && pcy>sz.y && pcy<sz.y+sz.h){
                this.speed*=0.55;
                break;
            }
        }
    }
    this.vx=0;this.vy=0;
    if(state.keys['w'])this.vy=-this.speed;
    if(state.keys['s'])this.vy=this.speed;
    if(state.keys['a']){this.vx=-this.speed;this.facingRight=false;}
    if(state.keys['d']){this.vx=this.speed;this.facingRight=true;}
    var nx=this.x+this.vx,ny=this.y+this.vy;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    // 石门碰撞检测（第二关，升降石门从上方降下）
    if(!blocked && StoneDoor.active){
        var sdRects=StoneDoor.getCollisionRects();
        if(sdRects){
            for(var si=0;si<sdRects.length;si++){
                var sr=sdRects[si];
                if(nx<sr.x+sr.w&&nx+this.w>sr.x&&ny<sr.y+sr.h&&ny+this.h>sr.y){
                    blocked=true;break;
                }
            }
        }
    }
    // 滚石碰撞检测（第二关，已停下的滚石作为障碍）
    if(!blocked){
        var br=RollingBoulder.getCollisionRect();
        if(br && nx<br.x+br.w&&nx+this.w>br.x&&ny<br.y+br.h&&ny+this.h>br.y){
            blocked=true;
        }
    }
    if(!blocked){this.x=nx;this.y=ny;}
    
    // 关卡边界限制（考虑隔断墙）
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x=Math.max(10, Math.min(maxX - this.w, this.x));
    // 第二关：小密室区域使用独立边界
    if (state.currentLevel === 2) {
        var srLeft = 1065, srRight = 1115, srEntryLeft = 1068, srEntryRight = 1096;
        var inRoomArea = (this.x + this.w > srLeft && this.x < srRight);
        var inEntryArea = (this.x + this.w > srEntryLeft && this.x < srEntryRight);
        if (inRoomArea || inEntryArea) {
            this.y = Math.max(8, Math.min(level.tunnelBot - this.h, this.y));
        } else {
            this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
        }

        this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));

    // 第二关：圆形房间边界（左侧区域时，限制在圆内，但门口缺口除外）
    if (state.currentLevel === 2 && this.x + this.w/2 < 230) {
        var rcx = 140, rcy = 90, R = 86;
        var pcx = this.x + this.w/2, pcy = this.y + this.h/2;
        // 门口缺口区域（x>195 且 y在通道范围内）不受圆形边界限制

        } else {
            var distFromCenter = Math.hypot(pcx - rcx, pcy - rcy);
            if (distFromCenter + 6 > R) {
                var ang = Math.atan2(pcy - rcy, pcx - rcx);
                this.x = rcx + Math.cos(ang) * (R - 6) - this.w/2;
                this.y = rcy + Math.sin(ang) * (R - 6) - this.h/2;
            }
        }
    }
    
    // 第三关：圆形重生房间 + 上下暗道边界
    if (state.currentLevel === 3) {
        var pcx = this.x + this.w/2, pcy = this.y + this.h/2;
        
        // 圆形房间区域（x < 118）
        if (pcx < 118) {
            var rcx = 68, rcy = 90, R = 48;
            // 门口缺口（右侧，y在48~132之间）
            if (pcx > 100 && pcy > 48 && pcy < 132) {
                // 在门口通道内，不应用圆形边界
            } else {
                var distFromCenter = Math.hypot(pcx - rcx, pcy - rcy);
                if (distFromCenter + 5 > R) {
                    var ang = Math.atan2(pcy - rcy, pcx - rcx);
                    this.x = rcx + Math.cos(ang) * (R - 5) - this.w/2;
                    this.y = rcy + Math.sin(ang) * (R - 5) - this.h/2;
                }
            }
        }
        
        // 岔路口区域（x: 118~178）
        if (pcx >= 118 && pcx < 178) {
            this.y = Math.max(36, Math.min(122 - this.h, this.y));
        }
        
        // 暗道区域（x >= 178）
        if (pcx >= 178) {
            if (pcy <= 76) {
                // 上方暗道1（压缩高度，勉强通过一个身位）
                this.y = Math.max(38, Math.min(40, this.y));
            } else {
                // 下方暗道2
                // 机关打开且玩家在机关上方时不限制y，让L3Trap.update触发掉落
                if (L3Trap.isOpen && pcx >= L3Trap.x && pcx <= L3Trap.x + L3Trap.w) {

                } else {

            // 限制x方向不超过右侧边界
            this.x = Math.min(778 - this.w, this.x);
        }
        
        // 整体x边界
        this.x = Math.max(10, this.x);
    }
    state.isMoving=(this.vx!==0||this.vy!==0);

Enemy.prototype.doPushBack=function(){

    if(dist<PUSH_RANGE){var force=PUSH_FORCE*(1-dist/PUSH_RANGE);this.x+=(dx/dist)*force;this.y+=(dy/dist)*force;this.clampBounds();this.pushFlash=4;if(state.globalTick%3===0)state.effects.push({x:this.x+Math.random()*8,y:this.y+Math.random()*12,life:10,maxLife:10,type:'push-spark'});}

Enemy.prototype.doShooting=function(){

        var dx = state.player.x - this.x;

        var dist = Math.hypot(dx, dy);

        var nerfRange = (state.currentLevel === 3 && l3EnemyReactionNerfed) ? 0.6 : 1;
        var nerfCooldown = (state.currentLevel === 3 && l3EnemyReactionNerfed) ? 1.8 : 1;
        
        if(dist <= this.attackRange * nerfRange){

Enemy.prototype.drawPrediction=function(){

        knife.speed = this.knifeInitSpd;
        knife.customAccel = this.knifeAccel;

        state.projectiles.push(knife);

};

// 始终盾牌面向玩家，不发射飞刀，只能从背面击杀
function ShieldDefender(x, y, name, armorColor, isTall) {
    Entity.call(this, x, y, isTall ? 10 : 8, isTall ? 16 : 12, armorColor);
    this.name = name;
    this.armorColor = armorColor;
    this.isTall = isTall;
    this.marked = false;
    this.pushFlash = 0;
    this.hitFlash = 0;
    // 盾牌始终朝向左边（-1=盾在右边，面向左，挡住左侧攻击）
    this.shieldDir = -1;
    this.moveSpeed = 0.15;
    // 寻找搭档的引用
    this.partner = null;
}
ShieldDefender.prototype = Object.create(Enemy.prototype);
ShieldDefender.prototype.constructor = ShieldDefender;

ShieldDefender.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;
    if (state.timeStopped) {
        if (this.marked) return;
        // 时间静止时不做任何事（不发射飞刀）
        return;
    }
    
    // 盾牌始终朝向左边
    this.shieldDir = -1;
    
    // 主动靠近玩家
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    // 与玩家保持一定距离
    var approachSpeed = 0.3;
    if (dist > 40) {
        var moveX = (dx / dist) * approachSpeed;
        var moveY = (dy / dist) * approachSpeed * 0.6; // 垂直移动稍慢
        
        var nx = this.x + moveX;
        var ny = this.y + moveY;
        
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        
        if (!blocked) { this.x = nx; this.y = ny; }
    } else if (dist < 30) {
        // 太近了，稍微后退
        var retreatX = (-dx / dist) * approachSpeed * 0.5;
        var nx = this.x + retreatX;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; }
    }
    
    this.clampBounds();
};

ShieldDefender.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

// 判断玩家是否在哧吭的背面
ShieldDefender.prototype.isPlayerBehind = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var myCenterX = this.x + this.w / 2;
    // 盾牌面向的方向的反方向即为背面
    if (this.shieldDir === 1) {
        // 盾在左，面向右，背面是左边
        return playerCenterX < myCenterX - 4;
    } else {
        // 盾在右，面向左，背面是右边
        return playerCenterX > myCenterX + 4;
    }
};

ShieldPartner.prototype = Object.create(Enemy.prototype);
ShieldPartner.prototype.constructor = ShieldPartner;

ShieldPartner.prototype.chasePlayer = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    if (dist > 25) {
        var speed = 0.35;
        var nx = this.x + (dx / dist) * speed;
        var ny = this.y + (dy / dist) * speed * 0.6;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; this.y = ny; }
    }
    this.clampBounds();
};

ShieldPartner.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;

        if (!state.isMoving) return;
        this.doShooting();

    if (this.defender && state.enemies.indexOf(this.defender) !== -1) {
        var def = this.defender;

            }.bind(this));
            if (!blocked) { this.x = nx; this.y = ny; }
        }
        this.clampBounds();
    } else {
        // 搭档已死，主动追击玩家
        this.chasePlayer();
    }
    
    this.doShooting();
};

    } else {

        ctx.fillStyle = PAL.gold;

    ctx.fillStyle = this.armorColor === 'black' ? '#aaccff' : '#ffcc88';

        }
        ctx.globalAlpha = 1;
    }
};

/* ==================== 保镖·吭哧二将（挡刀型随从） ==================== */
// 拾取令牌后召唤，始终在玩家前方抵挡飞刀
function Bodyguard(x, y, name, armorColor) {
    this.x = x;
    this.y = y;
    this.w = 8;
    this.h = 12;
    this.name = name;
    this.armorColor = armorColor || 'black';
    this.hp = 5; // 每个保镖可挡5次飞刀
    this.facingRight = true; // 面朝方向（始终面向最近敌人）
    this.hitFlash = 0;
    this.alive = true;
    this.spawnTimer = 30; // 召唤出场动画计时
    this.emergencyCooldown = 0; // 紧急传送冷却（帧）
    this.emergencyFlash = 0; // 传送残影特效计时
    this.prevX = x; // 传送前位置
    this.prevY = y;
}

Bodyguard.prototype.update = function() {
    if (!this.alive || !state.player) return;
    
    if (this.spawnTimer > 0) {
        this.spawnTimer--;
        return;
    }
    
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.emergencyCooldown > 0) this.emergencyCooldown--;
    if (this.emergencyFlash > 0) this.emergencyFlash--;
    
    // 始终面向最近敌人，站位在玩家与敌人之间
    var nearestEnemy = null;
    var nearestDist = Infinity;
    for (var ei = 0; ei < state.enemies.length; ei++) {
        var e = state.enemies[ei];
        var ex = e.x + (e.w || 8) / 2;
        var ey = e.y + (e.h || 12) / 2;
        var d = Math.hypot(ex - state.player.x - 4, ey - state.player.y - 6);
        if (d < nearestDist) {
            nearestDist = d;
            nearestEnemy = e;
        }
    }
    
    var guardIdx = state.bodyguards.indexOf(this);
    var targetX, targetY;
    
    // 第四关：保镖不主动拦截boss，只被动跟随玩家
    if (state.currentLevel === 4) {
        this.facingRight = state.player.facingRight !== false;
        if (this.facingRight) {
            targetX = state.player.x - this.w - 14 - guardIdx * 10;
        } else {
            targetX = state.player.x + 14 + guardIdx * 10;
        }
        targetY = state.player.y + (guardIdx === 0 ? -4 : 4);
    } else if (nearestEnemy) {
        // 面向最近敌人，站在玩家与敌人之间
        var enX = nearestEnemy.x + (nearestEnemy.w || 8) / 2;
        var enY = nearestEnemy.y + (nearestEnemy.h || 12) / 2;
        var toEnemyX = enX - (state.player.x + 4);
        var toEnemyY = enY - (state.player.y + 6);
        var toDist = Math.hypot(toEnemyX, toEnemyY);
        // 面朝方向
        this.facingRight = toEnemyX >= 0;
        // 站在玩家前方30px（沿玩家→敌人方向）
        var standDist = 30 + guardIdx * 12;
        targetX = state.player.x + 4 + (toEnemyX / toDist) * standDist - this.w / 2;
        targetY = state.player.y + 6 + (toEnemyY / toDist) * standDist - this.h / 2;
        // 两个保镖沿垂直于敌人方向错开
        var perpX = -toEnemyY / toDist * (guardIdx === 0 ? -4 : 4);
        var perpY = toEnemyX / toDist * (guardIdx === 0 ? -4 : 4);
        targetX += perpX;
        targetY += perpY;
    } else {
        // 无敌人时，跟随玩家朝向
        this.facingRight = state.player.facingRight !== false;
        if (this.facingRight) {
            targetX = state.player.x + 28 + guardIdx * 12;
        } else {
            targetX = state.player.x - this.w - 20 - guardIdx * 12;
        }
        targetY = state.player.y + (guardIdx === 0 ? -3 : 3);
    }
    
    var dx = targetX - this.x;
    var dy = targetY - this.y;
    var dist = Math.hypot(dx, dy);
    
    if (dist > 1.5) {
        var speed = Math.min(1.5, dist * 0.12);
        this.x += (dx / dist) * speed;
        this.y += (dy / dist) * speed;
    }
    
    // 第三关：保镖在暗道中跟随时的边界限制
    if (state.currentLevel === 3) {
        var pcx = this.x + this.w / 2;
        var pcy = this.y + this.h / 2;
        if (pcx >= 178) {
            if (pcy <= 76) {
                // 上方暗道
                this.y = Math.max(36, Math.min(40, this.y));
                this.x = Math.max(175, Math.min(778 - this.w, this.x));
            } else {
                // 下方暗道
                this.y = Math.max(108, Math.min(110, this.y));
                this.x = Math.max(175, Math.min(778 - this.w, this.x));
            }
        }
    }
};

Bodyguard.prototype.draw = function() {
    if (!this.alive) return;
    var x = px(this.x), y = px(this.y);
    var w = this.w, h = this.h;
    
    // 召唤出场动画：闪烁缩放
    if (this.spawnTimer > 0) {
        var sp = this.spawnTimer / 30;
        ctx.globalAlpha = 0.3 + 0.7 * (1 - sp);
        ctx.fillStyle = '#4488ff';
        drawPxCircle(x + w / 2, y + h / 2, 8 * sp, 'rgba(60,100,200,' + (0.3 * (1 - sp)) + ')');
        if (this.spawnTimer > 15) return;
        ctx.globalAlpha = (15 - this.spawnTimer) / 15;
    }
    
    var armorMain, armorDark, armorLight, trimColor;
    if (this.armorColor === 'black') {
        armorMain = '#1a1a22'; armorDark = '#0a0a12'; armorLight = '#2a2a32'; trimColor = '#4a4a52';
    } else {
        armorMain = '#e8e8e0'; armorDark = '#c8c8c0'; armorLight = '#f8f8f0'; trimColor = '#a8a8a0';
    }
    
    // 受击闪烁
    if (this.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,200,0.35)';
        ctx.fillRect(x - 1, y - 2, w + 2, h + 4);
    }
    
    // 紧急传送残影（从旧位置到当前位置的拖影）
    if (this.emergencyFlash > 0) {
        var ef = this.emergencyFlash / 12;
        ctx.globalAlpha = ef * 0.4;
        var oldX = px(this.prevX), oldY = px(this.prevY);
        ctx.fillStyle = this.armorColor === 'black' ? '#1a1a22' : '#e8e8e0';
        ctx.fillRect(oldX, oldY, w, h);
        // 连线特效
        ctx.strokeStyle = 'rgba(100,180,255,' + (ef * 0.5) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(oldX + w / 2, oldY + h / 2);
        ctx.lineTo(x + w / 2, y + h / 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }
    
    // 头盔
    ctx.fillStyle = armorMain;
    ctx.fillRect(x + 1, y, w - 2, 3);
    ctx.fillStyle = armorDark;
    ctx.fillRect(x + 2, y - 2, w - 4, 2);
    ctx.fillStyle = armorLight;
    ctx.fillRect(x + 3, y - 1, w - 6, 1);
    ctx.fillStyle = trimColor;
    ctx.fillRect(x + w / 2 - 1, y - 2, 2, 2);
    
    // 面部
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 2, y + 3, w - 4, 2);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(x + 3, y + 3, 1, 1);
    ctx.fillRect(x + w - 4, y + 3, 1, 1);
    
    // 铠甲身体
    ctx.fillStyle = armorMain;
    ctx.fillRect(x, y + 5, w, h - 8);
    ctx.fillStyle = armorDark;
    ctx.fillRect(x + 1, y + 6, w - 2, 2);
    ctx.fillStyle = armorLight;
    ctx.fillRect(x + 1, y + h - 5, w - 2, 1);
    ctx.fillStyle = trimColor;
    ctx.fillRect(x + w / 2 - 1, y + 5, 2, h - 9);
    ctx.fillRect(x, y + h / 2, w, 1);
    
    // 腿
    ctx.fillStyle = armorDark;
    ctx.fillRect(x + 2, y + h - 3, 2, 3);
    ctx.fillRect(x + w - 4, y + h - 3, 2, 3);
    
    // 盾牌（始终朝向最近敌人方向）
    var shieldX = this.facingRight ? x + w : x - 4;
    ctx.fillStyle = this.armorColor === 'black' ? '#3a3a42' : '#d0d0c8';
    ctx.fillRect(shieldX, y + 1, 4, h - 3);
    ctx.fillStyle = this.armorColor === 'black' ? '#5a5a62' : '#a0a098';
    ctx.fillRect(shieldX, y + 1, 1, h - 3);
    ctx.fillRect(shieldX + 3, y + 1, 1, h - 3);
    ctx.fillRect(shieldX, y + 1, 4, 1);
    ctx.fillRect(shieldX, y + h - 3, 4, 1);
    
    // HP指示（盾牌上的点）
    for (var hi = 0; hi < this.hp; hi++) {
        ctx.fillStyle = '#44cc44';
        ctx.fillRect(shieldX + 1, y + h - 5 - hi * 2, 2, 1);
    }
    
    // 名字
    ctx.fillStyle = this.armorColor === 'black' ? '#88aadd' : '#ffcc88';
    ctx.font = '7px zpix, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, x + w / 2, y - 4);
    ctx.textAlign = 'left';
    
    // 保镖标识光环
    if (this.spawnTimer <= 0) {
        var gp = 0.12 + Math.sin(state.globalTick * 0.06) * 0.06;
        drawPxCircle(x + w / 2, y + h / 2, 7, 'rgba(60,120,220,' + gp + ')');
    }
    
    ctx.globalAlpha = 1;
};

function Knife(x,y,dirX,dirY){
    this.x=x;this.y=y;this.dirX=dirX;this.dirY=dirY;this.speed=KNIFE_INIT_SPD;this.trail=[];this.alive=true;this.age=0;
}
Knife.prototype.update=function(){
    if(state.timeStopped&&!state.isMoving)return;
    var maxSpd = this.customMaxSpd || KNIFE_MAX_SPD;
    var accel = this.customAccel || KNIFE_ACCEL;
    this.speed=Math.min(this.speed+accel,maxSpd);
    this.x+=this.dirX*this.speed;this.y+=this.dirY*this.speed;this.age++;
    this.trail.push({x:this.x,y:this.y,speed:this.speed});
    if(this.trail.length>6)this.trail.shift();

    if (state.currentLevel === 3 && this.x >= 175) {
        // 判断飞刀在哪条通道：上通道 y:28~52，下通道 y:98~122
        if (this.y >= 28 && this.y <= 52) {
            // 在上通道，不能穿出上通道墙壁
            if (this.y < 28 || this.y > 52) { this.alive = false; return; }

            if (this.y < 98 || this.y > 122) { this.alive = false; return; }

            this.alive = false; return;

};
Knife.prototype.draw=function(){

    var x=px(this.x),y=px(this.y),sr=Math.min(this.speed/KNIFE_MAX_SPD,1);

    ctx.fillStyle='#d0d0d0';ctx.fillRect(x,y,1,1);ctx.fillRect(x+dx1,y+dy1,1,1);ctx.fillRect(x+dx2,y+dy2,1,1);
    ctx.fillStyle='#f0f0f0';ctx.fillRect(x+dx1*2,y+dy1*2,1,1);
};

/* ==================== 标枪投射物 ==================== */
function Javelin(x, y, dirX, dirY, ownerType) {
    this.x = x; this.y = y;
    // 初始速度：向玩家方向
    var speed = 0.75;
    this.vx = dirX * speed;
    this.vy = dirY * speed;
    this.gravity = 0.006;  // 抛物线重力（速度更快，重力稍小以保持弧线）
    this.alive = true;
    this.age = 0;
    this.maxAge = 70;  // 最大存活帧数（速度加快后更快飞出范围）
    this.trail = [];
    this.ownerType = ownerType || 'javelin';  // 标记来源类型
}
Javelin.prototype.update = function() {
    if (state.timeStopped && !state.isMoving) return;
    this.vy += this.gravity;  // 抛物线效果
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 5) this.trail.shift();
    var level = LEVELS[state.currentLevel - 1];
    if (this.y < level.tunnelTop || this.y > level.tunnelBot) {
        this.alive = false; return;
    }
    if (this.x < -10 || this.x > level.width + 10) this.alive = false;
    if (this.age > this.maxAge) this.alive = false;
    // 第三关：暗道墙壁碰撞
    if (state.currentLevel === 3 && this.x >= 175) {
        if (this.y >= 28 && this.y <= 52) {
            // 上通道范围，不处理
        } else if (this.y >= 98 && this.y <= 122) {
            // 下通道范围，不处理
        } else {
            this.alive = false; return;
        }
    }
};
Javelin.prototype.draw = function() {
    // 绘制尾迹
    this.trail.forEach(function(t, i) {
        var ratio = (i + 1) / this.trail.length;
        ctx.fillStyle = 'rgba(180,140,80,' + (ratio * 0.3) + ')';
        ctx.fillRect(px(t.x), px(t.y), 1, 1);
    }.bind(this));
    // 标枪主体：一根斜线
    var x = px(this.x), y = px(this.y);
    var angle = Math.atan2(this.vy, this.vx);
    var len = 4;  // 标枪长度（像素）
    var ex = x + Math.cos(angle) * len;
    var ey = y + Math.sin(angle) * len;
    // 枪杆
    ctx.fillStyle = '#a08050';
    ctx.fillRect(x, y, 1, 1);
    ctx.fillRect(Math.min(x, ex), Math.min(y, ey), Math.abs(ex - x) + 1, 1);
    // 枪尖（金属色）
    ctx.fillStyle = '#d0d0d0';
    ctx.fillRect(px(ex), px(ey), 1, 1);
};

/* ==================== 标枪敌人（第三关上方暗道） ==================== */
function JavelinEnemy(x, y, patrolX1, patrolX2, patrolY) {
    Entity.call(this, x, y, 8, 12, PAL.cinnabar);
    this.moveSpeed = 0.3;
    this.shootCooldown = Math.random() * 150 + 120;
    this.throwCooldown = 0;  // 投掷后额外冷却
    this.variant = Math.floor(Math.random() * 3);
    this.alertTimer = 0;
    this.marked = false;
    this.pushFlash = 0;
    this.dirX = 1; this.dirY = 0;
    this.patrolX1 = patrolX1;
    this.patrolX2 = patrolX2;
    this.patrolY = patrolY;
    this.patrolDir = 1;
    this.throwRange = 48;  // 4个玩家身位（12px * 4）
    this.enemyType = 'JavelinEnemy';  // 用于状态保存识别
}
JavelinEnemy.prototype = Object.create(Enemy.prototype);
JavelinEnemy.prototype.constructor = JavelinEnemy;

JavelinEnemy.prototype.update = function() {
    if (state.timeStopped) {
        if (this.marked) return;
        if (!state.isMoving) return;
        this.doPatrol();
        this.doPushBack();
        this.doThrowing();
        return;
    }
    this.doPatrol();
    this.doThrowing();
};

JavelinEnemy.prototype.doPatrol = function() {
    // 在指定范围内左右巡逻
    var targetX = this.patrolDir > 0 ? this.patrolX2 : this.patrolX1;
    this.dirX = this.patrolDir;
    this.dirY = 0;
    var nx = this.x + this.dirX * this.moveSpeed;
    if (nx >= this.patrolX2) {
        this.patrolDir = -1;
        nx = this.patrolX2;
    } else if (nx <= this.patrolX1) {
        this.patrolDir = 1;
        nx = this.patrolX1;
    }
    this.x = nx;
    this.y = this.patrolY;  // 固定在暗道地面
    // 不越过陷阱区域（陷阱x:280~330，巡逻范围已限制在右侧，这里加保险）
    if (this.x < 335) this.x = 335;
    this.clampBounds();
};

JavelinEnemy.prototype.doThrowing = function() {
    this.shootCooldown--;
    if (this.throwCooldown > 0) this.throwCooldown--;
    if (this.shootCooldown <= 0 && this.throwCooldown <= 0) {
        var dx = state.player.x - this.x;
        var dy = state.player.y - this.y;
        var dist = Math.hypot(dx, dy);
        // 第三关兜底：缩短投掷范围+延长冷却
        var nerfRange = l3EnemyReactionNerfed ? 0.6 : 1;
        var nerfCooldown = l3EnemyReactionNerfed ? 1.8 : 1;
        // 玩家在3个身位范围内才投掷
        if (dist <= this.throwRange * nerfRange) {
            this.throwJavelin();
            // 投掷后有较长冷却时间
            this.shootCooldown = (Math.random() * 120 + 100) * nerfCooldown;
            this.throwCooldown = 30;  // 投掷动作停顿
        }
    }
    this.alertTimer = this.shootCooldown < 25 ? (this.alertTimer + 1) % 12 : 0;
};

JavelinEnemy.prototype.throwJavelin = function() {
    var dx = state.player.x - this.x;
    var dy = state.player.y - this.y;
    var dist = Math.hypot(dx, dy) || 1;
    state.projectiles.push(new Javelin(this.x + 4, this.y + 2, dx / dist, dy / dist, 'javelin'));
};

JavelinEnemy.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

/* ==================== 第四关近战Boss ==================== */
function MeleeBoss(x, y) {
    Entity.call(this, x, y, 8, 12, PAL.cinnabar);
    this.speed = 1.3;
    this.facingRight = true;
    this.animTimer = 0;
    this.animFrame = 0;
    this.hp = 5;
    this.maxHp = 5;
    this.hitFlash = 0;
    this.chargeCooldown = 0;
    this.slashTimer = 0;
    this.attackCooldown = 0;
}

MeleeBoss.prototype.update = function() {
    if (!state.player) return;
    var pcx = state.player.x + 4;
    var pcy = state.player.y + 6;
    var bcx = this.x + 4;
    var bcy = this.y + 6;
    var dx = pcx - bcx;
    var dy = pcy - bcy;
    var dist = Math.hypot(dx, dy);

    // 面朝玩家
    this.facingRight = dx > 0;

    // 动画帧（加快以匹配奔跑速度）
    this.animTimer++;
    if (this.animTimer >= 6) {
        this.animTimer = 0;
        this.animFrame = (this.animFrame + 1) % 4;
    }

    if (this.hitFlash > 0) this.hitFlash--;
    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.slashTimer > 0) this.slashTimer--;

    // 疯狂追击玩家（距离越远速度越快）
    if (dist > 18) {
        var chaseSpeed = this.speed + Math.min(0.6, dist * 0.003);
        this.x += (dx / dist) * chaseSpeed;
        this.y += (dy / dist) * chaseSpeed;
    }

    // 边界限制
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));

    // 掩体碰撞
    for (var ci = 0; ci < state.covers.length; ci++) {
        var cv = state.covers[ci];
        if (this.x < cv.x + cv.w && this.x + this.w > cv.x && this.y < cv.y + cv.h && this.y + this.h > cv.y) {
            var cdx = bcx - (cv.x + cv.w / 2);
            var cdy = bcy - (cv.y + cv.h / 2);
            if (Math.abs(cdx) > Math.abs(cdy)) {
                this.x += cdx > 0 ? 1 : -1;
            } else {
                this.y += cdy > 0 ? 1 : -1;
            }
        }
    }

    // 近战攻击判定（距离足够近且不在冷却中，加快攻击频率）
    if (dist < 22 && this.attackCooldown <= 0 && !state.timeStopped) {
        this.slashTimer = 8;
        this.attackCooldown = 25;
        state.effects.push({ life: 6, maxLife: 6, type: 'flash' });
        triggerShake(3, 8);
        if (hasRewind) { triggerRewind(); }
        else { respawnAtCheckpoint(); }
    }

    // 主动击杀稻草人（避免被阻挡）
    for (var si = state.scarecrows.length - 1; si >= 0; si--) {
        var sc = state.scarecrows[si];
        var sd = Math.hypot(this.x + 4 - (sc.x + sc.w / 2), this.y + 6 - (sc.y + sc.h / 2));
        if (sd < 16) {
            state.dyingEnemies.push(new DyingScarecrow(sc.x, sc.y));
            state.effects.push({ x: sc.x + sc.w / 2, y: sc.y + sc.h / 2, life: 8, maxLife: 8, type: 'slash' });
            state.scarecrows.splice(si, 1);
            if (si < scarecrowCoverIndices.length) {
                var cIdx = scarecrowCoverIndices[si];
                state.covers.splice(cIdx, 1);
                for (var ci2 = si + 1; ci2 < scarecrowCoverIndices.length; ci2++) {
                    scarecrowCoverIndices[ci2]--;
                }
                scarecrowCoverIndices.splice(si, 1);
            }
            triggerShake(2, 4);
            ScarecrowHint.dismiss();
            break;
        }
    }
};

MeleeBoss.prototype.draw = function() {
    var x = px(this.x), y = px(this.y);
    var f = this.facingRight ? 1 : -1;
    var bob = (this.animFrame === 1 || this.animFrame === 3) ? -1 : 0;
    var leg = (this.animFrame === 1 || this.animFrame === 3);

    // 受击闪白
    if (this.hitFlash > 0 && this.hitFlash % 2 === 0) {
        ctx.globalAlpha = 0.6;
    }

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x - 1, y + 11, 10, 2);
    // 帽子
    ctx.fillStyle = PAL.straw;
    ctx.fillRect(x - 2, y - 2 + bob, 12, 2);
    ctx.fillStyle = PAL.darkStraw;
    ctx.fillRect(x, y - 4 + bob, 8, 2);
    ctx.fillStyle = '#4a3828';
    ctx.fillRect(x + 2, y - 3 + bob, 4, 1);
    // 脸部
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(x + 1, y + bob, 6, 3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(f > 0 ? x + 5 : x + 2, y + 1 + bob, 1, 1);
    // 上身白衣
    ctx.fillStyle = PAL.white;
    ctx.fillRect(x, y + 3 + bob, 8, 3);
    ctx.fillStyle = '#c8c0b0';
    ctx.fillRect(x + 3, y + 3 + bob, 2, 3);
    // 金腰带
    ctx.fillStyle = PAL.darkGold;
    ctx.fillRect(x, y + 6 + bob, 8, 1);
    ctx.fillStyle = PAL.gold;
    ctx.fillRect(x + 3, y + 5 + bob, 2, 1);
    // 下身
    ctx.fillStyle = '#d0c8b8';
    ctx.fillRect(x + 1, y + 7 + bob, 6, 3);
    ctx.fillStyle = '#a09888';
    ctx.fillRect(x + 1, y + 9 + bob, 1, 1);
    ctx.fillRect(x + 6, y + 9 + bob, 1, 1);
    // 裤腿
    ctx.fillStyle = '#2a2420';
    if (leg) { ctx.fillRect(x + 1, y + 10, 2, 2); ctx.fillRect(x + 5, y + 10, 2, 2); }
    else { ctx.fillRect(x + 2, y + 10, 2, 2); ctx.fillRect(x + 4, y + 10, 2, 2); }
    // 剑
    var sx = f > 0 ? x + 8 : x - 2;
    ctx.fillStyle = '#b0b8c0';
    ctx.fillRect(sx, y - 3 + bob, 1, 11);
    ctx.fillStyle = PAL.darkGold;
    ctx.fillRect(sx - 1, y + 5 + bob, 3, 1);
    ctx.fillStyle = '#e0e8f0';
    ctx.fillRect(sx, y - 3 + bob, 1, 2);

    ctx.globalAlpha = 1;

    // 斩击特效
    if (this.slashTimer > 0) {
        ctx.globalAlpha = this.slashTimer / 8;
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 1;
        var slashX = x + 4 + f * 8;
        var slashY = y + 4 + bob;
        ctx.beginPath();
        ctx.moveTo(slashX - 4, slashY - 5);
        ctx.lineTo(slashX + 4, slashY + 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(slashX - 2, slashY + 4);
        ctx.lineTo(slashX + 6, slashY - 3);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // 血条（头顶）
    if (this.hp < this.maxHp) {
        var barW = 10, barH = 2;
        var barX = x - 1, barY = y - 7;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
        ctx.strokeStyle = 'rgba(200,200,200,0.3)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(barX, barY, barW, barH);
    }
};

var ScarecrowHint = {
    active: false,
    scarecrowX: 200,
    dismissed: false, // 击杀过一个稻草人后隐藏
    
    dismiss: function() { this.dismissed = true; this.active = false; },
    
    check: function() {
        if (this.dismissed) { this.active = false; return; }
        if (state.currentLevel !== 1 && state.currentLevel !== 4) { this.active = false; return; }
        if (!state.player) { this.active = false; return; }
        // 稻草人全部被击杀后提示消失
        if (state.scarecrows.length === 0) { this.active = false; return; }
        // 稻草人存在时始终显示
        this.active = true;
        // 记录稻草人位置
        if (state.scarecrows.length > 0) {
            this.scarecrowX = state.scarecrows[0].x;
        }
    },
    
    draw: function() {
        if (!this.active) return;
        
        var text = '试着靠近敌人';
        ctx.save();
        // 与"第一关"相近的大小
        ctx.font = 'bold 9px "Microsoft YaHei", "SimHei", "PingFang SC", sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        
        // 文字在稻草人左边，垂直居中于稻草人列
        var textX = this.scarecrowX - 8;
        var textY = 80;
        
        // 微弱呼吸动画
        var breath = 0.8 + 0.2 * Math.sin(state.globalTick * 0.05);
        ctx.globalAlpha = breath;
        
        // 半透明黑色背景
        var metrics = ctx.measureText(text);
        var tw = metrics.width;
        var th = 9;
        var padX = 4, padY = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(textX - tw - padX, textY - th / 2 - padY, tw + padX * 2, th + padY * 2);
        
        // 黄色文字，无描边，与画面中其他黄色一致
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(text, textX, textY);
        
        ctx.restore();
    }
};

/* ==================== WASD 按键提示系统（第一关） ==================== */
var WASDHint = {
    visible: true,       // 是否显示
    pressedKeys: {},     // 记录已按过的键
    keyDefs: [
        { key: 'w', label: 'W', ox: 0, oy: -1 },
        { key: 'a', label: 'A', ox: -1, oy: 0 },
        { key: 's', label: 'S', ox: 0, oy: 1 },
        { key: 'd', label: 'D', ox: 1, oy: 0 }
    ],
    keySize: 22,        // 按键大小（像素）
    keyGap: 3,          // 按键间距
    pressedAnim: {},    // 按键按下动画计时器
    
    onLevelLoad: function(levelId) {
        // 进入第一关时重置（仅首次）
        if (levelId === 1 && this._initialized !== true) {
            this.visible = true;
            this.pressedKeys = {};
            this.pressedAnim = {};
            this._initialized = true;
        }
    },
    
    // keydown 事件中调用
    onKeyDown: function(key) {
        if (!this.visible) return;
        var k = key.toLowerCase();
        if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
            this.pressedKeys[k] = true;
            this.pressedAnim[k] = 10; // 10帧按下动画
            // 四个键都按过了，开始淡出
            var allPressed = this.keyDefs.every(function(d) { return this.pressedKeys[d.key]; }.bind(this));
            if (allPressed) {
                this._fadeTimer = 60; // 1秒后消失
            }
        }
    },
    
    update: function() {
        if (!this.visible) return;
        
        // 更新按下动画计时器
        for (var k in this.pressedAnim) {
            if (this.pressedAnim[k] > 0) this.pressedAnim[k]--;
        }
        
        // 淡出计时
        if (this._fadeTimer && this._fadeTimer > 0) {
            this._fadeTimer--;
            if (this._fadeTimer <= 0) {
                this.visible = false;
            }
        }
    },
    
    draw: function() {
        if (!this.visible) return;
        if (state.currentLevel !== 1) return;
        
        ctx.save();
        
        var ks = this.keySize;
        var gap = this.keyGap;
        // 布局：W在上，ASD在下，整体居中于画面下方
        var baseX = 160 - (ks + gap) * 1.5;  // 整体水平居中
        var baseY = 120; // 画面中下方（canvas高度180）
        
        // 整体呼吸动画
        var breath = 0.55 + 0.3 * Math.sin(state.globalTick * 0.04);
        ctx.globalAlpha = breath;
        
        // 淡出时额外降低透明度
        if (this._fadeTimer && this._fadeTimer > 0) {
            ctx.globalAlpha *= (this._fadeTimer / 60);
        }
        
        // 按键位置计算
        var positions = {
            'w': { x: baseX + ks / 2 + gap / 2, y: baseY },
            'a': { x: baseX - ks / 2 - gap / 2, y: baseY + ks + gap },
            's': { x: baseX + ks / 2 + gap / 2, y: baseY + ks + gap },
            'd': { x: baseX + ks * 1.5 + gap * 1.5, y: baseY + ks + gap }
        };
        
        for (var i = 0; i < this.keyDefs.length; i++) {
            var def = this.keyDefs[i];
            var pos = positions[def.key];
            var kx = pos.x - ks / 2;
            var ky = pos.y - ks / 2;
            var isPressed = !!this.pressedKeys[def.key];
            var animT = this.pressedAnim[def.key] || 0;
            // 按下位移效果
            var pressOffset = animT > 0 ? 2 : 0;
            
            // 按键阴影（立体感）
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(kx + 2, ky + 2, ks, ks);
            
            // 按键底色
            if (animT > 0) {
                // 按下状态 - 亮色
                ctx.fillStyle = '#c8a832';
            } else if (isPressed) {
                // 已按过 - 暗色标记
                ctx.fillStyle = '#5a5030';
            } else {
                // 未按下 - 默认
                ctx.fillStyle = '#3a3520';
            }
            ctx.fillRect(kx, ky + pressOffset, ks, ks);
            
            // 按键边框（像素风格）
            ctx.strokeStyle = isPressed ? 'rgba(200,168,0,0.3)' : 'rgba(200,168,0,0.6)';
            ctx.lineWidth = 1;
            ctx.strokeRect(kx + 0.5, ky + pressOffset + 0.5, ks - 1, ks - 1);
            
            // 按键高光（上和左边缘）
            if (animT <= 0 && !isPressed) {
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(kx + 1, ky + pressOffset + 1, ks - 2, 2);
                ctx.fillRect(kx + 1, ky + pressOffset + 1, 2, ks - 2);
            }
            
            // 按键文字
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (animT > 0) {
                ctx.fillStyle = '#fff8e0';
            } else if (isPressed) {
                ctx.fillStyle = 'rgba(200,168,0,0.4)';
            } else {
                ctx.fillStyle = '#cca800';
            }
            // 文字发光（未按过的键）
            if (!isPressed) {
                var textGlow = 0.4 + 0.3 * Math.sin(state.globalTick * 0.06 + i * 1.5);
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 4 * textGlow;
            }
            ctx.fillText(def.label, pos.x, pos.y + pressOffset);
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }
        
        // "使用 WASD 移动" 提示文字
        ctx.font = '9px "Microsoft YaHei", "PingFang SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(200,168,0,0.5)';
        ctx.fillText('使用 WASD 移动', 160, baseY + ks * 2 + gap * 2 + 8);
        
        ctx.restore();
    }
};

/* ==================== 双击冲刺系统 ==================== */
var Dash = {
    lastKeyTime: {},       // 上次按键时间戳
    keyHeld: {},           // 当前按键是否被按住
    doubleTapWindow: 280,  // 双击判定时间窗口（毫秒）
    dashDuration: 12,      // 冲刺持续帧数（更柔和）
    dashSpeed: 3.0,        // 冲刺速度（像素/帧）
    active: false,         // 是否正在冲刺
    timer: 0,              // 冲刺剩余帧
    dashVx: 0,
    dashVy: 0,
    trail: [],             // 残影坐标
    
    // keydown 事件中调用
    onKeyDown: function(key) {
        if (!state.running || !state.player || state.timeStopped) return;
        var k = key.toLowerCase();
        if (k !== 'w' && k !== 'a' && k !== 's' && k !== 'd') return;
        if (this.active) return;
        
        // 长按判定：如果这个键当前仍处于按住状态，说明是长按重复触发，忽略
        if (this.keyHeld[k]) return;
        this.keyHeld[k] = true;
        
        var now = performance.now();
        var last = this.lastKeyTime[k] || 0;
        
        if (now - last < this.doubleTapWindow) {
            // 双击确认，触发冲刺
            this.active = true;
            this.timer = this.dashDuration;
            this.trail = [];
            this.dashVx = 0;
            this.dashVy = 0;
            if (k === 'w') this.dashVy = -this.dashSpeed;
            if (k === 's') this.dashVy = this.dashSpeed;
            if (k === 'a') { this.dashVx = -this.dashSpeed; state.player.facingRight = false; }
            if (k === 'd') { this.dashVx = this.dashSpeed; state.player.facingRight = true; }
            this.lastKeyTime[k] = 0; // 重置，防止三击再次触发
        } else {
            this.lastKeyTime[k] = now;
        }
    },
    
    // keyup 事件中调用
    onKeyUp: function(key) {
        var k = key.toLowerCase();
        this.keyHeld[k] = false;
    },
    
    // 每帧更新
    update: function() {
        if (!this.active) return;
        this.timer--;
        
        // 记录残影（每3帧记录一次，更稀疏更丝滑）
        if (state.player && this.timer % 3 === 0) {
            this.trail.push({ x: state.player.x, y: state.player.y, life: 8 });
        }
        
        if (this.timer <= 0) {
            this.active = false;
            this.dashVx = 0;
            this.dashVy = 0;
        }
    },
    
    // 应用冲刺位移（带碰撞检测）
    applyMove: function() {
        if (!this.active || !state.player) return;
        var p = state.player;
        var dx = this.dashVx, dy = this.dashVy;
        if (dx === 0 && dy === 0) return;
        
        var nx = p.x + dx, ny = p.y + dy;
        var blocked = false;
        
        // 碰撞检测
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + p.w > cv.x && ny < cv.y + cv.h && ny + p.h > cv.y) blocked = true;
        });
        // 石门碰撞
        if (!blocked && StoneDoor.active) {
            var sdRects = StoneDoor.getCollisionRects();
            if (sdRects) {
                for (var si = 0; si < sdRects.length; si++) {
                    var sr = sdRects[si];
                    if (nx < sr.x + sr.w && nx + p.w > sr.x && ny < sr.y + sr.h && ny + p.h > sr.y) { blocked = true; break; }
                }
            }
        }
        // 滚石碰撞
        if (!blocked) {
            var br = RollingBoulder.getCollisionRect();
            if (br && nx < br.x + br.w && nx + p.w > br.x && ny < br.y + br.h && ny + p.h > br.y) blocked = true;
        }
        
        if (!blocked) {
            p.x = nx;
            p.y = ny;
            // 关卡边界钳位
            var level = LEVELS[state.currentLevel - 1];
            var maxX = level.width - 18;
            p.x = Math.max(10, Math.min(maxX - p.w, p.x));
            p.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - p.h, p.y));
        } else {
            // 碰墙平滑停止
            this.active = false;
            this.timer = 0;
            this.dashVx = 0;
            this.dashVy = 0;
        }
    },
    
    // 绘制残影
    drawTrail: function() {
        // 更新和绘制残影
        for (var i = this.trail.length - 1; i >= 0; i--) {
            this.trail[i].life--;
            if (this.trail[i].life <= 0) {
                this.trail.splice(i, 1);
                continue;
            }
            var t = this.trail[i];
            var alpha = t.life / 6 * 0.4;
            var x = px(t.x), y = px(t.y);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#aaddff';
            // 简化的残影（玩家轮廓）
            ctx.fillRect(x + 1, y, 6, 1);
            ctx.fillRect(x, y + 1, 8, 10);
            ctx.fillRect(x + 1, y + 11, 6, 1);
            ctx.globalAlpha = 1;
        }
    }
};

/* ==================== 道具拾取常驻提示系统（右上角） ==================== */
var ItemStatus = {
    el: null,
    items: {}, // { id: { name, color, glowColor } }
    
    init: function() {
        if (this.el) return; // 已初始化
        this.el = document.getElementById('item-status');
        if (!this.el) return; // DOM未就绪
        // 道具定义：id → 显示名称 + 颜色 + 描述
        this.itemDefs = {
            pearl:     { name: '时空静止', color: '#00cccc', glow: 'rgba(0,204,204,0.5)', tip: '敌不动我不动。停下来观察思考。' },
            rewind:    { name: '时间回溯', color: '#4488ff', glow: 'rgba(68,136,255,0.5)', tip: '别急着走，你的前面有你死前的魂灵守护着。' },
            checkpoint:{ name: '存档复活', color: '#00ff88', glow: 'rgba(0,255,136,0.5)', tip: '绿宝石守护着你前行的足迹。' },
            token:     { name: '吭哧二将', color: '#c8a832', glow: 'rgba(200,168,50,0.5)', tip: '吭哧二将是忠实的伙伴，甚至会瞬移替你挡下致命一击。' },
            fakeHorse: { name: '替身假马', color: '#b07830', glow: 'rgba(176,120,48,0.5)', tip: '替你挡下敌人攻击。' }
        };
    },
    
    // 拾取道具时调用
    acquire: function(itemId) {
        if (!this.el) this.init();
        var def = this.itemDefs[itemId];
        if (!def || this.items[itemId]) return; // 已有则不重复
        this.items[itemId] = def;
        this._render();
    },
    
    // 失去道具时调用（如使用回溯后）
    remove: function(itemId) {
        if (!this.items[itemId]) return;
        delete this.items[itemId];
        this._render();
    },
    
    // 关卡加载时重置
    reset: function() {
        this.items = {};
        if (this.el) this._render();
    },
    
    _render: function() {
        if (!this.el) return;
        var keys = Object.keys(this.items);
        if (keys.length === 0) {
            this.el.classList.remove('visible');
            this.el.innerHTML = '';
            return;
        }
        this.el.classList.add('visible');
        var html = '<div class="hover-hint">悬停查看</div>';
        for (var i = 0; i < keys.length; i++) {
            var def = this.items[keys[i]];
            var tipHtml = def.tip ? '<div class="item-tip">' + def.tip + '</div>' : '';
            html += '<div class="item-row">' +
                '<div class="item-name-line">' +
                '<span class="item-name" style="color:' + def.color + ';text-shadow:0 0 6px ' + def.glow + ';">' + def.name + '</span>' +
                '<span class="item-dot" style="background:' + def.color + ';box-shadow:0 0 4px ' + def.glow + ';"></span>' +
                '</div>' +
                tipHtml +
                '</div>';
        }
        this.el.innerHTML = html;
    }
};

/* ==================== 盾卫接近提示文字系统 ==================== */
var ShieldEnemyHint = {
    active: false,
    timer: 0,
    duration: 300, // 5秒（60fps * 5）
    triggered: false, // 只触发一次
    targetX: 0,
    targetY: 0,
    
    check: function() {
        if (state.currentLevel !== 1) { this.active = false; return; }
        if (!state.player) { this.active = false; return; }
        if (this.triggered) {
            if (!this.active) return;
            // 盾卫全部被击杀则立即消失
            var hasShield = false;
            for (var i = 0; i < state.enemies.length; i++) {
                if (state.enemies[i] instanceof ShieldDefender || state.enemies[i] instanceof ShieldPartner) {
                    hasShield = true; break;
                }
            }
            if (!hasShield) { this.active = false; return; }
            this.timer++;
            if (this.timer >= this.duration) {
                this.active = false;
            } else {
                this.updateTargetPosition();
            }
            return;
        }
        // 寻找存活的盾卫（ShieldDefender 或 ShieldPartner），检查是否进入画面
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                // 判断盾卫是否在摄像机可视范围内
                if (e.x + e.w > camera.x && e.x < camera.x + 320) {
                    this.triggered = true;
                    this.active = true;
                    this.timer = 0;
                    this.updateTargetPosition();
                    return;
                }
            }
        }
    },
    
    updateTargetPosition: function() {
        // 找到存活的盾卫来跟随
        var shieldEnemy = null;
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                shieldEnemy = e;
                break;
            }
        }
        if (shieldEnemy) {
            this.targetX = shieldEnemy.x + shieldEnemy.w / 2;
            this.targetY = shieldEnemy.y - 8;
        }
    },
    
    draw: function() {
        if (!this.active) return;
        
        var text = '注意盾牌。移动的靶子也是靶子';
        ctx.save();
        ctx.font = 'bold 9px "Microsoft YaHei", "SimHei", "PingFang SC", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        
        // 文字跟随盾卫位置
        var textX = this.targetX + 10;
        var textY = this.targetY;
        
        // 淡入淡出效果
        var fadeIn = Math.min(1, this.timer / 20);
        var fadeOut = this.timer > (this.duration - 30) ? (this.duration - this.timer) / 30 : 1;
        var alpha = fadeIn * fadeOut;
        
        ctx.globalAlpha = alpha;
        
        // 半透明黑色背景
        var metrics = ctx.measureText(text);
        var tw = metrics.width;
        var th = 9;
        var padX = 4, padY = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(textX - padX, textY - th - padY, tw + padX * 2, th + padY * 2);
        
        // 黄色文字
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(text, textX, textY);
        
        ctx.restore();
    },
    
    reset: function() {
        this.active = false;
        this.timer = 0;
        this.triggered = false;
    }
};

function drawSimpleEnemy(x,y,v,marked){

/* ==================== 关卡管理 ==================== */
function loadLevel(levelId) {
    var level = LEVELS[levelId - 1];
    if (!level) {
        gameWin();
        return;
    }
    
    state.currentLevel = levelId;
    state.enemies = [];
    state.pearls = [];
    state.projectiles = [];
    state.dyingEnemies = [];
    state.covers = [];
    state.scarecrows = [];
    state.scarecrowKilled = 0;
    state.scarecrowInitialCount = 0;
    
    // 血迹染色系统：第二关开始计数，通关后永久保持满血状态
    if (level.id === 2) {
        state.l2TotalEnemies = level.enemies.length;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    } else if (level.id > 2) {
        // 第三关及以后：保持第二关结束时的满血状态（bloodLevel=1）
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        if (state.bloodLevel < 1) state.bloodLevel = 1;
        bloodDrips = [];
    } else {
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    }
    
    // 重置盾卫接近提示
    ShieldEnemyHint.reset();
    
    // WASD 按键提示初始化（第一关）
    WASDHint.onLevelLoad(levelId);
    
    // 道具状态提示重置
    ItemStatus.reset();
    
    // 设置玩家位置
    var startPos = state.lastCheckpoint || level.playerStart;
    if (state.player) {
        state.player.x = startPos.x;
        state.player.y = startPos.y;
    } else {
        state.player = new Player(startPos.x, startPos.y);
    }
    // 第四关：玩家面朝左边
    if (startPos.facingLeft) {
        state.player.facingRight = false;
    }
    
    // 加载敌人
    var defenderRef = null;
    var partnerRef = null;
    level.enemies.forEach(function(e) {
        if (e.type === 'ShieldGuard') {
            var enemy = new ShieldGuard(e.x, e.y, e.name, e.armor, e.tall);
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldDefender') {
            var enemy = new ShieldDefender(e.x, e.y, e.name, e.armor, e.tall);
            defenderRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldPartner') {
            var enemy = new ShieldPartner(e.x, e.y, e.name, e.armor, e.tall);
            partnerRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'FastPatrolEnemy') {
            var enemy = new FastPatrolEnemy(e.x, e.y, e.patrolX1, e.patrolX2, e.patrolY);
            state.enemies.push(enemy);
        } else if (e.type === 'JavelinEnemy') {
            var enemy = new JavelinEnemy(e.x, e.y, e.patrolX1, e.patrolX2, e.patrolY);
            state.enemies.push(enemy);
        } else if (e.type === 'MeleeBoss') {
            var enemy = new MeleeBoss(e.x, e.y);
            state.enemies.push(enemy);
        } else {
            var enemy = new Enemy(e.x, e.y);
            // 第三关敌人攻击范围加大
            if (state.currentLevel === 3) {
                enemy.attackRange = 180;
            }
            state.enemies.push(enemy);
        }
    });
    
    // 建立搭档关系
    if (defenderRef && partnerRef) {
        defenderRef.partner = partnerRef;
        partnerRef.defender = defenderRef;
    }
    
    // 加载障碍物
    level.covers.forEach(function(c) {
        state.covers.push(new Cover(c.x, c.y, c.w, c.h, c.side, c.invisible));
    });
    
    // 第一关/第四关：加载稻草人（阻挡玩家前进的稻草人墙）
    if ((level.id === 1 || level.id === 4) && level.scarecrowRow) {
        scarecrowCoverIndices = [];
        var row = level.scarecrowRow;
        state.scarecrowInitialCount = row.count;
        state.scarecrowKilled = 0;
        var spacing = (row.yEnd - row.yStart) / (row.count - 1);
        for (var si = 0; si < row.count; si++) {
            var sy = Math.floor(row.yStart + si * spacing);
            var sc = new Scarecrow(row.x, sy);
            state.scarecrows.push(sc);
            // 稻草人作为碰撞体阻挡玩家，记录索引以便击杀时移除
            var coverIdx = state.covers.length;
            state.covers.push(new Cover(row.x, sy - 2, 6, 16, 'top'));
            scarecrowCoverIndices.push(coverIdx);
        }
    } else {
        scarecrowCoverIndices = [];
    }
    
    // 加载珍珠
    level.pearls.forEach(function(p) {
        state.pearls.push({ x: p.x, y: p.y, r: 4, active: true });
    });
    
    // 加载时间回溯道具
    if (level.rewindItem) {
        state.rewindItem = { x: level.rewindItem.x, y: level.rewindItem.y, active: true };
    } else {
        state.rewindItem = { x: 0, y: 0, active: false };
    }
    
    // 加载假马道具
    if (level.fakeHorse) {
        state.fakeHorse = { x: level.fakeHorse.x, y: level.fakeHorse.y, active: true, riding: false, hp: 0, hitFlash: 0 };
    } else {
        state.fakeHorse = null;
    }
    
    // 加载令牌道具
    if (level.bodyguardToken) {
        state.bodyguardToken = { x: level.bodyguardToken.x, y: level.bodyguardToken.y, active: true };
    } else {
        state.bodyguardToken = null;
    }
    state.bodyguards = [];
    state.l3NightVision = false;
    state.slowZones = level.slowZones || null;
    
    // 第二关：初始化石门和滚石
    StoneDoor.reset();
    RollingBoulder.reset();
    L3Trap.reset();
    if (level.id === 2 && level.stoneDoor) {
        StoneDoor.init(level.stoneDoor);
    }
    if (level.id === 2 && level.boulder) {
        RollingBoulder.init(level.boulder);
    }
    if (level.id === 3) {
        L3Trap.init();
        if (l3DarkPreserve) {
            L3Dark.onRespawn();
        } else {
            L3Dark.init();
            // 首次进入第三关时启动行动录制，替身重置
            L3ActionRec.start();
            L3GhostsClear();
        }
    } else {
        L3Dark.reset();
        L3ActionRec.reset();
        L3GhostsClear();
    }
    
    // 渲染关卡背景
    renderLevelBG(level);
    
    // 第四关：将减速区域纹理烘焙到背景画布上
    if (level.id === 4 && level.slowZones) {
        level.slowZones.forEach(function(sz) {
            // 深雪底色（极淡）
            bgCtx.fillStyle = 'rgba(150,160,180,0.13)';
            bgCtx.fillRect(sz.x, sz.y, sz.w, sz.h);
            // 深雪内部纹理（用固定种子绘制小点）
            var seed = sz.x * 7 + sz.y * 13;
            for (var di = 0; di < 12; di++) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                var dx = sz.x + (seed % sz.w);
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                var dy = sz.y + (seed % sz.h);
                bgCtx.fillStyle = 'rgba(140,148,172,0.1)';
                bgCtx.fillRect(dx, dy, 2, 1);
            }
            // 边缘微弱阴影
            bgCtx.fillStyle = 'rgba(140,148,172,0.06)';
            bgCtx.fillRect(sz.x, sz.y, sz.w, 1);
            bgCtx.fillRect(sz.x, sz.y + sz.h - 1, sz.w, 1);
            bgCtx.fillRect(sz.x, sz.y, 1, sz.h);
            bgCtx.fillRect(sz.x + sz.w - 1, sz.y, 1, sz.h);
        });
    }
    
    // 更新UI
    levelNumberEl.innerText = levelId;
    levelNameEl.innerText = level.name;
    
    // 重置状态
    state.timeStopped = false;
    state.stopTimer = 0;
    state.running = true;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    rewindDisplay.style.display = 'none';
    SFX.stopTick();
    SFX.stopRewind();
    hasRewind = false;
    stateHistory = [];
    camera.x = 0;
    
    // 初始化环境粒子
    initAmbient();
    
    // 保存游戏
    saveGame();
    
    // 显示关卡开始提示
    LevelStartEffect.show(level);
}

/* ==================== 绿宝石存档点 ==================== */
function drawCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var x = px(level.checkpoint.x);
    var y = px(level.checkpoint.y);
    
    var pulse = 0.6 + Math.sin(state.globalTick * 0.08) * 0.4;
    
    // 第四关：根据玩家距离动态点亮绿宝石
    if (state.currentLevel === 4) {
        var distToGem = Math.hypot(state.player.x + 4 - level.checkpoint.x, state.player.y + 6 - level.checkpoint.y);
        var proximity = Math.max(0, 1 - distToGem / 80); // 0~1，越近越亮
        var glowAlpha = 0.06 + proximity * 0.2;
        var gemBright = proximity;
        
        // 光晕
        drawPxCircle(x, y, 5 + proximity * 4, 'rgba(0,255,136,'+(glowAlpha*pulse)+')');
        drawPxCircle(x, y, 3 + proximity * 2, 'rgba(0,255,136,'+(glowAlpha*1.5*pulse)+')');
        
        // 宝石本体（颜色随距离变亮）
        var gr = Math.floor(proximity * 170);
        var gg = Math.floor(136 + proximity * 119);
        var gb = Math.floor(68 + proximity * 136);
        var gemColor = 'rgb('+gr+','+gg+','+gb+')';
        ctx.fillStyle = gemColor;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        // 高光中心
        var hlAlpha = 0.4 + proximity * 0.6;
        ctx.fillStyle = 'rgba(170,255,204,'+hlAlpha+')';
        ctx.fillRect(x,y-1,1,1);
        
        // 靠近时产生粒子
        if (proximity > 0.5 && state.globalTick % (proximity > 0.8 ? 4 : 8) === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
        return;
    }
    
    // 其他关卡：判断是否已激活（玩家已触碰）
    var activated = state.lastCheckpoint && 
                    state.lastCheckpoint.x === level.checkpoint.x;
    
    if (activated) {
        // 激活状态 - 亮绿色
        drawPxCircle(x, y, 5, 'rgba(0,255,136,'+(0.15*pulse)+')');
        drawPxCircle(x, y, 3, 'rgba(0,255,136,'+(0.3*pulse)+')');
        ctx.fillStyle = PAL.emerald;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        ctx.fillStyle = '#aaffcc';
        ctx.fillRect(x,y-1,1,1);
        
        // 粒子效果
        if (state.globalTick % 8 === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
    } else {
        // 未激活状态 - 暗绿色
        drawPxCircle(x, y, 4, 'rgba(0,200,100,0.1)');
        ctx.fillStyle = '#008844';
        ctx.fillRect(x-1,y-1,3,1);ctx.fillRect(x-2,y,5,1);
        ctx.fillRect(x-1,y+1,3,1);
        ctx.fillStyle = '#00aa55';
        ctx.fillRect(x,y,1,1);
    }
}

function checkCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    // 第四关：绿宝石是通关出口，不作为存档点
    if (state.currentLevel === 4) return;
    
    var playerCenterX = state.player.x + 4;
    var playerCenterY = state.player.y + 6;
    var dist = Math.hypot(playerCenterX - level.checkpoint.x, playerCenterY - level.checkpoint.y);
    
    if (dist < 15) {
        // 检查是否是新的存档点
        if (!state.lastCheckpoint || 
            state.lastCheckpoint.x !== level.checkpoint.x ||
            state.lastCheckpoint.y !== level.checkpoint.y) {
            
            state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
            saveGame();
            ItemStatus.acquire('checkpoint');
            showCheckpointHint();
            
            // 存档特效
            state.effects.push({
                x: level.checkpoint.x, y: level.checkpoint.y,
                r: 0, type: 'checkpoint-wave'
            });
        }
    }
}

/* ==================== 关卡完成检测 ==================== */
function checkLevelComplete() {
    if (state.transitioning) return;

    // 第四关：玩家触碰绿宝石即通关（boss必须存活，否则视为已失败）
    if (state.currentLevel === 4) {
        // 失败优先：boss已死则不允许通关
        if (state.enemies.length === 0) return;
        var level4 = LEVELS[3];
        if (level4.checkpoint) {
            var dist4 = Math.hypot(state.player.x + 4 - level4.checkpoint.x, state.player.y + 6 - level4.checkpoint.y);
            if (dist4 < 15) {
                state.transitioning = true;
                // 绿宝石点亮特效
                var gemX = level4.checkpoint.x, gemY = level4.checkpoint.y;
                state.effects.push({ x: gemX, y: gemY, r: 0, type: 'checkpoint-wave' });
                for (var gi = 0; gi < 12; gi++) {
                    state.effects.push({
                        x: gemX + (Math.random()-0.5)*14,
                        y: gemY + (Math.random()-0.5)*14,
                        vx: (Math.random()-0.5)*1.5,
                        vy: -Math.random()*1.5-0.5,
                        life: 20+Math.floor(Math.random()*15), maxLife: 35,
                        type: 'gem-spark'
                    });
                }
                triggerShake(2, 6);
                setTimeout(function() {
                    LevelStartEffect.hide();
                    state.lastCheckpoint = null;
                    loadLevel(state.currentLevel + 1);
                    state.transitioning = false;
                }, 800);
            }
        }
        return;
    }

    // 其他关卡：击杀所有敌人即通关
    if (state.enemies.length === 0 && state.dyingEnemies.length === 0) {
        state.transitioning = true;
        
        // 第三关完成：播放通关倒放电影
        if (state.currentLevel === 3) {
            JourneyCinematic.start();
            return;
        }
        
        // 延迟进入下一关
        setTimeout(function() {
            LevelStartEffect.hide();
            if (state.currentLevel < LEVELS.length) {
                state.lastCheckpoint = null; // 新关卡重置存档点
                loadLevel(state.currentLevel + 1);
            } else {
                gameWin();
            }
            state.transitioning = false;
        }, 800); // 缩短延迟时间
    }
}

/* ==================== 时间回溯系统 ==================== */
function captureState(){
    if(stateHistory.length>REWIND_FRAMES+100)stateHistory=stateHistory.slice(-REWIND_FRAMES-50);
    stateHistory.push({
        px:state.player.x,py:state.player.y,fr:state.player.facingRight,
        enemies:state.enemies.map(function(e){
            return{
                x:e.x,y:e.y,marked:e.marked,sc:e.shootCooldown,
                dx:e.dirX,dy:e.dirY,mt:e.moveTimer,v:e.variant,
                shieldHP: e.shieldHP, shieldBroken: e.shieldBroken,
                et:e.enemyType, tc:e.throwCooldown, pd:e.patrolDir,
                px1:e.patrolX1, px2:e.patrolX2, py:e.patrolY,
                bc:e.burstCount,
                ar:e.attackRange
            };
        }),
        pearls:state.pearls.map(function(p){return p.active;}),
        rw:state.rewindItem.active,
        bt:state.bodyguardToken ? state.bodyguardToken.active : false,
        bg:state.bodyguards.map(function(b){return {x:b.x,y:b.y,name:b.name,ac:b.armorColor,hp:b.hp,alive:b.alive,hf:b.hitFlash,st:b.spawnTimer};}),
        nv:state.l3NightVision,
        ts:state.timeStopped,st:state.stopTimer,
        fh:state.fakeHorse ? {active:state.fakeHorse.active,riding:state.fakeHorse.riding,hp:state.fakeHorse.hp} : null,
        trap:state.currentLevel===3?{t:L3Trap.timer,io:L3Trap.isOpen,op:L3Trap.openProgress,fa:L3Trap.firstApproach,pf:L3Trap.playerFalling,ft:L3Trap.fallTimer,fx:L3Trap.fallX,fy:L3Trap.fallY}:null
    });
}

function triggerRewind(){
    if(!hasRewind){
        respawnAtCheckpoint();
        return;
    }

    // 第三关特殊回溯：替身无限累加，不消失
    if (state.currentLevel === 3) {
        // 至少需要10帧录制才能创建替身
        if (L3ActionRec.history && L3ActionRec.history.length >= 10) {
            var deathX = state.player.x;
            var deathY = state.player.y;

            // 使用可用的最大回溯帧数（最多5秒=300帧）
            var rewindFrames = Math.min(300, stateHistory.length, L3ActionRec.history.length);
            var startIdx = L3ActionRec.history.length - rewindFrames;

            // 获取死亡前5s的玩家状态（位置、朝向）
            var rewindSnapshot = L3ActionRec.history[startIdx];
            var rewindStartX = rewindSnapshot.x;
            var rewindStartY = rewindSnapshot.y;
            var rewindFacing = rewindSnapshot.fr;

            // 只取死亡前5s的动作片段作为替身的回放内容
            var ghostActions = L3ActionRec.history.slice(startIdx);

            // 保存录制历史用于倒退动画（必须在spawnL3Ghost之前，因为spawn会重置录制）
            var rewindAnimFrames = L3ActionRec.history.slice(L3ActionRec.history.length - rewindFrames).slice().reverse();

            // 生成替身（从死亡前5s的位置开始，重复这5s的操作）
            spawnL3Ghost(rewindStartX, rewindStartY, rewindFacing, deathX, deathY, ghostActions);

            // 启动倒退动画（约1秒），动画结束后应用回溯结果
            var histIdx = stateHistory.length - rewindFrames;
            L3RewindAnim.frames = rewindAnimFrames;
            L3RewindAnim.frameIdx = 0;
            L3RewindAnim.speed = Math.max(3, Math.ceil(rewindFrames / 60));
            L3RewindAnim.pendingGhostX = rewindStartX;
            L3RewindAnim.pendingGhostY = rewindStartY;
            L3RewindAnim.pendingGhostFacing = rewindFacing;
            L3RewindAnim.pendingGhostActions = ghostActions;
            L3RewindAnim.pendingHistIdx = histIdx;
            L3RewindAnim.active = true;
            state.running = false;
            msgScreen.style.display = 'none';
            SFX.rewindStart();
            SFX.startRewindLoop();
            return;
        }
        // 录制帧不足10帧，普通复活但保留已有替身
        respawnAtCheckpoint();
        return;
    }

    // 非第三关：需要足够的历史帧
    if(stateHistory.length<REWIND_FRAMES){
        respawnAtCheckpoint();
        return;
    }

    isRewinding=true;rewindIndex=stateHistory.length-1;hasRewind=false;
    stopDisplay.style.display='none';markHint.style.display='none';rewindDisplay.style.display='none';
    SFX.rewindStart();
    SFX.startRewindLoop();
}

function updateRewind(){
    rewindIndex-=REWIND_SPEED;
    var targetIdx=stateHistory.length-1-REWIND_FRAMES;
    if(rewindIndex<=targetIdx){
        rewindIndex=targetIdx;
        var snap=stateHistory[rewindIndex];
        restoreState(snap);
        stateHistory=stateHistory.slice(0,rewindIndex);
        isRewinding=false;
        SFX.rewindEnd();
        state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    }
}

function restoreState(snap){
    state.player.x=snap.px;state.player.y=snap.py;state.player.facingRight=snap.fr;
    state.enemies=snap.enemies.map(function(e){
        var en;
        if(e.et === 'JavelinEnemy') {
            en = new JavelinEnemy(e.x, e.y, e.px1, e.px2, e.py);
            en.throwCooldown = e.tc || 0;
            en.patrolDir = e.pd !== undefined ? e.pd : 1;
        } else if(e.et === 'FastPatrolEnemy') {
            en = new FastPatrolEnemy(e.x, e.y, e.px1, e.px2, e.py);
            en.patrolDir = e.pd !== undefined ? e.pd : 1;
            en.burstCount = e.bc || 0;
        } else if(e.shieldHP !== undefined) {
            en = new ShieldGuard(e.x, e.y, '', 'black', true);
            en.shieldHP = e.shieldHP;
            en.shieldBroken = e.shieldBroken;
        } else {
            en = new Enemy(e.x,e.y);
            en.variant=e.v;
        }
        en.marked=e.marked;en.shootCooldown=e.sc;en.dirX=e.dx;en.dirY=e.dy;en.moveTimer=e.mt;
        if(e.bc !== undefined) en.burstCount = e.bc;
        if(e.ar !== undefined) en.attackRange = e.ar;
        return en;
    });
    snap.pearls.forEach(function(a,i){if(i<state.pearls.length)state.pearls[i].active=a;});
    state.rewindItem.active=snap.rw;
    if(snap.rw){hasRewind=false;rewindDisplay.style.display='none';}
    // 恢复令牌和保镖状态
    if(state.bodyguardToken) state.bodyguardToken.active = snap.bt !== undefined ? snap.bt : false;
    if(snap.bg && snap.bg.length > 0){
        state.bodyguards = snap.bg.map(function(b){
            if(!b.alive) return null;
            var g = new Bodyguard(b.x, b.y, b.name, b.ac);
            g.hp = b.hp; g.hitFlash = b.hf; g.alive = b.alive; g.spawnTimer = b.st;
            return g;
        }).filter(function(b){return b !== null;});
    } else {
        state.bodyguards = [];
    }
    state.l3NightVision = snap.nv || false;
    state.timeStopped=snap.ts;state.stopTimer=snap.st;
    if(state.timeStopped){stopDisplay.style.display='block';updateStopUI();}else{stopDisplay.style.display='none';}
    // 恢复假马状态
    if(snap.fh && state.fakeHorse){
        state.fakeHorse.active=snap.fh.active;
        state.fakeHorse.riding=snap.fh.riding;
        state.fakeHorse.hp=snap.fh.hp;
        state.fakeHorse.hitFlash=0;
    }
    state.projectiles=[];state.dyingEnemies=[];state.running=true;
    msgScreen.style.display='none';
}

function drawRewindFrame(){

    ctx.fillStyle='#2a2420';ctx.fillRect(px2+2,py2+10,2,2);ctx.fillRect(px2+4,py2+10,2,2);

    var progress=(stateHistory.length-1-idx)/REWIND_FRAMES;
    var scanY=Math.floor(180*(1-progress*1.15));
    ctx.fillStyle='rgba(100,180,255,0.18)';ctx.fillRect(camera.x,scanY,320,3);
    ctx.fillStyle='rgba(100,180,255,0.05)';ctx.fillRect(camera.x,scanY+3,320,8);

    for(var i=0;i<20;i++){ctx.fillStyle='rgba(150,200,255,'+(Math.random()*0.25)+')';ctx.fillRect(camera.x+Math.floor(Math.random()*320),Math.floor(Math.random()*180),1,1);}
    var symX=camera.x+160,symY=85;
