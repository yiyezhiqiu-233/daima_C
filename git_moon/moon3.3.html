    ctx.beginPath();ctx.moveTo(symX-2,symY-6);ctx.lineTo(symX-2,symY+6);ctx.lineTo(symX+4,symY);ctx.fill();
    ctx.fillStyle='rgba(140,190,255,0.8)';ctx.font='8px zpix,monospace';ctx.textAlign='center';
    ctx.fillText('时间回溯',symX,symY+22);ctx.textAlign='left';
}

/* ==================== 碰撞检测 ==================== */
function checkCollisions(){
    for(var ki=state.projectiles.length-1;ki>=0;ki--){
        var knife=state.projectiles[ki];if(!knife.alive)continue;
        // 替身挡刀：如果替身活跃，优先检测飞刀是否命中任一替身
        if(state.currentLevel === 3){
            var ghostHit = false;
            for(var ghi = 0; ghi < L3Ghosts.length; ghi++){
                var gh = L3Ghosts[ghi];
                if(!gh.active) continue;
                var ghX = gh.x, ghY = gh.y;
                if(knife.x < ghX + 8 && knife.x + 2 > ghX && knife.y < ghY + 12 && knife.y + 2 > ghY){
                    knife.alive = false;
                    state.effects.push({x: knife.x, y: knife.y, life: 6, maxLife: 6, type: 'spark'});
                    ghostHit = true;
                    break;
                }
            }
            if (ghostHit) continue;
        }
        // 保镖挡刀：保镖优先于玩家承受飞刀伤害
        var bodyguardHit = false;
        for(var bgi = 0; bgi < state.bodyguards.length; bgi++){
            var bg = state.bodyguards[bgi];
            if(!bg.alive || bg.spawnTimer > 0) continue;
            // 保镖碰撞区域（包含盾牌延伸，盾牌朝向敌人方向）
            var bgLeft = bg.x - (bg.facingRight ? 0 : 4);
            var bgRight = bg.x + bg.w + (bg.facingRight ? 4 : 0);
            if(knife.x < bgRight && knife.x + 2 > bgLeft && knife.y < bg.y + bg.h && knife.y + 2 > bg.y){
                knife.alive = false;
                bg.hp--;
                bg.hitFlash = 10;
                state.effects.push({x: knife.x, y: knife.y, life: 8, maxLife: 8, type: 'spark'});
                triggerShake(1, 4);
                if(bg.hp <= 0){
                    bg.alive = false;
                    state.effects.push({x: bg.x + 4, y: bg.y + 6, life: 15, maxLife: 15, type: 'clay-break'});
                    triggerShake(2, 8);
                }
                bodyguardHit = true;
                break;
            }
        }
        if (bodyguardHit) continue;
        // 清理已死亡的保镖
        state.bodyguards = state.bodyguards.filter(function(b){ return b.alive; });
        if(knife.x<state.player.x+state.player.w&&knife.x+2>state.player.x&&knife.y<state.player.y+state.player.h&&knife.y+2>state.player.y){
            knife.alive=false;
            // 假马护盾：优先扣马HP
            if(state.fakeHorse && state.fakeHorse.riding && state.fakeHorse.hp > 0){
                state.fakeHorse.hp--;
                state.fakeHorse.hitFlash = 10;
                state.effects.push({x:knife.x,y:knife.y,life:8,maxLife:8,type:'horse-hit'});
                triggerShake(1,4);
                if(state.fakeHorse.hp <= 0){
                    breakFakeHorse();
                }
            } else {
                // 保镖紧急传送挡刀：飞刀命中玩家瞬间，保镖闪现到玩家位置替死
                var emergencyGuard = null;
                for(var egi = 0; egi < state.bodyguards.length; egi++){
                    var eg = state.bodyguards[egi];
                    if(eg.alive && eg.spawnTimer <= 0 && eg.emergencyCooldown <= 0){
                        emergencyGuard = eg;
                        break;
                    }
                }
                if(emergencyGuard){
                    // 记录传送前位置用于残影特效
                    emergencyGuard.prevX = emergencyGuard.x;
                    emergencyGuard.prevY = emergencyGuard.y;
                    // 瞬移到玩家位置
                    emergencyGuard.x = state.player.x;
                    emergencyGuard.y = state.player.y;
                    emergencyGuard.hp--;
                    emergencyGuard.hitFlash = 15;
                    emergencyGuard.emergencyCooldown = 90; // 1.5秒冷却
                    emergencyGuard.emergencyFlash = 12; // 传送残影计时
                    // 传送特效
                    state.effects.push({x: emergencyGuard.prevX + 4, y: emergencyGuard.prevY + 6, life: 12, maxLife: 12, type: 'spark'});
                    state.effects.push({x: knife.x, y: knife.y, life: 8, maxLife: 8, type: 'spark'});
                    triggerShake(2, 6);
                    if(emergencyGuard.hp <= 0){
                        emergencyGuard.alive = false;
                        state.effects.push({x: state.player.x + 4, y: state.player.y + 6, life: 15, maxLife: 15, type: 'clay-break'});
                        triggerShake(3, 10);
                    }
                } else {
                    state.effects.push({life:6,maxLife:6,type:'flash'});triggerShake(3,8);
                    // 第三关兜底：记录暗道敌人击杀次数
                    if (state.currentLevel === 3 && state.player.y <= 55) {
                        l3UpperEnemyKillCount++;
                        if (l3UpperEnemyKillCount >= 6 && !l3EnemyReactionNerfed) {
                            l3EnemyReactionNerfed = true;
                        }
                    }
                    if(hasRewind){triggerRewind();}
                    else{
                        respawnAtCheckpoint();
                    }
                }
            }
            return;
        }
        for(var ci=0;ci<state.covers.length;ci++){
            var c=state.covers[ci];
            if(knife.x<c.x+c.w&&knife.x+2>c.x&&knife.y<c.y+c.h&&knife.y+2>c.y){
                state.effects.push({x:knife.x,y:knife.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:6,maxLife:6,type:'spark'});
                knife.alive=false;break;
            }
        }
    }
    
    for(var ei=state.enemies.length-1;ei>=0;ei--){
        var e=state.enemies[ei];
        var collW = e.w || 8;
        var collH = e.h || 12;
        var dist=Math.hypot(e.x+collW/2-(state.player.x+4),e.y+collH/2-(state.player.y+6));
        if(state.timeStopped){
            if(e instanceof ShieldGuard && !e.shieldBroken) continue;
            if(e instanceof ShieldDefender) continue; // 盾卫在时间静止时无法标记/击杀
            if(dist<MARK_RANGE&&!e.marked){
                e.marked=true;markHint.style.display='block';
                var qx=e.x+collW/2,qy=e.y+collH/2;
                state.effects.push({x:qx,y:qy,life:12,maxLife:12,type:'qi-slash'});
                state.effects.push({x:qx,y:qy,r:0,type:'qi-ring'});
                triggerShake(1,4);
            }
        }else{
            if(dist<22){
                var playerCenterX = state.player.x + 4;
                var playerCenterY = state.player.y + 6;
                var enemyCenterX = e.x + collW/2;
                var enemyCenterY = e.y + collH/2;
                
                if(!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)){
                    continue;
                }
                
                SFX.playerAttack();
                if(e instanceof ShieldGuard){
                    if(!e.shieldBroken){
                        e.shieldHP--;
                        e.hitFlash = 8;
                        triggerShake(3,6);
                        SFX.hitShield();
                        state.effects.push({x:e.x-2,y:e.y+collH/2,life:10,maxLife:10,type:'shield-hit'});
                        if(e.shieldHP <= 0){
                            e.shieldBroken = true;
                            triggerShake(4,10);
                            SFX.hitEnemy();
                        }
                    }else{
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:8,maxLife:8,type:'slash'});
                        state.enemies.splice(ei,1);triggerShake(3,6);onEnemyKilledL2();SFX.hitEnemy();
                    }
                }else if(e instanceof ShieldDefender){
                    // 哧吭：盾牌面向玩家，只能从背面击杀
                    if(e.isPlayerBehind()){
                        // 从背面击杀！
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:10,maxLife:10,type:'slash'});
                        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,1));
                        state.enemies.splice(ei,1);triggerShake(4,8);onEnemyKilledL2();SFX.hitEnemy();
                    }else{
                        // 正面被盾牌挡住
                        e.hitFlash = 6;
                        triggerShake(2,4);
                        SFX.hitShield();
                        state.effects.push({x:e.x+(e.shieldDir===1?-4:collW),y:e.y+collH/2,life:8,maxLife:8,type:'shield-hit'});
                    }
                }else if(e instanceof MeleeBoss){
                    // 第四关：击杀boss则失败
                    if (state.currentLevel === 4) {
                        e.hp--;
                        e.hitFlash = 8;
                        triggerShake(3, 6);
                        SFX.hitEnemy();
                        state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                        var kbDx = e.x - state.player.x;
                        var kbDy = e.y - state.player.y;
                        var kbDist = Math.hypot(kbDx, kbDy) || 1;
                        e.x += (kbDx / kbDist) * 15;
                        e.y += (kbDy / kbDist) * 10;
                        if (e.hp <= 0) {
                            state.dyingEnemies.push(new DyingEnemy(e.x, e.y, 0));
                            state.enemies.splice(ei, 1);
                            triggerShake(5, 12);
                            // 第四关击杀boss = 失败，倒退回第三关
                            state.transitioning = true;
                            state.running = false;
                            msgText.innerText = '杀戮心起，前功尽弃。';
                            msgText.style.color = '#ffcc00';
                            msgSub.innerText = '将返回第三关';
                            msgSub.style.color = '#ffd700';
                            hideMissionHint();
                            msgScreen.style.display = 'block';
                            setTimeout(function() {
                                msgScreen.style.display = 'none';
                                state.transitioning = false;
                                state.running = true;
                                state.lastCheckpoint = null;
                                localStorage.removeItem(SAVE_KEY);
                                loadLevel(3);
                            }, 2000);
                        }
                    } else {
                        // 近战Boss：多次击中才能击杀
                        e.hp--;
                        e.hitFlash = 8;
                        triggerShake(3, 6);
                        SFX.hitEnemy();
                        state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                        // 击退Boss
                        var kbDx = e.x - state.player.x;
                        var kbDy = e.y - state.player.y;
                        var kbDist = Math.hypot(kbDx, kbDy) || 1;
                        e.x += (kbDx / kbDist) * 15;
                        e.y += (kbDy / kbDist) * 10;
                        if (e.hp <= 0) {
                            state.dyingEnemies.push(new DyingEnemy(e.x, e.y, 0));
                            state.enemies.splice(ei, 1);
                            triggerShake(5, 12);
                        }
                    }
                }else{
                    state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                    state.enemies.splice(ei,1);triggerShake(2,5);onEnemyKilledL2();SFX.hitEnemy();
                }
            }
        }
    }
    
    // 撞击稻草人击杀
    if(state.scarecrows.length > 0 && !state.timeStopped){
        for(var sci=state.scarecrows.length-1;sci>=0;sci--){
            var sc=state.scarecrows[sci];
            var dist=Math.hypot(sc.x+sc.w/2-(state.player.x+4),sc.y+sc.h/2-(state.player.y+6));
            if(dist<18){
                // 击杀稻草人
                state.dyingEnemies.push(new DyingScarecrow(sc.x,sc.y));
                state.effects.push({x:sc.x+sc.w/2,y:sc.y+sc.h/2,life:8,maxLife:8,type:'slash'});
                // 移除稻草人
                state.scarecrows.splice(sci,1);
                state.scarecrowKilled++;
                // 移除对应的碰撞体（注意索引偏移）
                if(sci < scarecrowCoverIndices.length){
                    var coverIdxToRemove = scarecrowCoverIndices[sci];
                    state.covers.splice(coverIdxToRemove,1);
                    // 更新后续索引
                    for(var ci2=sci+1;ci2<scarecrowCoverIndices.length;ci2++){
                        scarecrowCoverIndices[ci2]--;
                    }
                    scarecrowCoverIndices.splice(sci,1);
                }
                triggerShake(2,4);
                SFX.hitEnemy();
                ScarecrowHint.dismiss();
                break; // 一次只撞一个
            }
        }
    }
    
    // 拾取珍珠
    for(var pi=0;pi<state.pearls.length;pi++){
        var p=state.pearls[pi];
        if(p.active&&Math.hypot(p.x-state.player.x,p.y-state.player.y)<20){
            p.active=false;triggerTimeStop();
            ItemStatus.acquire('pearl');
            // 第二关：首次拾取时间静止宝石提示
            if(state.currentLevel === 2){ L2TimeStopPickupHint.show(); }
        }
    }
    
    // 拾取时间回溯道具
    if(state.rewindItem.active&&Math.hypot(state.rewindItem.x-state.player.x,state.rewindItem.y-state.player.y)<20){
        state.rewindItem.active=false;hasRewind=true;l3DeathCount=0;
        ItemStatus.acquire('rewind');
        rewindDisplay.innerHTML='【时间回溯】×'+l3MaxDeaths;rewindDisplay.style.display='block';
        state.effects.push({life:8,maxLife:8,type:'rewind-flash'});
        // 第三关拾取提示
        if(state.currentLevel === 3){
            L3RewindPickupHint.show();
        }
    }
    
    // 拾取假马道具
    if(state.fakeHorse && state.fakeHorse.active && !state.fakeHorse.riding){
        if(Math.hypot(state.fakeHorse.x-state.player.x,state.fakeHorse.y-state.player.y)<20){
            state.fakeHorse.active = false;
            state.fakeHorse.riding = true;
            ItemStatus.acquire('fakeHorse');
            state.fakeHorse.hp = FAKE_HORSE_MAX_HP;
            state.fakeHorse.hitFlash = 0;
            // 拾取特效
            for(var fi=0;fi<8;fi++){
                state.effects.push({
                    x:state.fakeHorse.x+(Math.random()-0.5)*8,
                    y:state.fakeHorse.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*1.5,
                    vy:-Math.random()*1.5,
                    life:15,maxLife:15,type:'clay-break'
                });
            }
            triggerShake(1,4);
        }
    }
    
    // 拾取令牌道具（召唤吭哧二将）
    if(state.bodyguardToken && state.bodyguardToken.active){
        if(Math.hypot(state.bodyguardToken.x-state.player.x,state.bodyguardToken.y-state.player.y)<20){
            state.bodyguardToken.active = false;
            state.l3NightVision = true; // 激活下方暗道夜视
            ItemStatus.acquire('token');
            L3TokenPickupHint.show(); // 显示拾取提示
            // 一次性召唤吭哧二将（黑甲哧吭 + 白甲吭哧）
            state.bodyguards.push(new Bodyguard(state.player.x + 28, state.player.y - 3, '哧吭', 'black'));
            state.bodyguards.push(new Bodyguard(state.player.x + 28, state.player.y + 3, '吭哧', 'white'));
            // 拾取特效
            for(var bi=0;bi<12;bi++){
                state.effects.push({
                    x:state.bodyguardToken.x+(Math.random()-0.5)*10,
                    y:state.bodyguardToken.y+(Math.random()-0.5)*8,
                    vx:(Math.random()-0.5)*2,
                    vy:-Math.random()*2-0.5,
                    life:20,maxLife:20,type:'ghost-fade'
                });
            }
            triggerShake(3,10);
        }
    }
}

function respawnAtCheckpoint() {
    // 显示失败提示（通关样式）
    gameOver('你死的很惨！', '少侠按 R 重新来过。', true);
}

/* ==================== 时间静止 ==================== */
function triggerTimeStop(){
    state.timeStopped=true;
    state.stopStartTime=performance.now();
    state.stopTimer=STOP_DURATION;
    stopDisplay.style.display='block';markHint.style.display='none';
    state.effects.push({x:state.player.x+4,y:state.player.y+6,r:0,type:'wave'});
    state.effects.push({life:8,maxLife:8,type:'flash'});triggerShake(2,6);
    SFX.timeStopActivate();
    SFX.startTick();
}

function launchMarkedEnemies(){
    var marked=state.enemies.filter(function(e){return e.marked;});
    if(marked.length===0){markHint.style.display='none';return;}
    if(marked.length>0) SFX.hitEnemy();
    marked.forEach(function(e){
        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,e.variant));
        state.effects.push({x:e.x+4,y:e.y+6,life:12,maxLife:12,type:'launch-slash'});
    });
    var killedCount = marked.length;
    state.enemies=state.enemies.filter(function(e){return !e.marked;});
    // 第二关血迹：时间静止斩杀也计入
    if (state.currentLevel === 2) {
        for (var k = 0; k < killedCount; k++) onEnemyKilledL2();
    }
    triggerShake(4,10);markHint.style.display='none';
}

function updateStopUI(){
    var secs=Math.ceil(state.stopTimer/1000);
    var pct=(state.stopTimer/STOP_DURATION)*100;
    stopSecondsEl.innerText=secs;stopBarEl.style.width=pct+'%';
}

function drawTimeStopOverlay(){
    var progress=1-state.stopTimer/STOP_DURATION;
    // 深蓝绿色调覆盖，模拟去色效果
    var alpha=Math.max(0, 0.12*(1-progress));
    ctx.fillStyle='rgba(0,60,80,'+alpha+')';
    ctx.fillRect(camera.x,0,320,180);
    // 青色微光
    var alpha2=Math.max(0, 0.06*(1-progress));
    ctx.fillStyle='rgba(0,180,180,'+alpha2+')';
    ctx.fillRect(camera.x,0,320,180);
}

/* ==================== 特效系统 ==================== */
function drawEffects(){
    for(var i=state.effects.length-1;i>=0;i--){
        var eff=state.effects[i];
        if(eff.type==='wave'){
            eff.r+=3;var a=Math.max(0,1-eff.r/120);
            ctx.strokeStyle='rgba(0,204,204,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>120)state.effects.splice(i,1);
        }else if(eff.type==='checkpoint-wave'){
            eff.r+=4;var a=Math.max(0,1-eff.r/80);
            ctx.strokeStyle='rgba(0,255,136,'+(a*0.8)+')';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>80)state.effects.splice(i,1);
        }else if(eff.type==='qi-slash'){
            var p=1-eff.life/eff.maxLife;var size=4+p*14;
            ctx.strokeStyle='rgba(100,200,255,'+((1-p)*0.8)+')';ctx.lineWidth=Math.max(0.5,2-p);
            ctx.beginPath();ctx.moveTo(px(eff.x-size),px(eff.y-size));ctx.lineTo(px(eff.x+size),px(eff.y+size));ctx.stroke();
            ctx.beginPath();ctx.moveTo(px(eff.x+size),px(eff.y-size));ctx.lineTo(px(eff.x-size),px(eff.y+size));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='qi-ring'){
            eff.r+=2.5;var a=Math.max(0,1-eff.r/60);
            ctx.strokeStyle='rgba(80,180,255,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>60)state.effects.splice(i,1);
        }else if(eff.type==='spark'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.92;eff.vy*=0.92;
            ctx.fillStyle='rgba(255,220,120,'+Math.max(0,eff.life/eff.maxLife)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='gem-spark'){
            ctx.fillStyle='rgba(0,255,136,'+(Math.max(0,eff.life/eff.maxLife)*0.7)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='flash'){
            ctx.fillStyle='rgba(200,240,240,'+(eff.life/eff.maxLife*0.3)+')';ctx.fillRect(camera.x,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='rewind-flash'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,180,255,'+(a*0.4)+')';ctx.fillRect(camera.x,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='dying-trail'){
            ctx.fillStyle=eff.color.replace('1)',(Math.max(0,eff.life/eff.maxLife)*0.6)+')');ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='push-spark'){
            ctx.fillStyle='rgba(180,200,220,'+(Math.max(0,eff.life/eff.maxLife)*0.35)+')';ctx.fillRect(px(eff.x),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='shield-hit'){
            var p=1-eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,150,255,'+((1-p)*0.8)+')';
            ctx.fillRect(px(eff.x-2),px(eff.y-3),6,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(232,224,208,'+(1-p)+')';ctx.lineWidth=2-p;
            ctx.beginPath();ctx.moveTo(px(eff.x-12),px(eff.y-12));ctx.lineTo(px(eff.x+12),px(eff.y+12));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='launch-slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(255,240,200,'+(1-p)+')';ctx.lineWidth=3-p*2;
            ctx.beginPath();ctx.moveTo(px(eff.x-18),px(eff.y-18));ctx.lineTo(px(eff.x+18),px(eff.y+18));ctx.stroke();
            ctx.strokeStyle='rgba(255,180,80,'+((1-p)*0.7)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(px(eff.x+18),px(eff.y-18));ctx.lineTo(px(eff.x-18),px(eff.y+18));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='death-burst'){
            eff.particles.forEach(function(pt){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;var a=Math.max(0,eff.life/eff.maxLife);ctx.fillStyle=pt.color.replace('1)',a+')');ctx.fillRect(px(pt.x),px(pt.y),1,1);});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='clay-break'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.1;eff.vx*=0.98;
            var a=Math.max(0,eff.life/eff.maxLife);
            var colors=['rgba(139,105,20,','rgba(160,120,40,','rgba(107,78,10,','rgba(90,62,6,'];
            ctx.fillStyle=colors[Math.floor(eff.life)%4]+a+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillRect(px(eff.x+1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='clay-dust'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.96;eff.vy*=0.96;
            var a=Math.max(0,eff.life/eff.maxLife)*0.4;
            ctx.fillStyle='rgba(160,130,80,'+a+')';
            ctx.fillRect(px(eff.x),px(eff.y),2,2);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='horse-hit'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(200,160,60,'+(a*0.5)+')';
            ctx.fillRect(px(eff.x-2),px(eff.y-2),5,5);
            ctx.fillStyle='rgba(255,200,80,'+(a*0.3)+')';
            ctx.fillRect(px(eff.x-1),px(eff.y-1),3,3);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='blood-splatter'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.06;eff.vx*=0.95;
            var a=Math.max(0,eff.life/eff.maxLife);
            ctx.fillStyle='rgba(160,15,15,'+(a*0.8)+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillStyle='rgba(120,8,8,'+(a*0.5)+')';
            ctx.fillRect(px(eff.x-1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='ghost-fade'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.03;eff.vx*=0.96;
            var a=Math.max(0,eff.life/eff.maxLife);
            ctx.fillStyle='rgba(100,160,220,'+(a*0.7)+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillStyle='rgba(140,190,255,'+(a*0.4)+')';
            ctx.fillRect(px(eff.x-1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='ghost-slash'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.9;eff.vy*=0.9;
            var a=Math.max(0,eff.life/eff.maxLife);
            ctx.fillStyle='rgba(120,180,255,'+(a*0.8)+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillStyle='rgba(180,220,255,'+(a*0.5)+')';
            ctx.fillRect(px(eff.x+1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='rewind-particle'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vy+=0.02;eff.vx*=0.95;
            var a=Math.max(0,eff.life/eff.maxLife);
            ctx.fillStyle='rgba(180,200,255,'+(a*0.6)+')';
            ctx.fillRect(px(eff.x),px(eff.y),1,1);
            ctx.fillStyle='rgba(220,230,255,'+(a*0.3)+')';
            ctx.fillRect(px(eff.x+1),px(eff.y-1),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }
    }
}

/* ==================== 通关倒放电影绘制 ==================== */
function drawJourneyCinematic() {
    var pos = JourneyCinematic.getCurrentPos();
    var progress = JourneyCinematic.getProgress();
    if (!pos) return;

    var level = pos.level;
    var playerScreenX = 160; // 玩家固定在屏幕中央
    var playerScreenY = 90;

    // 根据关卡绘制简化背景
    drawCinematicBG(level, progress);

    // 相机：让玩家位置映射到屏幕中央，偏移量随关卡变化
    var levelWidths = { 1: 960, 2: 1500, 3: 800 };
    var lw = levelWidths[level] || 800;
    var camOffset = -(pos.x / lw) * (lw - 320);
    if (camOffset > lw - 320) camOffset = lw - 320;
    if (camOffset < 0) camOffset = 0;

    // 绘制残影（3帧拖尾）
    ctx.globalAlpha = 0.12;
    for (var t = 1; t <= 3; t++) {
        var trailIdx = JourneyCinematic.frameIdx - t * 3;
        if (trailIdx >= 0 && trailIdx < JourneyCinematic.frames.length) {
            var tp = JourneyCinematic.frames[trailIdx];
            var tCamOff = -(tp.x / lw) * (lw - 320);
            if (tCamOff > lw - 320) tCamOff = lw - 320;
            if (tCamOff < 0) tCamOff = 0;
            var tx = Math.floor(tp.x - tCamOff);
            var ty = Math.floor(tp.y);
            ctx.fillStyle = '#8899bb';
            ctx.fillRect(tx, ty, 8, 12);
        }
    }

    // 绘制倒退中的玩家（半透明，带倒退方向翻转）
    ctx.globalAlpha = 0.6;
    var sx = Math.floor(pos.x - camOffset);
    var sy = Math.floor(pos.y);
    var facing = pos.fr ? -1 : 1; // 倒放时方向翻转

    // 草帽（倒退中微动）
    var hatBob = Math.sin(JourneyCinematic.timer * 0.3) * 1;
    ctx.fillStyle = '#c8b896';
    ctx.fillRect(sx + facing * -1, sy - 3 + hatBob, 10, 3);
    ctx.fillStyle = '#b8a886';
    ctx.fillRect(sx, sy - 4 + hatBob, 8, 1);
    // 脸
    ctx.fillStyle = '#e0c8a8';
    ctx.fillRect(sx, sy, 8, 7);
    // 眼睛（倒退方向）
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx + (facing > 0 ? 1 : 6), sy + 3, 1, 1);
    // 身体
    ctx.fillStyle = '#f0e8d8';
    ctx.fillRect(sx, sy + 7, 8, 4);
    // 腿（行走动画）
    var walkFrame = Math.floor(JourneyCinematic.timer / 8) % 4;
    var legOff = (walkFrame < 2) ? walkFrame : (4 - walkFrame);
    ctx.fillStyle = '#3a4a5a';
    ctx.fillRect(sx + 1, sy + 11 + legOff, 2, 2);
    ctx.fillRect(sx + 5, sy + 11 - legOff, 2, 2);

    ctx.globalAlpha = 1;

    // 倒放扫描线效果
    drawCinematicOverlay(progress);

    // 回溯粒子
    if (JourneyCinematic.timer % 2 === 0) {
        ctx.fillStyle = 'rgba(150,200,255,' + (Math.random() * 0.3 + 0.1) + ')';
        ctx.fillRect(
            Math.floor(Math.random() * 320),
            Math.floor(Math.random() * 180),
            1, 1
        );
    }
}

function drawCinematicBG(level, progress) {
    var c = ctx;
    // 基础暗色调（随着进度逐渐变暗）
    var darken = 0.3 + progress * 0.4;

    if (level === 1) {
        // 第一关：雪夜 - 简化背景
        c.fillStyle = '#0e1118';
        c.fillRect(0, 0, 320, 200);
        // 雪地色调
        c.fillStyle = 'rgba(180,195,210,' + (0.15 * (1 - darken)) + ')';
        c.fillRect(0, 50, 320, 100);
        // 稻草人剪影
        for (var i = 0; i < 3; i++) {
            var sx = 60 + i * 100;
            c.fillStyle = 'rgba(139,119,80,' + (0.25 * (1 - darken)) + ')';
            c.fillRect(sx, 40, 4, 20);
            c.fillRect(sx - 6, 36, 16, 4);
        }
        // 飘雪
        for (var j = 0; j < 8; j++) {
            c.fillStyle = 'rgba(200,210,230,' + (0.15 * (1 - darken)) + ')';
            var snowX = (JourneyCinematic.timer * 0.3 + j * 41) % 320;
            var snowY = (JourneyCinematic.timer * 0.5 + j * 27) % 180;
            c.fillRect(Math.floor(snowX), Math.floor(snowY), 1, 1);
        }
        // 关卡名
        c.fillStyle = 'rgba(180,200,220,' + (0.3 * (1 - progress)) + ')';
        c.font = '10px zpix,monospace';
        c.textAlign = 'left';
        c.fillText('壹', 10, 18);
    } else if (level === 2) {
        // 第二关：地下通道 - 简化背景
        c.fillStyle = '#0a0a0e';
        c.fillRect(0, 0, 320, 200);
        // 墙壁
        c.fillStyle = 'rgba(34,34,38,' + (1 - darken * 0.5) + ')';
        c.fillRect(0, 0, 320, 50);
        c.fillRect(0, 130, 320, 70);
        // 石门轮廓
        c.fillStyle = 'rgba(60,55,50,' + (0.4 * (1 - darken)) + ')';
        c.fillRect(130, 50, 30, 80);
        // 柱子
        for (var i = 0; i < 4; i++) {
            c.fillStyle = 'rgba(50,48,45,' + (0.3 * (1 - darken)) + ')';
            c.fillRect(50 + i * 80, 45, 6, 90);
        }
        // 关卡名
        c.fillStyle = 'rgba(200,180,150,' + (0.3 * (1 - progress)) + ')';
        c.font = '10px zpix,monospace';
        c.textAlign = 'left';
        c.fillText('贰', 10, 18);
    } else if (level === 3) {
        // 第三关：幻境 - 简化背景
        c.fillStyle = '#080c14';
        c.fillRect(0, 0, 320, 200);
        // 分岔路上墙
        c.fillStyle = 'rgba(30,35,45,' + (1 - darken * 0.5) + ')';
        c.fillRect(0, 0, 320, 35);
        // 分岔路下墙
        c.fillRect(0, 145, 320, 55);
        // 分隔墙
        c.fillStyle = 'rgba(40,45,55,' + (0.6 * (1 - darken)) + ')';
        c.fillRect(0, 72, 320, 36);
        // 火把光芒
        for (var i = 0; i < 3; i++) {
            var tx = 80 + i * 100;
            var glow = 0.15 + Math.sin(JourneyCinematic.timer * 0.08 + i) * 0.05;
            c.fillStyle = 'rgba(255,180,80,' + (glow * (1 - darken)) + ')';
            c.fillRect(tx, 25, 2, 8);
            c.fillStyle = 'rgba(255,150,50,' + (glow * 0.3 * (1 - darken)) + ')';
            c.fillRect(tx - 3, 23, 8, 12);
        }
        // 关卡名
        c.fillStyle = 'rgba(140,180,220,' + (0.3 * (1 - progress)) + ')';
        c.font = '10px zpix,monospace';
        c.textAlign = 'left';
        c.fillText('叁', 10, 18);
    }

    // 整体暗化（随着进度加深）
    c.fillStyle = 'rgba(0,0,10,' + (darken * 0.5) + ')';
    c.fillRect(0, 0, 320, 200);
}

function drawCinematicOverlay(progress) {
    // 扫描线（从下往上）
    var scanY = Math.floor(180 * (1 - progress * 1.1));
    ctx.fillStyle = 'rgba(100,180,255,0.15)';
    ctx.fillRect(0, scanY, 320, 2);
    ctx.fillStyle = 'rgba(100,180,255,0.04)';
    ctx.fillRect(0, scanY + 2, 320, 6);
    ctx.fillStyle = 'rgba(100,180,255,0.02)';
    ctx.fillRect(0, scanY - 6, 320, 6);

    // 回溯符号（左上角）
    var symX = 30, symY = 90;
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.beginPath(); ctx.moveTo(symX - 6, symY - 5); ctx.lineTo(symX - 6, symY + 5); ctx.lineTo(symX, symY); ctx.fill();
    ctx.beginPath(); ctx.moveTo(symX, symY - 5); ctx.lineTo(symX, symY + 5); ctx.lineTo(symX + 4, symY); ctx.fill();

    // "时间回溯" 文字
    ctx.fillStyle = 'rgba(140,190,255,0.6)';
    ctx.font = '8px zpix,monospace';
    ctx.textAlign = 'center';
    ctx.fillText('时间回溯', 160, 170);

    // 进度条（底部细线）
    var barW = 200;
    var barX = 60;
    ctx.fillStyle = 'rgba(60,100,140,0.3)';
    ctx.fillRect(barX, 178, barW, 1);
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(barX, 178, barW * progress, 1);
    ctx.textAlign = 'left';
}

    }
    // 耳朵

    } else {
        ctx.fillRect(x - 8, y - 4 + bob, 1, 1);
        ctx.fillRect(x - 6, y - 4 + bob, 1, 1);
    }
    // 马眼
    ctx.fillStyle = '#1a1a1a';
    if(f > 0){
        ctx.fillRect(x + 10, y - 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x - 8, y - 3 + bob, 1, 1);

    // 马腿（带行走动画）
    ctx.fillStyle = '#6B4E0A';
    if(leg){
        ctx.fillRect(x - 4, y + 7, 1, 3);

        ctx.fillRect(x - 4, y + 8, 1, 2);

        ctx.fillRect(x + 2, y + 7, 1, 3);
        ctx.fillRect(x + 5, y + 7, 1, 3);
    }
    // 尾巴
    ctx.fillStyle = '#5A3E06';
    if(f > 0){
        ctx.fillRect(x - 6, y + 2 + bob, 1, 3);
        ctx.fillRect(x - 7, y + 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x + 7, y + 2 + bob, 1, 3);
        ctx.fillRect(x + 8, y + 3 + bob, 1, 1);

    // HP指示器（小方块显示剩余HP）
    for(var hi = 0; hi < FAKE_HORSE_MAX_HP; hi++){
        var hx = x - 5 + hi * 3;
        if(hi < fh.hp){
            ctx.fillStyle = '#c8a040';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
            ctx.fillStyle = '#e8c060';
            ctx.fillRect(hx, y - 6 + bob, 1, 1);
        } else {
            ctx.fillStyle = '#3a2a10';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
        }
    }
}

function breakFakeHorse(){
    var fh = state.fakeHorse;
    if(!fh) return;
    fh.riding = false;
    fh.hp = 0;
    // 破碎特效：泥土碎片飞散
    var cx = state.player.x + 4, cy = state.player.y + 6;
    for(var bi = 0; bi < 20; bi++){
        state.effects.push({
            x: cx + (Math.random() - 0.5) * 12,
            y: cy + (Math.random() - 0.5) * 8,
            vx: (Math.random() - 0.5) * 3,
            vy: -Math.random() * 2.5 - 0.5,
            life: 20 + Math.floor(Math.random() * 15),
            maxLife: 35,
            type: 'clay-break'
        });
    }
    // 灰尘云效果
    for(var di = 0; di < 6; di++){
        state.effects.push({
            x: cx + (Math.random() - 0.5) * 8,
            y: cy + (Math.random() - 0.5) * 4,
            vx: (Math.random() - 0.5) * 1,
            vy: (Math.random() - 0.5) * 0.5 - 0.3,
            life: 25 + Math.floor(Math.random() * 10),
            maxLife: 35,
            type: 'clay-dust'
        });
    }
    triggerShake(3, 10);
}

/* ==================== 游戏结束 ==================== */
function gameOver(txt, sub, isDeath){
    state.running=false;
    state.isGameWin=false;
    hideMissionHint();
    msgText.innerText=txt;
    msgText.style.color = isDeath ? '#cc2222' : '#ffd700';
    msgText.style.textShadow = isDeath 
        ? '0 0 10px #ff2222, 0 0 20px #cc1111, 0 0 40px #880000, 2px 2px 0 #000' 
        : '0 0 10px var(--gold), 0 0 20px var(--gold), 0 0 40px var(--gold), 2px 2px 0 #000';
    msgSub.innerText = sub || '按 R 键从存档点复活';
    msgSub.style.color = isDeath ? '#aa3333' : '#ffd700';
    msgSub.style.textShadow = isDeath 
        ? '0 0 8px rgba(204,34,34,0.7), 0 0 16px rgba(170,51,51,0.3), 1px 1px 0 #000' 
        : '0 0 8px rgba(255,215,0,0.7), 0 0 16px rgba(255,215,0,0.3), 1px 1px 0 #000';
    msgScreen.style.display='block';
}

function gameWin(){
    state.running=false;
    state.isGameWin=true;
    hideMissionHint();
    msgText.innerText="相濡以沫，不如相忘于江湖。";
    msgText.style.color='#ffcc00';
    msgText.style.textShadow = '0 0 10px var(--gold), 0 0 20px var(--gold), 0 0 40px var(--gold), 2px 2px 0 #000';
    msgSub.innerText = '按r重入江湖';
    msgSub.style.color='#ffd700';
    msgSub.style.textShadow = '0 0 8px rgba(255,215,0,0.7), 0 0 16px rgba(255,215,0,0.3), 1px 1px 0 #000';
    msgScreen.style.display='block';
    // 清除存档
    localStorage.removeItem(SAVE_KEY);
}

/* ==================== 初始化 ==================== */
function init(){
    // 尝试加载存档
    var savedGame = loadGame();
    
    state.keys={};
    state.projectiles=[];
    state.effects=[];
    state.dyingEnemies=[];
    state.running=true;
    state.timeStopped=false;
    state.stopTimer=0;
    state.stopStartTime=0;
    state.globalTick=0;
    state.isMoving=false;
    state.transitioning=false;
    state.bloodLevel=0;
    state.l2TotalEnemies=0;
    state.l2KilledEnemies=0;
    bloodDrips=[];
    
    hasRewind=false;
    isRewinding=false;
    rewindIndex=0;
    stateHistory=[];
    lastFrameTime=performance.now();
    L3RewindAnim.active=false;
    JourneyCinematic.active=false;
    L3RewindPickupHint.active=false;
    L2TimeStopPickupHint.reset();
    SFX.stopTick();
    SFX.stopRewind();
    Dash.active = false; Dash.timer = 0; Dash.trail = []; Dash.lastKeyTime = {}; Dash.keyHeld = {};
    hideMissionHint();
    
    msgScreen.style.display='none';
    LevelStartEffect.hide();
    stopDisplay.style.display='none';
    markHint.style.display='none';
    rewindDisplay.style.display='none';
    
    if (savedGame && savedGame.currentLevel) {
        // 从存档加载
        state.lastCheckpoint = savedGame.checkpoint;
        loadLevel(savedGame.currentLevel);
        if (savedGame.checkpoint) {
            state.player.x = savedGame.checkpoint.x;
            state.player.y = savedGame.checkpoint.y;
            ItemStatus.acquire('checkpoint');
        }
    } else {
        // 新游戏
        state.lastCheckpoint = null;
        loadLevel(1);
    }
}

/* ==================== 主循环 ==================== */
function gameLoop(currentTime){
    if(!state.running&&!isRewinding&&!L3Trap.playerFalling&&!L3RewindAnim.active&&!JourneyCinematic.active)return requestAnimationFrame(gameLoop);
    state.globalTick++;
    
    var deltaTime=currentTime-lastFrameTime;
    lastFrameTime=currentTime;

    // 更新摄像机位置
    updateCamera();

    if(isRewinding){
        updateRewind();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawRewindFrame();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 第三关：回溯倒退动画阶段
    if(L3RewindAnim.active){
        L3RewindAnim.update();
        updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        L3Trap.draw();
        // 绘制替身
        drawL3Ghost();
        // 绘制倒退中的玩家（半透明，带残影效果）
        drawL3RewindPlayer();
        drawEffects();
        L3Dark.draw();
        drawL3RewindOverlay();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 通关倒放电影阶段
    if(JourneyCinematic.active){
        JourneyCinematic.update();
        ctx.save();
        ctx.clearRect(0,0,320,200);
        drawJourneyCinematic();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 第三关：玩家掉落动画阶段
    if(L3Trap.playerFalling){
        L3Trap.update();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        L3Trap.draw();
        drawL3Torches();
        drawAmbient();
        drawCheckpoint();
        L3Dark.draw();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 关卡开始提示阶段：暂停游戏逻辑（玩家无法操控，敌人不会攻击）
    if(LevelStartEffect.active && !L3Trap.playerFalling){
        LevelStartEffect.update();
        updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.enemies.forEach(function(e){e.draw();});
        drawEffects();
        drawRidingHorse();
        state.player.draw();
        L3Dark.draw();
        ctx.restore();
        // 第一关：WASD 按键提示（屏幕空间）
        WASDHint.update();
        WASDHint.draw();
        LevelStartEffect.draw(ctx);
        requestAnimationFrame(gameLoop);return;
    }

    state.player.update();
    // 双击冲刺
    Dash.update();
    Dash.applyMove();
    captureState();
    // 第三关：录制玩家行动
    L3ActionRec.capture();
    // 通关电影：录制旅程
    JourneyRec.capture();

    if(state.timeStopped){
        var elapsed=performance.now()-state.stopStartTime;
        state.stopTimer=Math.max(0,STOP_DURATION-elapsed);
        updateStopUI();
        if(state.stopTimer<=0){
            state.timeStopped=false;stopDisplay.style.display='none';
            SFX.stopTick();
            SFX.timeStopEnd();
            launchMarkedEnemies();
        }
    }

    state.enemies.forEach(function(e){e.update();});
    state.projectiles.forEach(function(k){k.update();});
    state.projectiles=state.projectiles.filter(function(k){return k.alive;});

    // 第二关：更新石门和滚石
    StoneDoor.update();
    RollingBoulder.update();
    
    // 第三关：更新机关陷阱
    L3Trap.update();
    // 第三关：更新黑暗迷雾
    L3Dark.update();
    // 第三关：更新替身
    updateL3Ghost();
    // 更新保镖
    state.bodyguards.forEach(function(bg){ bg.update(); });
    // 第三关：更新拾取回溯宝石提示
    L3RewindPickupHint.update();
    // 第三关：更新拾取令牌提示
    L3TokenPickupHint.update();
    // 第二关：更新拾取时间静止宝石提示
    L2TimeStopPickupHint.update();

    for(var di=state.dyingEnemies.length-1;di>=0;di--){
        state.dyingEnemies[di].update();
        if(state.dyingEnemies[di].isDead()){
            state.dyingEnemies.splice(di,1);
        }
    }

    checkCollisions();
    checkCheckpoint();
    checkLevelComplete();
    updateShake();updateAmbient();updateBloodDrips();

    // 绘制世界空间内容（受摄像机偏移影响）
    ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
    drawBackground();
    state.covers.forEach(function(c){c.draw();});
    // 绘制稻草人（第一关）
    state.scarecrows.forEach(function(sc){sc.draw();});
    // 第二关：绘制石门和滚石
    StoneDoor.draw();
    RollingBoulder.draw();
    // 第三关：绘制机关陷阱
    L3Trap.draw();
    // 第二关火把动画
    drawL2Torches();
    // 第三关火把动画
    drawL3Torches();
    drawAmbient();
    state.pearls.forEach(function(p){drawPearl(p);});
    drawRewindItemSprite();
    drawFakeHorseItem();
    drawBodyguardToken();
    drawCheckpoint();
    state.projectiles.forEach(function(k){k.draw();});
    state.enemies.forEach(function(e){e.draw();});
    state.dyingEnemies.forEach(function(de){de.draw();});
    // 绘制保镖（在敌人之后、玩家之前）
    state.bodyguards.forEach(function(bg){ bg.draw(); });
    drawEffects();
    drawRidingHorse();
    // 第三关：绘制替身（在玩家之前绘制）
    drawL3Ghost();
    // 冲刺残影
    Dash.drawTrail();
    state.player.draw();
    if(state.timeStopped)drawTimeStopOverlay();
    // 稻草人接近提示（在摄像机空间内绘制）
    ScarecrowHint.check();
    ScarecrowHint.draw();
    // 盾卫接近提示（在摄像机空间内绘制）
    ShieldEnemyHint.check();
    ShieldEnemyHint.draw();
    // 第三关：黑暗迷雾覆盖
    L3Dark.draw();
    ctx.restore();

    // 绘制屏幕空间内容（不受摄像机偏移影响）
    // 第一关：WASD 按键提示
    WASDHint.update();
    WASDHint.draw();
    LevelStartEffect.draw(ctx);
    // 第三关：拾取回溯宝石提示框（屏幕右侧固定位置）
    L3RewindPickupHint.draw();
    // 第三关：拾取令牌提示框（屏幕右侧固定位置）
    L3TokenPickupHint.draw();
    // 第二关：拾取时间静止宝石提示框（屏幕右侧固定位置）
    L2TimeStopPickupHint.draw();

    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',function(e){
    state.keys[e.key.toLowerCase()]=true;
    WASDHint.onKeyDown(e.key);
    Dash.onKeyDown(e.key);
    if(e.key.toLowerCase()==='r'){
        if(!state.running){
            localStorage.removeItem(SAVE_KEY);
            if(state.isGameWin){
                // 通关后按R：从头开始
                state.isGameWin=false;
                init();
            }else{
                // 死亡后按R：从失败关卡重新开始
                var retryLevel = state.currentLevel || 1;
                init();
                loadLevel(retryLevel);
            }
        }
    }
    // 暗藏跳关功能
    if(e.key.toLowerCase()==='p' && state.running){
        var nextId = state.currentLevel + 1;
        if(nextId > LEVELS.length){gameWin();return;}
        state.currentLevel = nextId;
        loadLevel(nextId);
        hasRewind = false;
        rewindDisplay.style.display = 'none';
        isRewinding = false;
        stateHistory = [];
    }
});
window.addEventListener('keyup',function(e){state.keys[e.key.toLowerCase()]=false;Dash.onKeyUp(e.key);});

init();requestAnimationFrame(gameLoop);
</script>
