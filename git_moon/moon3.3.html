<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>像素武侠：影之刃 - 四关试炼</title>
    <style>
        @font-face {
            font-family: 'zpix';
            src: url('https://cdn.jsdelivr.net/npm/zpix-pixel-font@3.1.0/zpix.woff2') format('woff2');
            font-display: swap;
        }
        :root {
            --bg-color: #06060a;
            --frame-gold: #c8a800;
            --gold: #ffd700;
            --cinnabar: #912222;
            --moon-white: #ffe8a0;
            --emerald: #ffd700;
        }
        * { -webkit-font-smoothing: none; -moz-osx-font-smoothing: unset; font-smooth: never; }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 80%, rgba(145,34,34,0.04) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(212,175,55,0.03) 0%, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'zpix', monospace;
        }
        #game-container {
            position: relative; border: 3px solid var(--frame-gold);
            outline: 1px solid #3a3000; outline-offset: 4px;
            box-shadow:
                0 0 0 1px #0a0800,
                0 0 0 6px #1a1500,
                0 0 0 7px var(--frame-gold),
                0 0 40px rgba(0,0,0,0.95),
                0 0 80px rgba(200,168,0,0.1),
                inset 0 0 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block; background-color: #0a0a0e;
            image-rendering: pixelated; image-rendering: crisp-edges;
            width: 960px; height: 540px;
        }
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,0,0) 50%, rgba(0,0,0,0.12) 50%),
                linear-gradient(90deg, rgba(255,215,0,0.02), rgba(180,150,0,0.01), rgba(255,215,0,0.02)),
                radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
            background-size: 100% 4px, 8px 100%, 100% 100%;
            pointer-events: none; z-index: 5;
        }
        #ui-layer {
            position: absolute; top: 8px; left: 8px; color: var(--gold);
            pointer-events: none; font-size: 10px; line-height: 1.8; z-index: 6;
        }
        #status {
            background: rgba(10,8,0,0.8); border: 1px solid rgba(200,168,0,0.4);
            padding: 4px 8px; text-shadow: 1px 1px 0 #000; letter-spacing: 1px;
        }
        #level-display {
            margin-top: 4px; background: rgba(15,10,0,0.85);
            border: 1px solid rgba(255,215,0,0.5); padding: 4px 10px;
            text-shadow: 1px 1px 0 #000; font-size: 11px;
        }
        #level-display .label { color: #ffd700; }
        #level-display .number { color: #ffe44d; font-size: 14px; text-shadow: 0 0 6px rgba(255,215,0,0.6), 0 0 12px rgba(255,215,0,0.2); }
        #level-display .name { color: #ffdd66; font-size: 9px; margin-left: 4px; }
        #stop-display {
            margin-top: 4px; background: rgba(15,10,0,0.85);
            border: 1px solid rgba(255,215,0,0.45); padding: 4px 10px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 10px; letter-spacing: 1px;
        }
        #stop-display .label { color: #ffd700; }
        #stop-display .seconds { color: #ffe44d; font-size: 14px; text-shadow: 0 0 6px rgba(255,215,0,0.6), 0 0 12px rgba(255,215,0,0.2); }
        #stop-display .bar-bg { display: block; margin-top: 3px; width: 100px; height: 3px; background: rgba(30,25,0,0.6); border: 1px solid rgba(200,168,0,0.35); }
        #stop-display .bar-fill { display: block; height: 100%; background: #ffd700; transition: width 0.15s linear; }
        #rewind-display {
            margin-top: 4px; background: rgba(15,10,0,0.85);
            border: 1px solid rgba(255,200,0,0.4); padding: 3px 8px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 9px; color: #ffcc00;
        }
        #mark-hint {
            margin-top: 4px; color: #cca800; background: rgba(10,8,0,0.7);
            border: 1px solid rgba(200,168,0,0.25); padding: 3px 8px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 9px;
        }
        #save-indicator {
            position: absolute; top: 8px; right: 8px; color: #ffd700;
            background: rgba(15,10,0,0.85); border: 1px solid rgba(255,215,0,0.45);
            padding: 3px 8px; font-size: 8px; pointer-events: none; z-index: 6;
            opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 4px rgba(255,215,0,0.5);
        }
        #checkpoint-hint {
            position: absolute; bottom: 8px; left: 8px; color: #ffd700;
            background: rgba(15,10,0,0.85); border: 1px solid rgba(255,215,0,0.35);
            padding: 3px 8px; font-size: 8px; pointer-events: none; z-index: 6;
            opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 4px rgba(255,215,0,0.5);
        }
        #msg-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: var(--moon-white); text-align: center; display: none; font-size: 11px;
            z-index: 8; background: rgba(5,3,0,0.94);
            box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.6);
        }
        #msg-screen h2 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scaleY(1.2); margin: 0; font-weight: bold; letter-spacing: 2px; font-size: 72px; text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold), 0 0 40px var(--gold), 2px 2px 0 #000; line-height: 1; white-space: nowrap; }
        #msg-screen p { position: absolute; top: 70%; left: 50%; transform: translateX(-50%); margin: 0; color: #ffd700; font-size: 16px; text-shadow: 0 0 8px rgba(255,215,0,0.7), 0 0 16px rgba(255,215,0,0.3), 1px 1px 0 #000; z-index: 10; }
        #msg-screen::after {
            content: '影'; position: absolute; bottom: -10px; right: -10px;
            font-size: 20px; color: rgba(200,168,0,0.5);
            border: 1px solid rgba(200,168,0,0.35); padding: 2px 4px; transform: rotate(-8deg);
        }
        #controls-hint {
            position: absolute; bottom: 8px; right: 8px; color: rgba(200,168,0,0.4);
            font-size: 8px; pointer-events: none; z-index: 6; text-align: right; line-height: 1.8;
        }
        #mission-hint {
            position: absolute; bottom: 40px; left: 10px; pointer-events: none; z-index: 6;
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            font-size: 14px; line-height: 1.7;
            opacity: 0; transition: opacity 0.5s;
        }
        #mission-hint.visible { opacity: 1; }
        #mission-hint .label {
            color: rgba(200,168,0,0.5); font-size: 11px; letter-spacing: 1px;
        }
        #mission-hint .objective {
            color: #ffd700; font-size: 15px; text-shadow: 0 0 8px rgba(255,215,0,0.5), 0 0 16px rgba(255,215,0,0.2);
            animation: missionBreathe 2.5s ease-in-out infinite;
        }
        @keyframes missionBreathe {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        /* 道具拾取常驻提示（右上角） */
        #item-status {
            position: absolute; top: 10px; right: 10px; pointer-events: none; z-index: 6;
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            font-size: 12px; line-height: 1.8; text-align: right;
            opacity: 0; transition: opacity 0.5s;
        }
        #item-status.visible { opacity: 1; }
        #item-status .hover-hint {
            font-size: 10px; color: rgba(200,168,0,0.5); letter-spacing: 1px;
            animation: hoverHintPulse 3s ease-in-out infinite;
        }
        @keyframes hoverHintPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.85; }
        }
        .item-row {
            display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
            pointer-events: auto; cursor: default;
            animation: itemSlideIn 0.4s ease-out;
            padding: 1px 3px; margin: -1px -3px;
        }
        .item-row .item-name-line {
            display: flex; align-items: center; gap: 4px;
        }
        @keyframes itemSlideIn {
            from { transform: translateX(10px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .item-row .item-name {
            font-size: 12px; letter-spacing: 0.5px;
        }
        .item-row .item-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
            animation: itemDotPulse 2s ease-in-out infinite;
        }
        @keyframes itemDotPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .item-row .item-tip {
            font-size: 9px; line-height: 1.4;
            color: rgba(220,200,150,0.7);
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease;
            margin-top: 0;
            white-space: nowrap;
        }
        .item-row:hover .item-tip {
            max-height: 30px; opacity: 1; margin-top: 1px;
        }
        .item-row:hover .item-name {
            opacity: 1 !important;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="320" height="180"></canvas>
    <div id="crt-overlay"></div>
    <div id="ui-layer">
        <div id="level-display">
            <span class="label">第</span>
            <span class="number" id="level-number">1</span>
            <span class="label">关</span>
            <span class="name" id="level-name"></span>
        </div>
        <div id="stop-display">
            <span class="label">时空静止</span>
            <span class="seconds" id="stop-seconds">4</span>s
            <span class="bar-bg"><span class="bar-fill" id="stop-bar" style="width:100%"></span></span>
        </div>
        <div id="rewind-display">【时间回溯】</div>
        <div id="mark-hint">靠近敌人标记，静止结束时斩杀</div>
    </div>
    <div id="save-indicator">已存档</div>
    <div id="checkpoint-hint">复活点已记录</div>
    <div id="msg-screen">
        <h2 id="msg-text"></h2>
        <p id="msg-sub">按 R 键从存档点复活</p>
    </div>
    <div id="controls-hint">
        WASD 移动<br>
        青色灵珠: 时空静止<br>
        蓝色菱形: 时间回溯<br>
        绿宝石: 存档复活点<br>
        静止中不动可预判敌踪
    </div>
    <div id="mission-hint">
        <div class="label">任务目标</div>
        <div class="objective" id="mission-text"></div>
    </div>
    <div id="item-status"></div>
</div>

<script>
/* ==================== 音效系统（Web Audio API 程序化合成） ==================== */
var SFX = (function() {
    var ctx = null;
    var enabled = true;
    // 时间静止滴答定时器
    var tickInterval = null;
    // 时间回溯音效节点
    var rewindNodes = [];

    function getCtx() {
        if (!ctx) {
            try {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                enabled = false;
                return null;
            }
        }
        if (ctx.state === 'suspended') {
            ctx.resume();
        }
        return ctx;
    }

    // ── 玩家攻击音效（短促刀刃挥砍声） ──
    function playerAttack() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 噪声+高频快速衰减模拟刀刃声
        var bufLen = Math.floor(c.sampleRate * 0.08);
        var buf = c.createBuffer(1, bufLen, c.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < bufLen; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 3);
        }
        var noise = c.createBufferSource();
        noise.buffer = buf;
        var hp = c.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 2000;
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        noise.connect(hp);
        hp.connect(gain);
        gain.connect(c.destination);
        noise.start(now);
        noise.stop(now + 0.08);
        // 附加一个锐利音调
        var osc = c.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.06);
        var oscGain = c.createGain();
        oscGain.gain.setValueAtTime(0.06, now);
        oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(oscGain);
        oscGain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.06);
    }

    // ── 攻击反馈音效（击中敌人/盾牌/物体） ──
    function hitEnemy() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 低频冲击 + 短噪声
        var osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.12);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.12);
        // 金属碰撞噪声
        var bufLen = Math.floor(c.sampleRate * 0.05);
        var buf = c.createBuffer(1, bufLen, c.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < bufLen; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 5);
        }
        var noise = c.createBufferSource();
        noise.buffer = buf;
        var bp = c.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 3000;
        bp.Q.value = 2;
        var noiseGain = c.createGain();
        noiseGain.gain.setValueAtTime(0.12, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        noise.connect(bp);
        bp.connect(noiseGain);
        noiseGain.connect(c.destination);
        noise.start(now);
        noise.stop(now + 0.05);
    }

    // ── 击中盾牌音效 ──
    function hitShield() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 高频金属共鸣
        var osc = c.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.15);
        // 金属噪声
        var bufLen = Math.floor(c.sampleRate * 0.08);
        var buf = c.createBuffer(1, bufLen, c.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < bufLen; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 4);
        }
        var noise = c.createBufferSource();
        noise.buffer = buf;
        var hp = c.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 4000;
        var nGain = c.createGain();
        nGain.gain.setValueAtTime(0.1, now);
        nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        noise.connect(hp);
        hp.connect(nGain);
        nGain.connect(c.destination);
        noise.start(now);
        noise.stop(now + 0.08);
    }

    // ── 时间静止激活音效 ──
    function timeStopActivate() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 低沉的钟鸣
        var osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(110, now + 0.6);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.setValueAtTime(0.15, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.6);
        // 高频泛音
        var osc2 = c.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(880, now);
        osc2.frequency.exponentialRampToValueAtTime(440, now + 0.5);
        var gain2 = c.createGain();
        gain2.gain.setValueAtTime(0.05, now);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc2.connect(gain2);
        gain2.connect(c.destination);
        osc2.start(now);
        osc2.stop(now + 0.5);
    }

    // ── 时间静止滴答音效（启动循环） ──
    function startTick() {
        stopTick();
        if (!enabled) return;
        // 每800ms滴答一声，模拟缓慢时钟
        tickInterval = setInterval(function() {
            if (!enabled) return;
            var c = getCtx();
            if (!c) return;
            var now = c.currentTime;
            // 单次滴答：短促高频"嗒"
            var osc = c.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.03);
            var gain = c.createGain();
            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            osc.connect(gain);
            gain.connect(c.destination);
            osc.start(now);
            osc.stop(now + 0.04);
            // 机械回响
            var osc2 = c.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(600, now + 0.015);
            osc2.frequency.exponentialRampToValueAtTime(400, now + 0.06);
            var gain2 = c.createGain();
            gain2.gain.setValueAtTime(0.025, now + 0.015);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc2.connect(gain2);
            gain2.connect(c.destination);
            osc2.start(now + 0.015);
            osc2.stop(now + 0.06);
        }, 800);
    }

    // ── 停止滴答 ──
    function stopTick() {
        if (tickInterval) {
            clearInterval(tickInterval);
            tickInterval = null;
        }
    }

    // ── 时间静止结束音效（斩杀瞬间） ──
    function timeStopEnd() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 快速上升音调
        var osc = c.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        var lp = c.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 2000;
        osc.connect(lp);
        lp.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.2);
    }

    // ── 时间回溯启动音效 ──
    function rewindStart() {
        if (!enabled) return;
        stopRewind();
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // 倒放感的下降频率
        var osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.8);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.8);
        rewindNodes.push(osc);
    }

    // ── 时间回溯循环音效（倒带"嗡嗡"声） ──
    function startRewindLoop() {
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        // 持续的低频震荡+高频颤动，模拟时间倒流
        var osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 120;
        var oscGain = c.createGain();
        oscGain.gain.value = 0.06;
        osc.connect(oscGain);
        oscGain.connect(c.destination);
        osc.start();
        rewindNodes.push(osc);

        // 颤动层
        var lfo = c.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 4; // 4Hz颤动
        var lfoGain = c.createGain();
        lfoGain.gain.value = 30; // 频率偏移幅度
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();
        rewindNodes.push(lfo);

        // 高频"电流"噪声
        var bufLen = Math.floor(c.sampleRate * 0.5);
        var buf = c.createBuffer(1, bufLen, c.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < bufLen; i++) {
            data[i] = Math.sin(i / bufLen * Math.PI) * (Math.random() * 2 - 1) * 0.5;
        }
        var noise = c.createBufferSource();
        noise.buffer = buf;
        noise.loop = true;
        var bp = c.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1500;
        bp.Q.value = 3;
        var nGain = c.createGain();
        nGain.gain.value = 0.03;
        noise.connect(bp);
        bp.connect(nGain);
        nGain.connect(c.destination);
        noise.start();
        rewindNodes.push(noise);
    }

    // ── 停止回溯音效 ──
    function stopRewind() {
        for (var i = 0; i < rewindNodes.length; i++) {
            try { rewindNodes[i].stop(); } catch(e) {}
        }
        rewindNodes = [];
    }

    // ── 时间回溯结束音效 ──
    function rewindEnd() {
        stopRewind();
        if (!enabled) return;
        var c = getCtx();
        if (!c) return;
        var now = c.currentTime;
        // "叮"的一声恢复
        var osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        var gain = c.createGain();
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.setValueAtTime(0.1, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain);
        gain.connect(c.destination);
        osc.start(now);
        osc.stop(now + 0.3);
    }

    // 首次用户交互时初始化AudioContext
    function initOnInteraction() {
        if (!ctx) getCtx();
    }

    // 监听首次交互
    var inited = false;
    function tryInit() {
        if (inited) return;
        inited = true;
        initOnInteraction();
    }

    document.addEventListener('keydown', tryInit, { once: false });
    document.addEventListener('click', tryInit, { once: false });
    document.addEventListener('touchstart', tryInit, { once: false });

    return {
        playerAttack: playerAttack,
        hitEnemy: hitEnemy,
        hitShield: hitShield,
        timeStopActivate: timeStopActivate,
        startTick: startTick,
        stopTick: stopTick,
        timeStopEnd: timeStopEnd,
        rewindStart: rewindStart,
        startRewindLoop: startRewindLoop,
        stopRewind: stopRewind,
        rewindEnd: rewindEnd
    };
})();

/* ==================== 像素化文字渲染系统 ==================== */
var PixelFont = {
    // 离屏Canvas用于大字体渲染
    bigCanvas: null,
    bigCtx: null,
    scale: 4, // 放大倍数
    
    init: function() {
        this.bigCanvas = document.createElement('canvas');
        this.bigCanvas.width = 320 * this.scale;
        this.bigCanvas.height = 180 * this.scale;
        this.bigCtx = this.bigCanvas.getContext('2d');
    },
    
    // 渲染像素化文字，返回像素数据数组
    // text: 文字内容
    // fontSize: 目标像素大小（实际渲染会放大）
    // color: 文字颜色
    // 返回: { width, height, pixels: [[x,y,color], ...] }
    renderText: function(text, fontSize, color, outlineColor) {
        if (!this.bigCanvas) this.init();
        
        var actualFontSize = fontSize * this.scale;
        this.bigCtx.clearRect(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        
        // 设置字体
        this.bigCtx.font = 'bold ' + actualFontSize + 'px "Microsoft YaHei", "SimHei", sans-serif';
        this.bigCtx.textAlign = 'center';
        this.bigCtx.textBaseline = 'middle';
        
        var textX = this.bigCanvas.width / 2;
        var textY = this.bigCanvas.height / 2;
        
        // 绘制描边
        if (outlineColor) {
            this.bigCtx.strokeStyle = outlineColor;
            this.bigCtx.lineWidth = actualFontSize * 0.15;
            this.bigCtx.lineJoin = 'round';
            this.bigCtx.strokeText(text, textX, textY);
        }
        
        // 绘制文字
        this.bigCtx.fillStyle = color;
        this.bigCtx.fillText(text, textX, textY);
        
        // 获取像素数据
        var imgData = this.bigCtx.getImageData(0, 0, this.bigCanvas.width, this.bigCanvas.height);
        var data = imgData.data;
        
        // 采样并生成像素数组
        var pixels = [];
        var scale = this.scale;
        var targetWidth = Math.ceil(this.bigCanvas.width / scale);
        var targetHeight = Math.ceil(this.bigCanvas.height / scale);
        
        for (var y = 0; y < targetHeight; y++) {
            for (var x = 0; x < targetWidth; x++) {
                // 采样点
                var sx = Math.floor(x * scale + scale / 2);
                var sy = Math.floor(y * scale + scale / 2);
                var idx = (sy * this.bigCanvas.width + sx) * 4;
                
                var r = data[idx];
                var g = data[idx + 1];
                var b = data[idx + 2];
                var a = data[idx + 3];
                
                // RGB最大值判断阈值
                var maxRGB = Math.max(r, g, b);
                
                // 如果透明度足够且有颜色
                if (a > 128 && maxRGB > 50) {
                    // 判断是描边还是填充
                    var isOutline = maxRGB < 100;
                    var pixelColor = isOutline ? outlineColor : color;
                    pixels.push({ x: x, y: y, color: pixelColor, isOutline: isOutline });
                }
            }
        }
        
        // 计算实际边界
        var minX = targetWidth, maxX = 0, minY = targetHeight, maxY = 0;
        pixels.forEach(function(p) {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
        });
        
        // 裁剪到实际内容区域
        var croppedPixels = pixels.map(function(p) {
            return { x: p.x - minX, y: p.y - minY, color: p.color, isOutline: p.isOutline };
        });
        
        return {
            width: maxX - minX + 1,
            height: maxY - minY + 1,
            pixels: croppedPixels,
            offsetX: minX,
            offsetY: minY
        };
    }
};

var LevelStartEffect = {
    active: false,
    timer: 0,
    duration: 180, // 帧数（约3秒，更长展示时间）
    titleText: null,
    hintText: null,
    tipText: null,
    titleX: 0,
    titleY: 0,
    hintX: 0,
    hintY: 0,
    tipX: 0,
    tipY: 0,
    
    show: function(level) {
        // 关卡标题和关卡名合并为通关文字样式
        var levelTitle = '第' + ['一', '二', '三', '四'][level.id - 1] + '关 ' + level.name;
        this.titleStr = levelTitle;
        
        // 关卡提示文字（如"击杀吭哧二将"）
        this.hintStr = level.hint || '击杀所有敌人';
        
        // 使用通关文字样式（大号金色发光，透明背景）
        this.active = true;
        this.timer = 0;
    },
    
    hide: function() {
        this.active = false;
        // 保留文本对象，以便在初始展示后绘制缩小的任务提示
    },
    
    update: function() {
        if (!this.active) return;
        this.timer++;
        if (this.timer >= this.duration) {
            this.active = false;
        }
    },
    
    draw: function(ctx) {
        if (!this.titleStr) return;
        
        var progress = this.timer / this.duration;
        
        if (this.active) {
            // 初始展示阶段 - 通关文字样式（大号金色发光）
            var fadeIn = Math.min(1, this.timer / 20);
            var fadeOut = progress > 0.6 ? (1 - progress) / 0.4 : 1;
            var alpha = fadeIn * fadeOut;
            
            // 标题 - 与通关文字相同的大号发光风格
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 28px zpix, "Microsoft YaHei", "SimHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = '4px';
            // 多层金色发光
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#ffcc00';
            ctx.fillText(this.titleStr, 160, 80);
            ctx.fillText(this.titleStr, 160, 80);
            ctx.shadowBlur = 16;
            ctx.fillText(this.titleStr, 160, 80);
            ctx.shadowBlur = 24;
            ctx.fillText(this.titleStr, 160, 80);
            // 黑色描边（用深色偏移模拟）
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = '#1a1000';
            ctx.lineWidth = 2;
            ctx.strokeText(this.titleStr, 160, 80);
            ctx.fillStyle = '#ffcc00';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 12;
            ctx.fillText(this.titleStr, 160, 80);
            
            // 提示文字 - 同风格但稍小
            if (this.hintStr) {
                ctx.font = 'bold 14px zpix, "Microsoft YaHei", "SimHei", sans-serif';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ffd700';
                ctx.fillStyle = '#ffd700';
                ctx.fillText(this.hintStr, 160, 115);
                ctx.fillText(this.hintStr, 160, 115);
                ctx.shadowBlur = 10;
                ctx.fillText(this.hintStr, 160, 115);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#1a1000';
                ctx.lineWidth = 1;
                ctx.strokeText(this.hintStr, 160, 115);
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 6;
                ctx.fillText(this.hintStr, 160, 115);
            }
            
            ctx.restore();
        } else {
            // 更新HTML任务目标提示
            updateMissionHint(this.hintStr);
        }
        
        ctx.globalAlpha = 1;
    }
};

function px(n) { return Math.floor(n); }

function drawPxCircle(cx, cy, r, color) {
    cx = px(cx); cy = px(cy); ctx.fillStyle = color;
    for (var dy = -r; dy <= r; dy++)
        for (var dx = -r; dx <= r; dx++)
            if (dx*dx+dy*dy <= r*r) ctx.fillRect(cx+dx, cy+dy, 1, 1);
}

function hasLineOfSight(x1, y1, x2, y2) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var dist = Math.hypot(dx, dy);
    if (dist < 1) return true;
    
    var steps = Math.ceil(dist / 3);
    for (var i = 1; i < steps; i++) {
        var t = i / steps;
        var checkX = x1 + dx * t;
        var checkY = y1 + dy * t;
        
        for (var j = 0; j < state.covers.length; j++) {
            var cv = state.covers[j];
            if (checkX >= cv.x && checkX <= cv.x + cv.w &&
                checkY >= cv.y && checkY <= cv.y + cv.h) {
                return false;
            }
        }
    }
    return true;
}

var shake = {x:0,y:0,intensity:0,frames:0};
function triggerShake(i,f){shake.intensity=i;shake.frames=f;}
function updateShake(){
    if(shake.frames>0){shake.x=(Math.random()-0.5)*shake.intensity*2;shake.y=(Math.random()-0.5)*shake.intensity*2;shake.frames--;}
    else{shake.x=0;shake.y=0;}
}

var ambientParts = [];
function initAmbient(){
    ambientParts=[];
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    var count = isSnow ? 80 : 25;
    for(var i=0;i<count;i++){
        var rx=Math.random()*level.width;
        var ry;
        if(isSnow){
            ry=Math.random()*180;
        }else{
            ry=level.tunnelTop+Math.random()*(level.tunnelBot-level.tunnelTop);
        }
        ambientParts.push({
            x:rx, y:ry,
            vx:(Math.random()-0.5)*(isSnow?0.4:0.15),
            vy:isSnow?(Math.random()*0.6+0.3):(Math.random()-0.5)*0.06,
            phase:Math.random()*Math.PI*2,
            bright:Math.random()>0.6,
            size:isSnow?(Math.random()>0.7?2:1):1
        });
    }
}
function updateAmbient(){
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    ambientParts.forEach(function(p){
        p.x+=p.vx+Math.sin(p.phase)*(isSnow?0.12:0.05);
        p.y+=p.vy;
        p.phase+=0.02;
        if(isSnow){
            if(p.y>185||p.x<-10||p.x>level.width+10){
                p.x=Math.random()*level.width;
                p.y=-5-Math.random()*20;
                p.phase=Math.random()*Math.PI*2;
            }
        }else{
            if(p.y<level.tunnelTop||p.y>level.tunnelBot||p.x<-5||p.x>level.width+5){
                p.x=Math.random()*level.width;
                p.y=level.tunnelTop+Math.random()*(level.tunnelBot-level.tunnelTop);
                p.phase=Math.random()*Math.PI*2;
            }
        }
    });
}
function drawAmbient(){
    var level = LEVELS[state.currentLevel - 1];
    var isSnow = (level.id === 1);
    ambientParts.forEach(function(p){
        if(isSnow){
            var a=0.5+Math.sin(p.phase)*0.3;
            ctx.fillStyle='rgba(210,225,255,'+a+')';
            ctx.fillRect(px(p.x),px(p.y),p.size,p.size);
            if(p.size>1){
                ctx.globalAlpha=a*0.4;
                ctx.fillRect(px(p.x)+1,px(p.y),1,1);
                ctx.globalAlpha=1;
            }
        }else{
            var a=0.3+Math.sin(p.phase)*0.25;
            if(p.bright){
                ctx.fillStyle='rgba(212,175,55,'+a+')';ctx.fillRect(px(p.x),px(p.y),1,1);
                ctx.fillStyle='rgba(212,175,55,'+(a*0.3)+')';ctx.fillRect(px(p.x)-1,px(p.y),1,1);ctx.fillRect(px(p.x)+1,px(p.y),1,1);
            }else{
                ctx.fillStyle='rgba(180,170,140,'+(a*0.5)+')';ctx.fillRect(px(p.x),px(p.y),1,1);
            }
        }
    });
}

/* ==================== 关卡背景渲染 ==================== */
var bgCanvas = document.createElement('canvas');
bgCanvas.width=320;bgCanvas.height=180;
var bgCtx = bgCanvas.getContext('2d');

function renderLevelBG(level) {
    var c = bgCtx;
    var w = level.width;
    // 调整bgCanvas宽度以适配宽地图
    if (bgCanvas.width !== w) bgCanvas.width = w;
    
    if (level.id === 1) {
        renderSnowBG(c, w);
        return;
    }
    
    if (level.id === 2) {
        renderL2BG(c, w);
        return;
    }
    
    if (level.id === 3) {
        renderL3BG(c, w);
        return;
    }

    if (level.id === 4) {
        renderSnowBG(c, w);
        return;
    }
    
    // === 以下为原始关卡背景渲染（第4关） ===
    c.fillStyle='#0a0a0e';c.fillRect(0,0,w,180);
    
    // 绘制上下墙壁
    var t = level.tunnelTop;
    var b = level.tunnelBot;
    
    // 上墙
    c.fillStyle='#222226';c.fillRect(0,0,w,t);
    c.fillStyle='#2a2a2e';c.fillRect(0,0,w,t-4);
    c.fillStyle='#2e2e32';c.fillRect(0,0,w,t-10);
    // 下墙
    c.fillStyle='#222226';c.fillRect(0,b,w,180-b);
    c.fillStyle='#2a2a2e';c.fillRect(0,b+4,w,180-b-4);
    c.fillStyle='#2e2e32';c.fillRect(0,b+10,w,180-b-10);
    
    // 墙壁纹理
    c.fillStyle='#1a1a1e';
    for(var i=0;i<w;i+=14){c.fillRect(i,t-2,10,2);c.fillRect(i,b,10,2);}
    c.fillStyle='#3a3a3e';
    for(var i=0;i<w;i+=14){c.fillRect(i+1,t-1,8,1);c.fillRect(i+1,b,8,1);}
    c.fillStyle='#40404a';
    for(var i=0;i<w;i+=3){c.fillRect(i,t,2,1);c.fillRect(i,b-1,2,1);}
    
    // 墙壁装饰
    c.fillStyle='#28282c';
    for(var i=0;i<w;i+=28){
        var h1=Math.floor(Math.random()*6)+2;
        c.fillRect(i,t-10-h1,2,h1);
        c.fillRect(i+10,t-8-Math.floor(Math.random()*5),2,Math.floor(Math.random()*5)+2);
        var h2=Math.floor(Math.random()*6)+2;
        c.fillRect(i,b+10,2,h2);
        c.fillRect(i+10,b+8,2,Math.floor(Math.random()*5)+2);
    }
    
    // 壁龛
    var niches=[80, 160, 240];
    niches.forEach(function(nx){
        c.fillStyle='#0a0a0e';c.fillRect(nx,t-35,16,30);c.fillRect(nx+16,t-30,12,22);
        c.fillStyle='#14141a';c.fillRect(nx+3,t-30,10,22);
    });
    
    // 关卡隔断墙（左右两侧）
    c.fillStyle='#3a3a42';
    c.fillRect(0, t, 8, b - t);
    c.fillRect(312, t, 8, b - t);
    
    // 隔断墙装饰
    c.fillStyle='#4a4a52';
    c.fillRect(0, t, 8, 3);
    c.fillRect(0, b - 3, 8, 3);
    c.fillRect(312, t, 8, 3);
    c.fillRect(312, b - 3, 8, 3);
    
    // 门框效果（入口和出口标记）
    c.fillStyle='#2a2a2e';
    c.fillRect(0, t + 8, 4, b - t - 16);
    c.fillRect(316, t + 8, 4, b - t - 16);
}

/* ==================== 第一关雪夜背景 ==================== */
function renderSnowBG(c, w) {
    // 雪地覆盖整个画面（无天空）
    // 整个画面都是白茫茫的雪地，带微微的夜间色调
    var h = 180; // 画布总高度
    
    // 雪地底色 - 从上到下略有深浅变化，营造夜间雪原感
    c.fillStyle='#a8b0c4';
    c.fillRect(0,0,w,h);
    
    // 顶部稍微偏暗（夜间远方雪地）
    c.fillStyle='#98a0b4';
    c.fillRect(0,0,w,h*0.25);
    
    // 中上部分渐变过渡
    c.fillStyle='#a0a8bc';
    c.fillRect(0,h*0.25,w,h*0.15);
    
    // 中下部分稍微亮一些（近处雪地反光）
    c.fillStyle='#b8c0d4';
    c.fillRect(0,h*0.6,w,h*0.2);
    
    // 底部高光
    c.fillStyle='#c0c8dc';
    c.fillRect(0,h*0.8,w,h*0.2);
    
    // 雪地纹理 - 覆盖整个画面
    for(var i=0;i<w*8;i++){
        var tx=Math.floor(Math.random()*w);
        var ty=Math.floor(Math.random()*h);
        if(Math.random()>0.4){
            c.fillStyle=Math.random()>0.5?'#a0a8bc':'#c0c8dc';
            c.fillRect(tx,ty,1,1);
        }
    }
    
    // 雪地闪光点 - 覆盖整个画面
    for(var i=0;i<w;i++){
        c.fillStyle=Math.random()>0.5?'#dce4ff':'#c8d4f0';
        c.fillRect(Math.floor(Math.random()*w),Math.floor(Math.random()*h),1,1);
    }
    
    // 雪堆/雪丘 - 散布在整个画面
    for(var x=0;x<w;x+=25){
        var dh=Math.floor(Math.random()*6)+2;
        var dw=Math.floor(Math.random()*20)+10;
        var dy=Math.floor(Math.random()*(h-20))+5;
        c.fillStyle='#c8d0e4';
        c.fillRect(x,dy,dw,dh+1);
    }
    
    // 额外的大雪丘
    c.fillStyle='#d0d8ec';
    for(var x=10;x<w;x+=60){
        var dh=Math.floor(Math.random()*4)+2;
        var dy=Math.floor(Math.random()*(h-30))+10;
        c.fillRect(x,dy,Math.floor(Math.random()*15)+10,dh);
    }
    
    // 小雪堆装饰
    c.fillStyle='#d8e0f0';
    for(var x=20;x<w;x+=80+Math.floor(Math.random()*60)){
        var dw=Math.floor(Math.random()*10)+5;
        var dh=Math.floor(Math.random()*4)+2;
        var dy=Math.floor(Math.random()*(h-20))+5;
        c.fillRect(x,dy,dw,dh);
    }
    
    // 地面上的小石头/半埋在雪中的岩石 - 稀疏分布
    c.fillStyle='#8890a0';
    for(var x=80;x<w;x+=90+Math.floor(Math.random()*70)){
        var rw=Math.floor(Math.random()*3)+2;
        var rh=Math.floor(Math.random()*2)+1;
        var ry=h*0.5+Math.floor(Math.random()*h*0.4);
        c.fillRect(x,ry,rw,rh);
        c.fillStyle='#a0a8b8';
        c.fillRect(x,ry-1,rw,1);
        c.fillStyle='#8890a0';
    }
    
    // 微弱的月光照射效果（雪地上的反光带）
    c.globalAlpha=0.03;
    c.fillStyle='#e0e8ff';
    c.fillRect(Math.floor(w*0.3),0,w*0.4,h);
    c.globalAlpha=1;
}

/* ==================== 第二关背景：圆形暗室 + 暗道 ==================== */
function renderL2BG(c, w) {
    var h = 180;
    var t = 50, b = 130; // tunnelTop, tunnelBot
    
    c.fillStyle='#0a0a0e'; c.fillRect(0,0,w,h);
    
    // === 圆形暗室 (x: 0~305, 圆心 152, 90, 半径 120) ===
    var cx = 140, cy = 90, R = 90;
    
    // 圆形房间地面
    c.fillStyle='#181820';
    for (var dx = -R; dx <= R; dx++) {
        for (var dy = -R; dy <= R; dy++) {
            if (dx*dx+dy*dy <= R*R) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    
    // 地面纹理
    for (var i = 0; i < 600; i++) {
        var ang = Math.random() * Math.PI * 2;
        var rad = Math.random() * (R - 10);
        var tx = cx + Math.cos(ang) * rad;
        var ty = cy + Math.sin(ang) * rad;
        c.fillStyle = Math.random() > 0.5 ? '#141418' : '#1e1e26';
        c.fillRect(Math.floor(tx), Math.floor(ty), 1, 1);
    }
    
    // 圆形墙壁 - 多层描边营造厚度
    c.fillStyle='#2a2a32';
    for (var dx = -R-2; dx <= R+2; dx++) {
        for (var dy = -R-2; dy <= R+2; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= (R+2)*(R+2) && d2 > R*R) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    // 外层墙壁加深
    c.fillStyle='#1a1a22';
    for (var dx = -R-4; dx <= R+4; dx++) {
        for (var dy = -R-4; dy <= R+4; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= (R+4)*(R+4) && d2 > (R+2)*(R+2)) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    // 墙壁高光边缘
    c.fillStyle='#35353e';
    for (var dx = -R; dx <= R; dx++) {
        for (var dy = -R; dy <= R; dy++) {
            var d2 = dx*dx+dy*dy;
            if (d2 <= R*R && d2 > (R-2)*(R-2)) {
                c.fillRect(cx+dx, cy+dy, 1, 1);
            }
        }
    }
    
    // 门口缺口（右侧，连接暗道）- 升降石门通道
    var doorGapY = t, doorGapH = b - t;
    for (var dy = 0; dy < doorGapH; dy++) {
        c.fillStyle='#181820';
        c.fillRect(200, doorGapY + dy, 30, 1);
    }
    // 门框两侧石壁（带凹槽，让石门在其中升降）
    // 左侧门框
    c.fillStyle='#2a2a32';
    c.fillRect(198, doorGapY, 3, doorGapH);
    c.fillStyle='#3a3a42';
    c.fillRect(198, doorGapY, 3, 2);
    c.fillRect(198, doorGapY + doorGapH - 2, 3, 2);
    // 右侧门框
    c.fillStyle='#2a2a32';
    c.fillRect(229, doorGapY, 3, doorGapH);
    c.fillStyle='#3a3a42';
    c.fillRect(229, doorGapY, 3, 2);
    c.fillRect(229, doorGapY + doorGapH - 2, 3, 2);
    // 门框凹槽阴影（内部更深色，表示升降轨道）
    c.fillStyle='#101016';
    for (var dy = 0; dy < doorGapH; dy++) {
        c.fillRect(201, doorGapY + dy, 1, 1);
        c.fillRect(228, doorGapY + dy, 1, 1);
    }
    // 门口顶部横梁（石门缩回的区域）
    c.fillStyle='#3a3a44';
    c.fillRect(196, t - 5, 38, 5);
    c.fillStyle='#44444e';
    c.fillRect(197, t - 4, 36, 1);
    // 顶部横梁石纹
    c.fillStyle='#4e4e58';
    c.fillRect(196, t - 3, 36, 1);
    c.fillStyle='#323240';
    c.fillRect(200, t - 2, 28, 1);
    // 顶部横梁苔藓（石门缩回区域常年潮湿，长满苔藓）
    c.fillStyle='#3a6a30';
    c.fillRect(198, t - 5, 4, 2);
    c.fillRect(210, t - 5, 3, 2);
    c.fillRect(222, t - 4, 5, 2);
    c.fillStyle='#2d5a26';
    c.fillRect(200, t - 4, 2, 1);
    c.fillRect(215, t - 5, 2, 1);
    c.fillRect(228, t - 4, 2, 2);
    c.fillStyle='#4a7a40';
    c.fillRect(199, t - 3, 3, 1);
    c.fillRect(218, t - 4, 2, 1);
    // 门框侧面苔藓（从顶部蔓延下来）
    c.fillStyle='#3a6a30';
    c.fillRect(198, t, 2, 6);
    c.fillRect(230, t, 2, 4);
    c.fillStyle='#2d5a26';
    c.fillRect(198, t + 8, 1, 3);
    c.fillRect(230, t + 6, 1, 3);
    c.fillStyle='#4a7a40';
    c.fillRect(199, t + 3, 1, 2);
    // 门口底部石槛
    c.fillStyle='#3a3a44';
    c.fillRect(196, b, 38, 3);
    c.fillStyle='#44444e';
    c.fillRect(197, b + 1, 36, 1);
    // 石槛上的磨损痕迹
    c.fillStyle='#4a4a54';
    for (var sx = 200; sx < 228; sx += 4) {
        c.fillRect(sx, b, 2, 1);
    }
    // 石槛底部少量苔藓
    c.fillStyle='#2d5a26';
    c.fillRect(198, b + 2, 3, 1);
    c.fillRect(220, b + 2, 4, 1);
    c.fillStyle='#356530';
    c.fillRect(206, b + 3, 2, 1);
    c.fillRect(230, b + 2, 2, 1);
    
    // 火把位置（圆形房间内壁4个方向）
    var torchPositions = [
        { x: cx - R + 4, y: cy },        // 左
        { x: cx + R - 4, y: cy },         // 右（门口附近）
        { x: cx, y: cy - R + 4 },        // 上
        { x: cx, y: cy + R - 4 }         // 下
    ];
    torchPositions.forEach(function(tp) {
        drawTorchOnBG(c, tp.x, tp.y);
    });
    
    // 额外火把（上下壁中间位置，增加照明感）
    drawTorchOnBG(c, cx - 60, cy - R + 4);
    drawTorchOnBG(c, cx + 60, cy - R + 4);
    drawTorchOnBG(c, cx - 60, cy + R - 4);
    drawTorchOnBG(c, cx + 60, cy + R - 4);
    
    // 火把光照效果（暖色渐变）
    c.globalAlpha = 0.04;
    c.fillStyle = '#ff8844';
    for (var i = 0; i < torchPositions.length; i++) {
        drawPxCircleOn(c, torchPositions[i].x, torchPositions[i].y, 35, '#ff8844');
    }
    c.globalAlpha = 0.02;
    c.fillStyle = '#ff6622';
    for (var i = 0; i < torchPositions.length; i++) {
        drawPxCircleOn(c, torchPositions[i].x, torchPositions[i].y, 60, '#ff6622');
    }
    c.globalAlpha = 1;
    
    // === 暗道 (x: 305~960) ===
    // 上墙
    c.fillStyle='#222226'; c.fillRect(230, 0, w-230, t);
    c.fillStyle='#2a2a2e'; c.fillRect(230, 0, w-230, t-4);
    c.fillStyle='#2e2e32'; c.fillRect(230, 0, w-230, t-10);
    // 下墙
    c.fillStyle='#222226'; c.fillRect(230, b, w-230, h-b);
    c.fillStyle='#2a2a2e'; c.fillRect(230, b+4, w-230, h-b-4);
    c.fillStyle='#2e2e32'; c.fillRect(230, b+10, w-230, h-b-10);
    
    // 暗道墙壁纹理
    c.fillStyle='#1a1a1e';
    for(var i=230;i<w;i+=14){c.fillRect(i,t-2,10,2);c.fillRect(i,b,10,2);}
    c.fillStyle='#3a3a3e';
    for(var i=230;i<w;i+=14){c.fillRect(i+1,t-1,8,1);c.fillRect(i+1,b,8,1);}
    c.fillStyle='#40404a';
    for(var i=230;i<w;i+=3){c.fillRect(i,t,2,1);c.fillRect(i,b-1,2,1);}
    
    // 暗道壁龛
    var niches=[400, 560, 720, 880];
    niches.forEach(function(nx){
        if(nx+16 > w) return;
        c.fillStyle='#0a0a0e';c.fillRect(nx,t-30,16,25);c.fillRect(nx+16,t-25,12,18);
        c.fillStyle='#14141a';c.fillRect(nx+3,t-25,10,18);
    });
    
    // 暗道地面纹理
    for(var i=305;i<w;i+=5){
        var gx=Math.floor(Math.random()*6)+305;
        var gy=t+Math.floor(Math.random()*(b-t));
        if(gx<w){c.fillStyle='#161620';c.fillRect(gx,gy,1,1);}
    }
    
    // 暗道火把（每隔一段距离）
    for(var fx=280; fx<w; fx+=120){
        if(fx > 230){
            drawTorchOnBG(c, fx, t+4);
            drawTorchOnBG(c, fx, b-4);
        }
    }

    // === 狭窄甬道 (x: 960~1060) ===
    var corridorTop = 65, corridorBot = 115;
    // 甬道地面
    c.fillStyle = '#141418';
    c.fillRect(960, corridorTop, 100, corridorBot - corridorTop);
    // 甬道过渡斜坡（左侧，从正常暗道高度收窄到甬道高度）
    for (var tx = 940; tx < 960; tx++) {
        var ratio = (tx - 940) / 20;
        var topY = Math.floor(t + (corridorTop - t) * ratio);
        var botY = Math.floor(b - (b - corridorBot) * ratio);
        c.fillStyle = '#181820';
        c.fillRect(tx, topY, 1, botY - topY);
    }
    // 甬道上墙（收窄）
    c.fillStyle = '#2a2226';
    c.fillRect(960, 0, 100, corridorTop);
    c.fillStyle = '#322a2e';
    c.fillRect(960, 0, 100, corridorTop - 4);
    c.fillStyle = '#362e32';
    c.fillRect(960, 0, 100, corridorTop - 10);
    // 甬道下墙
    c.fillStyle = '#2a2226';
    c.fillRect(960, corridorBot, 100, h - corridorBot);
    c.fillStyle = '#322a2e';
    c.fillRect(960, corridorBot + 4, 100, h - corridorBot - 4);
    c.fillStyle = '#362e32';
    c.fillRect(960, corridorBot + 10, 100, h - corridorBot - 10);
    // 甬道墙壁纹理
    c.fillStyle = '#1a1618';
    for (var i = 960; i < 1060; i += 10) {
        c.fillRect(i, corridorTop - 1, 6, 1);
        c.fillRect(i, corridorBot, 6, 1);
    }
    c.fillStyle = '#3a3236';
    for (var i = 960; i < 1060; i += 4) {
        c.fillRect(i, corridorTop, 2, 1);
        c.fillRect(i, corridorBot - 1, 2, 1);
    }
    // 甬道石壁突起（装饰）
    c.fillStyle = '#2e2828';
    c.fillRect(975, corridorTop, 3, 6);
    c.fillRect(995, corridorBot - 6, 3, 6);
    c.fillRect(1020, corridorTop, 4, 5);
    c.fillRect(1035, corridorBot - 4, 3, 4);
    // 甬道裂缝装饰（头顶）
    c.fillStyle = '#0e0a0c';
    c.fillRect(985, corridorTop + 3, 12, 1);
    c.fillRect(1005, corridorTop + 5, 8, 1);
    // 甬道地面裂纹
    c.fillStyle = '#101014';
    c.fillRect(970, 85, 15, 1);
    c.fillRect(1000, 95, 20, 1);
    // 甬道微弱火把
    drawTorchOnBG(c, 985, corridorTop + 3);
    drawTorchOnBG(c, 1040, corridorBot - 3);

    // === 小密室 (x: 1065~1115, y: 8~50) ===
    var srX = 1065, srY = 8, srW = 50, srH = 42;
    var srEntryX = 1068, srEntryW = 28;
    // 密室地面
    c.fillStyle = '#161618';
    c.fillRect(srX, srY, srW, srH);
    // 密室地面纹理
    for (var si = 0; si < 60; si++) {
        var sx = srX + Math.floor(Math.random() * srW);

    c.fillStyle = '#32303a';
    c.fillRect(srX, srY - 4, srW, 1);

    c.fillRect(srX - 3, srY - 4, 3, srH + 4);

    c.fillRect(srX - 3, srY - 4, 1, srH + 4);

    c.fillRect(srX + srW, srY - 4, 3, srH + 4);
    c.fillStyle = '#32303a';
    c.fillRect(srX + srW + 2, srY - 4, 1, srH + 4);
    // 密室底部墙壁（入口两侧，入口 srEntryX~srEntryX+srEntryW 开放）
    // 左侧底部墙壁（srX-3 到 srEntryX）
    c.fillStyle = '#2a2830';
    c.fillRect(srX - 3, srY + srH, srEntryX - srX + 3, 3);
    c.fillStyle = '#32303a';
    c.fillRect(srX - 3, srY + srH, srEntryX - srX + 3, 1);

// 在bgCtx上绘制火把（静态部分）
function drawTorchOnBG(c, tx, ty) {
    // 火把支架
    c.fillStyle='#4a3a28';
    c.fillRect(tx-1, ty, 3, 4);
    c.fillStyle='#5c4a33';
    c.fillRect(tx, ty-2, 1, 3);
    // 火焰底座
    c.fillStyle='#8b6914';
    c.fillRect(tx-1, ty-1, 3, 2);
}

// 在指定context上绘制像素圆（用于背景渲染）
function drawPxCircleOn(c, cx2, cy2, r, color) {
    cx2 = Math.floor(cx2); cy2 = Math.floor(cy2);
    c.fillStyle = color;
    for (var dy = -r; dy <= r; dy++) {
        for (var dx = -r; dx <= r; dx++) {
            if (dx*dx+dy*dy <= r*r) {
                c.fillRect(cx2+dx, cy2+dy, 1, 1);
            }
        }
    }
}

        for (var i = 0; i < 6; i++) {
            this.mossPatches.push({
                ox: Math.random() > 0.5 ? 0 : this.w - 1,
                oy: Math.floor(Math.random() * 10),
                w: 1,
                h: Math.floor(Math.random() * 3) + 1,
                shade: Math.random() > 0.5 ? '#4a7a40' : '#356530'
            });
        }
    },
    
    update: function() {
        if (!this.active) return;
        if (!this.closed) {
            this.closeTimer++;
            if (this.closeTimer >= this.closeDelay && !this.closing) {
                this.closing = true;
            }
            if (this.closing && this.openProgress > 0) {
                // 石门从上方降下，先快后慢更自然
                var spd = this.openProgress > 0.5 ? 0.022 : 0.018;
                // 时间静止状态下，石门关闭速度大幅减缓
                if (state.timeStopped) spd *= 0.15;
                this.openProgress -= spd;
                if (this.openProgress <= 0) {
                    this.openProgress = 0;
                    this.closed = true;
                    // 检查玩家是否还在门内侧（圆形房间侧）
                    if (state.player && state.player.x + state.player.w < this.x + this.w) {
                        // 玩家未能通过石门，滚石锁定追杀
                        RollingBoulder.startHunting();
                    } else {
                        // 玩家已通过，触发滚石堵门
                        RollingBoulder.startRolling();
                    }
                    triggerShake(5, 18);
                }
            }
        }
    },
    
    // 石门当前已降下的高度
    getCurrentHeight: function() {
        return Math.floor(this.h * (1 - this.openProgress));
    },
    
    // 升降石门：单块从上方降下，返回一个碰撞矩形
    getCollisionRects: function() {
        if (this.openProgress >= 1) return null;
        var curH = this.getCurrentHeight();
        if (curH < 1) return null;
        return [
            { x: this.x, y: this.y, w: this.w, h: curH }
        ];
    },
    
    isBlocking: function() {
        // 门降下超过一半就视为阻挡
        return this.active && this.openProgress < 0.5;
    },
    
    draw: function() {
        if (!this.active || this.openProgress >= 1) return;
        var curH = this.getCurrentHeight();
        if (curH < 1) return;
        
        var x = px(this.x), y = px(this.y);
        var doorW = this.w;
        
        // === 苔藓层（门的最顶部，覆盖在石面之上）===
        // 苔藓只画在已降下的区域顶部
        this.mossPatches.forEach(function(mp) {
            if (mp.oy < curH) {
                ctx.fillStyle = mp.shade;
                ctx.fillRect(x + mp.ox, y + mp.oy, mp.w, mp.h);
            }
        });
        // 苔藓边缘 drip（沿门边缘滴落的少量苔藓）
        if (curH > 6) {
            ctx.fillStyle='#3a6a30';
            ctx.fillRect(x, y + 4, 1, 3);
            ctx.fillRect(x + doorW - 1, y + 6, 1, 2);
            ctx.fillStyle='#2d5a26';
            ctx.fillRect(x + 2, y + 5, 1, 4);
        }
        // 底部苔藓蔓延效果
        if (curH > 12) {
            ctx.fillStyle='#2a5020';
            ctx.fillRect(x + 1, y + 10, 2, 2);
            ctx.fillStyle='#356530';
            ctx.fillRect(x + doorW - 2, y + 8, 2, 1);
        }
        
        // === 石门主体 ===
        ctx.fillStyle='#4a4a52';
        ctx.fillRect(x, y, doorW, curH);
        
        // 石砖纹理（水平砖缝）
        ctx.fillStyle='#5a5a62';
        for (var dy = 0; dy < curH; dy += 8) {
            ctx.fillRect(x, y + dy, doorW, 1);
        }
        // 砖缝阴影
        ctx.fillStyle='#3a3a42';
        for (var dy = 4; dy < curH; dy += 8) {
            ctx.fillRect(x + 1, y + dy, doorW - 2, 1);
        }
        
        // 垂直砖缝（交错排列）
        ctx.fillStyle='#3a3a40';
        for (var dy = 0; dy < curH; dy += 8) {
            var offset = (dy % 16 === 0) ? 3 : Math.floor(doorW / 2);
            ctx.fillRect(x + offset, y + dy, 1, Math.min(8, curH - dy));
        }
        
        // 金属加固条（横向铁带）
        ctx.fillStyle='#6a6a6e';
        if (curH > 4) {
            ctx.fillRect(x - 1, y + 2, doorW + 2, 2);  // 顶部铁带
        }
        if (curH > 20) {
            ctx.fillRect(x - 1, y + Math.floor(curH * 0.6), doorW + 2, 2);  // 中部铁带
        }
        // 铁带铆钉
        ctx.fillStyle='#7a7a7e';
        if (curH > 4) {
            ctx.fillRect(x, y + 2, 1, 2);
            ctx.fillRect(x + doorW - 1, y + 2, 1, 2);
        }
        if (curH > 20) {
            var bandY = y + Math.floor(curH * 0.6);
            ctx.fillRect(x, bandY, 1, 2);
            ctx.fillRect(x + doorW - 1, bandY, 1, 2);
        }
        
        // 左右边框高光
        ctx.fillStyle='#5a5a64';
        ctx.fillRect(x, y, 1, curH);
        ctx.fillStyle='#3a3a42';
        ctx.fillRect(x + doorW - 1, y, 1, curH);
        
        // 底部边缘（石门下缘磨损效果）
        ctx.fillStyle='#585860';
        ctx.fillRect(x, y + curH - 1, doorW, 1);
        ctx.fillStyle='#6a6a70';
        ctx.fillRect(x + 1, y + curH - 1, doorW - 2, 1);
        
        // 关闭时的震动/火花效果
        if (this.closing && this.openProgress > 0 && this.openProgress < 0.08) {
            ctx.fillStyle='rgba(180,180,200,0.12)';
            ctx.fillRect(x - 1, y - 1, doorW + 2, curH + 2);
        }
        // 石尘粒子（关门过程中）
        if (this.closing && this.openProgress < 0.3 && this.openProgress > 0.02) {
            ctx.fillStyle='rgba(100,100,110,0.2)';
            ctx.fillRect(x + Math.floor(Math.random() * doorW), y + curH, 1, 1);
            ctx.fillRect(x + Math.floor(Math.random() * doorW), y + curH - 1, 1, 1);
        }
    },
    
    reset: function() {
        this.active = false;
        this.openProgress = 1.0;
        this.closing = false;
        this.closeTimer = 0;
        this.closed = false;
        this.mossPatches = [];
    }
};

/* ==================== 第二关滚石系统 ==================== */
var RollingBoulder = {
    active: false,
    x: 0, y: 0,
    targetX: 0,
    radius: 12,
    speed: 0,
    rolling: false,
    settled: false,
    hunting: false,       // 锁定玩家模式
    rotation: 0,
    spawnX: 55, // 圆形房间最左边
    
    init: function(config) {
        this.active = true;
        this.radius = config.radius || 12;
        this.x = this.spawnX;
        this.y = 90; // 圆形房间中心Y
        this.targetX = 201; // 石门左侧位置
        this.speed = 0;
        this.rolling = false;
        this.settled = false;
        this.hunting = false;
        this.rotation = 0;
    },
    
    startRolling: function() {
        if (!this.active || this.rolling) return;
        this.rolling = true;
        this.speed = 0.3;
    },
    
    // 玩家未通过石门时调用：滚石锁定追杀玩家
    startHunting: function() {
        if (!this.active || this.rolling) return;
        this.rolling = true;
        this.hunting = true;
        this.speed = 0.5;
        triggerShake(8, 10);
    },
    
    update: function() {
        if (!this.active || !this.rolling || this.settled) return;
        
        if (this.hunting && state.player) {
            // === 锁定追杀模式：滚石朝玩家位置移动 ===
            var pcx = state.player.x + state.player.w / 2;
            var pcy = state.player.y + state.player.h / 2;
            var dx = pcx - this.x;
            var dy = pcy - this.y;
            var dist = Math.hypot(dx, dy);
            if (dist > 0.5) {
                // 加速追赶，确保比玩家快
                this.speed = Math.min(this.speed + 0.02, 3.0);
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
            this.rotation += this.speed * 3;
        } else {
            // === 正常模式：直线滚向石门 ===
            this.speed = Math.min(this.speed + 0.008, 1.5);
            this.x += this.speed;
            this.rotation += this.speed * 3;
            
            // 到达石门位置则停止
            if (this.x >= this.targetX - this.radius) {
                this.x = this.targetX - this.radius;
                this.settled = true;
                this.rolling = false;
                triggerShake(5, 12);
            }
        }
        
        // 检测玩家碰撞（被滚石碾压 = 淘汰）
        if (state.player) {
            var px2 = state.player.x + state.player.w / 2;
            var py2 = state.player.y + state.player.h / 2;
            var dist = Math.hypot(px2 - this.x, py2 - this.y);
            if (dist < this.radius + 5) {
                if (hasRewind) {
                    triggerRewind();
                } else {
                    respawnAtCheckpoint();
                }
            }
        }
    },
    
    getCollisionRect: function() {
        if (!this.active || !this.settled) return null;
        return {
            x: this.x - this.radius,
            y: this.y - this.radius,
            w: this.radius * 2,
            h: this.radius * 2
        };
    },
    
    draw: function() {
        if (!this.active) return;
        var bx = px(this.x), by = px(this.y), r = this.radius;
        
        // 阴影
        ctx.fillStyle='rgba(0,0,0,0.3)';
        for(var dy=-r; dy<=r; dy++){
            for(var dx=-r; dx<=r; dx++){
                if(dx*dx+dy*dy<=r*r){
                    ctx.fillRect(bx+dx, by+dy+r+2, 1, 1);
                }
            }
        }
        
        // 滚石本体
        for(var dy=-r; dy<=r; dy++){
            for(var dx=-r; dx<=r; dx++){
                if(dx*dx+dy*dy<=r*r){
                    // 根据旋转角度产生纹理偏移
                    var texOff = Math.sin(dx*0.3+this.rotation)*Math.cos(dy*0.3+this.rotation);
                    var shade = texOff > 0 ? '#5a5a5a' : '#4a4a4a';
                    ctx.fillStyle = shade;
                    ctx.fillRect(bx+dx, by+dy, 1, 1);
                }
            }
        }
        
        // 高光
        ctx.fillStyle='#6a6a6a';
        ctx.fillRect(bx-3, by-4, 3, 3);
        ctx.fillStyle='#707070';
        ctx.fillRect(bx-3, by-4, 1, 1);
        
        // 裂纹纹理
        var crackAngle = this.rotation * 0.5;
        for(var i=0; i<3; i++){
            var ca = crackAngle + i * 2.1;
            for(var cd=2; cd<r-2; cd++){
                var crx = bx + Math.cos(ca)*cd;
                var cry = by + Math.sin(ca)*cd;
                if((crx-bx)*(crx-bx)+(cry-by)*(cry-by) <= r*r){
                    ctx.fillStyle='#3a3a3a';
                    ctx.fillRect(Math.floor(crx), Math.floor(cry), 1, 1);
                }
            }
        }
        
        // 滚动时的灰尘效果
        if (this.rolling && !this.settled) {
            for(var i=0; i<2; i++){
                ctx.fillStyle='rgba(100,100,100,0.3)';
                ctx.fillRect(bx-r-2-Math.floor(Math.random()*5), by+r-2+Math.floor(Math.random()*4)-2, 2, 2);
            }
        }
    },
    
    reset: function() {
        this.active = false;
        this.rolling = false;
        this.settled = false;
        this.speed = 0;
        this.rotation = 0;
    }
};

/* ==================== 第三关机关陷阱系统 ==================== */
var l3TrapFirstDeath = false; // 标记是否已在机关处死亡过一次
var l3TrapConsecutiveFalls = 0; // 陷阱连续掉落计数（非掉落时重置）
var l3TrapPermaClosed = false; // 连续掉落4次后永久封闭陷阱

// 第三关兜底：暗道敌人累计击杀玩家次数
var l3UpperEnemyKillCount = 0; // 上方暗道敌人击杀玩家累计次数
var l3EnemyReactionNerfed = false; // 是否已激活降低反应速度

var L3Trap = {
    active: false,
    x: 280,          // 机关区域起始x
    w: 50,           // 机关区域宽度
    floorY: 120,     // 地板y位置（下通道底部，dnBot=122附近）
    timer: 0,        // 当前计时器（帧数）
    cycleDuration: 120,   // 2秒循环（60fps * 2）
    openDuration: 50,     // 打开持续帧数（约0.83秒）
    closingDuration: 20,  // 关闭动画帧数
    isOpen: false,
    openProgress: 0,      // 0=关闭, 1=完全打开
    firstApproach: true,  // 是否首次接近
    playerFalling: false, // 玩家正在掉落
    fallTimer: 0,
    fallX: 0,
    fallY: 0,
    
    init: function() {
        this.active = true;
        this.timer = 0;
        this.isOpen = false;
        this.openProgress = 0;
        this.firstApproach = !l3TrapFirstDeath; // 只有首次才触发刚好打开
        this.playerFalling = false;
        this.fallTimer = 0;
    },
    
    update: function() {
        if (!this.active || state.currentLevel !== 3) return;
        
        // 兜底：连续掉落4次后永久封闭陷阱
        if (l3TrapPermaClosed) {
            this.openProgress = 0;
            this.isOpen = false;
            return;
        }
        
        // 玩家掉落动画
        if (this.playerFalling) {
            this.fallTimer++;
            this.fallY += 1.5; // 掉落速度
            if (this.fallTimer >= 30) {
                this.playerFalling = false;
                this.fallTimer = 0;
                // 掉落完成，触发死亡
                l3TrapFirstDeath = true;
                l3TrapConsecutiveFalls++;
                // 连续掉落4次：永久封闭
                if (l3TrapConsecutiveFalls >= 4) {
                    l3TrapPermaClosed = true;
                    this.openProgress = 0;
                    this.isOpen = false;
                }
                if (hasRewind) {
                    triggerRewind();
                } else {
                    respawnAtCheckpoint();
                }
            }
            return;
        }
        
        // 首次经过：陷阱在玩家首次经过上方时才第一次打开
        // 在首次触发前，陷阱保持完全关闭，不循环
        if (this.firstApproach && state.player) {
            var pcx = state.player.x + state.player.w / 2;
            var pcy = state.player.y + state.player.h / 2;
            // 检测玩家是否在陷阱上方区域（下方暗道的y范围）
            if (pcx >= this.x && pcx <= this.x + this.w && pcy >= 100 && pcy <= 122) {
                this.firstApproach = false;
                // 玩家正踩在陷阱上，直接触发打开动画
                // 设置计时器到即将打开的位置，让石板快速滑开
                this.timer = this.cycleDuration - this.openDuration - this.closingDuration;
            } else {
                // 玩家未到达陷阱，保持关闭状态，不推进计时器
                this.openProgress = 0;
                this.isOpen = false;
                return;
            }
        }
        
        // 更新计时器
        this.timer++;
        if (this.timer >= this.cycleDuration) {
            this.timer -= this.cycleDuration;
        }
        
        // 计算机关状态
        var openStart = this.cycleDuration - this.openDuration - this.closingDuration;
        var openFull = this.cycleDuration - this.openDuration;
        
        if (this.timer < openStart) {
            // 关闭状态
            this.openProgress = 0;
            this.isOpen = false;
        } else if (this.timer < openFull) {
            // 正在打开
            this.openProgress = (this.timer - openStart) / this.closingDuration;
            this.isOpen = false;
        } else {
            // 完全打开
            this.openProgress = 1;
            this.isOpen = true;
        }
        
        // 检测玩家是否踩在打开的机关上
        if (this.isOpen && state.player && !this.playerFalling) {
            var pcx = state.player.x + state.player.w / 2;
            var pcy = state.player.y + state.player.h / 2;
            if (pcx >= this.x && pcx <= this.x + this.w && state.player.y >= 106 && state.player.y <= 110) {
                // 玩家在打开的机关上方 - 开始掉落
                this.playerFalling = true;
                this.fallTimer = 0;
                this.fallX = state.player.x;
                this.fallY = state.player.y;
                triggerShake(4, 15);
            }
        }
        
        // 玩家成功走过陷阱区域（下方暗道中）且未掉落，重置连续掉落计数
        if (state.player) {
            var pcx2 = state.player.x + state.player.w / 2;
            if (pcx2 > this.x + this.w + 10 && state.player.y >= 100 && state.player.y <= 125) {
                l3TrapConsecutiveFalls = 0;
            }
        }
    },
    
    draw: function() {
        if (!this.active || state.currentLevel !== 3) return;
        
        var x = px(this.x), y = px(this.floorY), w = this.w;
        
        // 绘制掉落中的玩家
        if (this.playerFalling) {
            var fx = px(this.fallX), fy = px(this.fallY);
            // 玩家残影
            ctx.globalAlpha = Math.max(0, 1 - this.fallTimer / 30);
            ctx.fillStyle = PAL.white;
            ctx.fillRect(fx, fy, 8, 12);
            ctx.fillStyle = PAL.straw;
            ctx.fillRect(fx - 2, fy - 2, 12, 2);
            ctx.globalAlpha = 1;
            return;
        }
        
        if (this.openProgress <= 0) {
            // 机关关闭 - 绘制地板
            ctx.fillStyle = '#3a3a42';
            ctx.fillRect(x, y, w, 5);
            // 石板纹理
            ctx.fillStyle = '#4a4a52';
            for (var i = 0; i < w; i += 12) {
                ctx.fillRect(x + i, y, 10, 5);
            }
            ctx.fillStyle = '#2a2a32';
            for (var i = 0; i < w; i += 12) {
                ctx.fillRect(x + i + 5, y + 2, 1, 3);
            }
            // 石板缝隙
            ctx.fillStyle = '#1a1a22';
            for (var i = 0; i < w; i += 12) {
                ctx.fillRect(x + i - 1, y, 1, 5);
            }
            // 金属加固
            ctx.fillStyle = '#6a6a6e';
            ctx.fillRect(x, y, w, 1);
            ctx.fillRect(x, y + 4, w, 1);
        } else if (this.openProgress < 1) {
            // 正在打开 - 石板向两侧滑动
            var slide = Math.floor(this.openProgress * (w / 2));
            // 左侧石板
            ctx.fillStyle = '#3a3a42';
            ctx.fillRect(x - slide, y, w / 2, 5);
            // 右侧石板
            ctx.fillRect(x + w / 2 + slide, y, w / 2, 5);
            // 中间裂缝 - 露出深渊
            ctx.fillStyle = '#040408';
            ctx.fillRect(x + w / 2 - slide, y, slide * 2, 5);
            // 裂缝中的红色警示光
            var pulse = 0.3 + Math.sin(state.globalTick * 0.3) * 0.2;
            ctx.fillStyle = 'rgba(180,30,30,' + pulse + ')';
            ctx.fillRect(x + w / 2 - slide + 1, y + 1, Math.max(1, slide * 2 - 2), 3);
            // 火花效果
            if (Math.random() > 0.5) {
                ctx.fillStyle = '#ffaa44';
                ctx.fillRect(x + Math.floor(Math.random() * w), y - 1, 1, 1);
            }
        } else {
            // 完全打开 - 深渊可见
            ctx.fillStyle = '#040408';
            ctx.fillRect(x, y, w, 5);
            // 深渊红色脉动光
            var pulse = 0.15 + Math.sin(state.globalTick * 0.15) * 0.1;
            ctx.fillStyle = 'rgba(150,20,20,' + pulse + ')';
            ctx.fillRect(x + 2, y + 1, w - 4, 3);
            // 机关侧面轨道
            ctx.fillStyle = '#3a3a42';
            ctx.fillRect(x - 2, y, 3, 5);
            ctx.fillRect(x + w - 1, y, 3, 5);
            // 齿轮旋转动画
            var gearAngle = state.globalTick * 0.1;
            ctx.fillStyle = '#5a5a62';
            // 左齿轮
            for (var a = 0; a < 4; a++) {
                var ga = gearAngle + a * Math.PI / 2;
                ctx.fillRect(x + 282 - 2 + Math.floor(Math.cos(ga) * 3), y - 8 + Math.floor(Math.sin(ga) * 3), 1, 1);
            }
            // 右齿轮
            for (var a = 0; a < 4; a++) {
                var ga = -gearAngle + a * Math.PI / 2;
                ctx.fillRect(x + w - 4 + Math.floor(Math.cos(ga) * 3), y - 8 + Math.floor(Math.sin(ga) * 3), 1, 1);
            }
        }
        
        // 机关警示标记（地面上的红色三角）
        if (!this.isOpen && this.openProgress <= 0) {
            var warnPulse = 0.4 + Math.sin(state.globalTick * 0.08) * 0.3;
            ctx.globalAlpha = warnPulse;
            ctx.fillStyle = '#cc2222';
            // 三角警示
            var midX = x + Math.floor(w / 2);
            ctx.fillRect(midX - 1, y - 6, 3, 1);
            ctx.fillRect(midX - 2, y - 5, 5, 1);
            ctx.fillRect(midX - 3, y - 4, 7, 1);
            ctx.fillRect(midX - 2, y - 3, 5, 1);
            ctx.fillRect(midX - 1, y - 2, 3, 1);
            ctx.globalAlpha = 1;
        }
    },
    
    // 获取机关地板碰撞矩形（关闭时）
    getCollisionRect: function() {
        if (!this.active || this.isOpen || this.openProgress > 0.3) return null;
        return { x: this.x, y: this.floorY, w: this.w, h: 5 };
    },
    
    reset: function() {
        this.active = false;
        this.timer = 0;

/* ==================== 第三关黑暗迷雾系统 ==================== */
var l3DarkPreserve = false;
var L3Dark = {
    explored: null,
    gridW: 0,
    gridH: 0,
    CELL: 4,
    darkCanvas: null,
    darkCtx: null,
    exploredCanvas: null,
    exploredCtx: null,
    LIGHT_R: 30,       // 玩家光照半径
    TORCH_R: 16,       // 火把光照半径
    EXPLORED_VIS: 0.42, // 已探索区域可见度
    lastPX: -999,
    lastPY: -999,

    init: function() {
        var mapW = LEVELS[2] ? LEVELS[2].width : 800;
        this.gridW = Math.ceil(mapW / this.CELL);
        this.gridH = Math.ceil(180 / this.CELL);
        this.explored = new Uint8Array(this.gridW * this.gridH);
        this.lastPX = -999;
        this.lastPY = -999;

        if (!this.darkCanvas) {
            this.darkCanvas = document.createElement('canvas');
            this.darkCanvas.width = mapW;
            this.darkCanvas.height = 180;
            this.darkCtx = this.darkCanvas.getContext('2d');
        }
        if (!this.exploredCanvas) {
            this.exploredCanvas = document.createElement('canvas');
            this.exploredCanvas.width = mapW;
            this.exploredCanvas.height = 180;
            this.exploredCtx = this.exploredCanvas.getContext('2d');
        }

        this.exploredCtx.clearRect(0, 0, mapW, 180);

        // 圆形重生房间默认已探索
        this._markExplored(68, 90, 44);
        // 门口通道初始微弱探索
        this._markExplored(125, 90, 18);
    },

    onRespawn: function() {
        // 重生时保留探索状态，重建探索画布
        if (!this.explored || !this.darkCanvas) return;
        var mapW = this.darkCanvas.width;
        this.exploredCtx.clearRect(0, 0, mapW, 180);
        this._rebuildExploredCanvas();
        this.lastPX = -999;
        this.lastPY = -999;
    },

    _rebuildExploredCanvas: function() {
        this.exploredCtx.fillStyle = '#ffffff';
        for (var gy = 0; gy < this.gridH; gy++) {
            for (var gx = 0; gx < this.gridW; gx++) {
                if (this.explored[gy * this.gridW + gx]) {
                    this.exploredCtx.fillRect(gx * this.CELL, gy * this.CELL, this.CELL, this.CELL);
                }
            }
        }
    },

    _markExplored: function(cx, cy, radius) {
        var gcx = Math.floor(cx / this.CELL);
        var gcy = Math.floor(cy / this.CELL);
        var gr = Math.ceil(radius / this.CELL);
        for (var dy = -gr; dy <= gr; dy++) {
            for (var dx = -gr; dx <= gr; dx++) {
                var ix = gcx + dx, iy = gcy + dy;
                if (ix >= 0 && ix < this.gridW && iy >= 0 && iy < this.gridH) {
                    if (dx * dx + dy * dy <= gr * gr) {
                        this.explored[iy * this.gridW + ix] = 1;
                    }
                }
            }
        }
        // 在探索画布上绘制白色圆形
        this.exploredCtx.fillStyle = '#ffffff';
        this.exploredCtx.beginPath();
        this.exploredCtx.arc(cx, cy, radius, 0, Math.PI * 2);
        this.exploredCtx.fill();
    },

    _isExplored: function(wx, wy) {
        var gx = Math.floor(wx / this.CELL);
        var gy = Math.floor(wy / this.CELL);
        if (gx < 0 || gx >= this.gridW || gy < 0 || gy >= this.gridH) return false;
        return this.explored[gy * this.gridW + gx] === 1;
    },

    update: function() {
        if (state.currentLevel !== 3 || !state.player) return;
        var pcx = state.player.x + state.player.w / 2;
        var pcy = state.player.y + state.player.h / 2;
        var dx = pcx - this.lastPX;
        var dy = pcy - this.lastPY;
        if (dx * dx + dy * dy > 9) {
            this._markExplored(pcx, pcy, this.LIGHT_R * 0.65);
            this.lastPX = pcx;
            this.lastPY = pcy;
        }
    },

    draw: function() {
        if (state.currentLevel !== 3 || !this.explored) return;
        var dc = this.darkCtx;

        // 1. 填充完全黑暗
        dc.globalCompositeOperation = 'source-over';
        dc.globalAlpha = 1;
        dc.fillStyle = '#020206';
        dc.fillRect(0, 0, this.darkCanvas.width, 180);

        // 2. 已探索区域 - 部分可见（透过黑暗隐约可见）
        dc.globalCompositeOperation = 'destination-out';
        dc.globalAlpha = this.EXPLORED_VIS;
        dc.drawImage(this.exploredCanvas, 0, 0);
        dc.globalAlpha = 1;

        // 3. 玩家光照 - 明亮渐变
        var pcx, pcy;
        if (L3Trap.playerFalling) {
            pcx = L3Trap.fallX + 4;
            pcy = L3Trap.fallY + 6;
        } else if (state.player) {
            pcx = state.player.x + state.player.w / 2;
            pcy = state.player.y + state.player.h / 2;
        } else {
            pcx = 68; pcy = 90;
        }
        var r = this.LIGHT_R;
        var grad = dc.createRadialGradient(pcx, pcy, 3, pcx, pcy, r);
        grad.addColorStop(0, 'rgba(0,0,0,1)');
        grad.addColorStop(0.3, 'rgba(0,0,0,0.97)');
        grad.addColorStop(0.6, 'rgba(0,0,0,0.75)');
        grad.addColorStop(0.85, 'rgba(0,0,0,0.3)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        dc.fillStyle = grad;
        dc.beginPath();
        dc.arc(pcx, pcy, r, 0, Math.PI * 2);
        dc.fill();

        // 4. 已探索区域火把光照（闪烁暖光）
        var torches = [
            {x: 20, y: 90}, {x: 68, y: 42}, {x: 68, y: 138},
            {x: 150, y: 37}, {x: 150, y: 117},
            {x: 195, y: 30}, {x: 290, y: 30}, {x: 390, y: 30}, {x: 490, y: 30}, {x: 560, y: 30},
            {x: 630, y: 30}, {x: 710, y: 30}, {x: 780, y: 30},
            {x: 200, y: 115}, {x: 300, y: 115}, {x: 400, y: 115}, {x: 460, y: 115}, {x: 550, y: 115},
            {x: 630, y: 115}, {x: 710, y: 115}, {x: 780, y: 115}
        ];
        var tr = this.TORCH_R;
        for (var i = 0; i < torches.length; i++) {
            var t = torches[i];
            if (this._isExplored(t.x, t.y)) {
                var flk = 0.22 + Math.sin(state.globalTick * 0.12 + i * 2.1) * 0.07;
                var grad = dc.createRadialGradient(t.x, t.y, 0, t.x, t.y, tr);
                grad.addColorStop(0, 'rgba(0,0,0,' + flk + ')');
                grad.addColorStop(0.5, 'rgba(0,0,0,' + (flk * 0.35) + ')');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                dc.fillStyle = grad;
                dc.beginPath();
                dc.arc(t.x, t.y, tr, 0, Math.PI * 2);
                dc.fill();
            }
        }

        dc.globalCompositeOperation = 'source-over';

        // 5. 夜视特效：拾取令牌后下方暗道完全可见（绿色夜视）
        if (state.l3NightVision) {
            // 在黑暗画布上切出下方暗道区域（完全透明）
            dc.globalCompositeOperation = 'destination-out';
            dc.globalAlpha = 1;
            // 下方暗道区域 y:92~128（包含墙壁）, x:175~780
            dc.fillStyle = 'rgba(0,0,0,1)';
            dc.fillRect(175, 92, 605, 36);
            dc.globalCompositeOperation = 'source-over';
        }

        // 6. 绘制黑暗层到主画布
        ctx.drawImage(this.darkCanvas, 0, 0);

        // 7. 夜视绿色色调覆盖（下方暗道）
        if (state.l3NightVision) {
            ctx.globalCompositeOperation = 'source-over';
            var nvPulse = 0.06 + Math.sin(state.globalTick * 0.04) * 0.015;
            ctx.fillStyle = 'rgba(0,255,60,' + nvPulse + ')';
            ctx.fillRect(175, 92, 605, 36);
            // 夜视扫描线效果
            ctx.globalAlpha = 0.03;
            for (var sl = 92; sl < 128; sl += 3) {
                ctx.fillStyle = '#00ff44';
                ctx.fillRect(175, sl, 605, 1);
            }
            ctx.globalAlpha = 1;
        }
    },

    reset: function() {
        this.explored = null;
        this.lastPX = -999;
        this.lastPY = -999;
    }
};

/* 圆角矩形辅助函数 */
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

var JourneyRec = {

    frameCounter: 0,

    capture: function() {
        if (!state.player || !state.running) return;
        this.frameCounter++;

        this.history.push({
            x: state.player.x,
            y: state.player.y,
            fr: state.player.facingRight,
            level: state.currentLevel
        });
        if (this.history.length > this.maxFrames) {

        }
    },

        this.history = [];
        this.frameCounter = 0;
    }
};

// 通关倒放动画控制器
var JourneyCinematic = {
    active: false,
    frames: null,        // 倒放的帧序列
    frameIdx: 0,
    duration: 300,       // 5秒 = 300帧
    timer: 0,

    start: function() {
        if (JourneyRec.history.length < 10) {
            // 历史不足，直接进下一关
            this.skip();
            return;
        }
        hideMissionHint();
        // 采样生成5秒动画帧（300帧）
        var src = JourneyRec.history;
        var srcLen = src.length;
        this.frames = [];
        for (var i = 0; i < this.duration; i++) {
            // 从末尾往回映射到源数据
            var srcIdx = Math.floor((1 - i / this.duration) * (srcLen - 1));
            srcIdx = Math.max(0, Math.min(srcLen - 1, srcIdx));
            this.frames.push(src[srcIdx]);
        }
        this.frameIdx = 0;
        this.timer = 0;
        this.active = true;
        state.running = false;
        state.transitioning = true;
        SFX.rewindStart();
        SFX.startRewindLoop();
    },

    update: function() {
        if (!this.active) return;
        this.timer++;
        this.frameIdx++;
        if (this.timer >= this.duration) {
            this.finish();
        }
    },

    finish: function() {
        this.active = false;
        SFX.rewindEnd();
        JourneyRec.reset();
        LevelStartEffect.hide();
        state.lastCheckpoint = null;
        loadLevel(4);
        state.transitioning = false;
    },

    skip: function() {
        this.active = false;
        JourneyRec.reset();

        state.lastCheckpoint = null;

        state.transitioning = false;
    },

    getCurrentPos: function() {

    if (!ghostActions || ghostActions.length < 10) return;
    l3DeathCount++;
