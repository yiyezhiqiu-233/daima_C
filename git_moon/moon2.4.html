<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>像素武侠：影之刃</title>
    <style>
        @font-face {
            font-family: 'zpix';
            src: url('https://cdn.jsdelivr.net/npm/zpix-pixel-font@3.1.0/zpix.woff2') format('woff2');
            font-display: swap;
        }
        :root {
            --bg-color: #06060a;
            --frame-gold: #8b6914;
            --gold: #d4af37;
            --cinnabar: #912222;
            --moon-white: #e8e0d0;
        }
        * { -webkit-font-smoothing: none; -moz-osx-font-smoothing: unset; font-smooth: never; }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 80%, rgba(145,34,34,0.04) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(212,175,55,0.03) 0%, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'zpix', monospace;
        }
        #game-container {
            position: relative; border: 3px solid var(--frame-gold);
            outline: 1px solid #3a2a1e; outline-offset: 4px;
            box-shadow:
                0 0 0 1px #0a0806,
                0 0 0 6px #2a2018,
                0 0 0 7px var(--frame-gold),
                0 0 40px rgba(0,0,0,0.9),
                0 0 80px rgba(145,34,34,0.08),
                inset 0 0 30px rgba(0,0,0,0.4);
        }
        #game-container::before, #game-container::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            border: 2px solid var(--frame-gold); z-index: 10; pointer-events: none;
        }
        #game-container::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        #game-container::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }
        canvas {
            display: block; background-color: #0a0a0e;
            image-rendering: pixelated; image-rendering: crisp-edges;
            width: 960px; height: 540px;
        }
        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%),
                linear-gradient(90deg, rgba(255,80,80,0.03), rgba(80,255,80,0.01), rgba(80,80,255,0.03)),
                radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
            background-size: 100% 4px, 8px 100%, 100% 100%;
            pointer-events: none; z-index: 5;
        }
        #ui-layer {
            position: absolute; top: 8px; left: 8px; color: var(--gold);
            pointer-events: none; font-size: 10px; line-height: 1.8; z-index: 6;
        }
        #status {
            background: rgba(10,10,14,0.75); border: 1px solid rgba(139,105,20,0.4);
            padding: 4px 8px; text-shadow: 1px 1px 0 #000; letter-spacing: 1px;
        }
        #stop-display {
            margin-top: 4px; background: rgba(0,20,20,0.8);
            border: 1px solid rgba(0,204,204,0.35); padding: 4px 10px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 10px; letter-spacing: 1px;
        }
        #stop-display .label { color: #00cccc; }
        #stop-display .seconds { color: #ffffff; font-size: 14px; text-shadow: 0 0 6px rgba(0,204,204,0.5); }
        #stop-display .bar-bg { display: block; margin-top: 3px; width: 100px; height: 3px; background: rgba(0,60,60,0.6); border: 1px solid rgba(0,100,100,0.3); }
        #stop-display .bar-fill { display: block; height: 100%; background: #00cccc; transition: width 0.15s linear; }
        #rewind-display {
            margin-top: 4px; background: rgba(15,15,50,0.8);
            border: 1px solid rgba(80,120,220,0.4); padding: 3px 8px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 9px; color: #6688cc;
        }
        #mark-hint {
            margin-top: 4px; color: #aaa; background: rgba(10,10,14,0.6);
            border: 1px solid rgba(100,100,100,0.2); padding: 3px 8px;
            text-shadow: 1px 1px 0 #000; display: none; font-size: 9px;
        }
        #boss-hint {
            margin-top: 6px; color: #ffcc00; background: rgba(30,20,10,0.85);
            border: 1px solid rgba(200,150,50,0.5); padding: 6px 12px;
            text-shadow: 1px 1px 0 #000; font-size: 13px; letter-spacing: 2px;
            font-weight: bold;
        }
        #controls-hint {
            position: absolute; bottom: 8px; right: 8px; color: rgba(139,105,20,0.35);
            font-size: 8px; pointer-events: none; z-index: 6; text-align: right; line-height: 1.8;
        }
        #msg-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--moon-white); text-align: center; display: none; font-size: 11px;
            line-height: 2.2; z-index: 8; background: rgba(10,8,6,0.92);
            border: 2px solid var(--frame-gold); padding: 20px 32px;
            box-shadow: 0 0 0 1px #1a1410, 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
        }
        #msg-screen h2 { margin: 0 0 8px 0; font-weight: normal; letter-spacing: 2px; }
        #msg-screen p { margin: 0; color: #7a7060; font-size: 9px; }
        #msg-screen::after {
            content: '影'; position: absolute; bottom: -10px; right: -10px;
            font-size: 20px; color: rgba(145,34,34,0.5);
            border: 1px solid rgba(145,34,34,0.3); padding: 2px 4px; transform: rotate(-8deg);
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="320" height="180"></canvas>
    <div id="crt-overlay"></div>
    <div id="ui-layer">
        <div id="status">余敌: <span id="enemy-count">0</span></div>
        <div id="stop-display">
            <span class="label">时空静止</span>
            <span class="seconds" id="stop-seconds">4</span>s
            <span class="bar-bg"><span class="bar-fill" id="stop-bar" style="width:100%"></span></span>
        </div>
        <div id="rewind-display">【时间回溯】</div>
        <div id="mark-hint">靠近敌人标记，静止结束时斩杀</div>
        <div id="boss-hint">击败吭哧二将</div>
    </div>
    <div id="msg-screen">
        <h2 id="msg-text"></h2>
        <p>按 R 键重新出山</p>
    </div>
    <div id="controls-hint">
        WASD 移动<br>
        青色灵珠: 时空静止<br>
        蓝色菱形: 时间回溯<br>
        静止中不动可预判敌踪<br>
        靠近敌人打上红叉
    </div>
</div>

<script>
/* 第一段(0-300): 窄24px | 第二段(300-750): 宽48px | 第三段(750-1200): 窄24px */
var SECTIONS = [
    { start: 0,   end: 300,  top: 78, bot: 102 },
    { start: 300, end: 750,  top: 66, bot: 114 },
    { start: 750, end: 1200, top: 78, bot: 102 }
];

function getTunnelBounds(x) {
    for (var i = 0; i < SECTIONS.length; i++) {
        var s = SECTIONS[i];
        if (x >= s.start && x < s.end) return { top: s.top, bot: s.bot };
    }
    return { top: 78, bot: 102 };
}
function getStrictBounds(ex, ew) {
    var l = getTunnelBounds(ex);
    var r = getTunnelBounds(ex + ew - 1);
    return { top: Math.max(l.top, r.top), bot: Math.min(l.bot, r.bot) };
}

var PAL = {
    ink:'#0a0a0e',darkInk:'#1a1a1e',stone:'#3a3830',lightStone:'#5a5850',
    white:'#e8e0d0',cinnabar:'#912222',darkCinn:'#601515',
    gold:'#d4af37',darkGold:'#8b6914',bamboo:'#2d5c2d',darkBamboo:'#1a3a1a',
    skin:'#d4a574',darkSkin:'#a07850',straw:'#5c4533',darkStraw:'#3a2a1e',
    pearl:'#00cccc',mtFar:'#10101a',mtMid:'#181824',mtNear:'#20202e',
    ground:'#1a1810',groundLt:'#252218',pathStone:'#302d24',pathLt:'#3a3730',
    ninja:'#3a3a40',ninjaDark:'#22222a',ninjaTrim:'#555560'
};
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var msgScreen = document.getElementById('msg-screen');
var msgText = document.getElementById('msg-text');
var enemyCounter = document.getElementById('enemy-count');
var markHint = document.getElementById('mark-hint');
var stopDisplay = document.getElementById('stop-display');
var stopSecondsEl = document.getElementById('stop-seconds');
var stopBarEl = document.getElementById('stop-bar');
var rewindDisplay = document.getElementById('rewind-display');
var bossHint = document.getElementById('boss-hint');

/* 修改：使用毫秒作为时间单位，确保时间静止精确持续4秒 */
var STOP_DURATION = 4000; // 4000毫秒 = 4秒
var PUSH_RANGE = 75;
var PUSH_FORCE = 0.35;
var MARK_RANGE = 22;
var ATTACK_RANGE = 120; // 敌人攻击范围
var PLAYER_SPEED_NORMAL = 1.5;
/* 静止状态下速度略快（快33%） */
var PLAYER_SPEED_STOP = 5.0;
var KNIFE_INIT_SPD = 0.25;
var KNIFE_ACCEL = 0.018;
var KNIFE_MAX_SPD = 2.2;
var REWIND_FRAMES = 300;
var REWIND_SPEED = 3;

function px(n) { return Math.floor(n); }
function drawPxCircle(cx, cy, r, color) {
    cx = px(cx); cy = px(cy); ctx.fillStyle = color;
    for (var dy = -r; dy <= r; dy++)
        for (var dx = -r; dx <= r; dx++)
            if (dx*dx+dy*dy <= r*r) ctx.fillRect(cx+dx, cy+dy, 1, 1);
}

/* 射线检测：判断两点之间是否有障碍物阻挡 */
function hasLineOfSight(x1, y1, x2, y2) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var dist = Math.hypot(dx, dy);
    if (dist < 1) return true; // 距离太近，默认可见
    
    var steps = Math.ceil(dist / 3); // 每3像素检测一次
    for (var i = 1; i < steps; i++) {
        var t = i / steps;
        var checkX = x1 + dx * t;
        var checkY = y1 + dy * t;
        
        // 检查是否与障碍物碰撞
        for (var j = 0; j < state.covers.length; j++) {
            var cv = state.covers[j];
            if (checkX >= cv.x && checkX <= cv.x + cv.w &&
                checkY >= cv.y && checkY <= cv.y + cv.h) {
                return false; // 有障碍物阻挡
            }
        }
    }
    return true; // 视线通畅
}

var shake = {x:0,y:0,intensity:0,frames:0};
function triggerShake(i,f){shake.intensity=i;shake.frames=f;}
function updateShake(){
    if(shake.frames>0){shake.x=(Math.random()-0.5)*shake.intensity*2;shake.y=(Math.random()-0.5)*shake.intensity*2;shake.frames--;}
    else{shake.x=0;shake.y=0;}
}

var ambientParts = [];
function initAmbient(){
    ambientParts=[];
    for(var i=0;i<25;i++){
        var rx=Math.random()*1200;
        var b=getTunnelBounds(rx);
        ambientParts.push({x:rx,y:b.top+Math.random()*(b.bot-b.top),vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.06,phase:Math.random()*Math.PI*2,bright:Math.random()>0.6});
    }
}
function updateAmbient(){
    ambientParts.forEach(function(p){
        p.x+=p.vx+Math.sin(p.phase)*0.05;p.y+=p.vy;p.phase+=0.02;
        var b=getTunnelBounds(p.x);
        if(p.y<b.top||p.y>b.bot||p.x<-5||p.x>1205){p.x=Math.random()*1200;var nb=getTunnelBounds(p.x);p.y=nb.top+Math.random()*(nb.bot-nb.top);p.phase=Math.random()*Math.PI*2;}
    });
}
function drawAmbient(){
    ambientParts.forEach(function(p){
        var a=0.3+Math.sin(p.phase)*0.25;
        if(p.bright){
            ctx.fillStyle='rgba(212,175,55,'+a+')';ctx.fillRect(px(p.x-state.cameraX),px(p.y),1,1);
            ctx.fillStyle='rgba(212,175,55,'+(a*0.3)+')';ctx.fillRect(px(p.x-state.cameraX)-1,px(p.y),1,1);ctx.fillRect(px(p.x-state.cameraX)+1,px(p.y),1,1);
        }else{
            ctx.fillStyle='rgba(180,170,140,'+(a*0.5)+')';ctx.fillRect(px(p.x-state.cameraX),px(p.y),1,1);
        }
    });
}

var bgCanvas = document.createElement('canvas');
bgCanvas.width=1200;bgCanvas.height=180;
var bgCtx = bgCanvas.getContext('2d');

function drawSectionWalls(c, sec) {
    var x=sec.start, w=sec.end-sec.start, t=sec.top, b=sec.bot;
    c.fillStyle='#222226';c.fillRect(x,0,w,t);
    c.fillStyle='#2a2a2e';c.fillRect(x,0,w,t-4);
    c.fillStyle='#2e2e32';c.fillRect(x,0,w,t-10);
    c.fillStyle='#222226';c.fillRect(x,b,w,180-b);
    c.fillStyle='#2a2a2e';c.fillRect(x,b+4,w,180-b-4);
    c.fillStyle='#2e2e32';c.fillRect(x,b+10,w,180-b-10);
    c.fillStyle='#1a1a1e';
    for(var i=0;i<w;i+=14){c.fillRect(x+i,t-2,10,2);c.fillRect(x+i,b,10,2);}
    c.fillStyle='#3a3a3e';
    for(var i=0;i<w;i+=14){c.fillRect(x+i+1,t-1,8,1);c.fillRect(x+i+1,b,8,1);}
    c.fillStyle='#40404a';
    for(var i=0;i<w;i+=3){c.fillRect(x+i,t,2,1);c.fillRect(x+i,b-1,2,1);}
    c.fillStyle='#28282c';
    for(var i=0;i<w;i+=28){
        var h1=Math.floor(Math.random()*6)+2;
        c.fillRect(x+i,t-10-h1,2,h1);
        c.fillRect(x+i+10,t-8-Math.floor(Math.random()*5),2,Math.floor(Math.random()*5)+2);
        var h2=Math.floor(Math.random()*6)+2;
        c.fillRect(x+i,b+10,2,h2);
        c.fillRect(x+i+10,b+8,2,Math.floor(Math.random()*5)+2);
    }
    c.fillStyle='#3a3a3e';
    for(var i=0;i<w;i+=50){c.fillRect(x+i+15,t-30,4,12);c.fillRect(x+i+30,b+18,3,10);}
    c.fillStyle='#4a4a4e';
    for(var i=0;i<w;i+=70){c.fillRect(x+i+20,t-50,3,10);c.fillRect(x+i+40,b+30,2,8);}
    c.fillStyle='rgba(60,58,48,0.15)';
    for(var i=0;i<w;i+=20){c.fillRect(x+i,t+2,8,1);c.fillRect(x+i+5,b-3,6,1);}
}

function drawTransition(c, tx, leftSec, rightSec) {
    var lt=leftSec.top, lb=leftSec.bot, rt=rightSec.top, rb=rightSec.bot;
    if(rt<lt){
        c.fillStyle='#505058';c.fillRect(tx-1,lt-1,3,1);
        c.fillStyle='#3a3a42';c.fillRect(tx,rt,1,lt-rt);
        c.fillStyle='#4a4a52';c.fillRect(tx-1,rt,1,lt-rt);
    }else{
        c.fillStyle='#505058';c.fillRect(tx-1,rt-1,3,1);
        c.fillStyle='#3a3a42';c.fillRect(tx-1,rt,1,lt-rt);
        c.fillStyle='#4a4a52';c.fillRect(tx,rt,1,lt-rt);
    }
    if(rb>lb){
        c.fillStyle='#505058';c.fillRect(tx-1,lb,3,1);
        c.fillStyle='#3a3a42';c.fillRect(tx,lb,1,rb-lb);
        c.fillStyle='#4a4a52';c.fillRect(tx-1,lb,1,rb-lb);
    }else{
        c.fillStyle='#505058';c.fillRect(tx-1,rb-1,3,1);
        c.fillStyle='#3a3a42';c.fillRect(tx-1,rb,1,lb-rb);
        c.fillStyle='#4a4a52';c.fillRect(tx,rb,1,lb-rb);
    }
}

function renderStaticBG(){
    var c=bgCtx;
    c.fillStyle='#0a0a0e';c.fillRect(0,0,1200,180);
    c.fillStyle='#1a1a1e';c.fillRect(0,0,1200,180);
    SECTIONS.forEach(function(sec){drawSectionWalls(c,sec);});
    drawTransition(c, 300, SECTIONS[0], SECTIONS[1]);
    drawTransition(c, 750, SECTIONS[1], SECTIONS[2]);
    var niches=[{x:150,sec:0},{x:530,sec:1},{x:950,sec:2}];
    niches.forEach(function(n){
        var t=SECTIONS[n.sec].top;
        c.fillStyle='#0a0a0e';c.fillRect(n.x,t-35,16,30);c.fillRect(n.x+16,t-30,12,22);
        c.fillStyle='#14141a';c.fillRect(n.x+3,t-30,10,22);
    });
    c.fillStyle='rgba(40,50,60,0.08)';
    for(var i=310;i<740;i+=6){c.fillRect(i,88,4,4);}
}

var state = {
    running:true,timeStopped:false,stopTimer:0,stopStartTime:0,
    keys:{},player:null,enemies:[],projectiles:[],
    pearls:[],covers:[],wave:1,
    isMoving:false,effects:[],dyingEnemies:[],globalTick:0,
    rewindItem:{x:900,y:90,active:true},
    cameraX:0,checkpoints:[]
};
var hasRewind = false;
var isRewinding = false;
var rewindIndex = 0;
var stateHistory = [];
var lastFrameTime = 0;

function Entity(x,y,w,h,color){this.x=x;this.y=y;this.w=w;this.h=h;this.color=color;this.vx=0;this.vy=0;}

function Player(x,y){
    Entity.call(this,x,y,8,12,PAL.white);
    this.speed=PLAYER_SPEED_NORMAL;this.facingRight=true;this.animTimer=0;this.animFrame=0;
}
Player.prototype.update=function(){
    this.speed=state.timeStopped?PLAYER_SPEED_STOP:PLAYER_SPEED_NORMAL;
    this.vx=0;this.vy=0;
    if(state.keys['w'])this.vy=-this.speed;
    if(state.keys['s'])this.vy=this.speed;
    if(state.keys['a']){this.vx=-this.speed;this.facingRight=false;}
    if(state.keys['d']){this.vx=this.speed;this.facingRight=true;}
    var nx=this.x+this.vx,ny=this.y+this.vy;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    if(!blocked){this.x=nx;this.y=ny;}
    this.x=Math.max(0,Math.min(1200-this.w,this.x));
    var sb=getStrictBounds(this.x,this.w);
    this.y=Math.max(sb.top,Math.min(sb.bot-this.h,this.y));
    state.isMoving=(this.vx!==0||this.vy!==0);
    if(state.isMoving){this.animTimer++;if(this.animTimer%6===0)this.animFrame=(this.animFrame+1)%4;}
    else{this.animFrame=0;this.animTimer=0;}
    state.cameraX=Math.max(0,Math.min(1200-320,this.x-160+this.w/2));
};
Player.prototype.draw=function(){
    var x=px(this.x-state.cameraX),y=px(this.y),f=this.facingRight?1:-1;
    var bob=(this.animFrame===1||this.animFrame===3)?-1:0;
    var leg=(this.animFrame===1||this.animFrame===3);
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(x-1,y+11,10,2);
    ctx.fillStyle=PAL.straw;ctx.fillRect(x-2,y-2+bob,12,2);
    ctx.fillStyle=PAL.darkStraw;ctx.fillRect(x,y-4+bob,8,2);
    ctx.fillStyle='#4a3828';ctx.fillRect(x+2,y-3+bob,4,1);
    ctx.fillStyle=PAL.skin;ctx.fillRect(x+1,y+bob,6,3);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(f>0?x+5:x+2,y+1+bob,1,1);
    ctx.fillStyle=PAL.white;ctx.fillRect(x,y+3+bob,8,3);
    ctx.fillStyle='#c8c0b0';ctx.fillRect(x+3,y+3+bob,2,3);
    ctx.fillStyle=PAL.darkGold;ctx.fillRect(x,y+6+bob,8,1);
    ctx.fillStyle=PAL.gold;ctx.fillRect(x+3,y+5+bob,2,1);
    ctx.fillStyle='#d0c8b8';ctx.fillRect(x+1,y+7+bob,6,3);
    ctx.fillStyle='#a09888';ctx.fillRect(x+1,y+9+bob,1,1);ctx.fillRect(x+6,y+9+bob,1,1);
    ctx.fillStyle='#2a2420';
    if(leg){ctx.fillRect(x+1,y+10,2,2);ctx.fillRect(x+5,y+10,2,2);}
    else{ctx.fillRect(x+2,y+10,2,2);ctx.fillRect(x+4,y+10,2,2);}
    var sx=f>0?x+8:x-2;
    ctx.fillStyle='#b0b8c0';ctx.fillRect(sx,y-3+bob,1,11);
    ctx.fillStyle=PAL.darkGold;ctx.fillRect(sx-1,y+5+bob,3,1);
    ctx.fillStyle='#e0e8f0';ctx.fillRect(sx,y-3+bob,1,2);
    if(state.timeStopped&&state.isMoving){
        ctx.globalAlpha=0.2;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+1,y+bob,6,10);
        ctx.globalAlpha=0.08;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+(f>0?-3:5),y+bob,6,10);
        ctx.globalAlpha=1;
    }
};

function Enemy(x,y){
    Entity.call(this,x,y,8,12,PAL.cinnabar);
    this.shootCooldown=Math.random()*200+180;
    this.variant=Math.floor(Math.random()*3);
    this.alertTimer=0;this.marked=false;this.pushFlash=0;
    this.moveSpeed=0.3;this.moveTimer=Math.random()*80+40;
    var angle=Math.random()*Math.PI*2;
    this.dirX=Math.cos(angle);this.dirY=Math.sin(angle);
}
Enemy.prototype.update=function(){
    if(state.timeStopped){
        if(this.marked)return;
        if(!state.isMoving)return;

Enemy.prototype.drawPrediction=function(){

            }else{

function ShieldGuard(x, y, name, armorColor, isTall) {

    if (state.timeStopped) {

        return;
    }
    this.doPatrol();
};
ShieldGuard.prototype.doPatrol = function() {
    this.moveTimer--;
    if (this.moveTimer <= 0) {
        var a = Math.random() * Math.PI * 2;
        this.dirX = Math.cos(a);
        this.dirY = Math.sin(a);
        this.moveTimer = Math.random() * 100 + 50;
    }
    var nx = this.x + this.dirX * this.moveSpeed;
    var ny = this.y + this.dirY * this.moveSpeed;
    var blocked = false;
    state.covers.forEach(function(cv) {
        if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
    }.bind(this));
    if (!blocked) { this.x = nx; this.y = ny; }
    else {
        this.dirX = -this.dirX + (Math.random() - 0.5) * 0.5;
        this.dirY = -this.dirY + (Math.random() - 0.5) * 0.5;

};

function DyingEnemy(x,y,variant){

}
DyingEnemy.prototype.update=function(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=0.12;this.spinPhase+=0.3;this.life--;
    if(this.life%2===0){var col=this.variant===1?'rgba(100,100,120,1)':'rgba(145,34,34,1)';state.effects.push({x:this.x+Math.random()*this.w,y:this.y+Math.random()*this.h,vx:-this.vx*0.05+(Math.random()-0.5)*0.5,vy:-this.vy*0.05+(Math.random()-0.5)*0.5,life:12,maxLife:12,type:'dying-trail',color:col});}
};
DyingEnemy.prototype.draw=function(){

    ctx.globalAlpha=alpha;var col=this.variant===1?PAL.ninja:PAL.cinnabar;var colD=this.variant===1?PAL.ninjaDark:PAL.darkCinn;
    ctx.fillStyle=col;ctx.fillRect(x+wobble,y,this.w,this.h);ctx.fillStyle=colD;ctx.fillRect(x+wobble+2,y+2,this.w-4,this.h-4);
    ctx.fillStyle='#ff4444';ctx.fillRect(x+wobble+2,y+2,1,1);ctx.fillRect(x+wobble+5,y+2,1,1);ctx.globalAlpha=1;
};
DyingEnemy.prototype.isDead=function(){return this.life<=0;};

function Cover(x,y,w,h,side){this.x=x;this.y=y;this.w=w;this.h=h;this.side=side;}

function captureState(){
    if(stateHistory.length>REWIND_FRAMES+100)stateHistory=stateHistory.slice(-REWIND_FRAMES-50);
    stateHistory.push({
        px:state.player.x,py:state.player.y,fr:state.player.facingRight,
        enemies:state.enemies.map(function(e){return{x:e.x,y:e.y,marked:e.marked,sc:e.shootCooldown,dx:e.dirX,dy:e.dirY,mt:e.moveTimer,v:e.variant};}),
        pearls:state.pearls.map(function(p){return p.active;}),
        rw:state.rewindItem.active,
        ts:state.timeStopped,st:state.stopTimer
    });
}

function triggerRewind(){
    if(!hasRewind||stateHistory.length<REWIND_FRAMES){gameOver("相濡以沫，不如相忘于江湖。");return;}
    isRewinding=true;rewindIndex=stateHistory.length-1;hasRewind=false;
    stopDisplay.style.display='none';markHint.style.display='none';rewindDisplay.style.display='none';
}

function updateRewind(){
    rewindIndex-=REWIND_SPEED;
    var targetIdx=stateHistory.length-1-REWIND_FRAMES;
    if(rewindIndex<=targetIdx){
        rewindIndex=targetIdx;
        var snap=stateHistory[rewindIndex];
        restoreState(snap);
        stateHistory=stateHistory.slice(0,rewindIndex);
        isRewinding=false;
        state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    }
}

function restoreState(snap){
    state.player.x=snap.px;state.player.y=snap.py;state.player.facingRight=snap.fr;
    state.enemies=snap.enemies.map(function(e){var en=new Enemy(e.x,e.y);en.variant=e.v;en.marked=e.marked;en.shootCooldown=e.sc;en.dirX=e.dx;en.dirY=e.dy;en.moveTimer=e.mt;return en;});
    snap.pearls.forEach(function(a,i){if(i<state.pearls.length)state.pearls[i].active=a;});
    state.rewindItem.active=snap.rw;
    if(snap.rw){hasRewind=false;rewindDisplay.style.display='none';}
    state.timeStopped=snap.ts;state.stopTimer=snap.st;
    if(state.timeStopped){stopDisplay.style.display='block';updateStopUI();}else{stopDisplay.style.display='none';}
    state.projectiles=[];state.dyingEnemies=[];state.effects=[];state.running=true;
    msgScreen.style.display='none';
}

    state.enemies=state.enemies.filter(function(e){return !e.marked;});

            if(eff.r>120)state.effects.splice(i,1);

            var p=1-eff.life/eff.maxLife;var size=4+p*14;
            ctx.strokeStyle='rgba(100,200,255,'+((1-p)*0.8)+')';ctx.lineWidth=Math.max(0.5,2-p);
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX-size),px(eff.y-size));ctx.lineTo(px(eff.x-state.cameraX+size),px(eff.y+size));ctx.stroke();
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX+size),px(eff.y-size));ctx.lineTo(px(eff.x-state.cameraX-size),px(eff.y+size));ctx.stroke();
            ctx.strokeStyle='rgba(200,230,255,'+((1-p)*0.5)+')';ctx.lineWidth=1;
            var s2=size*0.6;
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX-s2),px(eff.y-s2));ctx.lineTo(px(eff.x-state.cameraX+s2),px(eff.y+s2));ctx.stroke();
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX+s2),px(eff.y-s2));ctx.lineTo(px(eff.x-state.cameraX-s2),px(eff.y+s2));ctx.stroke();
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='qi-ring'){
            eff.r+=2.5;var a=Math.max(0,1-eff.r/60);
            ctx.strokeStyle='rgba(80,180,255,'+(a*0.6)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(px(eff.x-state.cameraX),px(eff.y),eff.r,0,Math.PI*2);ctx.stroke();
            if(eff.r>60)state.effects.splice(i,1);
        }else if(eff.type==='qi-spark'){

            ctx.fillStyle='rgba(200,230,255,'+(a*0.3)+')';ctx.fillRect(px(eff.x-state.cameraX)+(eff.vx>0?1:-1),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(232,224,208,'+(1-p)+')';ctx.lineWidth=2-p;
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX-12),px(eff.y-12));ctx.lineTo(px(eff.x-state.cameraX+12),px(eff.y+12));ctx.stroke();
            if(eff.life===eff.maxLife-1)for(var j=0;j<4;j++)state.effects.push({x:eff.x+(Math.random()-0.5)*16,y:eff.y+(Math.random()-0.5)*16,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:8+Math.random()*6,maxLife:14,type:'spark'});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='launch-slash'){
            var p=1-eff.life/eff.maxLife;
            ctx.strokeStyle='rgba(255,240,200,'+(1-p)+')';ctx.lineWidth=3-p*2;
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX-18),px(eff.y-18));ctx.lineTo(px(eff.x-state.cameraX+18),px(eff.y+18));ctx.stroke();
            ctx.strokeStyle='rgba(255,180,80,'+((1-p)*0.7)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(px(eff.x-state.cameraX+18),px(eff.y-18));ctx.lineTo(px(eff.x-state.cameraX-18),px(eff.y+18));ctx.stroke();
            if(eff.life===eff.maxLife-1)for(var j=0;j<10;j++)state.effects.push({x:eff.x+(Math.random()-0.5)*24,y:eff.y+(Math.random()-0.5)*24,vx:(Math.random()-0.5)*3.5,vy:(Math.random()-0.5)*3.5,life:10+Math.random()*8,maxLife:18,type:'spark'});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='death-burst'){
            eff.particles.forEach(function(pt){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;var a=Math.max(0,eff.life/eff.maxLife);ctx.fillStyle=pt.color.replace('1)',a+')');ctx.fillRect(px(pt.x-state.cameraX),px(pt.y),1,1);});
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='spark'){
            eff.x+=eff.vx;eff.y+=eff.vy;eff.vx*=0.92;eff.vy*=0.92;
            ctx.fillStyle='rgba(255,220,120,'+Math.max(0,eff.life/eff.maxLife)+')';ctx.fillRect(px(eff.x-state.cameraX),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='pearl-spark'){
            ctx.fillStyle='rgba(0,204,204,'+(Math.max(0,eff.life/eff.maxLife)*0.5)+')';ctx.fillRect(px(eff.x-state.cameraX),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='flash'){
            ctx.fillStyle='rgba(200,240,240,'+(eff.life/eff.maxLife*0.3)+')';ctx.fillRect(0,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='rewind-flash'){
            var a=eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,180,255,'+(a*0.4)+')';ctx.fillRect(0,0,320,180);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='dying-trail'){
            ctx.fillStyle=eff.color.replace('1)',(Math.max(0,eff.life/eff.maxLife)*0.6)+')');ctx.fillRect(px(eff.x-state.cameraX),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='push-spark'){
            ctx.fillStyle='rgba(180,200,220,'+(Math.max(0,eff.life/eff.maxLife)*0.35)+')';ctx.fillRect(px(eff.x-state.cameraX),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='mark-flash'){
            ctx.fillStyle='rgba(255,30,30,'+(Math.max(0,eff.life/eff.maxLife)*0.4)+')';ctx.fillRect(px(eff.x-state.cameraX),px(eff.y),1,1);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }else if(eff.type==='shield-hit'){
            var p=1-eff.life/eff.maxLife;
            ctx.fillStyle='rgba(100,150,255,'+((1-p)*0.8)+')';
            ctx.fillRect(px(eff.x-state.cameraX-2),px(eff.y-3),6,1);
            ctx.fillRect(px(eff.x-state.cameraX-1),px(eff.y-2),4,4);
            ctx.fillStyle='rgba(150,200,255,'+((1-p)*0.5)+')';
            ctx.fillRect(px(eff.x-state.cameraX),px(eff.y-1),2,2);
            eff.life--;if(eff.life<=0)state.effects.splice(i,1);
        }
    }
}

function checkCollisions(){
    for(var ki=state.projectiles.length-1;ki>=0;ki--){
        var knife=state.projectiles[ki];if(!knife.alive)continue;
        if(knife.x<state.player.x+state.player.w&&knife.x+2>state.player.x&&knife.y<state.player.y+state.player.h&&knife.y+2>state.player.y){
            knife.alive=false;state.effects.push({life:6,maxLife:6,type:'flash'});triggerShake(3,8);
            if(hasRewind){triggerRewind();}
            else{gameOver("相濡以沫，不如相忘于江湖。");}return;
        }
        for(var ci=0;ci<state.covers.length;ci++){
            var c=state.covers[ci];
            if(knife.x<c.x+c.w&&knife.x+2>c.x&&knife.y<c.y+c.h&&knife.y+2>c.y){
                state.effects.push({x:knife.x,y:knife.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:6,maxLife:6,type:'spark'});
                for(var j=0;j<3;j++)state.effects.push({x:knife.x+(Math.random()-0.5)*4,y:knife.y+(Math.random()-0.5)*4,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:8,maxLife:8,type:'spark'});
                knife.alive=false;break;
            }
        }
    }
    for(var ei=state.enemies.length-1;ei>=0;ei--){
        var e=state.enemies[ei];
        var collW = e.w || 8;
        var collH = e.h || 12;
        var dist=Math.hypot(e.x+collW/2-(state.player.x+4),e.y+collH/2-(state.player.y+6));
        if(state.timeStopped){
            // 时间静止时不能标记ShieldGuard（除非盾牌已破）
            if(e instanceof ShieldGuard && !e.shieldBroken) continue;
            if(dist<MARK_RANGE&&!e.marked){
                e.marked=true;markHint.style.display='block';
                var qx=e.x+collW/2,qy=e.y+collH/2;
                state.effects.push({x:qx,y:qy,life:12,maxLife:12,type:'qi-slash'});
                state.effects.push({x:qx,y:qy,r:0,type:'qi-ring'});
                for(var j=0;j<8;j++){var angle=(j/8)*Math.PI*2;state.effects.push({x:qx,y:qy,vx:Math.cos(angle)*1.5,vy:Math.sin(angle)*1.5,life:15,maxLife:15,type:'qi-spark'});}
                for(var j=0;j<12;j++)state.effects.push({x:e.x+Math.random()*collW,y:e.y+Math.random()*collH,life:15,maxLife:15,type:'mark-flash'});
                triggerShake(1,4);
            }
        }else{
            if(dist<22){
                // 检查是否有障碍物阻挡（玩家无法隔着障碍物击杀敌人）
                var playerCenterX = state.player.x + 4;
                var playerCenterY = state.player.y + 6;
                var enemyCenterX = e.x + collW/2;
                var enemyCenterY = e.y + collH/2;
                
                if(!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)){
                    // 有障碍物阻挡，无法击杀
                    continue;
                }
                
                // 检查是否是ShieldGuard
                if(e instanceof ShieldGuard){
                    if(!e.shieldBroken){
                        // 盾牌还在，减少盾牌血量
                        e.shieldHP--;
                        e.hitFlash = 8;
                        triggerShake(3,6);
                        // 盾牌受击特效
                        state.effects.push({x:e.x-2,y:e.y+collH/2,life:10,maxLife:10,type:'shield-hit'});
                        for(var j=0;j<6;j++)state.effects.push({x:e.x-4+Math.random()*4,y:e.y+Math.random()*collH,vx:-1+Math.random()*0.5,vy:(Math.random()-0.5)*2,life:8,maxLife:8,type:'spark'});
                        if(e.shieldHP <= 0){
                            e.shieldBroken = true;
                            // 盾牌破碎特效
                            for(var j=0;j<12;j++)state.effects.push({x:e.x-4+Math.random()*6,y:e.y+Math.random()*collH,vx:-2+Math.random()*2,vy:(Math.random()-0.5)*3,life:12,maxLife:12,type:'spark'});
                            triggerShake(4,10);
                        }
                    }else{
                        // 盾牌已破，可以击杀
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:8,maxLife:8,type:'slash'});
                        var dc = e.armorColor === 'black' ? 
                            ['rgba(30,30,40,1)','rgba(20,20,30,1)','rgba(50,50,60,1)'] : 
                            ['rgba(200,200,190,1)','rgba(180,180,170,1)','rgba(220,220,210,1)'];
                        var pts=[];for(var j=0;j<12;j++)pts.push({x:e.x+collW/2+(Math.random()-0.5)*8,y:e.y+collH/2+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*3.5,vy:(Math.random()-0.5)*3.5-1,color:dc[j%dc.length]});
                        state.effects.push({particles:pts,life:20,maxLife:20,type:'death-burst'});
                        state.enemies.splice(ei,1);triggerShake(3,6);
                        // 检查吭哧二将是否都被击败
                        var guardsRemaining = state.enemies.filter(function(en){return en instanceof ShieldGuard;}).length;
                        if(guardsRemaining === 0) bossHint.style.display = 'none';
                        checkCheckpoints();
                        if(state.enemies.length===0)gameWin();
                    }
                }else{
                    // 普通敌人
                    state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                    var dc=e.variant===1?['rgba(100,100,110,1)','rgba(60,60,70,1)','rgba(140,140,150,1)']:['rgba(145,34,34,1)','rgba(96,21,21,1)','rgba(180,60,60,1)'];
                    var pts=[];for(var j=0;j<10;j++)pts.push({x:e.x+4+(Math.random()-0.5)*6,y:e.y+6+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3-1,color:dc[j%dc.length]});
                    state.effects.push({particles:pts,life:18,maxLife:18,type:'death-burst'});
                    state.enemies.splice(ei,1);triggerShake(2,5);
                    checkCheckpoints();
                    if(state.enemies.length===0)gameWin();
                }
            }
        }
    }
    for(var pi=0;pi<state.pearls.length;pi++){
        var p=state.pearls[pi];
        if(p.active&&Math.hypot(p.x-state.player.x,p.y-state.player.y)<20){p.active=false;triggerTimeStop();}
    }
    if(state.rewindItem.active&&Math.hypot(state.rewindItem.x-state.player.x,state.rewindItem.y-state.player.y)<20){
        state.rewindItem.active=false;hasRewind=true;rewindDisplay.style.display='block';
        for(var j=0;j<10;j++)state.effects.push({x:state.rewindItem.x+(Math.random()-0.5)*8,y:state.rewindItem.y+(Math.random()-0.5)*4,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:15,maxLife:15,type:'qi-spark'});
        state.effects.push({life:8,maxLife:8,type:'rewind-flash'});
    }
}

function checkCheckpoints(){
    var ae=state.enemies;
    if(ae.length===0){state.checkpoints[2].active=true;return;}
    if(ae.every(function(e){return e.x>=300;})&&!state.checkpoints[0].active){
        state.checkpoints[0].active=true;
        state.effects.push({x:300,y:90,life:15,maxLife:15,type:'qi-slash'});
        state.effects.push({x:300,y:90,r:0,type:'qi-ring'});
    }
    if(ae.every(function(e){return e.x>=750;})&&!state.checkpoints[1].active){
        state.checkpoints[1].active=true;
        state.effects.push({x:750,y:90,life:15,maxLife:15,type:'qi-slash'});
        state.effects.push({x:750,y:90,r:0,type:'qi-ring'});
    }
}

function triggerTimeStop(){
    state.timeStopped=true;
    state.stopStartTime=performance.now();
    state.stopTimer=STOP_DURATION;
    stopDisplay.style.display='block';markHint.style.display='none';
    state.effects.push({x:state.player.x+4,y:state.player.y+6,r:0,type:'wave'});
    state.effects.push({life:8,maxLife:8,type:'flash'});triggerShake(2,6);
}

function updateStopUI(){
    var secs=Math.ceil(state.stopTimer/1000);
    var pct=(state.stopTimer/STOP_DURATION)*100;
    stopSecondsEl.innerText=secs;stopBarEl.style.width=pct+'%';
    var progress=1-state.stopTimer/STOP_DURATION;
    var r=Math.floor(progress*220),g=Math.floor(204-progress*120),b=Math.floor(204-progress*140);
    stopSecondsEl.style.color='rgb('+r+','+g+','+b+')';stopBarEl.style.background='rgb('+r+','+g+','+b+')';
}

function gameOver(txt){state.running=false;msgText.innerText=txt;msgText.style.color=PAL.cinnabar;msgScreen.style.display='block';}
function gameWin(){state.running=false;msgText.innerText="事了拂衣去，深藏功与名。";msgText.style.color=PAL.gold;msgScreen.style.display='block';}

function gameLoop(currentTime){
    if(!state.running&&!isRewinding)return requestAnimationFrame(gameLoop);
    state.globalTick++;
    
    var deltaTime=currentTime-lastFrameTime;
    lastFrameTime=currentTime;

    if(isRewinding){
        updateRewind();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x,shake.y);ctx.clearRect(-10,-10,340,200);
        drawRewindFrame();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    state.player.update();
    captureState();

    /* 使用真实时间来更新时间静止效果 */
    if(state.timeStopped){
        var elapsed=performance.now()-state.stopStartTime;
        state.stopTimer=Math.max(0,STOP_DURATION-elapsed);
        updateStopUI();
        if(state.stopTimer<=0){
            state.timeStopped=false;stopDisplay.style.display='none';launchMarkedEnemies();
        }
    }

    state.enemies.forEach(function(e){e.update();});
    state.projectiles.forEach(function(k){k.update();});
    state.projectiles=state.projectiles.filter(function(k){return k.alive;});

    for(var di=state.dyingEnemies.length-1;di>=0;di--){
        state.dyingEnemies[di].update();
        if(state.dyingEnemies[di].isDead()){
            var de=state.dyingEnemies[di];
            var dc=de.variant===1?['rgba(100,100,110,1)','rgba(60,60,70,1)','rgba(160,160,180,1)']:['rgba(200,60,60,1)','rgba(145,34,34,1)','rgba(255,120,80,1)'];
            var pts=[];for(var j=0;j<14;j++)pts.push({x:de.x+de.w/2+(Math.random()-0.5)*8,y:de.y+de.h/2+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-1.5,color:dc[j%dc.length]});
            state.effects.push({particles:pts,life:22,maxLife:22,type:'death-burst'});triggerShake(2,4);
            state.dyingEnemies.splice(di,1);
            if(state.enemies.length===0&&state.dyingEnemies.length===0)setTimeout(function(){if(state.running)gameWin();},300);
        }
    }

    checkCollisions();updateShake();updateAmbient();

    ctx.save();ctx.translate(shake.x,shake.y);ctx.clearRect(-10,-10,340,200);
    var filterStr=getTimeStopFilter();
    if(filterStr!=='none')ctx.filter=filterStr;
    drawBackground();
    state.covers.forEach(function(c){c.draw();});
    drawAmbient();
    state.pearls.forEach(function(p){drawPearl(p);});
    drawRewindItemSprite();
    drawCheckpoints();
    state.projectiles.forEach(function(k){k.draw();});
    state.enemies.forEach(function(e){e.draw();});
    state.dyingEnemies.forEach(function(de){de.draw();});
    ctx.filter='none';
    drawEffects();
    state.player.draw();
    if(state.timeStopped)drawTimeStopOverlay();
    ctx.restore();
    enemyCounter.innerText=state.enemies.length;
    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',function(e){state.keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='r')init();});
window.addEventListener('keyup',function(e){state.keys[e.key.toLowerCase()]=false;});

init();requestAnimationFrame(gameLoop);
</script>
</body>
</html>
