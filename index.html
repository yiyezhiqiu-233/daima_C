        this.history = [];
        this.frameCounter = 0;
    }
};

// 通关倒放动画控制器
var JourneyCinematic = {
    active: false,
    frames: null,        // 倒放的帧序列
    frameIdx: 0,
    duration: 300,       // 5秒 = 300帧
    timer: 0,

    start: function() {
        if (JourneyRec.history.length < 10) {
            // 历史不足，直接进下一关
            this.skip();
            return;
        }
        hideMissionHint();
        // 采样生成5秒动画帧（300帧）
        var src = JourneyRec.history;
        var srcLen = src.length;
        this.frames = [];
        for (var i = 0; i < this.duration; i++) {
            // 从末尾往回映射到源数据
            var srcIdx = Math.floor((1 - i / this.duration) * (srcLen - 1));
            srcIdx = Math.max(0, Math.min(srcLen - 1, srcIdx));
            this.frames.push(src[srcIdx]);
        }
        this.frameIdx = 0;
        this.timer = 0;
        this.active = true;
        state.running = false;
        state.transitioning = true;
        SFX.rewindStart();
        SFX.startRewindLoop();
    },

    update: function() {
        if (!this.active) return;
        this.timer++;
        this.frameIdx++;
        if (this.timer >= this.duration) {
            this.finish();
        }
    },

    finish: function() {
        this.active = false;
        SFX.rewindEnd();
        JourneyRec.reset();
        LevelStartEffect.hide();
        state.lastCheckpoint = null;
        loadLevel(4);
        state.transitioning = false;
    },

    skip: function() {
        this.active = false;
        JourneyRec.reset();
        LevelStartEffect.hide();
        state.lastCheckpoint = null;
        loadLevel(4);
        state.transitioning = false;
    },

    getCurrentPos: function() {
        if (!this.frames || this.frames.length === 0) return null;
        var idx = Math.min(this.frameIdx, this.frames.length - 1);
        return this.frames[idx];
    },

    getProgress: function() {
        return Math.min(1, this.timer / this.duration);
    }
};

function updateL3Ghost() {
    if (state.currentLevel !== 3) return;

    for (var gi = 0; gi < L3Ghosts.length; gi++) {
        var g = L3Ghosts[gi];
        if (!g.active) continue;

        // 回放完毕后永久停留在原地，不再消失
        if (g.finished) continue;

        // 回放行动完成 → 永久停留在原地
        if (g.actionIndex >= g.totalActions) {
            g.finished = true;
            g.animFrame = 0;
            continue;
        }

        var act = g.actions[g.actionIndex];
        g.actionIndex++;

        // 直接使用录制位置
        var prevX = g.x, prevY = g.y;
        g.x = act.x;
        g.y = act.y;
        if (act.fr !== undefined) g.facingRight = act.fr;

        // 动画
        var dx = g.x - prevX, dy = g.y - prevY;
        var isMoving = (dx !== 0 || dy !== 0);
        if (isMoving) { g.animTimer++; if (g.animTimer % 6 === 0) g.animFrame = (g.animFrame + 1) % 4; }
        else { g.animFrame = 0; g.animTimer = 0; }

        var pcx = g.x + 4, pcy = g.y + 6;

        // 替身触发机关
        if (L3Trap.active && L3Trap.isOpen && !g.triggerTrap) {
            if (pcx >= L3Trap.x && pcx <= L3Trap.x + L3Trap.w && pcy > 90 && pcy < 124) {
                g.triggerTrap = true;
                g.fadeOut = true;
                g.fadeTimer = 0;
                triggerShake(3, 10);
                for (var bi = 0; bi < 8; bi++) {
                    state.effects.push({
                        x: g.x + 4 + (Math.random() - 0.5) * 8,
                        y: g.y + 6 + (Math.random() - 0.5) * 8,
                        vx: (Math.random() - 0.5) * 2,
                        vy: -Math.random() * 2 - 0.5,
                        life: 18 + Math.floor(Math.random() * 10),
                        maxLife: 28,
                        type: 'ghost-fade'
                    });
                }
            }
        }

        // 替身击杀敌人（替身撞击敌人与玩家撞击效果一致）
        for (var gei = state.enemies.length - 1; gei >= 0; gei--) {
            var ge = state.enemies[gei];
            var gCollW = ge.w || 8;
            var gCollH = ge.h || 12;
            var gDist = Math.hypot(ge.x + gCollW/2 - pcx, ge.y + gCollH/2 - pcy);
            if (gDist < 22) {
                if (hasLineOfSight(pcx, pcy, ge.x + gCollW/2, ge.y + gCollH/2)) {
                    state.effects.push({x: ge.x + 4, y: ge.y + 6, life: 8, maxLife: 8, type: 'slash'});
                    state.enemies.splice(gei, 1);
                    triggerShake(2, 5);
                    for (var gk = 0; gk < 4; gk++) {
                        state.effects.push({
                            x: pcx + (Math.random() - 0.5) * 6,
                            y: pcy + (Math.random() - 0.5) * 6,
                            vx: (Math.random() - 0.5) * 1.2,
                            vy: (Math.random() - 0.5) * 1.2,
                            life: 10 + Math.floor(Math.random() * 8),
                            maxLife: 18,
                            type: 'ghost-slash'
                        });
                    }
                }
            }
        }

        // 替身检查点激活
        var level = LEVELS[state.currentLevel - 1];
        if (level.checkpoint && !g.triggerTrap) {
            var dist = Math.hypot(level.checkpoint.x - pcx, level.checkpoint.y - pcy);
            if (dist < 15) {
                if (!state.lastCheckpoint || state.lastCheckpoint.x !== level.checkpoint.x) {
                    state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
                    state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
                }
            }
        }
    }
}

var L3RewindAnim = {
    active: false,
    frames: null,      // 倒放的帧序列（从死亡位置回溯到目标位置）
    frames2: null,     // 双人模式：玩家2的倒退帧序列
    frameIdx: 0,
    speed: 6,          // 每帧跳过6个录制帧（约6倍速倒退）
    // 回溯完成后要执行的数据（在动画结束时应用）
    pendingGhostX: 0, pendingGhostY: 0, pendingGhostFacing: true,
    pendingGhostActions: null,
    pendingHistIdx: 0,

    start: function(ghostX, ghostY, ghostFacing, ghostActions, histIdx, rewoundFrames) {
        // 收集倒退帧：从当前录制历史的末尾往前取
        this.frames = L3ActionRec.history.slice(0, rewoundFrames).reverse();
        // 双人模式：同时构建玩家2的倒退帧
        if (gameMode === 'dual' && state.player2 && L3ActionRec.history.length > 0) {
            this.frames2 = [];
            for (var fi = 0; fi < this.frames.length; fi++) {
                var fr = this.frames[fi];
                this.frames2.push({ x: fr.p2x || state.player2.x, y: fr.p2y || state.player2.y, fr: fr.p2fr !== undefined ? fr.p2fr : true });
            }
        } else {
            this.frames2 = null;
        }
        this.frameIdx = 0;
        this.speed = Math.max(3, Math.ceil(rewoundFrames / 60)); // 约1秒内完成倒退
        // 保存回溯完成后需要的数据
        this.pendingGhostX = ghostX;
        this.pendingGhostY = ghostY;
        this.pendingGhostFacing = ghostFacing;
        this.pendingGhostActions = ghostActions;
        this.pendingHistIdx = histIdx;
        this.active = true;
        // 暂停游戏逻辑
        state.running = false;
    },

    update: function() {
        if (!this.active) return;
        this.frameIdx += this.speed;
        // 每隔几帧释放一个回溯粒子特效（玩家1）
        if (this.frameIdx % (this.speed * 4) < this.speed) {
            if (this.frameIdx < this.frames.length) {
                var f = this.frames[Math.min(this.frameIdx, this.frames.length - 1)];
                state.effects.push({
                    x: f.x + 4 + (Math.random() - 0.5) * 6,
                    y: f.y + 6 + (Math.random() - 0.5) * 6,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: -Math.random() * 0.8 - 0.2,
                    life: 12, maxLife: 12,
                    type: 'rewind-particle'
                });
            }
            // 双人模式：玩家2也释放粒子
            if (this.frames2 && this.frameIdx < this.frames2.length) {
                var f2 = this.frames2[Math.min(this.frameIdx, this.frames2.length - 1)];
                state.effects.push({
                    x: f2.x + 4 + (Math.random() - 0.5) * 6,
                    y: f2.y + 6 + (Math.random() - 0.5) * 6,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: -Math.random() * 0.8 - 0.2,
                    life: 12, maxLife: 12,
                    type: 'rewind-particle'
                });
            }
        }
        // 倒退完成
        if (this.frameIdx >= this.frames.length) {
            this.finish();
        }
    },

    finish: function() {
        this.active = false;
        SFX.rewindEnd();
        // 应用回溯结果
        finishL3Rewind(this.pendingGhostX, this.pendingGhostY, this.pendingGhostFacing,
                       this.pendingGhostActions, this.pendingHistIdx);
    },

    getCurrentPos: function() {
        if (!this.frames || this.frames.length === 0) return null;
        var idx = Math.min(this.frameIdx, this.frames.length - 1);
        return this.frames[idx];
    },

    // 获取玩家2当前倒退帧位置
    getP2Pos: function() {
        if (!this.frames2 || this.frames2.length === 0) return null;
        var idx = Math.min(this.frameIdx, this.frames2.length - 1);
        return this.frames2[idx];
    }
};

function finishL3Rewind(ghostX, ghostY, ghostFacing, ghostActions, histIdx) {
    // 累计8次死亡：清除所有替身，重新开始关卡
    if (l3DeathCount >= l3MaxDeaths) {
        hasRewind = false; rewindDisplay.style.display = 'none';
        L3Ghosts = []; l3DeathCount = 0;
        L3ActionRec.reset(); if (gameMode === 'dual') L3ActionRec2.reset();
        L3RewindAnim.active = false;
        l3DarkPreserve = false;
        loadLevel(state.currentLevel);
        return;
    }

    // 从stateHistory恢复对应时间点的完整世界状态（敌人、陷阱等）
    if (histIdx >= 0 && histIdx < stateHistory.length) {
        var snap = stateHistory[histIdx];
        if (snap.enemies) {
            state.enemies = snap.enemies.map(function(e) {
                var en;
                if (e.et === 'JavelinEnemy') {
                    en = new JavelinEnemy(e.x, e.y, e.px1, e.px2, e.py);
                    en.throwCooldown = e.tc || 0;
                    en.patrolDir = e.pd !== undefined ? e.pd : 1;
                } else if (e.shieldHP !== undefined) {
                    en = new ShieldGuard(e.x, e.y, '', 'black', true);
                    en.shieldHP = e.shieldHP;
                    en.shieldBroken = e.shieldBroken;
                } else {
                    en = new Enemy(e.x, e.y);
                    en.variant = e.v;
                }
                en.marked = e.marked; en.shootCooldown = e.sc;
                en.dirX = e.dx; en.dirY = e.dy; en.moveTimer = e.mt;
                if(e.bc !== undefined) en.burstCount = e.bc;
                if(e.ar !== undefined) en.attackRange = e.ar;
                return en;
            });
        }
        if (snap.trap) {
            L3Trap.timer = snap.trap.t;
            L3Trap.isOpen = snap.trap.io;
            L3Trap.openProgress = snap.trap.op;
            L3Trap.firstApproach = snap.trap.fa;
            L3Trap.playerFalling = false;
            L3Trap.fallTimer = 0;
        }
        if (snap.pearls) snap.pearls.forEach(function(a, i) { if (i < state.pearls.length) state.pearls[i].active = a; });
        stateHistory = stateHistory.slice(0, histIdx);
    }

    // 玩家回到目标位置
    state.player.x = ghostX;
    state.player.y = ghostY;
    state.player.facingRight = ghostFacing;
    state.player.attackAnim = 0;
    // 双人模式：玩家2也回到回溯前的位置
    if (gameMode === 'dual' && state.player2) {
        var p2Snap = L3RewindAnim.frames2 && L3RewindAnim.frames2.length > 0
            ? L3RewindAnim.frames2[L3RewindAnim.frames2.length - 1] : null;
        if (p2Snap) {
            state.player2.x = p2Snap.x;
            state.player2.y = p2Snap.y;
            state.player2.facingRight = p2Snap.fr;
        }
        state.player2.attackAnim = 0;
    }
    state.projectiles = [];
    state.timeStopped = false;
    state.stopTimer = 0;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    state.running = true;
    hasRewind = true;
    var remaining = l3MaxDeaths - l3DeathCount;
    rewindDisplay.innerHTML = '【时间回溯】×' + remaining;
    rewindDisplay.style.display = 'block';
    msgScreen.style.display = 'none';

    state.effects.push({life:15,maxLife:15,type:'rewind-flash'});
    triggerShake(3, 10);
}

function drawFlame(x, y, seed) {
    var flicker = Math.sin(seed * 0.2) * 1.5;
    var flicker2 = Math.cos(seed * 0.15) * 1;

    ctx.fillStyle='#ff6622';

        ctx.fillStyle='#ffcc44';

}

// 将颜色向血红色混合
function bloodBlend(hex, ratio) {
    if (!ratio || ratio <= 0) return hex;
    if (ratio >= 1) ratio = 1;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    // 目标血色：深暗红
    var br = 110, bg = 10, bb = 10;
    var nr = Math.round(r + (br - r) * ratio);
    var ng = Math.round(g + (bg - g) * ratio);
    var nb = Math.round(b + (bb - b) * ratio);
    return '#' + ((1<<24)+(nr<<16)+(ng<<8)+nb).toString(16).slice(1);
}

var bloodDrips = [];
function updateBloodDrips() {
    if (state.bloodLevel <= 0) {
        bloodDrips = [];
        return;
    }
    // 按照血迹等级概率生成新血滴
    if (state.isMoving && Math.random() < state.bloodLevel * 0.3) {
        bloodDrips.push({
            x: state.player.x + Math.random()*8,
            y: state.player.y + 10 + Math.random()*2,
            vy: 0.15 + Math.random()*0.2,
            life: 25 + Math.floor(Math.random()*15),
            maxLife: 40

    }
    // 更新现有血滴
    for (var i = bloodDrips.length - 1; i >= 0; i--) {
        bloodDrips[i].y += bloodDrips[i].vy;
        bloodDrips[i].life--;
        if (bloodDrips[i].life <= 0) {
            bloodDrips.splice(i, 1);
        }
    }
}
function drawBloodDrips() {
    for (var i = 0; i < bloodDrips.length; i++) {
        var d = bloodDrips[i];
        var alpha = Math.max(0, d.life / d.maxLife) * 0.7;
        ctx.fillStyle = 'rgba(160,15,15,' + alpha + ')';
        ctx.fillRect(px(d.x), px(d.y), 1, 1);

}

Player.prototype.update=function(timeFactor){
    this.speed=state.timeStopped?PLAYER_SPEED_STOP:PLAYER_SPEED_NORMAL;
    if(this.attackAnim>0) this.attackAnim--;
    // 第四关：雪地减速区域（深雪/泥泞地带）
    if(state.currentLevel===4 && state.slowZones && !state.timeStopped){
        var pcx=this.x+this.w/2, pcy=this.y+this.h/2;
        for(var si=0;si<state.slowZones.length;si++){
            var sz=state.slowZones[si];
            if(pcx>sz.x && pcx<sz.x+sz.w && pcy>sz.y && pcy<sz.y+sz.h){
                this.speed*=0.55;
                break;
            }
        }
    }
    this.vx=0;this.vy=0;
    if(this.keys['w'])this.vy=-this.speed*timeFactor;
    if(this.keys['s'])this.vy=this.speed*timeFactor;
    if(this.keys['a']){this.vx=-this.speed*timeFactor;this.facingRight=false;}
    if(this.keys['d']){this.vx=this.speed*timeFactor;this.facingRight=true;}
    var nx=this.x+this.vx,ny=this.y+this.vy;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    // 石门碰撞检测（第二关，升降石门从上方降下）
    if(!blocked && StoneDoor.active){
        var sdRects=StoneDoor.getCollisionRects();
        if(sdRects){
            for(var si=0;si<sdRects.length;si++){
                var sr=sdRects[si];
                if(nx<sr.x+sr.w&&nx+this.w>sr.x&&ny<sr.y+sr.h&&ny+this.h>sr.y){
                    blocked=true;break;
                }
            }
        }
    }
    // 密室石门碰撞检测（第二关，累积3次死亡后打开）
    if(!blocked && L2SecretDoor.active){
        var secretRects=L2SecretDoor.getCollisionRects();
        if(secretRects){
            for(var ssi=0;ssi<secretRects.length;ssi++){
                var ssr=secretRects[ssi];
                if(nx<ssr.x+ssr.w&&nx+this.w>ssr.x&&ny<ssr.y+ssr.h&&ny+this.h>ssr.y){
                    blocked=true;break;

    if(!blocked){

        if(br && nx<br.x+br.w&&nx+this.w>br.x&&ny<br.y+br.h&&ny+this.h>br.y){

        }
    }
    if(!blocked){this.x=nx;this.y=ny;}
    
    // 关卡边界限制（考虑隔断墙）
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x=Math.max(10, Math.min(maxX - this.w, this.x));
    // 第二关：小密室区域和甬道区域使用独立边界
    if (state.currentLevel === 2) {
        var srLeft = 1065, srRight = 1115, srEntryLeft = 1068, srEntryRight = 1096;
        var inRoomArea = (this.x + this.w > srLeft && this.x < srRight);
        var inEntryArea = (this.x + this.w > srEntryLeft && this.x < srEntryRight);
        if (inRoomArea || inEntryArea) {
            this.y = Math.max(8, Math.min(level.tunnelBot - this.h, this.y));
        } else if (this.x + this.w > 940 && this.x < 1060) {
            // 甬道区域（x:940~1060）：边界从正常暗道收窄到甬道宽度
            var corridorTop = 65, corridorBot = 115;
            if (this.x + this.w <= 960) {
                // 过渡区（x:940~960）：线性插值
                var ratio = (this.x + this.w - 940) / 20;
                var dynTop = Math.floor(level.tunnelTop + (corridorTop - level.tunnelTop) * ratio);
                var dynBot = Math.floor(level.tunnelBot - (level.tunnelBot - corridorBot) * ratio);
                this.y = Math.max(dynTop, Math.min(dynBot - this.h, this.y));
            } else {
                // 甬道本段（x:960~1060）
                this.y = Math.max(corridorTop, Math.min(corridorBot - this.h, this.y));
            }
        } else {
            this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
        }
    } else {
        this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
    }
    
    // 第二关：圆形房间边界（左侧区域时，限制在圆内，但门口缺口除外）
    if (state.currentLevel === 2 && this.x + this.w/2 < 230) {
        var rcx = 140, rcy = 90, R = 86;
        var pcx = this.x + this.w/2, pcy = this.y + this.h/2;
        // 门口缺口区域（x>195 且 y在通道范围内）不受圆形边界限制
        if (pcx > 195 && pcy > 52 && pcy < 128) {
            // 在门口通道内，不应用圆形边界
        } else {
            var distFromCenter = Math.hypot(pcx - rcx, pcy - rcy);
            if (distFromCenter + 6 > R) {
                var ang = Math.atan2(pcy - rcy, pcx - rcx);
                this.x = rcx + Math.cos(ang) * (R - 6) - this.w/2;
                this.y = rcy + Math.sin(ang) * (R - 6) - this.h/2;
            }
        }
    }
    
    // 第三关：圆形重生房间 + 上下暗道边界
    if (state.currentLevel === 3) {
        var pcx = this.x + this.w/2, pcy = this.y + this.h/2;
        
        // 圆形房间区域（x < 118）
        if (pcx < 118) {
            var rcx = 68, rcy = 90, R = 48;
            // 门口缺口（右侧，y在48~132之间）
            if (pcx > 100 && pcy > 48 && pcy < 132) {
                // 在门口通道内，不应用圆形边界
            } else {
                var distFromCenter = Math.hypot(pcx - rcx, pcy - rcy);
                if (distFromCenter + 5 > R) {
                    var ang = Math.atan2(pcy - rcy, pcx - rcx);
                    this.x = rcx + Math.cos(ang) * (R - 5) - this.w/2;
                    this.y = rcy + Math.sin(ang) * (R - 5) - this.h/2;
                }
            }
        }
        
        // 岔路口区域（x: 118~178）
        if (pcx >= 118 && pcx < 178) {
            this.y = Math.max(36, Math.min(122 - this.h, this.y));
        }
        
        // 暗道区域（x >= 178）
        if (pcx >= 178) {
            if (pcy <= 76) {
                // 上方暗道1（压缩高度，勉强通过一个身位）
                this.y = Math.max(38, Math.min(40, this.y));
            } else {
                // 下方暗道2
                // 机关打开且玩家在机关上方时不限制y，让L3Trap.update触发掉落
                if (L3Trap.isOpen && pcx >= L3Trap.x && pcx <= L3Trap.x + L3Trap.w) {
                    // 不夹紧y，等待L3Trap.update检测并触发掉落
                } else {
                    this.y = Math.max(108, Math.min(110, this.y));
                }
            }
            // 不能从上方暗道直接移到下方暗道（通过分隔墙）
            // 限制x方向不超过右侧边界
            this.x = Math.min(778 - this.w, this.x);
        }
        
        // 整体x边界
        this.x = Math.max(10, this.x);
    }
    state.isMoving=(this.vx!==0||this.vy!==0);
    if(state.isMoving){this.animTimer++;if(this.animTimer%6===0)this.animFrame=(this.animFrame+1)%4;}
    else{this.animFrame=0;this.animTimer=0;}
};
Player.prototype.draw=function(){

    ctx.fillStyle=bl ? bloodBlend('#c8c0b0', bl) : '#c8c0b0';ctx.fillRect(x+3,y+3+bob,2,3);

    ctx.fillStyle=bl ? bloodBlend('#a09888', bl) : '#a09888';ctx.fillRect(x+1,y+9+bob,1,1);ctx.fillRect(x+6,y+9+bob,1,1);

    var guardColor = bl ? bloodBlend(PAL.darkGold, bl * 0.3) : PAL.darkGold;
    var tipColor = bl ? bloodBlend('#e0e8f0', bl * 0.3) : '#e0e8f0';
    var sheathColor = bl ? bloodBlend('#5a4a2a', bl * 0.3) : '#5a4a2a';
    // 斜挎角度（弧度）：面向右时从垂直顺时针旋转约30度，面朝左时镜像
    var SHEATH_ANGLE = f > 0 ? 0.52 : -0.52; // ~30度
    var SHEATH_COS = Math.cos(SHEATH_ANGLE), SHEATH_SIN = Math.sin(SHEATH_ANGLE);
    // 剑鞘枢轴点（腰带处）
    var sheathPivotX = x + 5, sheathPivotY = y + 6 + bob;

    if(this.attackAnim > 0){
        // === 拔剑挥砍收剑完整动画 ===

        var dur = isSpecial ? ATTACK_ANIM_SPECIAL : ATTACK_ANIM_DUR;
        var progress = 1 - this.attackAnim / dur; // 0(刚触发) → 1(结束)
        var maxAngle = isSpecial ? ATTACK_MAX_ANGLE * 1.4 : ATTACK_MAX_ANGLE; // 特殊：挥砍角度更大
        var swingT, showBlade, showSheath;
        if(progress < 0.1){

        }else if(progress < 0.3){

            swingT = swingP * swingP * (3 - 2 * swingP); // smoothstep
            showBlade = 1;

        }else if(isSpecial && progress < 0.45){
            // 阶段3（特殊）：剑甩飞出去（继续向前延伸+旋转）
            var throwP = (progress - 0.3) / 0.15;
            swingT = 1 + throwP * 0.6; // 超过最大角度，继续甩
            showBlade = 1;
            showSheath = false;
        }else if(isSpecial && progress < 0.55){
            // 阶段4（特殊）：剑飞到最远处短暂悬停
            swingT = 1.6;
            showBlade = 1;
            showSheath = false;
        }else if(!isSpecial && progress < 0.5){
            // 阶段3（普通）：保持
            swingT = 1;
            showBlade = 1;
            showSheath = false;
        }else if(isSpecial && progress < 0.85){
            // 阶段5（特殊）：剑急速回收（弹性效果）
            var retP = (progress - 0.55) / 0.3;
            // 弹性缓动：快速回弹并轻微过冲
            if(retP < 0.7){

            }else{

        }else if(!isSpecial && progress < 0.85){
            // 阶段4（普通）：收剑

        }

        if(showBlade > 0){
            // 绘制拔出/挥砍中的剑
            var dir = f;
            var pivotX = sheathPivotX, pivotY = sheathPivotY;
            var theta = angle * dir;
            var cosT = Math.cos(theta), sinT = Math.sin(theta);

            function rotPx(dx, dy) {

                        Math.round(pivotY + dx * sinT + dy * cosT)];
            }
            // 剑刃长度（特殊攻击时剑"甩飞"，视觉上更长）
            var baseBladeLen = isSpecial ? 12 : 8;
            var bladeLen = Math.ceil(showBlade * baseBladeLen) + 1;

            ctx.fillStyle = bladeColor;
            for(var bi = bladeStart; bi <= 1; bi++) {

            ctx.fillStyle = isSpecial ? '#ffe880' : tipColor; // 特殊攻击剑尖金色
            for(var ti = bladeStart; ti <= bladeStart + 2; ti++) {

                    ? (progress - arcStart) / ((arcEnd - arcStart) / 2)
                    : (arcEnd - progress) / ((arcEnd - arcStart) / 2);
                ctx.globalAlpha = Math.min(arcFade * (isSpecial ? 0.7 : 0.5), isSpecial ? 0.7 : 0.5);
                ctx.fillStyle = isSpecial ? '#ffd780' : '#c0d8ff'; // 特殊：金色弧线
                var arcCount = isSpecial ? 12 : 8;
                for(var ai = 0; ai < arcCount; ai++) {
                    var arcAng = (ai / (arcCount - 1)) * angle * dir;
                    var ac2 = Math.cos(arcAng), as3 = Math.sin(arcAng);
                    var trailLen = isSpecial ? baseBladeLen + 2 : 7;
                    var ax3 = Math.round(pivotX + 0 * ac2 - (-trailLen) * as3);
                    var ay3 = Math.round(pivotY + 0 * as3 + (-trailLen) * ac2);
                    ctx.fillRect(ax3, ay3, 1, 1);
                    if(isSpecial){
                        // 特殊：额外的宽弧线
                        var ax4 = Math.round(pivotX + 0 * ac2 - (-trailLen + 3) * as3);
                        var ay4 = Math.round(pivotY + 0 * as3 + (-trailLen + 3) * ac2);
                        ctx.fillRect(ax4, ay4, 1, 1);
                    }
                }
                ctx.globalAlpha = 1;
            }
        }
    }else{
        // === 静止状态：剑斜挎在腰间 ===
        // 剑鞘（深色长条，斜跨腰间）
        ctx.fillStyle = sheathColor;
        for(var si = -7; si <= 2; si++){
            var sdx = 0 * SHEATH_COS - si * SHEATH_SIN;
            var sdy = 0 * SHEATH_SIN + si * SHEATH_COS;
            ctx.fillRect(Math.round(sheathPivotX + sdx), Math.round(sheathPivotY + sdy), 1, 1);
        }
        // 剑柄露出部分（从鞘口伸出的一小截）
        ctx.fillStyle = guardColor;
        var hx = Math.round(sheathPivotX + 0 * SHEATH_COS - 2 * SHEATH_SIN);
        var hy = Math.round(sheathPivotY + 0 * SHEATH_SIN + 2 * SHEATH_COS);

        var hx2 = Math.round(sheathPivotX + 0 * SHEATH_COS - 3 * SHEATH_SIN);
        var hy2 = Math.round(sheathPivotY + 0 * SHEATH_SIN + 3 * SHEATH_COS);
        ctx.fillStyle = '#8a6a3a';
        ctx.fillRect(hx2, hy2, 1, 1);
        // 鞘口金属环
        ctx.fillStyle = guardColor;
        var smx = Math.round(sheathPivotX + 0 * SHEATH_COS - (-7) * SHEATH_SIN);
        var smy = Math.round(sheathPivotY + 0 * SHEATH_SIN + (-7) * SHEATH_COS);
        ctx.fillRect(smx, smy, 1, 1);
        ctx.fillRect(smx + (SHEATH_SIN > 0 ? 1 : -1), smy, 1, 1);
    }
    
    // 第二关：血迹斑驳效果（在衣服上随机位置绘制血斑点）
    if (bl > 0) {
        // 使用确定性随机种子保证血斑位置稳定
        var seed = state.l2KilledEnemies * 7;
        var spotCount = Math.floor(bl * 8); // 最多8个血斑
        for (var si = 0; si < spotCount; si++) {

            ctx.fillRect(spx, spy, 1, 1);

                ctx.fillStyle = 'rgba(120,10,10,' + (0.3 + bl * 0.3) + ')';
                ctx.fillRect(spx + 1, spy, 1, 1);

        }
    }
    
    if(state.timeStopped&&state.isMoving){
        ctx.globalAlpha=0.2;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+1,y+bob,6,10);
        ctx.globalAlpha=0.08;ctx.fillStyle=PAL.pearl;ctx.fillRect(x+(f>0?-3:5),y+bob,6,10);

    }
    
    // 第二关：绘制血滴效果

};

    this.moveTimer--;

    var nx=this.x+this.dirX*this.moveSpeed*timeFactor,ny=this.y+this.dirY*this.moveSpeed*timeFactor;
    var blocked=false;
    state.covers.forEach(function(cv){if(nx<cv.x+cv.w&&nx+this.w>cv.x&&ny<cv.y+cv.h&&ny+this.h>cv.y)blocked=true;}.bind(this));
    if(!blocked){this.x=nx;this.y=ny;}
    else{this.dirX=-this.dirX+(Math.random()-0.5)*0.5;this.dirY=-this.dirY+(Math.random()-0.5)*0.5;var len=Math.hypot(this.dirX,this.dirY)||1;this.dirX/=len;this.dirY/=len;this.moveTimer=Math.random()*40+20;}

Enemy.prototype.doPushBack=function(timeFactor){
    var tp=getNearestPlayer(this.x+4,this.y+6);
    var dx=this.x+4-(tp.x+4),dy=this.y+6-(tp.y+6);
    var dist=Math.hypot(dx,dy)||1;
    if(dist<PUSH_RANGE){var force=PUSH_FORCE*(1-dist/PUSH_RANGE)*timeFactor;this.x+=(dx/dist)*force;this.y+=(dy/dist)*force;this.clampBounds();this.pushFlash=4;if(state.globalTick%3===0)state.effects.push({x:this.x+Math.random()*8,y:this.y+Math.random()*12,life:10,maxLife:10,type:'push-spark'});}
};
Enemy.prototype.doShooting=function(){
    this.shootCooldown--;

        var tp=getNearestPlayer(this.x,this.y);
        var dx = tp.x - this.x;
        var dy = tp.y - this.y;
        var dist = Math.hypot(dx, dy);
        
        // 第三关兜底：偷偷降低反应速度（缩短攻击范围+延长冷却）
        var nerfRange = (state.currentLevel === 3 && l3EnemyReactionNerfed) ? 0.6 : 1;
        var nerfCooldown = (state.currentLevel === 3 && l3EnemyReactionNerfed) ? 1.8 : 1;
        
        if(dist <= this.attackRange * nerfRange){
            this.shootKnife();
            this.burstCount++;
        }
        // 第三关：连射2次后长间隔，其他关正常冷却
        if (state.currentLevel === 3) {
            if (this.burstCount >= this.burstMax) {
                this.shootCooldown = (this.longCooldown + Math.floor(Math.random() * 40)) * nerfCooldown;

                this.shootCooldown = this.burstCooldown * nerfCooldown;

Enemy.prototype.clampBounds=function(){
    var level = LEVELS[state.currentLevel - 1];

Enemy.prototype.drawPrediction=function(){

function FastPatrolEnemy(x, y, patrolX1, patrolX2, patrolY) {

    this.dirX = 1;
    this.dirY = 0;
    this.knifeInitSpd = 1.8;
    this.knifeAccel = 0.06;
    this.knifeMaxSpd = 5.5;
    this.kniveCount = 3;
    this.knifeSpread = 0.25;
    this.burstCount = 0;        // 连续射击计数

}
FastPatrolEnemy.prototype = Object.create(Enemy.prototype);
FastPatrolEnemy.prototype.constructor = FastPatrolEnemy;

FastPatrolEnemy.prototype.doPatrol = function() {
    var targetX = this.patrolDir > 0 ? this.patrolX2 : this.patrolX1;
    this.dirX = this.patrolDir;
    this.dirY = 0;
    
    var nx = this.x + this.dirX * this.moveSpeed;
    if (nx >= this.patrolX2) {
        this.patrolDir = -1;
        nx = this.patrolX2;
    } else if (nx <= this.patrolX1) {
        this.patrolDir = 1;
        nx = this.patrolX1;
    }
    
    var ny = this.patrolY;
    var blocked = false;
    state.covers.forEach(function(cv) {
        if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
    }.bind(this));
    
    if (!blocked) {
        this.x = nx;
        this.y = ny;
    } else {
        this.patrolDir = -this.patrolDir;
    }
    this.clampBounds();
};

FastPatrolEnemy.prototype.doShooting = function() {
    this.shootCooldown--;
    if (this.shootCooldown <= 0) {
        var tp=getNearestPlayer(this.x,this.y);
        var dx = tp.x - this.x;
        var dy = tp.y - this.y;

        if (dist <= ATTACK_RANGE) {
            this.shootKnife();
            this.burstCount++;
            // 连续发射burstMax次后，强制冷却
            if (this.burstCount >= this.burstMax) {
                this.shootCooldown = this.burstCooldown;

            this.shootCooldown = Math.random() * 30 + 20;
        }
    }
    this.alertTimer = 0;
};

FastPatrolEnemy.prototype.shootKnife = function() {
    var tp=getNearestPlayer(this.x,this.y);
    var dx = tp.x - this.x;
    var dy = tp.y - this.y;
    var baseAngle = Math.atan2(dy, dx);
    var count = this.kniveCount;
    var spread = this.knifeSpread;
    for (var i = 0; i < count; i++) {
        var offsetAngle = (i - (count - 1) / 2) * spread;
        var angle = baseAngle + offsetAngle;
        var knife = new Knife(this.x + 4, this.y + 4, Math.cos(angle), Math.sin(angle));
        knife.speed = this.knifeInitSpd;
        knife.customAccel = this.knifeAccel;
        knife.customMaxSpd = this.knifeMaxSpd;
        knife.ownerType = 'multi';
        state.projectiles.push(knife);
    }
};

// 始终盾牌面向玩家，不发射飞刀，只能从背面击杀
function ShieldDefender(x, y, name, armorColor, isTall) {
    Entity.call(this, x, y, isTall ? 10 : 8, isTall ? 16 : 12, armorColor);
    this.name = name;
    this.armorColor = armorColor;
    this.isTall = isTall;
    this.marked = false;
    this.pushFlash = 0;
    this.hitFlash = 0;
    // 盾牌始终朝向左边（-1=盾在右边，面向左，挡住左侧攻击）
    this.shieldDir = -1;
    this.moveSpeed = 0.15;
    // 寻找搭档的引用
    this.partner = null;
}
ShieldDefender.prototype = Object.create(Enemy.prototype);
ShieldDefender.prototype.constructor = ShieldDefender;

ShieldDefender.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;
    if (state.timeStopped) {
        if (this.marked) return;
        // 时间静止时不做任何事（不发射飞刀）
        return;
    }
    
    // 盾牌始终朝向左边
    this.shieldDir = -1;
    
    // 主动靠近玩家
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    // 与玩家保持一定距离
    var approachSpeed = 0.3;
    if (dist > 40) {
        var moveX = (dx / dist) * approachSpeed;
        var moveY = (dy / dist) * approachSpeed * 0.6; // 垂直移动稍慢
        
        var nx = this.x + moveX;
        var ny = this.y + moveY;
        
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        
        if (!blocked) { this.x = nx; this.y = ny; }
    } else if (dist < 30) {
        // 太近了，稍微后退
        var retreatX = (-dx / dist) * approachSpeed * 0.5;
        var nx = this.x + retreatX;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; }
    }
    
    this.clampBounds();
};

ShieldDefender.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

// 判断玩家是否在哧吭的背面
ShieldDefender.prototype.isPlayerBehind = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var myCenterX = this.x + this.w / 2;
    // 盾牌面向的方向的反方向即为背面
    if (this.shieldDir === 1) {
        // 盾在左，面向右，背面是左边
        return playerCenterX < myCenterX - 4;
    } else {
        // 盾在右，面向左，背面是右边
        return playerCenterX > myCenterX + 4;
    }
};

ShieldPartner.prototype = Object.create(Enemy.prototype);
ShieldPartner.prototype.constructor = ShieldPartner;

ShieldPartner.prototype.chasePlayer = function() {
    var playerCenterX = state.player.x + state.player.w / 2;
    var playerCenterY = state.player.y + state.player.h / 2;
    var myCenterX = this.x + this.w / 2;
    var myCenterY = this.y + this.h / 2;
    
    var dx = playerCenterX - myCenterX;
    var dy = playerCenterY - myCenterY;
    var dist = Math.hypot(dx, dy);
    
    if (dist > 25) {
        var speed = 0.35;
        var nx = this.x + (dx / dist) * speed;
        var ny = this.y + (dy / dist) * speed * 0.6;
        var blocked = false;
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) blocked = true;
        }.bind(this));
        if (!blocked) { this.x = nx; this.y = ny; }
    }
    this.clampBounds();

ShieldPartner.prototype.update = function() {
    // 击杀第一个稻草人之前不行动
    if (state.scarecrowKilled < 1) return;
    if (state.timeStopped) {
        if (this.marked) return;
        if (!state.isMoving) return;
        this.doShooting();
        return;
    }
    
    // 如果有搭档，始终跟随在搭档后方（右侧，因为盾牌朝左）
    if (this.defender && state.enemies.indexOf(this.defender) !== -1) {
        var def = this.defender;

        var followDist = 16;
        var targetX = def.x + def.w + followDist;
        var targetY = def.y + (def.h - this.h) / 2;
        
        var dx = targetX - this.x;
        var dy = targetY - this.y;
        var dist = Math.hypot(dx, dy);
        
        if (dist > 2) {
            var speed = Math.min(0.6, dist * 0.12);
            var nx = this.x + (dx / dist) * speed;
            var ny = this.y + (dy / dist) * speed;

            }.bind(this));
            if (!blocked) { this.x = nx; this.y = ny; }
        }
        this.clampBounds();
    } else {
        // 搭档已死，主动追击玩家
        this.chasePlayer();
    }
    
    this.doShooting();
};

// 拾取令牌后召唤，始终在玩家前方抵挡飞刀
function Bodyguard(x, y, name, armorColor) {
    this.x = x;
    this.y = y;
    this.w = 8;
    this.h = 12;
    this.name = name;
    this.armorColor = armorColor || 'black';
    this.hp = 5; // 每个保镖可挡5次飞刀
    this.facingRight = true; // 面朝方向（始终面向最近敌人）
    this.hitFlash = 0;
    this.alive = true;
    this.spawnTimer = 30; // 召唤出场动画计时
    this.emergencyCooldown = 0; // 紧急传送冷却（帧）
    this.emergencyFlash = 0; // 传送残影特效计时
    this.prevX = x; // 传送前位置
    this.prevY = y;
}

Bodyguard.prototype.update = function(timeFactor) {
    if (!this.alive || !state.player) return;
    
    if (this.spawnTimer > 0) {
        this.spawnTimer--;
        return;
    }
    
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.emergencyCooldown > 0) this.emergencyCooldown--;
    if (this.emergencyFlash > 0) this.emergencyFlash--;
    
    // 始终面向最近敌人，站位在玩家与敌人之间
    var nearestEnemy = null;
    var nearestDist = Infinity;
    for (var ei = 0; ei < state.enemies.length; ei++) {
        var e = state.enemies[ei];
        var ex = e.x + (e.w || 8) / 2;
        var ey = e.y + (e.h || 12) / 2;
        var d = Math.hypot(ex - state.player.x - 4, ey - state.player.y - 6);
        if (d < nearestDist) {
            nearestDist = d;
            nearestEnemy = e;
        }
    }
    
    var guardIdx = state.bodyguards.indexOf(this);
    var targetX, targetY;
    
    // 第四关：保镖不主动拦截boss，只被动跟随玩家
    if (state.currentLevel === 4) {
        this.facingRight = state.player.facingRight !== false;
        if (this.facingRight) {
            targetX = state.player.x - this.w - 14 - guardIdx * 10;
        } else {
            targetX = state.player.x + 14 + guardIdx * 10;
        }
        targetY = state.player.y + (guardIdx === 0 ? -4 : 4);
    } else if (nearestEnemy) {
        // 面向最近敌人，站在玩家与敌人之间
        var enX = nearestEnemy.x + (nearestEnemy.w || 8) / 2;
        var enY = nearestEnemy.y + (nearestEnemy.h || 12) / 2;
        var toEnemyX = enX - (state.player.x + 4);
        var toEnemyY = enY - (state.player.y + 6);
        var toDist = Math.hypot(toEnemyX, toEnemyY);
        // 面朝方向
        this.facingRight = toEnemyX >= 0;
        // 站在玩家前方30px（沿玩家→敌人方向）
        var standDist = 30 + guardIdx * 12;
        targetX = state.player.x + 4 + (toEnemyX / toDist) * standDist - this.w / 2;
        targetY = state.player.y + 6 + (toEnemyY / toDist) * standDist - this.h / 2;
        // 两个保镖沿垂直于敌人方向错开
        var perpX = -toEnemyY / toDist * (guardIdx === 0 ? -4 : 4);
        var perpY = toEnemyX / toDist * (guardIdx === 0 ? -4 : 4);
        targetX += perpX;
        targetY += perpY;
    } else {
        // 无敌人时，跟随玩家朝向
        this.facingRight = state.player.facingRight !== false;
        if (this.facingRight) {
            targetX = state.player.x + 28 + guardIdx * 12;
        } else {
            targetX = state.player.x - this.w - 20 - guardIdx * 12;
        }
        targetY = state.player.y + (guardIdx === 0 ? -3 : 3);
    }
    
    var dx = targetX - this.x;
    var dy = targetY - this.y;
    var dist = Math.hypot(dx, dy);
    
    if (dist > 1.5) {
        var speed = Math.min(1.5, dist * 0.12);
        this.x += (dx / dist) * speed * timeFactor;
        this.y += (dy / dist) * speed * timeFactor;
    }
    
    // 第三关：保镖在暗道中跟随时的边界限制
    if (state.currentLevel === 3) {
        var pcx = this.x + this.w / 2;
        var pcy = this.y + this.h / 2;
        if (pcx >= 178) {
            if (pcy <= 76) {
                // 上方暗道
                this.y = Math.max(36, Math.min(40, this.y));
                this.x = Math.max(175, Math.min(778 - this.w, this.x));
            } else {
                // 下方暗道
                this.y = Math.max(108, Math.min(110, this.y));
                this.x = Math.max(175, Math.min(778 - this.w, this.x));
            }
        }
    }
};

function Javelin(x, y, dirX, dirY, ownerType) {

        } else if (this.y >= 98 && this.y <= 122) {

function JavelinEnemy(x, y, patrolX1, patrolX2, patrolY) {
    Entity.call(this, x, y, 8, 12, PAL.cinnabar);
    this.moveSpeed = 0.3;
    this.shootCooldown = Math.random() * 150 + 120;
    this.throwCooldown = 0;  // 投掷后额外冷却
    this.variant = Math.floor(Math.random() * 3);
    this.alertTimer = 0;
    this.marked = false;
    this.pushFlash = 0;
    this.dirX = 1; this.dirY = 0;
    this.patrolX1 = patrolX1;
    this.patrolX2 = patrolX2;
    this.patrolY = patrolY;
    this.patrolDir = 1;
    this.throwRange = 48;  // 4个玩家身位（12px * 4）
    this.enemyType = 'JavelinEnemy';  // 用于状态保存识别
}
JavelinEnemy.prototype = Object.create(Enemy.prototype);
JavelinEnemy.prototype.constructor = JavelinEnemy;

JavelinEnemy.prototype.update = function() {
    if (state.timeStopped) {
        if (this.marked) return;
        if (!state.isMoving) return;
        this.doPatrol();
        this.doPushBack();
        this.doThrowing();
        return;
    }
    this.doPatrol();
    this.doThrowing();
};

JavelinEnemy.prototype.doPatrol = function() {
    // 在指定范围内左右巡逻
    var targetX = this.patrolDir > 0 ? this.patrolX2 : this.patrolX1;
    this.dirX = this.patrolDir;
    this.dirY = 0;
    var nx = this.x + this.dirX * this.moveSpeed;
    if (nx >= this.patrolX2) {
        this.patrolDir = -1;
        nx = this.patrolX2;
    } else if (nx <= this.patrolX1) {
        this.patrolDir = 1;
        nx = this.patrolX1;
    }
    this.x = nx;
    this.y = this.patrolY;  // 固定在暗道地面
    // 不越过陷阱区域（陷阱x:280~330，巡逻范围已限制在右侧，这里加保险）
    if (this.x < 335) this.x = 335;
    this.clampBounds();
};

JavelinEnemy.prototype.doThrowing = function() {
    this.shootCooldown--;
    if (this.throwCooldown > 0) this.throwCooldown--;
    if (this.shootCooldown <= 0 && this.throwCooldown <= 0) {
        var tp=getNearestPlayer(this.x,this.y);
        var dx = tp.x - this.x;
        var dy = tp.y - this.y;
        var dist = Math.hypot(dx, dy);
        // 第三关兜底：缩短投掷范围+延长冷却
        var nerfRange = l3EnemyReactionNerfed ? 0.6 : 1;
        var nerfCooldown = l3EnemyReactionNerfed ? 1.8 : 1;
        // 玩家在3个身位范围内才投掷
        if (dist <= this.throwRange * nerfRange) {
            this.throwJavelin();
            // 投掷后有较长冷却时间
            this.shootCooldown = (Math.random() * 120 + 100) * nerfCooldown;
            this.throwCooldown = 30;  // 投掷动作停顿
        }
    }
    this.alertTimer = this.shootCooldown < 25 ? (this.alertTimer + 1) % 12 : 0;
};

JavelinEnemy.prototype.throwJavelin = function() {
    var tp=getNearestPlayer(this.x,this.y);
    var dx = tp.x - this.x;
    var dy = tp.y - this.y;
    var dist = Math.hypot(dx, dy) || 1;
    state.projectiles.push(new Javelin(this.x + 4, this.y + 2, dx / dist, dy / dist, 'javelin'));
};

JavelinEnemy.prototype.clampBounds = function() {
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));
};

    }
};
DyingScarecrow.prototype.draw=function(){
    var alpha=Math.max(0,this.life/this.maxLife);
    var x=px(this.x),y=px(this.y),wobble=Math.sin(this.spinPhase)*2;
    // 稻草人身体碎片
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#6a5a40';
    ctx.fillRect(x+wobble,y,6,8);
    ctx.fillStyle='#5a4030';
    ctx.fillRect(x+2+wobble,y-2,2,4);
    // 头部碎片
    ctx.fillStyle='#c8a050';
    ctx.fillRect(x+1+wobble,y-4,4,3);
    // 木桩碎片
    ctx.fillStyle='#5a4030';
    ctx.fillRect(x+2+wobble*0.5,y+6,2,6);
    ctx.globalAlpha=1;
    // 稻草碎片飞散
    for(var i=0;i<this.straws.length;i++){
        var s=this.straws[i];
        if(s.life>0){
            ctx.globalAlpha=Math.max(0,s.life/25)*alpha;
            ctx.fillStyle=Math.random()>0.5?'#d4c080':'#c8b060';
            ctx.fillRect(x+3+px(s.dx),y+6+px(s.dy),2,1);
        }
    }
    ctx.globalAlpha=1;
};
DyingScarecrow.prototype.isDead=function(){return this.life<=0;};

function Cover(x,y,w,h,side,invisible){this.x=x;this.y=y;this.w=w;this.h=h;this.side=side;this.invisible=invisible||false;}
Cover.prototype.draw=function(){

        ctx.fillStyle='#2a2a2e';ctx.fillRect(x,y,w,1);
        ctx.fillStyle=PAL.lightStone;ctx.fillRect(x,y+h-1,w,1);
        ctx.fillStyle='#605850';ctx.fillRect(x,y+h-2,w,1);
    }else{
        ctx.fillStyle=PAL.lightStone;ctx.fillRect(x,y,w,1);

    }
    ctx.fillStyle='#4a4840';ctx.fillRect(x,y,1,h);

};

/* ==================== 第四关近战Boss（巡逻+视野+追赶） ==================== */
function MeleeBoss(x, y) {
    Entity.call(this, x, y, 8, 12, PAL.cinnabar);
    this.speed = 1.3;
    this.patrolSpeed = 0.6;
    this.facingRight = true;
    this.animTimer = 0;
    this.animFrame = 0;
    this.hp = 5;
    this.maxHp = 5;
    this.hitFlash = 0;
    this.slashTimer = 0;
    this.attackCooldown = 0;
    // 状态机：patrol（巡逻） / chase（追赶）
    this.aiState = 'patrol';
    this.enemyType = 'MeleeBoss';
    // 扇形视野参数
    this.FOV_RANGE = 120;        // 视野距离
    this.FOV_HALF_ANGLE = Math.PI / 3;  // 视野半角60度（总120度）
    this.FOV_CHASE_RANGE = 150;  // 追赶时视野略大
    this.FOV_CHASE_HALF = Math.PI / 2.2; // 追赶时视野90度+
    // 巡逻路径点
    this.patrolPoints = [
        { x: 300, y: 90 }, { x: 500, y: 40 }, { x: 700, y: 140 },
        { x: 900, y: 60 }, { x: 750, y: 120 }, { x: 550, y: 30 }
    ];
    this.patrolIdx = 0;
    this.patrolWait = 0;       // 到达巡逻点后等待帧数
    this.patrolDirX = 1;
    this.patrolDirY = 0;
    // 追赶状态
    this.chaseTimer = 0;       // 追赶持续计时（丢失目标后还能追一段时间）
    this.LOSE_SIGHT_TIME = 180; // 丢失视野后持续追赶帧数（3秒）
    this.lastSeenX = 0;
    this.lastSeenY = 0;
    // 视野可视化
    this.alertLevel = 0;       // 0=未发现, 渐变到1=完全警觉
    this.exclamationTimer = 0; // 感叹号显示计时
    // 卡住检测与绕行
    this.prevX = x;
    this.prevY = y;
    this.stuckFrames = 0;      // 连续未移动帧数
    this.slideDir = 0;         // 绕行方向：1=向上绕，-1=向下绕
}

// 检测指定位置是否与任何障碍物碰撞
MeleeBoss.prototype.collidesWithCovers = function(nx, ny) {
    for (var ci = 0; ci < state.covers.length; ci++) {
        var cv = state.covers[ci];
        if (nx < cv.x + cv.w && nx + this.w > cv.x && ny < cv.y + cv.h && ny + this.h > cv.y) {
            return true;
        }
    }
    return false;
};

// 沿垂直于前进方向滑动绕行障碍物
MeleeBoss.prototype._slideAround = function(dx, dy, speed) {
    // 计算垂直方向（逆时针90度）
    var perpX = -dy, perpY = dx;

    // 确定绕行方向并保持一致
    if (this.slideDir === 0) {
        // 选一个更远离地图中心的方向绕行
        var level = LEVELS[state.currentLevel - 1];
        var midY = (level.tunnelTop + level.tunnelBot) / 2;
        this.slideDir = (this.y + 6 < midY) ? -1 : 1; // 上方往下绕，下方往上绕
    }
    var dir = this.slideDir;

    // 尝试垂直方向移动
    var s1x = this.x + perpX * speed * dir;
    var s1y = this.y + perpY * speed * dir;
    if (!this.collidesWithCovers(s1x, s1y)) {
        this.x = s1x;
        this.y = s1y;
        return;
    }

    // 垂直+前进各半（对角绕行）
    var s2x = this.x + (perpX * 0.7 + dx * 0.3) * speed * dir;
    var s2y = this.y + (perpY * 0.7 + dy * 0.3) * speed * dir;
    if (!this.collidesWithCovers(s2x, s2y)) {
        this.x = s2x;
        this.y = s2y;
        return;
    }

    // 反方向垂直滑动
    var s3x = this.x - perpX * speed * dir;
    var s3y = this.y - perpY * speed * dir;
    if (!this.collidesWithCovers(s3x, s3y)) {
        this.x = s3x;
        this.y = s3y;
        this.slideDir = -this.slideDir; // 反转绕行方向
        return;
    }
};

// 强制脱困：卡住时间过长时用多方向探测逃离
MeleeBoss.prototype._forceUnstuck = function(dx, dy, speed) {
    // 尝试8个方向逃离
    var bestDist = 0;
    var bestX = this.x, bestY = this.y;
    var perpX = -dy, perpY = dx;

    // 4个垂直方向优先
    var tries = [
        { x: perpX, y: perpY },
        { x: -perpX, y: -perpY },
        { x: 0, y: 1 },
        { x: 0, y: -1 },
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: dx, y: 0 },
        { x: 0, y: dy }
    ];
    for (var ti = 0; ti < tries.length; ti++) {
        var t = tries[ti];
        var tx = this.x + t.x * speed * 1.2;
        var ty = this.y + t.y * speed * 1.2;
        if (!this.collidesWithCovers(tx, ty)) {
            // 选择离目标最远的方向
            var goalX = this.aiState === 'chase' ? (state.player.x + 4) : this.patrolPoints[this.patrolIdx].x;
            var goalY = this.aiState === 'chase' ? (state.player.y + 6) : this.patrolPoints[this.patrolIdx].y;
            var newDist = Math.hypot(goalX - tx - 4, goalY - ty - 6);
            if (newDist > bestDist) {
                bestDist = newDist;
                bestX = tx;
                bestY = ty;
            }
        }
    }
    if (bestDist > 0) {
        this.x = bestX;
        this.y = bestY;
    }
    // 重置卡住计时，避免每帧都触发
    this.stuckFrames = 0;
    this.slideDir = 0;
};

// 检测玩家是否在Boss扇形视野内（考虑障碍物遮挡）
MeleeBoss.prototype.canSeePlayer = function() {
    // 双人模式：检测两个玩家，任一可见即可
    var players = [state.player];
    if(gameMode === 'dual' && state.player2) players.push(state.player2);
    for(var pi = 0; pi < players.length; pi++){
        var pl = players[pi];
        if(!pl) continue;
        var pcx = pl.x + 4;
        var pcy = pl.y + 6;
        var bcx = this.x + 4;
        var bcy = this.y + 6;
        var dx = pcx - bcx;
        var dy = pcy - bcy;
        var dist = Math.hypot(dx, dy);

        var fovRange = (this.aiState === 'chase') ? this.FOV_CHASE_RANGE : this.FOV_RANGE;
        var fovHalf = (this.aiState === 'chase') ? this.FOV_CHASE_HALF : this.FOV_HALF_ANGLE;

        if (dist > fovRange) continue;

        var facingAngle = this.facingRight ? 0 : Math.PI;
        var playerAngle = Math.atan2(dy, dx);
        var angleDiff = playerAngle - facingAngle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        if (Math.abs(angleDiff) <= fovHalf) {
            if (hasLineOfSight(bcx, bcy, pcx, pcy)) {
                return true;
            }
        }
    }
    return false;
};

MeleeBoss.prototype.update = function() {
    if (!state.player) return;
    // 双人模式：选择最近的玩家作为追踪目标
    var targetPlayer = state.player;
    if(gameMode === 'dual' && state.player2){
        var d1 = Math.hypot(state.player.x + 4 - (this.x + 4), state.player.y + 6 - (this.y + 6));
        var d2 = Math.hypot(state.player2.x + 4 - (this.x + 4), state.player2.y + 6 - (this.y + 6));
        if(d2 < d1) targetPlayer = state.player2;
    }
    var pcx = targetPlayer.x + 4;
    var pcy = targetPlayer.y + 6;
    var bcx = this.x + 4;
    var bcy = this.y + 6;
    var dx = pcx - bcx;
    var dy = pcy - bcy;
    var dist = Math.hypot(dx, dy);

    // 动画帧
    var animSpeed = (this.aiState === 'chase') ? 4 : 8;
    this.animTimer++;
    if (this.animTimer >= animSpeed) {
        this.animTimer = 0;
        this.animFrame = (this.animFrame + 1) % 4;
    }

    if (this.hitFlash > 0) this.hitFlash--;
    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.slashTimer > 0) this.slashTimer--;
    if (this.exclamationTimer > 0) this.exclamationTimer--;

    // ===== 视野检测 =====
    var canSee = this.canSeePlayer();

    if (canSee) {
        this.lastSeenX = pcx;
        this.lastSeenY = pcy;
        this.chaseTimer = this.LOSE_SIGHT_TIME; // 重置追赶计时
        // 警觉度渐增
        this.alertLevel = Math.min(1, this.alertLevel + 0.08);
    } else {
        // 看不见时警觉度渐降
        this.alertLevel = Math.max(0, this.alertLevel - 0.015);
    }

    // ===== 状态切换 =====
    if (this.aiState === 'patrol') {
        if (canSee && this.alertLevel >= 0.5) {
            // 发现玩家，切换到追赶
            this.aiState = 'chase';
            this.chaseTimer = this.LOSE_SIGHT_TIME;
            this.exclamationTimer = 45; // 显示感叹号
            this.lastSeenX = pcx;
            this.lastSeenY = pcy;
        }
    }

    if (this.aiState === 'chase') {
        this.chaseTimer--;
        // 追赶超时且看不见玩家，回到巡逻
        if (this.chaseTimer <= 0 && !canSee) {
            this.aiState = 'patrol';
            this.patrolWait = 60; // 回到巡逻时先等一会
        }
    }

    // ===== 移动逻辑 =====
    var moveDx = 0, moveDy = 0;
    var moveSpeed = this.patrolSpeed;

    if (this.aiState === 'chase') {
        // 追赶模式：速度更快，朝向最后看到玩家的位置
        moveSpeed = this.speed + Math.min(0.5, dist * 0.002);
        // 面朝玩家
        this.facingRight = dx > 0;
        if (dist > 18) {
            moveDx = dx / dist;
            moveDy = dy / dist;
        }
    } else {
        // 巡逻模式
        if (this.patrolWait > 0) {
            this.patrolWait--;
        } else {
            var target = this.patrolPoints[this.patrolIdx];
            var tdx = target.x - bcx;
            var tdy = target.y - bcy;
            var tdist = Math.hypot(tdx, tdy);
            if (tdist < 5) {
                // 到达巡逻点，等待后前往下一个
                this.patrolWait = 40 + Math.floor(Math.random() * 60);
                this.patrolIdx = (this.patrolIdx + 1) % this.patrolPoints.length;
            } else {
                moveDx = tdx / tdist;
                moveDy = tdy / tdist;
                this.facingRight = moveDx > 0;
            }
        }
    }

    // 应用移动（分轴碰撞+墙壁滑动+卡住绕行）
    if (moveDx !== 0 || moveDy !== 0) {
        var newX = this.x + moveDx * moveSpeed;
        var newY = this.y + moveDy * moveSpeed;

        // 优先尝试完整移动
        if (!this.collidesWithCovers(newX, newY)) {
            this.x = newX;
            this.y = newY;
        }
        // 尝试仅X轴移动（沿Y方向墙壁滑动）
        else if (!this.collidesWithCovers(newX, this.y)) {
            this.x = newX;
        }
        // 尝试仅Y轴移动（沿X方向墙壁滑动）
        else if (!this.collidesWithCovers(this.x, newY)) {
            this.y = newY;
        }
        // 完全被挡：沿垂直于前进方向滑动绕行
        else {
            this._slideAround(moveDx, moveDy, moveSpeed);
        }
    }

    // 边界限制
    var level = LEVELS[state.currentLevel - 1];
    var maxX = level.width - 18;
    this.x = Math.max(10, Math.min(maxX - this.w, this.x));
    this.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - this.h, this.y));

    // ===== 卡住检测 =====
    var movedDist = Math.hypot(this.x - this.prevX, this.y - this.prevY);
    if (movedDist < 0.3 && (moveDx !== 0 || moveDy !== 0)) {
        this.stuckFrames++;
    } else {
        this.stuckFrames = 0;
        this.slideDir = 0;
    }
    // 卡住超过15帧：强制绕行
    if (this.stuckFrames >= 15) {
        this._forceUnstuck(moveDx, moveDy, moveSpeed);
    }
    this.prevX = this.x;
    this.prevY = this.y;

    // ===== 近战攻击判定 =====
    // 检测所有玩家（P1和P2）
    var playersForBoss = [state.player];
    if(gameMode === 'dual' && state.player2) playersForBoss.push(state.player2);
    for(var bpi = 0; bpi < playersForBoss.length; bpi++){
        var bp = playersForBoss[bpi];
        var bdist = Math.hypot(bp.x + 4 - bcx, bp.y + 6 - bcy);
        if(bdist < 22 && this.attackCooldown <= 0 && !state.timeStopped){
            this.slashTimer = 8;
            this.attackCooldown = 25;
            state.effects.push({ life: 6, maxLife: 6, type: 'flash' });
            triggerShake(3, 8);
            if (state.currentLevel === 2) { L2SecretDoor.onDeath(); }
            // 第四关：软复活（不触发gameOver，玩家回到起点继续游戏）
            if (state.currentLevel === 4) {
                var stats4 = (bp === state.player2) ? PlayerStats2 : PlayerStats;
                stats4.totalDeaths++;
                bp.x = LEVELS[3].playerStart.x;
                bp.y = LEVELS[3].playerStart.y;
                bp.facingRight = !LEVELS[3].playerStart.facingLeft;
                state.effects.push({ life: 12, maxLife: 12, type: 'flash' });
            } else if (hasRewind) { triggerRewind((bp === state.player2) ? 2 : 1); }
            else { dyingPlayerIdx = (bp === state.player2) ? 2 : 1; respawnAtCheckpoint(); }
            break; // 一帧只攻击一次
        }
    }

    // ===== 主动击杀稻草人（避免被阻挡）=====
    for (var si = state.scarecrows.length - 1; si >= 0; si--) {
        var sc = state.scarecrows[si];
        var sd = Math.hypot(this.x + 4 - (sc.x + sc.w / 2), this.y + 6 - (sc.y + sc.h / 2));
        if (sd < 16) {
            state.dyingEnemies.push(new DyingScarecrow(sc.x, sc.y));
            state.effects.push({ x: sc.x + sc.w / 2, y: sc.y + sc.h / 2, life: 8, maxLife: 8, type: 'slash' });
            state.scarecrows.splice(si, 1);
            if (si < scarecrowCoverIndices.length) {
                var cIdx = scarecrowCoverIndices[si];
                state.covers.splice(cIdx, 1);
                for (var ci2 = si + 1; ci2 < scarecrowCoverIndices.length; ci2++) {
                    scarecrowCoverIndices[ci2]--;
                }
                scarecrowCoverIndices.splice(si, 1);
            }
            triggerShake(2, 4);
            ScarecrowHint.dismiss();
            break;
        }
    }
};

MeleeBoss.prototype.draw = function() {
    var x = px(this.x), y = px(this.y);
    var f = this.facingRight ? 1 : -1;
    var bob = (this.animFrame === 1 || this.animFrame === 3) ? -1 : 0;
    var leg = (this.animFrame === 1 || this.animFrame === 3);

    // ===== 扇形视野可视化 =====
    if (state.currentLevel === 4) {
        var bcx = this.x + 4, bcy = this.y + 6;
        var fovR = (this.aiState === 'chase') ? this.FOV_CHASE_RANGE : this.FOV_RANGE;
        var fovH = (this.aiState === 'chase') ? this.FOV_CHASE_HALF : this.FOV_HALF_ANGLE;
        var baseAngle = this.facingRight ? 0 : Math.PI;
        // 视野锥颜色：巡逻时淡黄，追赶时红色
        var coneR = (this.aiState === 'chase') ? 180 : 140;
        var coneG = (this.aiState === 'chase') ? 50 : 120;
        var coneB = 30;
        var coneAlpha = (this.aiState === 'chase') ? 0.08 + this.alertLevel * 0.07 : 0.04 + this.alertLevel * 0.06;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(bcx, bcy);
        ctx.arc(bcx, bcy, fovR, baseAngle - fovH, baseAngle + fovH);
        ctx.closePath();
        var fovGrad = ctx.createRadialGradient(bcx, bcy, 0, bcx, bcy, fovR);
        fovGrad.addColorStop(0, 'rgba('+coneR+','+coneG+','+coneB+','+(coneAlpha*1.5)+')');
        fovGrad.addColorStop(0.7, 'rgba('+coneR+','+coneG+','+coneB+','+(coneAlpha*0.8)+')');
        fovGrad.addColorStop(1, 'rgba('+coneR+','+coneG+','+coneB+',0)');
        ctx.fillStyle = fovGrad;
        ctx.fill();
        // 视野边缘线
        ctx.beginPath();
        ctx.moveTo(bcx, bcy);
        ctx.lineTo(bcx + Math.cos(baseAngle - fovH) * fovR, bcy + Math.sin(baseAngle - fovH) * fovR);
        ctx.strokeStyle = 'rgba('+coneR+','+coneG+','+coneB+','+(coneAlpha*0.5)+')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bcx, bcy);
        ctx.lineTo(bcx + Math.cos(baseAngle + fovH) * fovR, bcy + Math.sin(baseAngle + fovH) * fovR);
        ctx.stroke();
        ctx.restore();
    }

    // 受击闪白
    if (this.hitFlash > 0 && this.hitFlash % 2 === 0) {
        ctx.globalAlpha = 0.6;
    }

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x - 1, y + 11, 10, 2);
    // 帽子
    ctx.fillStyle = PAL.straw;
    ctx.fillRect(x - 2, y - 2 + bob, 12, 2);
    ctx.fillStyle = PAL.darkStraw;
    ctx.fillRect(x, y - 4 + bob, 8, 2);
    ctx.fillStyle = '#4a3828';
    ctx.fillRect(x + 2, y - 3 + bob, 4, 1);
    // 脸部
    ctx.fillStyle = PAL.skin;
    ctx.fillRect(x + 1, y + bob, 6, 3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(f > 0 ? x + 5 : x + 2, y + 1 + bob, 1, 1);
    // 上身白衣
    ctx.fillStyle = PAL.white;
    ctx.fillRect(x, y + 3 + bob, 8, 3);
    ctx.fillStyle = '#c8c0b0';
    ctx.fillRect(x + 3, y + 3 + bob, 2, 3);
    // 金腰带
    ctx.fillStyle = PAL.darkGold;
    ctx.fillRect(x, y + 6 + bob, 8, 1);
    ctx.fillStyle = PAL.gold;
    ctx.fillRect(x + 3, y + 5 + bob, 2, 1);
    // 下身
    ctx.fillStyle = '#d0c8b8';
    ctx.fillRect(x + 1, y + 7 + bob, 6, 3);
    ctx.fillStyle = '#a09888';
    ctx.fillRect(x + 1, y + 9 + bob, 1, 1);
    ctx.fillRect(x + 6, y + 9 + bob, 1, 1);
    // 裤腿
    ctx.fillStyle = '#2a2420';
    if (leg) { ctx.fillRect(x + 1, y + 10, 2, 2); ctx.fillRect(x + 5, y + 10, 2, 2); }
    else { ctx.fillRect(x + 2, y + 10, 2, 2); ctx.fillRect(x + 4, y + 10, 2, 2); }
    // 剑
    var sx = f > 0 ? x + 8 : x - 2;
    ctx.fillStyle = '#b0b8c0';
    ctx.fillRect(sx, y - 3 + bob, 1, 11);
    ctx.fillStyle = PAL.darkGold;
    ctx.fillRect(sx - 1, y + 5 + bob, 3, 1);
    ctx.fillStyle = '#e0e8f0';
    ctx.fillRect(sx, y - 3 + bob, 1, 2);

    ctx.globalAlpha = 1;

    // ===== 感叹号（发现玩家时）=====
    if (this.exclamationTimer > 0) {
        var exAlpha = Math.min(1, this.exclamationTimer / 20);

        // 感叹号背景圆

        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 1;
        var slashX = x + 4 + f * 8;
        var slashY = y + 4 + bob;
        ctx.beginPath();
        ctx.moveTo(slashX - 4, slashY - 5);
        ctx.lineTo(slashX + 4, slashY + 5);

        ctx.moveTo(slashX - 2, slashY + 4);

        ctx.globalAlpha = 1;

        ctx.strokeStyle = 'rgba(200,200,200,0.3)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(barX, barY, barW, barH);
    }
};

/* ==================== WASD 按键提示系统（第一关） ==================== */
var WASDHint = {
    visible: true,       // 是否显示
    pressedKeys: {},     // 记录已按过的键
    keyDefs: [
        { key: 'w', label: 'W', ox: 0, oy: -1 },
        { key: 'a', label: 'A', ox: -1, oy: 0 },
        { key: 's', label: 'S', ox: 0, oy: 1 },
        { key: 'd', label: 'D', ox: 1, oy: 0 }
    ],
    keySize: 22,        // 按键大小（像素）
    keyGap: 3,          // 按键间距
    pressedAnim: {},    // 按键按下动画计时器
    
    onLevelLoad: function(levelId) {
        // 进入第一关时重置（仅首次）
        if (levelId === 1 && this._initialized !== true) {
            this.visible = true;
            this.pressedKeys = {};
            this.pressedAnim = {};
            this._initialized = true;
        }
    },
    
    // keydown 事件中调用
    onKeyDown: function(key) {
        if (!this.visible) return;
        var k = key.toLowerCase();
        if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
            this.pressedKeys[k] = true;
            this.pressedAnim[k] = 10; // 10帧按下动画
            // 四个键都按过了，开始淡出
            var allPressed = this.keyDefs.every(function(d) { return this.pressedKeys[d.key]; }.bind(this));
            if (allPressed) {
                this._fadeTimer = 60; // 1秒后消失
            }
        }
    },
    
    update: function() {
        if (!this.visible) return;
        
        // 更新按下动画计时器
        for (var k in this.pressedAnim) {
            if (this.pressedAnim[k] > 0) this.pressedAnim[k]--;
        }
        
        // 淡出计时
        if (this._fadeTimer && this._fadeTimer > 0) {
            this._fadeTimer--;
            if (this._fadeTimer <= 0) {
                this.visible = false;
            }
        }
    },
    
    draw: function() {
        if (!this.visible) return;
        if (state.currentLevel !== 1) return;
        
        ctx.save();
        
        var ks = this.keySize;
        var gap = this.keyGap;
        // 布局：W在上，ASD在下，整体居中于画面下方
        var baseX = 160 - (ks + gap) * 1.5;  // 整体水平居中
        var baseY = 120; // 画面中下方（canvas高度180）
        
        // 整体呼吸动画
        var breath = 0.55 + 0.3 * Math.sin(state.globalTick * 0.04);
        ctx.globalAlpha = breath;
        
        // 淡出时额外降低透明度
        if (this._fadeTimer && this._fadeTimer > 0) {
            ctx.globalAlpha *= (this._fadeTimer / 60);
        }
        
        // 按键位置计算
        var positions = {
            'w': { x: baseX + ks / 2 + gap / 2, y: baseY },
            'a': { x: baseX - ks / 2 - gap / 2, y: baseY + ks + gap },
            's': { x: baseX + ks / 2 + gap / 2, y: baseY + ks + gap },
            'd': { x: baseX + ks * 1.5 + gap * 1.5, y: baseY + ks + gap }
        };
        
        for (var i = 0; i < this.keyDefs.length; i++) {
            var def = this.keyDefs[i];
            var pos = positions[def.key];
            var kx = pos.x - ks / 2;
            var ky = pos.y - ks / 2;
            var isPressed = !!this.pressedKeys[def.key];
            var animT = this.pressedAnim[def.key] || 0;
            // 按下位移效果
            var pressOffset = animT > 0 ? 2 : 0;
            
            // 按键阴影（立体感）
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(kx + 2, ky + 2, ks, ks);
            
            // 按键底色
            if (animT > 0) {
                // 按下状态 - 亮色
                ctx.fillStyle = '#c8a832';
            } else if (isPressed) {
                // 已按过 - 暗色标记
                ctx.fillStyle = '#5a5030';
            } else {
                // 未按下 - 默认
                ctx.fillStyle = '#3a3520';
            }
            ctx.fillRect(kx, ky + pressOffset, ks, ks);
            
            // 按键边框（像素风格）
            ctx.strokeStyle = isPressed ? 'rgba(200,168,0,0.3)' : 'rgba(200,168,0,0.6)';
            ctx.lineWidth = 1;
            ctx.strokeRect(kx + 0.5, ky + pressOffset + 0.5, ks - 1, ks - 1);
            
            // 按键高光（上和左边缘）
            if (animT <= 0 && !isPressed) {
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(kx + 1, ky + pressOffset + 1, ks - 2, 2);
                ctx.fillRect(kx + 1, ky + pressOffset + 1, 2, ks - 2);
            }
            
            // 按键文字
            ctx.font = "bold 12px 'FZPixel'";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (animT > 0) {
                ctx.fillStyle = '#fff8e0';
            } else if (isPressed) {
                ctx.fillStyle = 'rgba(200,168,0,0.4)';
            } else {
                ctx.fillStyle = '#cca800';
            }
            // 文字发光（未按过的键）
            if (!isPressed) {
                var textGlow = 0.4 + 0.3 * Math.sin(state.globalTick * 0.06 + i * 1.5);
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 4 * textGlow;
            }
            ctx.fillText(def.label, pos.x, pos.y + pressOffset);
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }
        
        // "使用 WASD 移动" 提示文字
        ctx.font = "9px 'FZPixel'";
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(200,168,0,0.5)';
        ctx.fillText('使用 WASD 移动', 160, baseY + ks * 2 + gap * 2 + 8);
        
        ctx.restore();
    }
};

/* ==================== 双击冲刺系统 ==================== */
var Dash = {
    lastKeyTime: {},       // 上次按键时间戳
    keyHeld: {},           // 当前按键是否被按住
    doubleTapWindow: 280,  // 双击判定时间窗口（毫秒）
    dashDuration: 12,      // 冲刺持续帧数（更柔和）
    dashSpeed: 3.0,        // 冲刺速度（像素/帧）
    active: false,         // 是否正在冲刺
    timer: 0,              // 冲刺剩余帧
    dashVx: 0,
    dashVy: 0,
    trail: [],             // 残影坐标
    
    // keydown 事件中调用
    onKeyDown: function(key) {
        if (!state.running || !state.player || state.timeStopped) return;
        var k = key.toLowerCase();
        if (k !== 'w' && k !== 'a' && k !== 's' && k !== 'd') return;
        if (this.active) return;
        
        // 长按判定：如果这个键当前仍处于按住状态，说明是长按重复触发，忽略
        if (this.keyHeld[k]) return;
        this.keyHeld[k] = true;
        
        var now = performance.now();
        var last = this.lastKeyTime[k] || 0;
        
        if (now - last < this.doubleTapWindow) {
            // 双击确认，触发冲刺
            this.active = true;
            this.timer = this.dashDuration;
            this.trail = [];
            this.dashVx = 0;
            this.dashVy = 0;
            if (k === 'w') this.dashVy = -this.dashSpeed;
            if (k === 's') this.dashVy = this.dashSpeed;
            if (k === 'a') { this.dashVx = -this.dashSpeed; state.player.facingRight = false; }
            if (k === 'd') { this.dashVx = this.dashSpeed; state.player.facingRight = true; }
            this.lastKeyTime[k] = 0; // 重置，防止三击再次触发
        } else {
            this.lastKeyTime[k] = now;
        }
    },
    
    // keyup 事件中调用
    onKeyUp: function(key) {
        var k = key.toLowerCase();
        this.keyHeld[k] = false;
    },
    
    // 每帧更新
    update: function() {
        if (!this.active) return;
        this.timer--;
        
        // 记录残影（每3帧记录一次，更稀疏更丝滑）
        if (state.player && this.timer % 3 === 0) {
            this.trail.push({ x: state.player.x, y: state.player.y, life: 8 });
        }
        
        if (this.timer <= 0) {
            this.active = false;
            this.dashVx = 0;
            this.dashVy = 0;
        }
    },
    
    // 应用冲刺位移（带碰撞检测）
    applyMove: function() {
        if (!this.active || !state.player) return;
        var p = state.player;
        var dx = this.dashVx, dy = this.dashVy;
        if (dx === 0 && dy === 0) return;
        
        var nx = p.x + dx, ny = p.y + dy;
        var blocked = false;
        
        // 碰撞检测
        state.covers.forEach(function(cv) {
            if (nx < cv.x + cv.w && nx + p.w > cv.x && ny < cv.y + cv.h && ny + p.h > cv.y) blocked = true;
        });
        // 石门碰撞
        if (!blocked && StoneDoor.active) {
            var sdRects = StoneDoor.getCollisionRects();
            if (sdRects) {
                for (var si = 0; si < sdRects.length; si++) {
                    var sr = sdRects[si];
                    if (nx < sr.x + sr.w && nx + p.w > sr.x && ny < sr.y + sr.h && ny + p.h > sr.y) { blocked = true; break; }
                }
            }
        }
        // 密室石门碰撞
        if (!blocked && L2SecretDoor.active) {
            var secretRects = L2SecretDoor.getCollisionRects();
            if (secretRects) {
                for (var ssi = 0; ssi < secretRects.length; ssi++) {
                    var ssr = secretRects[ssi];
                    if (nx < ssr.x + ssr.w && nx + p.w > ssr.x && ny < ssr.y + ssr.h && ny + p.h > ssr.y) { blocked = true; break; }
                }
            }
        }
        // 滚石碰撞
        if (!blocked) {
            var br = RollingBoulder.getCollisionRect();
            if (br && nx < br.x + br.w && nx + p.w > br.x && ny < br.y + br.h && ny + p.h > br.y) blocked = true;
        }
        
        if (!blocked) {
            p.x = nx;
            p.y = ny;
            // 关卡边界钳位
            var level = LEVELS[state.currentLevel - 1];
            var maxX = level.width - 18;
            p.x = Math.max(10, Math.min(maxX - p.w, p.x));
            p.y = Math.max(level.tunnelTop, Math.min(level.tunnelBot - p.h, p.y));
        } else {
            // 碰墙平滑停止
            this.active = false;
            this.timer = 0;
            this.dashVx = 0;
            this.dashVy = 0;
        }
    },
    
    // 绘制残影
    drawTrail: function() {
        // 更新和绘制残影
        for (var i = this.trail.length - 1; i >= 0; i--) {
            this.trail[i].life--;
            if (this.trail[i].life <= 0) {
                this.trail.splice(i, 1);
                continue;
            }
            var t = this.trail[i];
            var alpha = t.life / 6 * 0.4;
            var x = px(t.x), y = px(t.y);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#aaddff';
            // 简化的残影（玩家轮廓）
            ctx.fillRect(x + 1, y, 6, 1);
            ctx.fillRect(x, y + 1, 8, 10);
            ctx.fillRect(x + 1, y + 11, 6, 1);
            ctx.globalAlpha = 1;
        }
    }
};

var ItemStatus = {
    el: null,
    items: {}, // { id: { name, color, glowColor } }
    
    init: function() {
        if (this.el) return; // 已初始化
        this.el = document.getElementById('item-status');
        if (!this.el) return; // DOM未就绪
        // 道具定义：id → 显示名称 + 颜色 + 描述
        this.itemDefs = {
            pearl:     { name: '时空静止', color: '#00cccc', glow: 'rgba(0,204,204,0.5)', tip: '敌不动我不动。停下来观察思考。' },
            rewind:    { name: '时间回溯', color: '#4488ff', glow: 'rgba(68,136,255,0.5)', tip: '别急着走，你的前面有你死前的魂灵守护着。' },
            checkpoint:{ name: '存档复活', color: '#00ff88', glow: 'rgba(0,255,136,0.5)', tip: '绿宝石守护着你前行的足迹。' },
            token:     { name: '吭哧二将', color: '#c8a832', glow: 'rgba(200,168,50,0.5)', tip: '吭哧二将是忠实的伙伴，甚至会瞬移替你挡下致命一击。' },
            fakeHorse: { name: '替身假马', color: '#b07830', glow: 'rgba(176,120,48,0.5)', tip: '替你挡下敌人攻击。' }
        };
    },
    
    // 拾取道具时调用
    acquire: function(itemId) {
        if (!this.el) this.init();
        var def = this.itemDefs[itemId];
        if (!def || this.items[itemId]) return; // 已有则不重复
        this.items[itemId] = def;
        this._render();
    },
    
    // 失去道具时调用（如使用回溯后）
    remove: function(itemId) {
        if (!this.items[itemId]) return;
        delete this.items[itemId];
        this._render();
    },
    
    // 关卡加载时重置
    reset: function() {
        this.items = {};
        if (this.el) this._render();
    },
    
    _render: function() {
        if (!this.el) return;
        var keys = Object.keys(this.items);
        if (keys.length === 0) {
            this.el.classList.remove('visible');
            this.el.innerHTML = '';
            return;
        }
        this.el.classList.add('visible');
        var html = '<div class="hover-hint">悬停查看</div>';
        for (var i = 0; i < keys.length; i++) {
            var def = this.items[keys[i]];

            html += '<div class="item-row">' +
                '<div class="item-name-line">' +
                '<span class="item-name" style="color:' + def.color + ';text-shadow:0 0 6px ' + def.glow + ';">' + def.name + '</span>' +
                '<span class="item-dot" style="background:' + def.color + ';box-shadow:0 0 4px ' + def.glow + ';"></span>' +
                '</div>' +
                tipHtml +
                '</div>';
        }
        this.el.innerHTML = html;
    }
};

/* ==================== 盾卫接近提示文字系统 ==================== */
var ShieldEnemyHint = {
    active: false,
    timer: 0,
    duration: 300, // 5秒（60fps * 5）
    triggered: false, // 只触发一次
    targetX: 0,
    targetY: 0,
    
    check: function() {
        if (state.currentLevel !== 1) { this.active = false; return; }
        if (!state.player) { this.active = false; return; }
        if (this.triggered) {
            if (!this.active) return;
            // 盾卫全部被击杀则立即消失
            var hasShield = false;
            for (var i = 0; i < state.enemies.length; i++) {
                if (state.enemies[i] instanceof ShieldDefender || state.enemies[i] instanceof ShieldPartner) {
                    hasShield = true; break;
                }
            }
            if (!hasShield) { this.active = false; return; }
            this.timer++;
            if (this.timer >= this.duration) {
                this.active = false;
            } else {
                this.updateTargetPosition();
            }
            return;
        }
        // 寻找存活的盾卫（ShieldDefender 或 ShieldPartner），检查是否进入画面
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                // 判断盾卫是否在摄像机可视范围内
                if (e.x + e.w > camera.x && e.x < camera.x + 320) {
                    this.triggered = true;
                    this.active = true;
                    this.timer = 0;
                    this.updateTargetPosition();
                    return;
                }
            }
        }
    },
    
    updateTargetPosition: function() {
        // 找到存活的盾卫来跟随
        var shieldEnemy = null;
        for (var i = 0; i < state.enemies.length; i++) {
            var e = state.enemies[i];
            if (e instanceof ShieldDefender || e instanceof ShieldPartner) {
                shieldEnemy = e;
                break;
            }
        }
        if (shieldEnemy) {
            this.targetX = shieldEnemy.x + shieldEnemy.w / 2;
            this.targetY = shieldEnemy.y - 8;
        }
    },
    
    draw: function() {
        if (!this.active) return;
        
        var text = '注意盾牌。移动的靶子也是靶子';
        ctx.save();
        ctx.font = "bold 9px 'FZPixel'";
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        
        // 文字跟随盾卫位置
        var textX = this.targetX + 10;
        var textY = this.targetY;
        
        // 淡入淡出效果
        var fadeIn = Math.min(1, this.timer / 20);
        var fadeOut = this.timer > (this.duration - 30) ? (this.duration - this.timer) / 30 : 1;
        var alpha = fadeIn * fadeOut;
        
        ctx.globalAlpha = alpha;
        
        // 半透明黑色背景
        var metrics = ctx.measureText(text);
        var tw = metrics.width;
        var th = 9;
        var padX = 4, padY = 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(textX - padX, textY - th - padY, tw + padX * 2, th + padY * 2);
        
        // 黄色文字
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(text, textX, textY);
        
        ctx.restore();
    },
    
    reset: function() {
        this.active = false;
        this.timer = 0;
        this.triggered = false;
    }
};
