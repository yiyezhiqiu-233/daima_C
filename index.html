/* ==================== 标题画面（海面 + 小船 + 玩家） ==================== */
var TitleScreen = {
    active: true,
    tick: 0,
    _stars: null, // 预生成星星位置
    // 按钮定义（画布坐标系）
    buttons: [
        { label: '孤剑独行（单人）', x: 70, y: 66, w: 180, h: 14, action: 'single' },
        { label: '双剑合璧（双人）', x: 70, y: 86, w: 180, h: 14, action: 'dual' },
        { label: '传书作者', x: 70, y: 106, w: 180, h: 14, action: 'author' }
    ],
    hoveredBtn: -1, // 当前鼠标悬停的按钮索引

    start: function() {
        this.active = true;
        this.tick = 0;
        showAuthorModal = false;
        // 移除双人模式CSS
        var gc = document.getElementById('game-container');
        if (gc) gc.classList.remove('dual-mode');
        canvas.width = 320; canvas.height = 180;
        // 预生成星星
        if (!this._stars) {
            this._stars = [];
            for (var i = 0; i < 60; i++) {
                this._stars.push({
                    x: Math.random() * 320,
                    y: Math.random() * 75,
                    size: Math.random() < 0.15 ? 2 : 1,
                    twinkleSpeed: 0.02 + Math.random() * 0.03,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    brightness: 0.3 + Math.random() * 0.7
                });
            }
        }
    },

    update: function() {
        if (!this.active) return;
        this.tick++;
    },

    draw: function(ctx) {
        if (!this.active) return;
        var w = 320, h = 180;
        var t = this.tick;

        // —— 深蓝夜空渐变背景 ——
        var skyGrad = ctx.createLinearGradient(0, 0, 0, h);
        skyGrad.addColorStop(0, '#050a1a');
        skyGrad.addColorStop(0.35, '#0a1530');
        skyGrad.addColorStop(0.55, '#0d1a3a');
        skyGrad.addColorStop(1, '#081020');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h);

        // —— 星空 ——
        for (var si = 0; si < this._stars.length; si++) {
            var star = this._stars[si];
            var twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * star.twinkleSpeed + star.twinkleOffset));
            var sa = star.brightness * twinkle;
            if (star.size === 2) {
                // 亮星：带十字光芒
                ctx.fillStyle = 'rgba(200,220,255,' + (sa * 0.3) + ')';
                ctx.fillRect(Math.floor(star.x) - 1, Math.floor(star.y), 3, 1);
                ctx.fillRect(Math.floor(star.x), Math.floor(star.y) - 1, 1, 3);
            }
            ctx.fillStyle = 'rgba(200,220,255,' + sa + ')';
            ctx.fillRect(Math.floor(star.x), Math.floor(star.y), star.size, star.size);
        }

        // —— 月亮（右上方，带光晕） ——
        var moonX = 265, moonY = 28, moonR = 14;
        // 最外层柔光
        ctx.fillStyle = 'rgba(255,245,210,0.04)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2); ctx.fill();
        // 中层光晕
        ctx.fillStyle = 'rgba(255,245,220,0.06)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 2, 0, Math.PI * 2); ctx.fill();
        // 内层光晕
        ctx.fillStyle = 'rgba(255,250,230,0.1)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 1.4, 0, Math.PI * 2); ctx.fill();
        // 月亮本体
        ctx.fillStyle = 'rgba(255,248,220,0.35)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,252,240,0.6)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 0.65, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,245,0.85)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 0.35, 0, Math.PI * 2); ctx.fill();

        // —— 远山剪影 ——
        ctx.fillStyle = '#0c1628';
        ctx.beginPath();
        ctx.moveTo(0, 85);
        ctx.lineTo(30, 68); ctx.lineTo(55, 75); ctx.lineTo(80, 58);
        ctx.lineTo(110, 72); ctx.lineTo(140, 62); ctx.lineTo(165, 70);
        ctx.lineTo(195, 55); ctx.lineTo(220, 65); ctx.lineTo(250, 60);
        ctx.lineTo(280, 70); ctx.lineTo(305, 63); ctx.lineTo(320, 72);
        ctx.lineTo(320, 90); ctx.lineTo(0, 90);
        ctx.closePath(); ctx.fill();

        // 近山（更暗）
        ctx.fillStyle = '#091020';
        ctx.beginPath();
        ctx.moveTo(0, 92);
        ctx.lineTo(25, 80); ctx.lineTo(50, 86); ctx.lineTo(75, 78);
        ctx.lineTo(100, 85); ctx.lineTo(130, 76); ctx.lineTo(160, 83);
        ctx.lineTo(185, 75); ctx.lineTo(210, 82); ctx.lineTo(240, 78);
        ctx.lineTo(265, 84); ctx.lineTo(290, 77); ctx.lineTo(320, 85);
        ctx.lineTo(320, 95); ctx.lineTo(0, 95);
        ctx.closePath(); ctx.fill();

        // —— 水面 ——
        var waterY = 90;
        // 水面底色（比天空更深）
        var waterGrad = ctx.createLinearGradient(0, waterY, 0, h);
        waterGrad.addColorStop(0, '#0a1530');
        waterGrad.addColorStop(1, '#060e20');
        ctx.fillStyle = waterGrad;
        ctx.fillRect(0, waterY, w, h - waterY);

        // 月光倒影（水面竖直光柱）
        var refX = moonX;
        for (var ri = 0; ri < 20; ri++) {
            var ry = waterY + 3 + ri * 4;
            var rw = 2 + Math.sin(t * 0.03 + ri * 0.8) * 1.5;
            var ra = 0.12 - ri * 0.005;
            if (ra > 0) {
                ctx.fillStyle = 'rgba(255,245,210,' + ra + ')';
                ctx.fillRect(Math.floor(refX - rw + Math.sin(t * 0.02 + ri) * 2), ry, Math.ceil(rw * 2), 1);
            }
        }

        // 水面波纹线
        for (var wl = 0; wl < 10; wl++) {
            var wy = waterY + 5 + wl * 9;
            var wa = 1 + Math.sin(t * 0.015 + wl * 1.5) * 0.8;
            var wf = 0.025 + wl * 0.004;
            var ws = 0.4 + wl * 0.08;
            ctx.strokeStyle = 'rgba(80,120,180,' + (0.06 + Math.sin(t * 0.012 + wl * 2.5) * 0.025) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (var x2 = 0; x2 <= w; x2 += 2) {
                var wyy = wy + Math.sin(x2 * wf + t * ws * 0.04) * wa
                    + Math.sin(x2 * wf * 0.6 + t * ws * 0.025 + 2) * (wa * 0.4);
                if (x2 === 0) ctx.moveTo(x2, wyy);
                else ctx.lineTo(x2, wyy);
            }
            ctx.stroke();
        }

        // 水面碎光
        for (var sp = 0; sp < 15; sp++) {
            var sx = (sp * 29 + t * 0.2) % (w + 20) - 10;
            var sy = waterY + 4 + sp * 6 + Math.sin(t * 0.018 + sp * 2.3) * 3;
            var sa2 = 0.08 + Math.sin(t * 0.025 + sp * 1.9) * 0.06;
            if (sa2 > 0 && sy < h) {
                ctx.fillStyle = 'rgba(180,210,255,' + sa2 + ')';
                ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 1);
            }
        }

        // —— 小船（像素风） ——
        var boatX = 155;
        var boatY = 120 + Math.sin(t * 0.03) * 2.5 + Math.sin(t * 0.048) * 1.2;
        var boatTilt = Math.sin(t * 0.03) * 0.025;

        ctx.save();
        ctx.translate(boatX, boatY);
        ctx.rotate(boatTilt);

        // 船体
        ctx.fillStyle = '#3a2a18';
        ctx.beginPath();
        ctx.moveTo(-18, 0); ctx.lineTo(-14, 8); ctx.lineTo(14, 8); ctx.lineTo(18, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#5a4228';
        ctx.beginPath();
        ctx.moveTo(-16, 0); ctx.lineTo(-12, 5); ctx.lineTo(12, 5); ctx.lineTo(16, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#6a5238'; ctx.fillRect(-16, -1, 32, 1);
        ctx.fillStyle = '#4a3220'; ctx.fillRect(-19, -1, 3, 2); ctx.fillRect(16, -1, 3, 2);

        // 船夫（斗笠白衣剑客）
        // 斗笠
        ctx.fillStyle = '#5c4533'; ctx.fillRect(-3, -16, 14, 2);
        ctx.fillStyle = '#3a2a1e'; ctx.fillRect(-1, -18, 10, 2);
        ctx.fillStyle = '#4a3828'; ctx.fillRect(1, -17, 6, 1);
        // 脸部
        ctx.fillStyle = '#d4a574'; ctx.fillRect(1, -14, 6, 3);
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(5, -13, 1, 1);
        // 白衣
        ctx.fillStyle = '#e8e0d0'; ctx.fillRect(0, -11, 8, 4);
        ctx.fillStyle = '#c8c0b0'; ctx.fillRect(3, -11, 2, 4);
        // 腰带
        ctx.fillStyle = '#8b6914'; ctx.fillRect(0, -7, 8, 1);
        ctx.fillStyle = '#d4af37'; ctx.fillRect(3, -8, 2, 1);
        // 下身
        ctx.fillStyle = '#d0c8b8'; ctx.fillRect(1, -6, 6, 3);
        ctx.fillStyle = '#2a2420'; ctx.fillRect(1, -3, 2, 2); ctx.fillRect(5, -3, 2, 2);
        // 剑
        ctx.fillStyle = '#b0b8c0'; ctx.fillRect(8, -18, 1, 12);
        ctx.fillStyle = '#8b6914'; ctx.fillRect(7, -9, 3, 1);
        ctx.fillStyle = '#e0e8f0'; ctx.fillRect(8, -18, 1, 2);

        ctx.restore();

        // 船周水花
        for (var splash = 0; splash < 4; splash++) {
            var spx = boatX - 18 + splash * 12 + Math.sin(t * 0.04 + splash) * 2.5;
            var spy = boatY + 6 + Math.sin(t * 0.055 + splash * 2) * 1.5;
            ctx.fillStyle = 'rgba(150,190,230,' + (0.08 + Math.sin(t * 0.04 + splash) * 0.04) + ')';
            ctx.fillRect(Math.floor(spx), Math.floor(spy), 3, 1);
        }

        // —— 金色装饰边框 ——
        ctx.strokeStyle = 'rgba(180,150,60,0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, w - 8, h - 8);
        // 内边框
        ctx.strokeStyle = 'rgba(180,150,60,0.25)';
        ctx.lineWidth = 1;
        ctx.strokeRect(7, 7, w - 14, h - 14);
        // 四角装饰
        var cornerLen = 12;
        ctx.strokeStyle = 'rgba(200,170,70,0.6)';
        ctx.lineWidth = 1.5;
        // 左上
        ctx.beginPath(); ctx.moveTo(4, 4 + cornerLen); ctx.lineTo(4, 4); ctx.lineTo(4 + cornerLen, 4); ctx.stroke();
        // 右上
        ctx.beginPath(); ctx.moveTo(w - 4 - cornerLen, 4); ctx.lineTo(w - 4, 4); ctx.lineTo(w - 4, 4 + cornerLen); ctx.stroke();
        // 左下
        ctx.beginPath(); ctx.moveTo(4, h - 4 - cornerLen); ctx.lineTo(4, h - 4); ctx.lineTo(4 + cornerLen, h - 4); ctx.stroke();
        // 右下
        ctx.beginPath(); ctx.moveTo(w - 4 - cornerLen, h - 4); ctx.lineTo(w - 4, h - 4); ctx.lineTo(w - 4, h - 4 - cornerLen); ctx.stroke();

        // —— 左上角标题 "江湖浮沉" ——
        ctx.save();

        var titleBreathe = 0.8 + Math.sin(t * 0.02) * 0.2;
        ctx.globalAlpha = titleBreathe;
        ctx.font = "bold 20px 'FZPixel'";
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        // 描边
        ctx.strokeStyle = '#1a0a00';
        ctx.lineWidth = 1.5;
        ctx.strokeText('江湖浮沉', 22, 30);
        // 金色填充
        ctx.fillStyle = '#ffd740';
        ctx.shadowColor = 'rgba(255,200,50,0.4)';
        ctx.shadowBlur = 8;
        ctx.fillText('江湖浮沉', 22, 30);
        ctx.shadowBlur = 0;
        ctx.restore();

        // —— "按下任意键开始游戏" 呼吸提示（居中偏上） ——
        var promptAlpha = 0.25 + Math.sin(t * 0.025) * 0.2;
        ctx.save();
        ctx.globalAlpha = promptAlpha;
        ctx.font = "9px 'FZPixel'";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#c8a832';
        ctx.shadowColor = '#c8a832';
        ctx.shadowBlur = 4;
        ctx.fillText('选择模式开始游戏', 160, 56);
        ctx.restore();

        // —— 三个模式选择按钮（画布绘制） ——
        for (var bi = 0; bi < this.buttons.length; bi++) {
            var btn = this.buttons[bi];
            var isHover = (this.hoveredBtn === bi);
            var btnAlpha = isHover ? 0.95 : 0.7 + Math.sin(t * 0.03 + bi * 1.2) * 0.1;
            ctx.save();
            ctx.globalAlpha = btnAlpha;
            // 按钮背景
            ctx.fillStyle = isHover ? 'rgba(20,15,5,0.9)' : 'rgba(12,8,3,0.85)';
            ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
            // 金色边框
            ctx.strokeStyle = isHover ? '#ffd740' : '#c8a800';
            ctx.lineWidth = isHover ? 1.5 : 1;
            ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
            // 按钮文字
            ctx.globalAlpha = isHover ? 1 : 0.85;
            ctx.font = "9px 'FZPixel'";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isHover ? '#ffe880' : '#d4b840';
            if (isHover) {
                ctx.shadowColor = '#ffd740';
                ctx.shadowBlur = 4;
            }
            ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2);
            ctx.restore();
        }

        // —— 右下角操作说明 ——
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.font = "7px 'FZPixel'";
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#aa9955';
        ctx.fillText('WASD 移动', w - 14, h - 22);
        ctx.fillText('空格 挥剑', w - 14, h - 12);
        ctx.restore();

        // —— 左下角作者信息 ——
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.font = "7px 'FZPixel'";
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#887744';
        ctx.fillText('作者：25级产品设计1班吴煜城', 14, h - 12);
        ctx.restore();
    }
};

/* ==================== 初始化 ==================== */
function init(){
    // 双人模式：调整画布和CSS
    if (gameMode === 'dual') {
        canvas.width = 320;
        canvas.height = 360;
        var gc = document.getElementById('game-container');
        if (gc) gc.classList.add('dual-mode');
    } else {
        canvas.width = 320;
        canvas.height = 180;
        var gc = document.getElementById('game-container');
        if (gc) gc.classList.remove('dual-mode');
    }
    
    // 双人模式重置按键状态
    state2Keys = {};
    player2AttackPressed = false;
    state.player2 = null;

    // 尝试加载存档
    var savedGame = loadGame();
    
    state.keys={};
    state.projectiles=[];
    state.effects=[];
    state.dyingEnemies=[];
    state.running=true;
    state.timeStopped=false;
    state.stopTimer=0;
    state.stopStartTime=0;
    state.globalTick=0;
    FateScreen.active = false;
    DualFateScreen.active = false;
    fateDescOverlay.style.display = 'none';
    state.isMoving=false;
    state.transitioning=false;
    state.bloodLevel=0;
    state.l2TotalEnemies=0;
    state.l2KilledEnemies=0;
    bloodDrips=[];
    
    hasRewind=false;
    isRewinding=false;
    bossRewinding=false;
    bossRewindTarget=0;
    bossRespawnTimer=0;
    rewindIndex=0;
    stateHistory=[];
    lastFrameTime=performance.now();
    L3RewindAnim.active=false;
    JourneyCinematic.active=false;
    L3RewindPickupHint.active=false;
    L2TimeStopPickupHint.reset();
    SFX.stopTick();
    SFX.stopRewind();
    Dash.active = false; Dash.timer = 0; Dash.trail = []; Dash.lastKeyTime = {}; Dash.keyHeld = {};
    Dash2.active = false; Dash2.timer = 0; Dash2.trail = []; Dash2.lastKeyTime = {}; Dash2.keyHeld = {};
    L1MissionPause.reset();
    L2TimeStopPause.reset();
    hideMissionHint();
    
    msgScreen.style.display='none';
    LevelStartEffect.hide();
    stopDisplay.style.display='none';
    markHint.style.display='none';
    rewindDisplay.style.display='none';
    
    if (savedGame && savedGame.currentLevel) {
        // 从存档加载
        state.lastCheckpoint = savedGame.checkpoint;
        loadLevel(savedGame.currentLevel);
        if (savedGame.checkpoint) {
            state.player.x = savedGame.checkpoint.x;
            state.player.y = savedGame.checkpoint.y;
            ItemStatus.acquire('checkpoint');
        }
    } else {
        // 新游戏
        state.lastCheckpoint = null;
        loadLevel(1);
    }
}

/* ==================== 主循环 ==================== */
function gameLoop(currentTime){
    // 标题画面阶段
    if(TitleScreen.active){
        TitleScreen.update();
        ctx.clearRect(0, 0, 320, 200);
        TitleScreen.draw(ctx);
        requestAnimationFrame(gameLoop);
        return;
    }

    if(!state.running&&!isRewinding&&!L3Trap.playerFalling&&!L3RewindAnim.active&&!JourneyCinematic.active){
        // 江湖命格/双人命格独立页面
        if(FateScreen.active || DualFateScreen.active){
            if(FateScreen.active) FateScreen.update();
            if(DualFateScreen.active) DualFateScreen.update();
            ctx.clearRect(0, 0, 320, 200);
            if(FateScreen.active) FateScreen.draw(ctx);
            if(DualFateScreen.active) DualFateScreen.draw(ctx);
            return requestAnimationFrame(gameLoop);
        }
        // 结局画面阶段
        if(EndingScreen.active){
            EndingScreen.update();
            ctx.clearRect(0, 0, 320, 200);
            EndingScreen.draw(ctx);
        }
        return requestAnimationFrame(gameLoop);
    }
    state.globalTick++;
    
    var deltaTime=currentTime-lastFrameTime;
    lastFrameTime=currentTime;
    // 计算时间因子，以60Hz为基准
    var timeFactor = deltaTime / (1000/60);
    timeFactor = Math.min(timeFactor, 3); // 限制最大时间因子，防止游戏在低帧率下速度过快

    // 更新摄像机位置
    updateCamera();
    if(gameMode === 'dual') updateCamera2();

    if(isRewinding){
        if(bossRewinding){
            updateBossRewind();updateShake();updateAmbient();
            ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
            drawRewindFrame();
            ctx.restore();
        }else{
            updateRewind();updateShake();updateAmbient();
            ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
            drawRewindFrame();
            ctx.restore();
        }
        requestAnimationFrame(gameLoop);return;
    }

    // 第三关：回溯倒退动画阶段
    if(L3RewindAnim.active){
        L3RewindAnim.update();
        updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        L3Trap.draw();
        // 绘制替身
        drawL3Ghost();
        // 绘制倒退中的玩家（半透明，带残影效果）
        drawL3RewindPlayer();
        drawEffects();
        L3Dark.draw();
        drawL3RewindOverlay();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 通关倒放电影阶段
    if(JourneyCinematic.active){
        JourneyCinematic.update();
        ctx.save();
        ctx.clearRect(0,0,320,200);
        drawJourneyCinematic();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 第三关：玩家掉落动画阶段
    if(L3Trap.playerFalling){
        L3Trap.update();updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        L3Trap.draw();
        drawL3Torches();
        drawAmbient();
        drawCheckpoint();
        L3Dark.draw();
        ctx.restore();
        requestAnimationFrame(gameLoop);return;
    }

    // 关卡开始提示阶段：单人模式暂停游戏逻辑（双人模式不冻结，允许操作）
    if(LevelStartEffect.active && gameMode !== 'dual' && !L3Trap.playerFalling){
        LevelStartEffect.update();
        updateShake();updateAmbient();
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.enemies.forEach(function(e){e.draw();});
        drawEffects();
        drawRidingHorse();
        state.player.draw();
        L3Dark.draw();
        ctx.restore();
        // 第一关：WASD 按键提示（屏幕空间）
        WASDHint.update();
        WASDHint.draw();
        LevelStartEffect.draw(ctx);
        requestAnimationFrame(gameLoop);return;
    }
    // 双人模式：LevelStartEffect 不冻结，但需要推进计时器让其自然结束
    if(LevelStartEffect.active && gameMode === 'dual'){
        LevelStartEffect.update();
    }

    // 第一关：首次移动后任务暂停（单人模式冻结，双人模式跳过）
    if (gameMode !== 'dual') L1MissionPause.check();
    if (L1MissionPause.active && gameMode !== 'dual') {
        L1MissionPause.update();
        updateShake(); updateAmbient();
        ctx.save(); ctx.translate(shake.x - camera.x, shake.y); ctx.clearRect(camera.x - 10, -10, 340, 200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.enemies.forEach(function(e){e.draw();});
        drawEffects();
        drawRidingHorse();
        state.player.draw();
        L3Dark.draw();
        ctx.restore();
        // 暂停期间绘制暗色遮罩和任务强调
        L1MissionPause.draw();
        requestAnimationFrame(gameLoop); return;
    }

    // 第二关：时间静止道具暂停（已移除冻结，仅更新计时器让其自然结束）
    if (L2TimeStopPause.active) {
        L2TimeStopPause.update();
    }

    state.player.update(timeFactor);
    // 双人模式：更新玩家2
    var p1Moving = (state.player.vx !== 0 || state.player.vy !== 0);
    if(gameMode === 'dual' && state.player2){
        state.player2.update(timeFactor);
        var p2Moving = (state.player2.vx !== 0 || state.player2.vy !== 0);
        state.isMoving = p1Moving || p2Moving;
    } else {
        state.isMoving = p1Moving;
    }
    // 双人模式：两个玩家都靠自动靠近击杀
    if(gameMode === 'dual'){
        performAttack(state.player);
        if(state.player2) performAttack(state.player2);
    } else {
        performAttack(state.player);
    }
    // 双击冲刺
    Dash.update();
    Dash.applyMove();
    // 双人模式：玩家2冲刺
    if (gameMode === 'dual') { Dash2.update(); Dash2.applyMove(); }
    // 连杀计时器递减
    if(comboTimer > 0) comboTimer--;
    if(comboTimer <= 0) comboCount = 0;
    captureState();
    // 第三关：录制玩家行动
    L3ActionRec.capture();
    // 双人模式：录制玩家2行动
    if (gameMode === 'dual') L3ActionRec2.capture();
    // 通关电影：录制旅程
    JourneyRec.capture();

    if(state.timeStopped){
        var elapsed=performance.now()-state.stopStartTime;
        state.stopTimer=Math.max(0,STOP_DURATION-elapsed);
        updateStopUI();
        if(state.stopTimer<=0){
            state.timeStopped=false;stopDisplay.style.display='none';
            SFX.stopTick();
            SFX.timeStopEnd();
            launchMarkedEnemies();
        }
    }

    // 第四关：Boss自动复活计时
    if (bossRespawnTimer > 0) {
        bossRespawnTimer--;
        if (bossRespawnTimer <= 0) {
            var newBoss = new MeleeBoss(bossRespawnPos.x, bossRespawnPos.y);
            state.enemies.push(newBoss);
            state.effects.push({ life: 10, maxLife: 10, type: 'flash' });
            triggerShake(2, 6);
        }
    }
    state.enemies.forEach(function(e){e.update(timeFactor);});
    state.projectiles.forEach(function(k){k.update(timeFactor);});
    state.projectiles=state.projectiles.filter(function(k){return k.alive;});

    // 第二关：更新石门和滚石
    StoneDoor.update(timeFactor);
    RollingBoulder.update(timeFactor);
    
    // 第三关：更新机关陷阱
    L3Trap.update();
    // 第二关：更新密室石门系统
    L2SecretDoor.update();
    // 第三关：更新黑暗迷雾
    L3Dark.update();
    // 第三关：更新替身
    updateL3Ghost();
    // 更新保镖
    state.bodyguards.forEach(function(bg){ bg.update(timeFactor); });
    // 第三关：更新拾取回溯宝石提示
    L3RewindPickupHint.update();
    // 第三关：更新拾取令牌提示
    L3TokenPickupHint.update();
    // 第二关：更新拾取时间静止宝石提示
    L2TimeStopPickupHint.update();

    for(var di=state.dyingEnemies.length-1;di>=0;di--){
        state.dyingEnemies[di].update();
        if(state.dyingEnemies[di].isDead()){
            state.dyingEnemies.splice(di,1);
        }
    }

    checkCollisions();
    checkCheckpoint();
    checkLevelComplete();
    updateShake();updateAmbient();updateBloodDrips();

    if(gameMode === 'dual' && state.player2) {
        // =============== 双人模式：分屏渲染（同一世界） ===============
        ctx.clearRect(0, 0, 320, 360);
        
        // === 上半部分：玩家1视角 ===
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, 320, 178);
        ctx.clip();
        ctx.translate(shake.x - camera.x, shake.y);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.projectiles.forEach(function(k){k.draw();});
        state.enemies.forEach(function(e){e.draw();});
        state.dyingEnemies.forEach(function(de){de.draw();});
        state.bodyguards.forEach(function(bg){ bg.draw(); });
        drawEffects();
        drawRidingHorse();
        drawL3Ghost();
        Dash.drawTrail();
        Dash2.drawTrail();
        state.player.draw();
        state.player2.draw();
        if(state.timeStopped)drawTimeStopOverlay();
        ScarecrowHint.check();
        ScarecrowHint.draw();
        ShieldEnemyHint.check();
        ShieldEnemyHint.draw();
        L2SecretDoor.draw();
        L3Dark.draw();
        ctx.restore();
        
        // 金色分隔线
        ctx.fillStyle = 'rgba(200,168,0,0.8)';
        ctx.fillRect(0, 179, 320, 2);
        
        // === 下半部分：玩家2视角 ===
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 182, 320, 178);
        ctx.clip();
        ctx.translate(shake.x - camera2.x, 182 + shake.y);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.projectiles.forEach(function(k){k.draw();});
        state.enemies.forEach(function(e){e.draw();});
        state.dyingEnemies.forEach(function(de){de.draw();});
        state.bodyguards.forEach(function(bg){ bg.draw(); });
        drawEffects();
        drawRidingHorse();
        drawL3Ghost();
        Dash.drawTrail();
        Dash2.drawTrail();
        state.player.draw();
        state.player2.draw();
        if(state.timeStopped)drawTimeStopOverlay();
        L2SecretDoor.draw();
        L3Dark.draw();
        ctx.restore();
        
        // 玩家标识文字
        ctx.save();
        ctx.font = "7px 'FZPixel'";
        ctx.textAlign = 'left';
        ctx.fillStyle = 'rgba(255,215,0,0.6)';
        ctx.fillText('P1', 4, 10);
        ctx.fillStyle = 'rgba(100,150,255,0.6)';
        ctx.fillText('P2', 4, 192);
        ctx.restore();
    } else {
        // =============== 单人模式：原始渲染 ===============
        ctx.save();ctx.translate(shake.x-camera.x,shake.y);ctx.clearRect(camera.x-10,-10,340,200);
        drawBackground();
        state.covers.forEach(function(c){c.draw();});
        state.scarecrows.forEach(function(sc){sc.draw();});
        StoneDoor.draw();
        RollingBoulder.draw();
        L3Trap.draw();
        drawL2Torches();
        drawL3Torches();
        drawAmbient();
        state.pearls.forEach(function(p){drawPearl(p);});
        drawRewindItemSprite();
        drawFakeHorseItem();
        drawBodyguardToken();
        drawCheckpoint();
        state.projectiles.forEach(function(k){k.draw();});
        state.enemies.forEach(function(e){e.draw();});
        state.dyingEnemies.forEach(function(de){de.draw();});
        state.bodyguards.forEach(function(bg){ bg.draw(); });
        drawEffects();
        drawRidingHorse();
        drawL3Ghost();
        Dash.drawTrail();
        state.player.draw();
        if(state.timeStopped)drawTimeStopOverlay();
        ScarecrowHint.check();
        ScarecrowHint.draw();
        ShieldEnemyHint.check();
        ShieldEnemyHint.draw();
        L2SecretDoor.draw();
        L3Dark.draw();
        ctx.restore();
    }

    // 绘制屏幕空间内容（不受摄像机偏移影响）
    // 第一关：WASD 按键提示
    WASDHint.update();
    WASDHint.draw();
    // 第一关：方向键按键指引（双人模式P2）
    ArrowHint.update();
    ArrowHint.draw();
    LevelStartEffect.draw(ctx);
    // 第三关：拾取回溯宝石提示框（屏幕右侧固定位置）
    L3RewindPickupHint.draw();
    // 第三关：拾取令牌提示框（屏幕右侧固定位置）
    L3TokenPickupHint.draw();
    // 第二关：拾取时间静止宝石提示框（屏幕右侧固定位置）
    L2TimeStopPickupHint.draw();

    requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',function(e){
    // 标题画面：忽略（通过按钮选择模式开始）
    if(TitleScreen.active){
        if(showAuthorModal){
            // 反馈弹窗打开时：按Escape关闭，其余按键忽略
            if(e.key === 'Escape'){
                showAuthorModal = false;
                document.getElementById('feedback-modal').classList.add('feedback-hidden');
            }
            return;
        }
        // 不再支持任意键直接开始游戏，改为按钮点击
        return;
    }

    // 玩家2控制：方向键存储到state2Keys
    var key = e.key;
    if(key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight'){
        if(showAuthorModal) return; // 反馈弹窗打开时不拦截方向键
        var arrowMap = {'ArrowUp':'w','ArrowDown':'s','ArrowLeft':'a','ArrowRight':'d'};
        var mapped = arrowMap[key];
        state2Keys[mapped] = true;
        // 双人模式：玩家2方向键双击冲刺
        if (gameMode === 'dual') Dash2.onKeyDown(mapped);
        // 双人模式：方向键按键指引
        ArrowHint.onKeyDown(key);
        e.preventDefault();
        return;
    }
    // 江湖命格/双人命格页面：按R关闭（必须在玩家2 Enter攻击之前判断）
    if(FateScreen.active || DualFateScreen.active){
        if(e.key.toLowerCase() === 'r'){
            FateScreen.active = false;
            DualFateScreen.active = false;
            fateDescOverlay.style.display = 'none';
            EndingScreen.active = true;
            EndingScreen.phase = 2;
            EndingScreen.phaseTick = 0;
            EndingScreen.scrollY = 220;
            e.preventDefault();
            return;
        }
        e.preventDefault();
        return;
    }

    // 玩家2攻击：Enter键
    if(key === 'Enter'){
        if(gameMode === 'dual'){
            player2AttackPressed = true;
        }
        e.preventDefault();
        return;
    }
    // 玩家2回溯：右Shift
    if(key === 'Shift' && e.location === KeyboardEvent.DOM_KEY_LOCATION_RIGHT){
        if(gameMode === 'dual' && hasRewind && !isRewinding && state.running){
            triggerRewind(2);
        }
        e.preventDefault();
        return;
    }

    state.keys[key.toLowerCase()]=true;
    WASDHint.onKeyDown(e.key);
    Dash.onKeyDown(e.key);

    // 结局字幕滚完后：任意键回到主页
    if(state.isGameWin && EndingScreen.canPressR){
        state.isGameWin = false;
        EndingScreen.active = false;
        msgScreen.style.display = 'none';
        msgScreen.style.opacity = '1';
        TitleScreen.start();
        return;
    }

    if(e.key.toLowerCase()==='r'){
        if(!state.running){
            localStorage.removeItem(SAVE_KEY);
            // 死亡后按R：从失败关卡重新开始
            var retryLevel = state.currentLevel || 1;
            // 保存第二关密室石门状态（死亡计数等），init/loadLevel会重置
            var _savedL2dc = L2SecretDoor.deathCount;
            var _savedL2op = L2SecretDoor.openProgress;
            var _savedL2sg = L2SecretDoor.showGuide;
            var _savedL2opening = L2SecretDoor.opening;
            var _savedL2active = L2SecretDoor.active;
            var _savedL2moss = L2SecretDoor.mossPatches.slice();
            init();
            loadLevel(retryLevel);
            // 恢复第二关密室石门状态
            if (retryLevel === 2) {
                L2SecretDoor.deathCount = _savedL2dc;
                L2SecretDoor.openProgress = _savedL2op;
                L2SecretDoor.showGuide = _savedL2sg;
                L2SecretDoor.opening = _savedL2opening;
                L2SecretDoor.active = _savedL2active;
                L2SecretDoor.mossPatches = _savedL2moss;
            }
        }
    }
    // 暗藏跳关功能
    if(e.key.toLowerCase()==='p' && state.running){
        var nextId = state.currentLevel + 1;
        if(nextId > LEVELS.length){gameWin();return;}
        state.currentLevel = nextId;
        loadLevel(nextId);
        hasRewind = false;
        rewindDisplay.style.display = 'none';
        isRewinding = false;
        stateHistory = [];
    }
});
window.addEventListener('keyup',function(e){
    if(TitleScreen.active) return;
    // 玩家2按键释放
    var key = e.key;
    if(key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight'){
        var arrowMap = {'ArrowUp':'w','ArrowDown':'s','ArrowLeft':'a','ArrowRight':'d'};
        var mapped = arrowMap[key];
        state2Keys[mapped] = false;
        if (gameMode === 'dual') Dash2.onKeyUp(mapped);
        return;
    }
    state.keys[key.toLowerCase()]=false;Dash.onKeyUp(e.key);
});

// 标题画面：不调用init()，直接启动渲染循环
TitleScreen.start();
requestAnimationFrame(gameLoop);

/* ==================== 标题画面鼠标事件 ==================== */
(function(){
    function getCanvasCoords(e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = 320 / rect.width;
        var scaleY = 180 / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }
    canvas.addEventListener('mousemove', function(e) {
        if (!TitleScreen.active) { TitleScreen.hoveredBtn = -1; return; }
        var pos = getCanvasCoords(e);
        TitleScreen.hoveredBtn = -1;
        for (var i = 0; i < TitleScreen.buttons.length; i++) {
            var btn = TitleScreen.buttons[i];
            if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                TitleScreen.hoveredBtn = i;
                break;
            }
        }
        canvas.style.cursor = TitleScreen.hoveredBtn >= 0 ? 'pointer' : 'default';
    });
    canvas.addEventListener('click', function(e) {
        if (!TitleScreen.active) return;
        if (showAuthorModal) return; // HTML弹窗打开时忽略画布点击
        var pos = getCanvasCoords(e);
        for (var i = 0; i < TitleScreen.buttons.length; i++) {
            var btn = TitleScreen.buttons[i];
            if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                if (btn.action === 'single') {
                    gameMode = 'single';
                    TitleScreen.active = false;
                    L1MissionPause.fullReset();
                    L2TimeStopPause.fullReset();
                    init();
                } else if (btn.action === 'dual') {
                    gameMode = 'dual';
                    TitleScreen.active = false;
                    L1MissionPause.fullReset();
                    L2TimeStopPause.fullReset();
                    init();
                } else if (btn.action === 'author') {
                    showAuthorModal = true;
                    var fbModal = document.getElementById('feedback-modal');
                    fbModal.classList.remove('feedback-hidden');
                }
                return;
            }
        }
    });

    // 反馈弹窗：点击空白区域关闭
    document.getElementById('feedback-modal').addEventListener('click', function(e) {
        if (e.target === this) {
            showAuthorModal = false;
            this.classList.add('feedback-hidden');
        }
    });
})();
</script>
