/* ==================== 关卡管理 ==================== */
function loadLevel(levelId) {
    var level = LEVELS[levelId - 1];
    if (!level) {
        gameWin();
        return;
    }
    
    state.currentLevel = levelId;
    state.enemies = [];
    state.pearls = [];
    state.projectiles = [];
    state.dyingEnemies = [];
    state.covers = [];
    state.scarecrows = [];
    state.scarecrowKilled = 0;
    state.scarecrowInitialCount = 0;
    
    // 血迹染色系统：第二关开始计数，通关后永久保持满血状态
    if (level.id === 2) {
        state.l2TotalEnemies = level.enemies.length;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    } else if (level.id > 2) {
        // 第三关及以后：保持第二关结束时的满血状态（bloodLevel=1）
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        if (state.bloodLevel < 1) state.bloodLevel = 1;
        bloodDrips = [];
    } else {
        state.l2TotalEnemies = 0;
        state.l2KilledEnemies = 0;
        state.bloodLevel = 0;
        bloodDrips = [];
    }
    
    // 重置盾卫接近提示
    ShieldEnemyHint.reset();
    
    // WASD 按键提示初始化（第一关）
    WASDHint.onLevelLoad(levelId);
    ArrowHint.onLevelLoad(levelId);

    // 道具状态提示重置
    ItemStatus.reset();
    
    // 设置玩家位置
    var startPos = state.lastCheckpoint || level.playerStart;
    if (state.player) {
        state.player.x = startPos.x;
        state.player.y = startPos.y;
        state.player.keys = state.keys; // 修复：重新绑定按键引用（init重置state.keys后会断开）
    } else {
        state.player = new Player(startPos.x, startPos.y);
    }
    // 第四关：玩家面朝左边
    if (startPos.facingLeft) {
        state.player.facingRight = false;
    }
    
    // 双人模式：创建/重置玩家2
    if (gameMode === 'dual') {
        if (state.player2) {
            state.player2.x = startPos.x;
            state.player2.y = startPos.y;
        } else {
            state.player2 = new Player(startPos.x, startPos.y);
            state.player2.keys = state2Keys; // 使用方向键
            state.player2.tint = 1; // 蓝色色调区分
        }
        if (startPos.facingLeft) {
            state.player2.facingRight = false;
        }
    }
    
    // 加载敌人
    var defenderRef = null;
    var partnerRef = null;
    level.enemies.forEach(function(e) {
        if (e.type === 'ShieldGuard') {
            var enemy = new ShieldGuard(e.x, e.y, e.name, e.armor, e.tall);
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldDefender') {
            var enemy = new ShieldDefender(e.x, e.y, e.name, e.armor, e.tall);
            defenderRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'ShieldPartner') {
            var enemy = new ShieldPartner(e.x, e.y, e.name, e.armor, e.tall);
            partnerRef = enemy;
            state.enemies.push(enemy);
        } else if (e.type === 'FastPatrolEnemy') {
            var enemy = new FastPatrolEnemy(e.x, e.y, e.patrolX1, e.patrolX2, e.patrolY);
            state.enemies.push(enemy);
        } else if (e.type === 'JavelinEnemy') {
            var enemy = new JavelinEnemy(e.x, e.y, e.patrolX1, e.patrolX2, e.patrolY);
            state.enemies.push(enemy);
        } else if (e.type === 'MeleeBoss') {
            var enemy = new MeleeBoss(e.x, e.y);
            state.enemies.push(enemy);
        } else {
            var enemy = new Enemy(e.x, e.y);
            // 第三关敌人攻击范围加大
            if (state.currentLevel === 3) {
                enemy.attackRange = 180;
            }
            state.enemies.push(enemy);
        }
    });
    
    // 建立搭档关系
    if (defenderRef && partnerRef) {
        defenderRef.partner = partnerRef;
        partnerRef.defender = defenderRef;
    }
    
    // 加载障碍物
    level.covers.forEach(function(c) {
        state.covers.push(new Cover(c.x, c.y, c.w, c.h, c.side, c.invisible));
    });
    
    // 第一关/第四关：加载稻草人（阻挡玩家前进的稻草人墙）
    if ((level.id === 1 || level.id === 4) && level.scarecrowRow) {
        scarecrowCoverIndices = [];
        var row = level.scarecrowRow;
        state.scarecrowInitialCount = row.count;
        state.scarecrowKilled = 0;
        var spacing = (row.yEnd - row.yStart) / (row.count - 1);
        for (var si = 0; si < row.count; si++) {
            var sy = Math.floor(row.yStart + si * spacing);
            var sc = new Scarecrow(row.x, sy);
            state.scarecrows.push(sc);
            // 稻草人作为碰撞体阻挡玩家，记录索引以便击杀时移除
            var coverIdx = state.covers.length;
            state.covers.push(new Cover(row.x, sy - 2, 6, 16, 'top'));
            scarecrowCoverIndices.push(coverIdx);
        }
    } else {
        scarecrowCoverIndices = [];
    }
    
    // 加载珍珠
    level.pearls.forEach(function(p) {
        state.pearls.push({ x: p.x, y: p.y, r: 4, active: true });
    });
    
    // 加载时间回溯道具
    if (level.rewindItem) {
        state.rewindItem = { x: level.rewindItem.x, y: level.rewindItem.y, active: true };
    } else {
        state.rewindItem = { x: 0, y: 0, active: false };
    }
    
    // 加载假马道具
    if (level.fakeHorse) {
        state.fakeHorse = { x: level.fakeHorse.x, y: level.fakeHorse.y, active: true, riding: false, hp: 0, hitFlash: 0 };
    } else {
        state.fakeHorse = null;
    }
    
    // 加载令牌道具
    if (level.bodyguardToken) {
        state.bodyguardToken = { x: level.bodyguardToken.x, y: level.bodyguardToken.y, active: true };
    } else {
        state.bodyguardToken = null;
    }
    state.bodyguards = [];
    state.l3NightVision = false;
    state.slowZones = level.slowZones || null;
    
    // 第二关：初始化石门和滚石
    StoneDoor.reset();
    RollingBoulder.reset();
    L3Trap.reset();
    if (level.id === 2 && level.stoneDoor) {
        StoneDoor.init(level.stoneDoor);
    }
    if (level.id === 2 && level.boulder) {
        RollingBoulder.init(level.boulder);
    }
    if (level.id === 2) {
        L2SecretDoor.init();
    }
    if (level.id === 3) {
        L3Trap.init();
        if (l3DarkPreserve) {
            L3Dark.onRespawn();
        } else {
            L3Dark.init();
            // 首次进入第三关时启动行动录制，替身重置
            L3ActionRec.start();
            if (gameMode === 'dual') L3ActionRec2.start();
            L3GhostsClear();
        }
    } else {
        L3Dark.reset();
        L3ActionRec.reset();
        if (gameMode === 'dual') L3ActionRec2.reset();
        L3GhostsClear();
    }
    
    // 渲染关卡背景
    renderLevelBG(level);
    
    // 第四关：将减速区域纹理烘焙到背景画布上
    if (level.id === 4 && level.slowZones) {
        level.slowZones.forEach(function(sz) {
            // 深雪底色（极淡）
            bgCtx.fillStyle = 'rgba(150,160,180,0.13)';
            bgCtx.fillRect(sz.x, sz.y, sz.w, sz.h);
            // 深雪内部纹理（用固定种子绘制小点）
            var seed = sz.x * 7 + sz.y * 13;
            for (var di = 0; di < 12; di++) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                var dx = sz.x + (seed % sz.w);
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                var dy = sz.y + (seed % sz.h);
                bgCtx.fillStyle = 'rgba(140,148,172,0.1)';
                bgCtx.fillRect(dx, dy, 2, 1);
            }
            // 边缘微弱阴影
            bgCtx.fillStyle = 'rgba(140,148,172,0.06)';
            bgCtx.fillRect(sz.x, sz.y, sz.w, 1);
            bgCtx.fillRect(sz.x, sz.y + sz.h - 1, sz.w, 1);
            bgCtx.fillRect(sz.x, sz.y, 1, sz.h);
            bgCtx.fillRect(sz.x + sz.w - 1, sz.y, 1, sz.h);
        });
    }
    
    // 更新UI
    if (levelNumberEl) levelNumberEl.innerText = levelId;
    if (levelNameEl) levelNameEl.innerText = level.name;
    
    // 重置状态
    state.timeStopped = false;
    state.stopTimer = 0;
    state.running = true;
    stopDisplay.style.display = 'none';
    markHint.style.display = 'none';
    rewindDisplay.style.display = 'none';
    SFX.stopTick();
    SFX.stopRewind();
    hasRewind = false;
    stateHistory = [];
    camera.x = 0;
    
    // 初始化环境粒子
    initAmbient();
    
    // 保存游戏
    saveGame();
    
    // 显示关卡开始提示
    LevelStartEffect.show(level);
    
    // 确保前一关的暂停状态被清除（防止跨关卡冻结）
    L1MissionPause.active = false;
    L1MissionPause.timer = 0;
}

/* ==================== 绿宝石存档点 ==================== */
function drawCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    
    var x = px(level.checkpoint.x);
    var y = px(level.checkpoint.y);
    
    var pulse = 0.6 + Math.sin(state.globalTick * 0.08) * 0.4;
    
    // 第四关：根据玩家距离动态点亮绿宝石
    if (state.currentLevel === 4) {
        var distToGem = Math.hypot(state.player.x + 4 - level.checkpoint.x, state.player.y + 6 - level.checkpoint.y);
        var proximity = Math.max(0, 1 - distToGem / 80); // 0~1，越近越亮
        var glowAlpha = 0.06 + proximity * 0.2;
        var gemBright = proximity;
        
        // 光晕
        drawPxCircle(x, y, 5 + proximity * 4, 'rgba(0,255,136,'+(glowAlpha*pulse)+')');
        drawPxCircle(x, y, 3 + proximity * 2, 'rgba(0,255,136,'+(glowAlpha*1.5*pulse)+')');
        
        // 宝石本体（颜色随距离变亮）
        var gr = Math.floor(proximity * 170);
        var gg = Math.floor(136 + proximity * 119);
        var gb = Math.floor(68 + proximity * 136);
        var gemColor = 'rgb('+gr+','+gg+','+gb+')';
        ctx.fillStyle = gemColor;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        // 高光中心
        var hlAlpha = 0.4 + proximity * 0.6;
        ctx.fillStyle = 'rgba(170,255,204,'+hlAlpha+')';
        ctx.fillRect(x,y-1,1,1);
        
        // 靠近时产生粒子
        if (proximity > 0.5 && state.globalTick % (proximity > 0.8 ? 4 : 8) === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
        return;
    }
    
    // 其他关卡：判断是否已激活（玩家已触碰）
    var activated = state.lastCheckpoint && 
                    state.lastCheckpoint.x === level.checkpoint.x;
    
    if (activated) {
        // 激活状态 - 亮绿色
        drawPxCircle(x, y, 5, 'rgba(0,255,136,'+(0.15*pulse)+')');
        drawPxCircle(x, y, 3, 'rgba(0,255,136,'+(0.3*pulse)+')');
        ctx.fillStyle = PAL.emerald;
        ctx.fillRect(x-1,y-2,3,1);ctx.fillRect(x-2,y-1,5,1);
        ctx.fillRect(x-3,y,7,1);ctx.fillRect(x-2,y+1,5,1);
        ctx.fillRect(x-1,y+2,3,1);
        ctx.fillStyle = '#aaffcc';
        ctx.fillRect(x,y-1,1,1);
        
        // 粒子效果
        if (state.globalTick % 8 === 0) {
            state.effects.push({
                x: level.checkpoint.x + (Math.random()-0.5)*10,
                y: level.checkpoint.y + (Math.random()-0.5)*6,
                life: 12, maxLife: 12, type: 'gem-spark'
            });
        }
    } else {
        // 未激活状态 - 暗绿色
        drawPxCircle(x, y, 4, 'rgba(0,200,100,0.1)');
        ctx.fillStyle = '#008844';
        ctx.fillRect(x-1,y-1,3,1);ctx.fillRect(x-2,y,5,1);
        ctx.fillRect(x-1,y+1,3,1);
        ctx.fillStyle = '#00aa55';
        ctx.fillRect(x,y,1,1);
    }
}

function checkCheckpoint() {
    var level = LEVELS[state.currentLevel - 1];
    if (!level.checkpoint) return;
    // 第四关：绿宝石是通关出口，不作为存档点
    if (state.currentLevel === 4) return;
    
    // 检测两个玩家是否触碰检查点
    var players = [state.player];
    if(gameMode === 'dual' && state.player2) players.push(state.player2);
    for(var cpi = 0; cpi < players.length; cpi++){
        var cp = players[cpi];
        if(!cp) continue;
        var playerCenterX = cp.x + 4;
        var playerCenterY = cp.y + 6;
        var dist = Math.hypot(playerCenterX - level.checkpoint.x, playerCenterY - level.checkpoint.y);
        
        if (dist < 15) {
            // 检查是否是新的存档点
            if (!state.lastCheckpoint || 
                state.lastCheckpoint.x !== level.checkpoint.x ||
                state.lastCheckpoint.y !== level.checkpoint.y) {
                
                state.lastCheckpoint = { x: level.checkpoint.x, y: level.checkpoint.y };
                saveGame();
                ItemStatus.acquire('checkpoint');
                showCheckpointHint();
                
                // 存档特效
                state.effects.push({
                    x: level.checkpoint.x, y: level.checkpoint.y,
                    r: 0, type: 'checkpoint-wave'
                });
            }
            break; // 只要一个玩家触发即可
        }
    }
}

/* ==================== 关卡完成检测 ==================== */
function checkLevelComplete() {
    if (state.transitioning) return;

    // 第四关：玩家触碰绿宝石即通关（boss状态不影响通关）
    if (state.currentLevel === 4) {
        var level4 = LEVELS[3];
        if (level4.checkpoint) {
            var dist4 = Math.hypot(state.player.x + 4 - level4.checkpoint.x, state.player.y + 6 - level4.checkpoint.y);
            // 双人模式：两个玩家都必须到达绿宝石
            var p2dist4 = 999;
            if(gameMode === 'dual' && state.player2){
                p2dist4 = Math.hypot(state.player2.x + 4 - level4.checkpoint.x, state.player2.y + 6 - level4.checkpoint.y);
            }
            var p1OnGem = dist4 < 15;
            var p2OnGem = (gameMode !== 'dual') || p2dist4 < 15;
            if (p1OnGem && p2OnGem) {
                state.transitioning = true;
                // 绿宝石点亮特效
                var gemX = level4.checkpoint.x, gemY = level4.checkpoint.y;
                state.effects.push({ x: gemX, y: gemY, r: 0, type: 'checkpoint-wave' });
                for (var gi = 0; gi < 12; gi++) {
                    state.effects.push({
                        x: gemX + (Math.random()-0.5)*14,
                        y: gemY + (Math.random()-0.5)*14,
                        vx: (Math.random()-0.5)*1.5,
                        vy: -Math.random()*1.5-0.5,
                        life: 20+Math.floor(Math.random()*15), maxLife: 35,
                        type: 'gem-spark'
                    });
                }
                triggerShake(2, 6);
                setTimeout(function() {
                    LevelStartEffect.hide();
                    state.lastCheckpoint = null;
                    loadLevel(state.currentLevel + 1);
                    state.transitioning = false;
                }, 800);
            }
        }
        return;
    }

    // 其他关卡：击杀所有敌人即通关
    if (state.enemies.length === 0 && state.dyingEnemies.length === 0) {
        state.transitioning = true;
        PlayerStats.bossKills++;
        
        // 第三关完成：播放通关倒放电影
        if (state.currentLevel === 3) {
            JourneyCinematic.start();
            return;
        }
        
        // 延迟进入下一关
        setTimeout(function() {
            LevelStartEffect.hide();
            if (state.currentLevel < LEVELS.length) {
                state.lastCheckpoint = null; // 新关卡重置存档点
                loadLevel(state.currentLevel + 1);
            } else {
                gameWin();
            }
            state.transitioning = false;
        }, 800); // 缩短延迟时间
    }
}

/* ==================== 时间回溯系统 ==================== */
function captureState(){
    if(stateHistory.length>REWIND_FRAMES+100)stateHistory=stateHistory.slice(-REWIND_FRAMES-50);
    stateHistory.push({
        px:state.player.x,py:state.player.y,fr:state.player.facingRight,
        // 双人模式：记录玩家2的位置
        p2x: state.player2 ? state.player2.x : 0,
        p2y: state.player2 ? state.player2.y : 0,
        p2fr: state.player2 ? state.player2.facingRight : true,
        enemies:state.enemies.map(function(e){
            var base = {
                x:e.x,y:e.y,marked:e.marked||false,sc:e.shootCooldown||0,
                dx:e.dirX||0,dy:e.dirY||0,mt:e.moveTimer||0,v:e.variant||0,
                shieldHP: e.shieldHP, shieldBroken: e.shieldBroken,
                et:e.enemyType, tc:e.throwCooldown, pd:e.patrolDir,
                px1:e.patrolX1, px2:e.patrolX2, py:e.patrolY,
                bc:e.burstCount,
                ar:e.attackRange
            };
            // Boss AI状态
            if(e.aiState) { base.bas=e.aiState; base.bl=e.alertLevel; base.ct=e.chaseTimer; base.pi=e.patrolIdx; base.pw=e.patrolWait; base.fr2=e.facingRight; base.hp=e.hp; base.et2='MeleeBoss'; }
            return base;
        }),
        pearls:state.pearls.map(function(p){return p.active;}),
        rw:state.rewindItem.active,
        bt:state.bodyguardToken ? state.bodyguardToken.active : false,
        bg:state.bodyguards.map(function(b){return {x:b.x,y:b.y,name:b.name,ac:b.armorColor,hp:b.hp,alive:b.alive,hf:b.hitFlash,st:b.spawnTimer};}),
        nv:state.l3NightVision,
        ts:state.timeStopped,st:state.stopTimer,
        fh:state.fakeHorse ? {active:state.fakeHorse.active,riding:state.fakeHorse.riding,hp:state.fakeHorse.hp} : null,
        trap:state.currentLevel===3?{t:L3Trap.timer,io:L3Trap.isOpen,op:L3Trap.openProgress,fa:L3Trap.firstApproach,pf:L3Trap.playerFalling,ft:L3Trap.fallTimer,fx:L3Trap.fallX,fy:L3Trap.fallY}:null,
        sr:state.currentLevel===2?{dc:L2SecretDoor.deathCount,op:L2SecretDoor.openProgress,sg:L2SecretDoor.showGuide}:null
    });
}

function triggerRewind(playerIdx){
    playerIdx = playerIdx || 1;
    var stats = playerIdx === 2 ? PlayerStats2 : PlayerStats;
    stats.rewindUsed++;
    if(!hasRewind){
        respawnAtCheckpoint();
        return;
    }

    // 第三关特殊回溯：替身无限累加，不消失
    if (state.currentLevel === 3) {
        // 至少需要10帧录制才能创建替身
        if (L3ActionRec.history && L3ActionRec.history.length >= 10) {
            var deathX = state.player.x;
            var deathY = state.player.y;

            // 使用可用的最大回溯帧数（最多5秒=300帧）
            var rewindFrames = Math.min(300, stateHistory.length, L3ActionRec.history.length);
            var startIdx = L3ActionRec.history.length - rewindFrames;

            // 获取死亡前5s的玩家状态（位置、朝向）
            var rewindSnapshot = L3ActionRec.history[startIdx];
            var rewindStartX = rewindSnapshot.x;
            var rewindStartY = rewindSnapshot.y;
            var rewindFacing = rewindSnapshot.fr;

            // 只取死亡前5s的动作片段作为替身的回放内容
            var ghostActions = L3ActionRec.history.slice(startIdx);

            // 保存录制历史用于倒退动画（必须在spawnL3Ghost之前，因为spawn会重置录制）
            var rewindAnimFrames = L3ActionRec.history.slice(L3ActionRec.history.length - rewindFrames).slice().reverse();

            // 双人模式：保存玩家2的录制用于倒退动画
            var p2RewindAnimFrames = null;
            var p2GhostActions = null;
            var p2RewindStartX = 0, p2RewindStartY = 0, p2RewindFacing = true;
            if (gameMode === 'dual' && state.player2 && L3ActionRec2.history && L3ActionRec2.history.length >= 10) {
                var p2Frames = Math.min(rewindFrames, L3ActionRec2.history.length);
                var p2StartIdx = L3ActionRec2.history.length - p2Frames;
                var p2Snapshot = L3ActionRec2.history[p2StartIdx];
                p2RewindStartX = p2Snapshot.x;
                p2RewindStartY = p2Snapshot.y;
                p2RewindFacing = p2Snapshot.fr;
                p2GhostActions = L3ActionRec2.history.slice(p2StartIdx);
                p2RewindAnimFrames = L3ActionRec2.history.slice(L3ActionRec2.history.length - p2Frames).slice().reverse();
            }

            // 生成玩家1替身
            spawnL3Ghost(rewindStartX, rewindStartY, rewindFacing, deathX, deathY, ghostActions, 'p1');
            // 双人模式：生成玩家2替身
            if (gameMode === 'dual' && state.player2 && p2GhostActions && p2GhostActions.length >= 10) {
                var p2DeathX = state.player2.x;
                var p2DeathY = state.player2.y;
                // 单独创建P2替身（不再次调用spawnL3Ghost避免重复重置录制，因P1的spawn已经重置过了）
                l3DeathCount++;
                var p2Ghost = createGhostObj(p2RewindStartX, p2RewindStartY, p2RewindFacing, p2GhostActions, 'p2');
                L3Ghosts.push(p2Ghost);
            }

            // 启动倒退动画（约1秒），动画结束后应用回溯结果
            var histIdx = stateHistory.length - rewindFrames;
            L3RewindAnim.frames = rewindAnimFrames;
            // 双人模式：构建玩家2的倒退帧
            if (p2RewindAnimFrames && p2RewindAnimFrames.length > 0) {
                L3RewindAnim.frames2 = [];
                for (var rfi = 0; rfi < p2RewindAnimFrames.length; rfi++) {
                    var rf = p2RewindAnimFrames[rfi];
                    L3RewindAnim.frames2.push({ x: rf.x, y: rf.y, fr: rf.fr });
                }
            } else if (gameMode === 'dual' && state.player2) {
                // P2录制不足，用L3ActionRec中记录的P2位置
                L3RewindAnim.frames2 = [];
                for (var rfi = 0; rfi < rewindAnimFrames.length; rfi++) {
                    var rf = rewindAnimFrames[rfi];
                    L3RewindAnim.frames2.push({ x: rf.p2x || state.player2.x, y: rf.p2y || state.player2.y, fr: rf.p2fr !== undefined ? rf.p2fr : true });
                }
            } else {
                L3RewindAnim.frames2 = null;
            }
            L3RewindAnim.frameIdx = 0;
            L3RewindAnim.speed = Math.max(3, Math.ceil(rewindFrames / 60));
            L3RewindAnim.pendingGhostX = rewindStartX;
            L3RewindAnim.pendingGhostY = rewindStartY;
            L3RewindAnim.pendingGhostFacing = rewindFacing;
            L3RewindAnim.pendingGhostActions = ghostActions;
            L3RewindAnim.pendingHistIdx = histIdx;
            L3RewindAnim.active = true;
            state.running = false;
            msgScreen.style.display = 'none';
            SFX.rewindStart();
            SFX.startRewindLoop();
            return;
        }
        // 录制帧不足10帧，普通复活但保留已有替身
        respawnAtCheckpoint();
        return;
    }

    // 非第三关：需要足够的历史帧
    if(stateHistory.length<REWIND_FRAMES){
        respawnAtCheckpoint();
        return;
    }

    isRewinding=true;rewindIndex=stateHistory.length-1;hasRewind=false;
    stopDisplay.style.display='none';markHint.style.display='none';rewindDisplay.style.display='none';
    SFX.rewindStart();
    SFX.startRewindLoop();
}

function updateRewind(){
    rewindIndex-=REWIND_SPEED;
    var targetIdx=stateHistory.length-1-REWIND_FRAMES;
    if(rewindIndex<=targetIdx){
        rewindIndex=targetIdx;
        var snap=stateHistory[rewindIndex];
        restoreState(snap);
        stateHistory=stateHistory.slice(0,rewindIndex);
        isRewinding=false;
        SFX.rewindEnd();
        state.effects.push({life:12,maxLife:12,type:'rewind-flash'});
    }
}

/* ==================== 第四关Boss回溯（boss死亡时触发） ==================== */
function triggerBossRewind(){
    if(stateHistory.length < 60){ respawnAtCheckpoint(); return; }

    // 回溯帧数：取60~300帧中的较小值（至少1秒，最多5秒）
    var rewindFrames = Math.min(REWIND_FRAMES, stateHistory.length - 10);
    if(rewindFrames < 60) rewindFrames = stateHistory.length - 10;

    isRewinding = true;
    bossRewinding = true;  // 标记为boss回溯（区别于普通回溯）
    rewindIndex = stateHistory.length - 1;
    hasRewind = false;     // 消耗回溯能力
    msgScreen.style.display = 'none';
    rewindDisplay.style.display = 'none';
    SFX.rewindStart();
    SFX.startRewindLoop();

    // 存储回溯目标帧数
    bossRewindTarget = stateHistory.length - 1 - rewindFrames;

    // 屏幕闪白效果提示boss复活
    state.effects.push({life:15,maxLife:15,type:'rewind-flash'});
}

var bossRewinding = false;
var bossRewindTarget = 0;
var bossRespawnTimer = 0;
var bossRespawnPos = { x: 420, y: 84 };

function updateBossRewind(){
    if(!bossRewinding) return;
    rewindIndex -= REWIND_SPEED;
    if(rewindIndex <= bossRewindTarget){
        rewindIndex = bossRewindTarget;
        var snap = stateHistory[rewindIndex];
        // 恢复全部状态（包含boss位置、AI状态、玩家位置等）
        restoreState(snap);
        // 确保boss在场
        var bossAlive = false;
        for(var bi = 0; bi < state.enemies.length; bi++){
            if(state.enemies[bi] instanceof MeleeBoss){ bossAlive = true; break; }
        }
        // 如果restoreState没有恢复boss（快照中boss类型未被识别），手动创建
        if(!bossAlive){
            var boss = new MeleeBoss(snap.px - 50, snap.py);
            // 随机偏移boss位置使其出现在玩家附近但不重叠
            boss.aiState = 'patrol';
            boss.alertLevel = 0;
            state.enemies.push(boss);
        }
        stateHistory = stateHistory.slice(0, rewindIndex);
        bossRewinding = false;
        isRewinding = false;
        SFX.rewindEnd();
        // boss复活闪光特效
        state.effects.push({life:20,maxLife:20,type:'rewind-flash'});
        state.projectiles = [];
        state.dyingEnemies = [];
        state.running = true;
    }
}

function restoreState(snap){
    state.player.x=snap.px;state.player.y=snap.py;state.player.facingRight=snap.fr;
    state.player.attackAnim=0;
    // 双人模式：恢复玩家2的位置
    if (gameMode === 'dual' && state.player2) {
        state.player2.x = snap.p2x;
        state.player2.y = snap.p2y;
        state.player2.facingRight = snap.p2fr;
        state.player2.attackAnim = 0;
    }
    state.enemies=snap.enemies.map(function(e){
        var en;
        if(e.et2 === 'MeleeBoss') {
            en = new MeleeBoss(e.x, e.y);
            en.aiState = e.bas || 'patrol';
            en.alertLevel = e.bl || 0;
            en.chaseTimer = e.ct || 0;
            en.patrolIdx = e.pi || 0;
            en.patrolWait = e.pw || 0;
            en.facingRight = e.fr2 !== undefined ? e.fr2 : true;
            en.hp = e.hp || 5;
            en.exclamationTimer = 0;
        } else if(e.et === 'JavelinEnemy') {
            en = new JavelinEnemy(e.x, e.y, e.px1, e.px2, e.py);
            en.throwCooldown = e.tc || 0;
            en.patrolDir = e.pd !== undefined ? e.pd : 1;
        } else if(e.et === 'FastPatrolEnemy') {
            en = new FastPatrolEnemy(e.x, e.y, e.px1, e.px2, e.py);
            en.patrolDir = e.pd !== undefined ? e.pd : 1;
            en.burstCount = e.bc || 0;
        } else if(e.shieldHP !== undefined) {
            en = new ShieldGuard(e.x, e.y, '', 'black', true);
            en.shieldHP = e.shieldHP;
            en.shieldBroken = e.shieldBroken;
        } else {
            en = new Enemy(e.x,e.y);
            en.variant=e.v;
        }
        en.marked=e.marked;en.shootCooldown=e.sc;en.dirX=e.dx;en.dirY=e.dy;en.moveTimer=e.mt;
        if(e.bc !== undefined) en.burstCount = e.bc;
        if(e.ar !== undefined) en.attackRange = e.ar;
        return en;
    });
    snap.pearls.forEach(function(a,i){if(i<state.pearls.length)state.pearls[i].active=a;});
    state.rewindItem.active=snap.rw;
    if(snap.rw){hasRewind=false;rewindDisplay.style.display='none';}
    // 恢复令牌和保镖状态
    if(state.bodyguardToken) state.bodyguardToken.active = snap.bt !== undefined ? snap.bt : false;
    if(snap.bg && snap.bg.length > 0){
        state.bodyguards = snap.bg.map(function(b){
            if(!b.alive) return null;
            var g = new Bodyguard(b.x, b.y, b.name, b.ac);
            g.hp = b.hp; g.hitFlash = b.hf; g.alive = b.alive; g.spawnTimer = b.st;
            return g;
        }).filter(function(b){return b !== null;});
    } else {
        state.bodyguards = [];
    }
    state.l3NightVision = snap.nv || false;
    // 恢复第二关密室石门状态
    if(state.currentLevel === 2 && snap.sr !== undefined && snap.sr) {
        L2SecretDoor.deathCount = snap.sr.dc || 0;
        L2SecretDoor.openProgress = snap.sr.op || 0;
        L2SecretDoor.showGuide = snap.sr.sg || false;
        L2SecretDoor.opening = L2SecretDoor.openProgress > 0 && L2SecretDoor.openProgress < 1;
        if (L2SecretDoor.openProgress >= 1) L2SecretDoor.opening = false;
    }
    state.timeStopped=snap.ts;state.stopTimer=snap.st;
    if(state.timeStopped){stopDisplay.style.display='block';updateStopUI();}else{stopDisplay.style.display='none';}
    // 恢复假马状态
    if(snap.fh && state.fakeHorse){
        state.fakeHorse.active=snap.fh.active;
        state.fakeHorse.riding=snap.fh.riding;
        state.fakeHorse.hp=snap.fh.hp;
        state.fakeHorse.hitFlash=0;
    }
    state.projectiles=[];state.dyingEnemies=[];state.running=true;
    msgScreen.style.display='none';
}

/* ==================== 碰撞检测 ==================== */
/* 玩家攻击敌人的通用函数（支持任意玩家对象） */
function performAttack(player){
    for(var ei=state.enemies.length-1;ei>=0;ei--){
        var e=state.enemies[ei];
        var collW = e.w || 8;
        var collH = e.h || 12;
        var dist=Math.hypot(e.x+collW/2-(player.x+4),e.y+collH/2-(player.y+6));
        if(state.timeStopped){
            if(e instanceof ShieldGuard && !e.shieldBroken) continue;
            if(e instanceof ShieldDefender) continue;
            if(dist<MARK_RANGE&&!e.marked){
                e.marked=true;markHint.style.display='block';
                var qx=e.x+collW/2,qy=e.y+collH/2;
                state.effects.push({x:qx,y:qy,life:12,maxLife:12,type:'qi-slash'});
                state.effects.push({x:qx,y:qy,r:0,type:'qi-ring'});
                triggerShake(1,4);
            }
        }else{
            if(dist<22){
                var playerCenterX = player.x + 4;
                var playerCenterY = player.y + 6;
                var enemyCenterX = e.x + collW/2;
                var enemyCenterY = e.y + collH/2;
                
                if(!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)){
                    continue;
                }
                
                player.attackAnim = ATTACK_ANIM_DUR;
                SFX.playerAttack();
                if(e instanceof ShieldGuard){
                    if(!e.shieldBroken){
                        e.shieldHP--;
                        e.hitFlash = 8;
                        triggerShake(3,6);
                        SFX.hitShield();
                        state.effects.push({x:e.x-2,y:e.y+collH/2,life:10,maxLife:10,type:'shield-hit'});
                        if(e.shieldHP <= 0){
                            e.shieldBroken = true;
                            triggerShake(4,10);
                            SFX.hitEnemy();
                        }
                    }else{
                        if(onPlayerKill()){
                            player.attackAnim = ATTACK_ANIM_SPECIAL;
                            triggerComboEffect(player.x + 4, player.y + 6, player.facingRight);
                        }
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:8,maxLife:8,type:'slash'});
                        state.enemies.splice(ei,1);triggerShake(3,6);onEnemyKilledL2();SFX.hitEnemy();
                    }
                }else if(e instanceof ShieldDefender){
                    if(e.isPlayerBehind()){
                        if(onPlayerKill()){
                            player.attackAnim = ATTACK_ANIM_SPECIAL;
                            triggerComboEffect(player.x + 4, player.y + 6, player.facingRight);
                        }
                        state.effects.push({x:e.x+collW/2,y:e.y+collH/2,life:10,maxLife:10,type:'slash'});
                        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,1));
                        state.enemies.splice(ei,1);triggerShake(4,8);onEnemyKilledL2();SFX.hitEnemy();
                    }else{
                        e.hitFlash = 6;
                        triggerShake(2,4);
                        SFX.hitShield();
                        state.effects.push({x:e.x+(e.shieldDir===1?-4:collW),y:e.y+collH/2,life:8,maxLife:8,type:'shield-hit'});
                    }
                }else if(e instanceof MeleeBoss){
                    if (state.currentLevel === 4) {
                        e.hp--;
                        e.hitFlash = 8;
                        triggerShake(3, 6);
                        SFX.hitEnemy();
                        state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                        var kbDx = e.x - player.x;
                        var kbDy = e.y - player.y;
                        var kbDist = Math.hypot(kbDx, kbDy) || 1;
                        e.x += (kbDx / kbDist) * 15;
                        e.y += (kbDy / kbDist) * 10;
                        if (e.hp <= 0) {
                            // 第四关：Boss被击杀后自动复活，不触发gameOver
                            var stats_bk = (player === state.player2) ? PlayerStats2 : PlayerStats;
                            stats_bk.bossKills++;
                            var bossOrigX = LEVELS[3].enemies[0].x;
                            var bossOrigY = LEVELS[3].enemies[0].y;
                            state.dyingEnemies.push(new DyingEnemy(e.x, e.y, 0));
                            state.enemies.splice(ei, 1);
                            triggerShake(5, 12);
                            bossRespawnTimer = 180; // 3秒后Boss复活
                            bossRespawnPos.x = bossOrigX;
                            bossRespawnPos.y = bossOrigY;
                        }
                    } else {
                        e.hp--;
                        e.hitFlash = 8;
                        triggerShake(3, 6);
                        SFX.hitEnemy();
                        state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                        var kbDx = e.x - player.x;
                        var kbDy = e.y - player.y;
                        var kbDist = Math.hypot(kbDx, kbDy) || 1;
                        e.x += (kbDx / kbDist) * 15;
                        e.y += (kbDy / kbDist) * 10;
                        if (e.hp <= 0) {
                            state.dyingEnemies.push(new DyingEnemy(e.x, e.y, 0));
                            state.enemies.splice(ei, 1);
                            triggerShake(5, 12);
                        }
                    }
                }else{
                    if(onPlayerKill()){
                        player.attackAnim = ATTACK_ANIM_SPECIAL;
                        triggerComboEffect(player.x + 4, player.y + 6, player.facingRight);
                    }
                    state.effects.push({x:e.x+4,y:e.y+6,life:8,maxLife:8,type:'slash'});
                    state.enemies.splice(ei,1);triggerShake(2,5);onEnemyKilledL2();SFX.hitEnemy();
                }
                return true; // 成功攻击了一个敌人
            }
        }
    }
    return false; // 没有攻击到敌人
}

/* 检查指定玩家是否被飞刀命中 */
function checkPlayerHit(player, knife){
    if(knife.x<player.x+player.w&&knife.x+2>player.x&&knife.y<player.y+player.h&&knife.y+2>player.y){
        knife.alive=false;
        // 假马护盾：优先扣马HP（仅对玩家1有效，共享状态）
        if(player === state.player && state.fakeHorse && state.fakeHorse.riding && state.fakeHorse.hp > 0){
            state.fakeHorse.hp--;
            state.fakeHorse.hitFlash = 10;
            state.effects.push({x:knife.x,y:knife.y,life:8,maxLife:8,type:'horse-hit'});
            triggerShake(1,4);
            if(state.fakeHorse.hp <= 0){
                breakFakeHorse();
            }
            return true;
        }
        // 保镖紧急传送挡刀
        var emergencyGuard = null;
        for(var egi = 0; egi < state.bodyguards.length; egi++){
            var eg = state.bodyguards[egi];
            if(eg.alive && eg.spawnTimer <= 0 && eg.emergencyCooldown <= 0){
                emergencyGuard = eg;
                break;
            }
        }
        if(emergencyGuard){
            emergencyGuard.prevX = emergencyGuard.x;
            emergencyGuard.prevY = emergencyGuard.y;
            emergencyGuard.x = player.x;
            emergencyGuard.y = player.y;
            emergencyGuard.hp--;
            emergencyGuard.hitFlash = 15;
            emergencyGuard.emergencyCooldown = 90;
            emergencyGuard.emergencyFlash = 12;
            state.effects.push({x: emergencyGuard.prevX + 4, y: emergencyGuard.prevY + 6, life: 12, maxLife: 12, type: 'spark'});
            state.effects.push({x: knife.x, y: knife.y, life: 8, maxLife: 8, type: 'spark'});
            triggerShake(2, 6);
            if(emergencyGuard.hp <= 0){
                emergencyGuard.alive = false;
                state.effects.push({x: player.x + 4, y: player.y + 6, life: 15, maxLife: 15, type: 'clay-break'});
                triggerShake(3, 10);
            }
        } else {
            state.effects.push({life:6,maxLife:6,type:'flash'});triggerShake(3,8);
            if (state.currentLevel === 2) {
                L2SecretDoor.onDeath();
            }
            if (state.currentLevel === 3 && player.y <= 55) {
                l3UpperEnemyKillCount++;
                if (l3UpperEnemyKillCount >= 6 && !l3EnemyReactionNerfed) {
                    l3EnemyReactionNerfed = true;
                }
            }
            if(hasRewind){triggerRewind((player === state.player2) ? 2 : 1);}
            else{
                dyingPlayerIdx = (player === state.player2) ? 2 : 1;
                var knifeCause = knife.ownerType === 'multi' ? 'multi-knife' : 'knife';
                respawnAtCheckpoint(knifeCause);
            }
        }
        return true;
    }
    return false;
}

/* 检查指定玩家拾取道具 */
function checkPlayerPickups(player){
    // 拾取珍珠
    for(var pi=0;pi<state.pearls.length;pi++){
        var p=state.pearls[pi];
        if(p.active&&Math.hypot(p.x-player.x,p.y-player.y)<20){
            p.active=false;triggerTimeStop();
            ItemStatus.acquire('pearl');
            if(state.currentLevel === 2){ L2TimeStopPickupHint.show(); }
        }
    }
    // 拾取时间回溯道具
    if(state.rewindItem.active&&Math.hypot(state.rewindItem.x-player.x,state.rewindItem.y-player.y)<20){
        state.rewindItem.active=false;hasRewind=true;l3DeathCount=0;
        ItemStatus.acquire('rewind');
        rewindDisplay.innerHTML='【时间回溯】×'+l3MaxDeaths;rewindDisplay.style.display='block';
        state.effects.push({life:8,maxLife:8,type:'rewind-flash'});
        if(state.currentLevel === 3){ L3RewindPickupHint.show(); }
    }
    // 拾取假马道具
    if(state.fakeHorse && state.fakeHorse.active && !state.fakeHorse.riding){
        if(Math.hypot(state.fakeHorse.x-player.x,state.fakeHorse.y-player.y)<20){
            state.fakeHorse.active = false;
            state.fakeHorse.riding = true;
            ItemStatus.acquire('fakeHorse');
            state.fakeHorse.hp = FAKE_HORSE_MAX_HP;
            state.fakeHorse.hitFlash = 0;
            for(var fi=0;fi<8;fi++){
                state.effects.push({
                    x:state.fakeHorse.x+(Math.random()-0.5)*8,
                    y:state.fakeHorse.y+(Math.random()-0.5)*6,
                    vx:(Math.random()-0.5)*1.5,
                    vy:-Math.random()*1.5,
                    life:15,maxLife:15,type:'clay-break'
                });
            }
            triggerShake(1,4);
        }
    }
    // 拾取令牌道具
    if(state.bodyguardToken && state.bodyguardToken.active){
        if(Math.hypot(state.bodyguardToken.x-player.x,state.bodyguardToken.y-player.y)<20){
            state.bodyguardToken.active = false;
            state.l3NightVision = true;
            ItemStatus.acquire('token');
            L3TokenPickupHint.show();
            state.bodyguards.push(new Bodyguard(player.x + 28, player.y - 3, '哧吭', 'black'));
            state.bodyguards.push(new Bodyguard(player.x + 28, player.y + 3, '吭哧', 'white'));
            for(var bi=0;bi<12;bi++){
                state.effects.push({
                    x:state.bodyguardToken.x+(Math.random()-0.5)*10,
                    y:state.bodyguardToken.y+(Math.random()-0.5)*8,
                    vx:(Math.random()-0.5)*2,
                    vy:-Math.random()*2-0.5,
                    life:20,maxLife:20,type:'ghost-fade'
                });
            }
            triggerShake(3,10);
        }
    }
}

function checkCollisions(){
    for(var ki=state.projectiles.length-1;ki>=0;ki--){
        var knife=state.projectiles[ki];if(!knife.alive)continue;
        // 替身挡刀：如果替身活跃，优先检测飞刀是否命中任一替身
        if(state.currentLevel === 3){
            var ghostHit = false;
            for(var ghi = 0; ghi < L3Ghosts.length; ghi++){
                var gh = L3Ghosts[ghi];
                if(!gh.active) continue;
                var ghX = gh.x, ghY = gh.y;
                if(knife.x < ghX + 8 && knife.x + 2 > ghX && knife.y < ghY + 12 && knife.y + 2 > ghY){
                    knife.alive = false;
                    state.effects.push({x: knife.x, y: knife.y, life: 6, maxLife: 6, type: 'spark'});
                    ghostHit = true;
                    break;
                }
            }
            if (ghostHit) continue;
        }
        // 保镖挡刀：保镖优先于玩家承受飞刀伤害
        var bodyguardHit = false;
        for(var bgi = 0; bgi < state.bodyguards.length; bgi++){
            var bg = state.bodyguards[bgi];
            if(!bg.alive || bg.spawnTimer > 0) continue;
            var bgLeft = bg.x - (bg.facingRight ? 0 : 4);
            var bgRight = bg.x + bg.w + (bg.facingRight ? 4 : 0);
            if(knife.x < bgRight && knife.x + 2 > bgLeft && knife.y < bg.y + bg.h && knife.y + 2 > bg.y){
                knife.alive = false;
                bg.hp--;
                bg.hitFlash = 10;
                state.effects.push({x: knife.x, y: knife.y, life: 8, maxLife: 8, type: 'spark'});
                triggerShake(1, 4);
                if(bg.hp <= 0){
                    bg.alive = false;
                    state.effects.push({x: bg.x + 4, y: bg.y + 6, life: 15, maxLife: 15, type: 'clay-break'});
                    triggerShake(2, 8);
                }
                bodyguardHit = true;
                break;
            }
        }
        if (bodyguardHit) continue;
        state.bodyguards = state.bodyguards.filter(function(b){ return b.alive; });
        // 检测飞刀命中玩家1
        if(checkPlayerHit(state.player, knife)) continue;
        // 双人模式：检测飞刀命中玩家2
        if(gameMode === 'dual' && state.player2){
            if(checkPlayerHit(state.player2, knife)) continue;
        }
        // 飞刀命中障碍物
        for(var ci=0;ci<state.covers.length;ci++){
            var c=state.covers[ci];
            if(knife.x<c.x+c.w&&knife.x+2>c.x&&knife.y<c.y+c.h&&knife.y+2>c.y){
                state.effects.push({x:knife.x,y:knife.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:6,maxLife:6,type:'spark'});
                knife.alive=false;break;
            }
        }
    }
    
    // 近战攻击检测：单人模式用按键触发，双人模式在gameLoop中靠近自动触发
    if(gameMode !== 'dual'){
        performAttack(state.player);
    }
    
    // 撞击稻草人击杀（两个玩家都可以）
    var playersToCheck = [state.player];
    if(gameMode === 'dual' && state.player2) playersToCheck.push(state.player2);
    for(var pci = 0; pci < playersToCheck.length; pci++){
        var pl = playersToCheck[pci];
        if(state.scarecrows.length > 0 && !state.timeStopped){
            for(var sci=state.scarecrows.length-1;sci>=0;sci--){
                var sc=state.scarecrows[sci];
                var dist=Math.hypot(sc.x+sc.w/2-(pl.x+4),sc.y+sc.h/2-(pl.y+6));
                if(dist<18){
                    state.dyingEnemies.push(new DyingScarecrow(sc.x,sc.y));
                    state.effects.push({x:sc.x+sc.w/2,y:sc.y+sc.h/2,life:8,maxLife:8,type:'slash'});
                    state.scarecrows.splice(sci,1);
                    state.scarecrowKilled++;
                    if(sci < scarecrowCoverIndices.length){
                        var coverIdxToRemove = scarecrowCoverIndices[sci];
                        state.covers.splice(coverIdxToRemove,1);
                        for(var ci2=sci+1;ci2<scarecrowCoverIndices.length;ci2++){
                            scarecrowCoverIndices[ci2]--;
                        }
                        scarecrowCoverIndices.splice(sci,1);
                    }
                    triggerShake(2,4);
                    SFX.hitEnemy();
                    ScarecrowHint.dismiss();
                    break;
                }
            }
        }
    }
    
    // 拾取道具（两个玩家都可以拾取）
    checkPlayerPickups(state.player);
    if(gameMode === 'dual' && state.player2){
        checkPlayerPickups(state.player2);
    }
}

function respawnAtCheckpoint(cause) {
    var stats = dyingPlayerIdx === 2 ? PlayerStats2 : PlayerStats;
    stats.totalDeaths++;
    if (cause === 'knife') stats.knifeKilled++;
    else if (cause === 'multi-knife') stats.multiKnifeKilled++;
    else if (cause === 'trap') stats.trapFalls++;
    else if (cause === 'rock') stats.rockCrushed++;
    var txt = '你死的很惨！';
    var sub = '少侠按 R 重新来过。';
    if (cause === 'knife') {
        var knifeMsgs = ['你死的很惨！', '我以前也是个大侠，直到我的膝盖中了一刀。'];
        txt = knifeMsgs[Math.floor(Math.random() * knifeMsgs.length)];
    } else if (cause === 'multi-knife') {
        var multiMsgs = ['你死的很惨！', '万剑穿心，好似一个刺猬精。'];
        txt = multiMsgs[Math.floor(Math.random() * multiMsgs.length)];
    } else if (cause === 'trap') {
        txt = getTrapDeathText();
    }
    gameOver(txt, sub, true);
}

/* 获取第三关陷阱死亡文字（按次数递进） */
var l3TrapDeathCount = 0;
function getTrapDeathText() {
    l3TrapDeathCount++;
    if (l3TrapDeathCount === 1) return '一失足成千古恨。';
    if (l3TrapDeathCount === 2) return '二失足成万古恨。';
    if (l3TrapDeathCount === 3) return '好胜心强的你，暗下决心。';
    return '你死的很惨！';
}

/* ==================== 时间静止 ==================== */
function triggerTimeStop(){
    state.timeStopped=true;
    state.stopStartTime=performance.now();
    state.stopTimer=STOP_DURATION;
    stopDisplay.style.display='block';markHint.style.display='none';
    state.effects.push({x:state.player.x+4,y:state.player.y+6,r:0,type:'wave'});
    state.effects.push({life:8,maxLife:8,type:'flash'});triggerShake(2,6);
    SFX.timeStopActivate();
    SFX.startTick();
    L2TimeStopPause.trigger();
}

function launchMarkedEnemies(){
    var marked=state.enemies.filter(function(e){return e.marked;});
    if(marked.length===0){markHint.style.display='none';return;}
    // 时间静止斩杀：每个被标记的敌人都算一次击杀
    var isCombo = false;
    for(var mi = 0; mi < marked.length; mi++){
        if(onPlayerKill()){
            isCombo = true;
            // 只对最后一个触发特效
        }
    }
    state.player.attackAnim = isCombo ? ATTACK_ANIM_SPECIAL : ATTACK_ANIM_DUR;
    if(isCombo){
        triggerComboEffect(state.player.x + 4, state.player.y + 6, state.player.facingRight);
    }
    if(marked.length>0) SFX.hitEnemy();
    marked.forEach(function(e){
        state.dyingEnemies.push(new DyingEnemy(e.x,e.y,e.variant));
        state.effects.push({x:e.x+4,y:e.y+6,life:12,maxLife:12,type:'launch-slash'});
    });
    var killedCount = marked.length;
    PlayerStats.timeStopKills += killedCount;
    state.enemies=state.enemies.filter(function(e){return !e.marked;});
    // 第二关血迹：时间静止斩杀也计入
    if (state.currentLevel === 2) {
        for (var k = 0; k < killedCount; k++) onEnemyKilledL2();
    }
    triggerShake(4,10);markHint.style.display='none';
}

function triggerComboEffect(px, py, facingRight){
    // 更强烈的屏幕震动
    triggerShake(6, 14);
    // 全屏闪光
    state.effects.push({life: 10, maxLife: 10, type: 'combo-flash'});
    // 剑飞出再回收的粒子轨迹
    var dir = facingRight ? 1 : -1;
    for(var ci = 0; ci < 12; ci++){
        var spread = (Math.random() - 0.5) * 1.5;
        state.effects.push({
            x: px + dir * (ci * 3 + Math.random() * 4),
            y: py + spread * ci * 0.5,
            vx: dir * (2.5 + Math.random() * 2),
            vy: (Math.random() - 0.5) * 1.2,
            life: 8 + Math.floor(Math.random() * 6),
            maxLife: 14,
            type: 'sword-trail'
        });
    }
    // 金色爆裂粒子
    for(var bi = 0; bi < 16; bi++){
        var angle = Math.random() * Math.PI * 2;
        var speed = 1 + Math.random() * 3;
        state.effects.push({
            x: px + dir * 8,
            y: py,
            vx: Math.cos(angle) * speed + dir * 1.5,
            vy: Math.sin(angle) * speed,
            life: 12 + Math.floor(Math.random() * 10),
            maxLife: 22,
            type: 'combo-burst'
        });
    }
    // 击杀号角冲击波
    state.effects.push({x: px, y: py, r: 0, type: 'combo-wave'});
}

/* ==================== 第三关回溯倒退玩家绘制 ==================== */
function drawL3RewindPlayer() {
    var pos = L3RewindAnim.getCurrentPos();
    if (!pos) return;
    var x = px(pos.x), y = px(pos.y);
    var f = pos.fr ? 1 : -1;

    // 半透明残影效果
    ctx.globalAlpha = 0.35;

    // 绘制2帧残影（更早的位置）
    var trailFrames = L3RewindAnim.speed * 2;
    for (var t = 1; t <= 2; t++) {
        var tIdx = L3RewindAnim.frameIdx - trailFrames * t;
        if (tIdx >= 0 && tIdx < L3RewindAnim.frames.length) {
            var tp = L3RewindAnim.frames[tIdx];
            var tx = px(tp.x), ty = px(tp.y);
            ctx.globalAlpha = 0.15 / t;
            ctx.fillStyle = '#8899bb';
            ctx.fillRect(tx, ty, 8, 12);
        }
    }

    // 主角色（半透明蓝色调）
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = PAL.straw; ctx.fillRect(x - 2, y - 2, 12, 2);
    ctx.fillStyle = '#7a9abb'; ctx.fillRect(x, y - 4, 8, 2);
    ctx.fillStyle = '#6a8aaa'; ctx.fillRect(x + 2, y - 3, 4, 1);
    ctx.fillStyle = '#8ab0cc'; ctx.fillRect(x + 1, y, 6, 3);
    ctx.fillStyle = '#5a7a9a'; ctx.fillRect(f > 0 ? x + 5 : x + 2, y + 1, 1, 1);
    ctx.fillStyle = '#7a9abb'; ctx.fillRect(x, y + 3, 8, 3);
    ctx.fillStyle = '#6a8aaa'; ctx.fillRect(x + 3, y + 3, 2, 3);
    ctx.fillStyle = '#5a8aaa'; ctx.fillRect(x, y + 6, 8, 1);
    ctx.fillStyle = '#8a9aaa'; ctx.fillRect(x + 1, y + 7, 6, 3);
    ctx.fillStyle = '#6a7a8a'; ctx.fillRect(x + 1, y + 9, 1, 1); ctx.fillRect(x + 6, y + 9, 1, 1);
    ctx.fillRect(x + 2, y + 10, 2, 2); ctx.fillRect(x + 4, y + 10, 2, 2);

    // 双人模式：绘制玩家2的倒退角色
    if (gameMode === 'dual' && L3RewindAnim.frames2) {
        var pos2 = L3RewindAnim.getP2Pos();
        if (pos2) {
            var x2 = px(pos2.x), y2 = px(pos2.y);
            var f2 = pos2.fr ? 1 : -1;
            // 玩家2残影
            for (var t2 = 1; t2 <= 2; t2++) {
                var tIdx2 = L3RewindAnim.frameIdx - trailFrames * t2;
                if (tIdx2 >= 0 && tIdx2 < L3RewindAnim.frames2.length) {
                    var tp2 = L3RewindAnim.frames2[tIdx2];
                    var tx2 = px(tp2.x), ty2 = px(tp2.y);
                    ctx.globalAlpha = 0.12 / t2;
                    ctx.fillStyle = '#5577aa';
                    ctx.fillRect(tx2, ty2, 8, 12);
                }
            }
            // 玩家2主角色（蓝紫色调区分）
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#4466aa'; ctx.fillRect(x2 - 2, y2 - 2, 12, 2);
            ctx.fillStyle = '#6688bb'; ctx.fillRect(x2, y2 - 4, 8, 2);
            ctx.fillStyle = '#5577aa'; ctx.fillRect(x2 + 2, y2 - 3, 4, 1);
            ctx.fillStyle = '#7799cc'; ctx.fillRect(x2 + 1, y2, 6, 3);
            ctx.fillStyle = '#4466aa'; ctx.fillRect(f2 > 0 ? x2 + 5 : x2 + 2, y2 + 1, 1, 1);
            ctx.fillStyle = '#6688bb'; ctx.fillRect(x2, y2 + 3, 8, 3);
            ctx.fillStyle = '#5577aa'; ctx.fillRect(x2 + 3, y2 + 3, 2, 3);
            ctx.fillStyle = '#4466aa'; ctx.fillRect(x2, y2 + 6, 8, 1);

/* ==================== 通关倒放电影绘制 ==================== */
function drawJourneyCinematic() {
    var pos = JourneyCinematic.getCurrentPos();
    var progress = JourneyCinematic.getProgress();
    if (!pos) return;

    var level = pos.level;

    // 根据关卡绘制简化背景
    drawCinematicBG(level, progress);

    // 相机偏移
    var levelWidths = { 1: 960, 2: 1500, 3: 800 };
    var lw = levelWidths[level] || 800;
    var camOffset = -(pos.x / lw) * (lw - 320);
    if (camOffset > lw - 320) camOffset = lw - 320;
    if (camOffset < 0) camOffset = 0;

    // 绘制残影（3帧拖尾）
    ctx.globalAlpha = 0.12;
    for (var t = 1; t <= 3; t++) {
        var trailIdx = JourneyCinematic.frameIdx - t * 3;
        if (trailIdx >= 0 && trailIdx < JourneyCinematic.frames.length) {
            var tp = JourneyCinematic.frames[trailIdx];
            var tCamOff = -(tp.x / lw) * (lw - 320);
            if (tCamOff > lw - 320) tCamOff = lw - 320;
            if (tCamOff < 0) tCamOff = 0;
            var tx = Math.floor(tp.x - tCamOff);
            var ty = Math.floor(tp.y);
            ctx.fillStyle = '#8899bb';
            ctx.fillRect(tx, ty, 8, 12);
        }
    }

    // 绘制倒退中的玩家
    ctx.globalAlpha = 0.6;
    var sx = Math.floor(pos.x - camOffset);
    var sy = Math.floor(pos.y);
    var facing = pos.fr ? -1 : 1;

    var hatBob = Math.sin(JourneyCinematic.timer * 0.3) * 1;
    ctx.fillStyle = '#c8b896';
    ctx.fillRect(sx + facing * -1, sy - 3 + hatBob, 10, 3);
    ctx.fillStyle = '#b8a886';
    ctx.fillRect(sx, sy - 4 + hatBob, 8, 1);
    ctx.fillStyle = '#e0c8a8';
    ctx.fillRect(sx, sy, 8, 7);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx + (facing > 0 ? 1 : 6), sy + 3, 1, 1);
    ctx.fillStyle = '#f0e8d8';
    ctx.fillRect(sx, sy + 7, 8, 4);
    var walkFrame = Math.floor(JourneyCinematic.timer / 8) % 4;
    var legOff = (walkFrame < 2) ? walkFrame : (4 - walkFrame);
    ctx.fillStyle = '#3a4a5a';
    ctx.fillRect(sx + 1, sy + 11 + legOff, 2, 2);

function drawRidingHorse(){
    var fh = state.fakeHorse;
    if(!fh || !fh.riding) return;
    var x = px(state.player.x), y = px(state.player.y);
    var f = state.player.facingRight ? 1 : -1;
    var bob = (state.player.animFrame === 1 || state.player.animFrame === 3) ? -1 : 0;
    var leg = (state.player.animFrame === 1 || state.player.animFrame === 3);
    // 受伤闪烁
    if(fh.hitFlash > 0){
        fh.hitFlash--;
        if(fh.hitFlash % 2 === 0) return; // 闪烁效果
    }
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x - 4, y + 12, 16, 2);
    // 马身体
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x - 5, y + 2 + bob, 14, 5);
    ctx.fillStyle = '#A07828';
    ctx.fillRect(x - 4, y + 3 + bob, 12, 3);
    // 马脖子
    ctx.fillStyle = '#8B6914';
    if(f > 0){
        ctx.fillRect(x + 7, y - 1 + bob, 3, 6);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x + 7, y + bob, 2, 4);
    } else {
        ctx.fillRect(x - 6, y - 1 + bob, 3, 6);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x - 5, y + bob, 2, 4);
    }
    // 马头
    ctx.fillStyle = '#8B6914';
    if(f > 0){
        ctx.fillRect(x + 8, y - 3 + bob, 3, 4);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x + 9, y - 2 + bob, 1, 2);
    } else {
        ctx.fillRect(x - 7, y - 3 + bob, 3, 4);
        ctx.fillStyle = '#A07828';
        ctx.fillRect(x - 7, y - 2 + bob, 1, 2);
    }
    // 耳朵
    ctx.fillStyle = '#7A5A10';
    if(f > 0){
        ctx.fillRect(x + 9, y - 4 + bob, 1, 1);
        ctx.fillRect(x + 11, y - 4 + bob, 1, 1);
    } else {
        ctx.fillRect(x - 8, y - 4 + bob, 1, 1);
        ctx.fillRect(x - 6, y - 4 + bob, 1, 1);
    }
    // 马眼
    ctx.fillStyle = '#1a1a1a';
    if(f > 0){
        ctx.fillRect(x + 10, y - 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x - 8, y - 3 + bob, 1, 1);
    }
    // 马腿（带行走动画）
    ctx.fillStyle = '#6B4E0A';
    if(leg){
        ctx.fillRect(x - 4, y + 7, 1, 3);
        ctx.fillRect(x - 1, y + 7, 1, 3);
        ctx.fillRect(x + 2, y + 8, 1, 2);
        ctx.fillRect(x + 5, y + 8, 1, 2);
    } else {
        ctx.fillRect(x - 4, y + 8, 1, 2);
        ctx.fillRect(x - 1, y + 8, 1, 2);
        ctx.fillRect(x + 2, y + 7, 1, 3);
        ctx.fillRect(x + 5, y + 7, 1, 3);
    }
    // 尾巴
    ctx.fillStyle = '#5A3E06';
    if(f > 0){
        ctx.fillRect(x - 6, y + 2 + bob, 1, 3);
        ctx.fillRect(x - 7, y + 3 + bob, 1, 1);
    } else {
        ctx.fillRect(x + 7, y + 2 + bob, 1, 3);
        ctx.fillRect(x + 8, y + 3 + bob, 1, 1);
    }
    // 马背裂纹（根据剩余HP显示）
    var cracks = FAKE_HORSE_MAX_HP - fh.hp;
    ctx.fillStyle = '#4A3000';
    if(cracks >= 1) ctx.fillRect(x - 2, y + 3 + bob, 2, 1);
    if(cracks >= 2) ctx.fillRect(x + 3, y + 4 + bob, 1, 2);
    if(cracks >= 3) ctx.fillRect(x, y + 2 + bob, 1, 1);
    if(cracks >= 4) ctx.fillRect(x + 5, y + 3 + bob, 1, 1);
    if(cracks >= 5) ctx.fillRect(x - 3, y + 4 + bob, 2, 1);
    // HP指示器（小方块显示剩余HP）
    for(var hi = 0; hi < FAKE_HORSE_MAX_HP; hi++){
        var hx = x - 5 + hi * 3;
        if(hi < fh.hp){
            ctx.fillStyle = '#c8a040';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
            ctx.fillStyle = '#e8c060';
            ctx.fillRect(hx, y - 6 + bob, 1, 1);
        } else {
            ctx.fillStyle = '#3a2a10';
            ctx.fillRect(hx, y - 6 + bob, 2, 2);
        }
    }
}

/* ==================== 结局画面 ==================== */
var EndingScreen = {
    active: false,
    phase: 0, // 0=引语显示, 1=引语淡出, 2=海面淡入+字幕滚动, 3=静止
    tick: 0,
    phaseTick: 0,

    // 阶段时长（帧数）
    QUOTE_SHOW: 120,    // 2秒引语
    QUOTE_FADE: 60,     // 1秒淡出
    SEA_FADE: 90,       // 1.5秒海面淡入
    SCROLL_START: 40,   // 海面淡入后短暂停留即开始字幕
    SCROLL_SPEED: 0.3,  // 字幕滚动速度（像素/帧）
    canPressR: false,   // 是否允许按任意键回到主页

    seaTick: 0,         // 海面动画用的tick（独立于字幕）
    scrollY: 0,         // 字幕当前滚动位置
    _fateShown: false,  // 是否已展示过命格（防止重复触发）

    // 滚动字幕内容
    credits: [
        '游戏结束。',
        null
    ],

    start: function() {
        this.active = true;
        this.phase = 0;
        this.tick = 0;
        this.phaseTick = 0;
        this.seaTick = 0;
        this.scrollY = 220; // 从画面下方开始
        this.canPressR = false;
        this._fateShown = false;
    },

    update: function() {
        if (!this.active) return;
        this.tick++;
        this.phaseTick++;
        this.seaTick++;

        switch (this.phase) {
            case 0: // 引语显示
                if (this.phaseTick >= this.QUOTE_SHOW) {
                    this.phase = 1;
                    this.phaseTick = 0;
                }
                break;
            case 1: // 引语淡出
                if (this.phaseTick >= this.QUOTE_FADE) {
                    this.phaseTick = 0;
                    // 隐藏引语
                    msgScreen.style.display = 'none';
                    // 直接进入命格页面（在滚动字幕之前）
                    if (!this._fateShown) {
                        this._fateShown = true;
                        if (gameMode === 'dual') DualFateScreen.start();
                        else FateScreen.start();
                    }
                    // 不进入phase 2，等命格页面关闭后由按键处理恢复
                }
                break;
            case 2: // 海面淡入 + 字幕滚动
                if (this.phaseTick > this.SCROLL_START) {
                    this.scrollY -= this.SCROLL_SPEED;
                }
                if (this.scrollY < -(this.credits.length * 24 + 80)) {
                    this.phase = 3;
                    this.phaseTick = 0;
                    this.canPressR = true; // 字幕滚完后才允许按R
                }
                break;
        }
    },

    draw: function(ctx) {
        if (!this.active) return;

        if (this.phase === 0 || this.phase === 1) {
            // 引语阶段：通过CSS opacity控制HTML msgScreen
            if (this.phase === 1) {
                var fadeProgress = this.phaseTick / this.QUOTE_FADE;
                msgScreen.style.opacity = 1 - fadeProgress;
            }
            return;
        }

        // phase 2 & 3：使用与主页相同的月夜行船动画
        var t = this.seaTick;

        // —— 海面淡入 ——
        var seaAlpha = 1;
        if (this.phase === 2 && this.phaseTick < this.SEA_FADE) {
            seaAlpha = this.phaseTick / this.SEA_FADE;
        }

        ctx.save();
        ctx.globalAlpha = seaAlpha;

        // 确保TitleScreen的星星已生成
        if (!TitleScreen._stars) {
            TitleScreen._stars = [];
            for (var si = 0; si < 60; si++) {
                TitleScreen._stars.push({
                    x: Math.random() * 320,
                    y: Math.random() * 75,
                    size: Math.random() < 0.15 ? 2 : 1,
                    twinkleSpeed: 0.02 + Math.random() * 0.03,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    brightness: 0.3 + Math.random() * 0.7
                });
            }
        }

        var w = 320, h = 180;

        // —— 深蓝夜空渐变背景 ——
        var skyGrad = ctx.createLinearGradient(0, 0, 0, h);
        skyGrad.addColorStop(0, '#050a1a');
        skyGrad.addColorStop(0.35, '#0a1530');
        skyGrad.addColorStop(0.55, '#0d1a3a');
        skyGrad.addColorStop(1, '#081020');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h);

        // —— 星空 ——
        for (var si2 = 0; si2 < TitleScreen._stars.length; si2++) {
            var star = TitleScreen._stars[si2];
            var twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * star.twinkleSpeed + star.twinkleOffset));
            var sa = star.brightness * twinkle;
            if (star.size === 2) {
                ctx.fillStyle = 'rgba(200,220,255,' + (sa * 0.3) + ')';
                ctx.fillRect(Math.floor(star.x) - 1, Math.floor(star.y), 3, 1);
                ctx.fillRect(Math.floor(star.x), Math.floor(star.y) - 1, 1, 3);
            }
            ctx.fillStyle = 'rgba(200,220,255,' + sa + ')';
            ctx.fillRect(Math.floor(star.x), Math.floor(star.y), star.size, star.size);
        }

        // —— 月亮（右上方，带光晕） ——
        var moonX = 265, moonY = 28, moonR = 14;
        ctx.fillStyle = 'rgba(255,245,210,0.04)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,245,220,0.06)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,250,230,0.1)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 1.4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,248,220,0.35)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,252,240,0.6)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 0.65, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,245,0.85)';
        ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 0.35, 0, Math.PI * 2); ctx.fill();

        // —— 远山剪影 ——
        ctx.fillStyle = '#0c1628';
        ctx.beginPath();
        ctx.moveTo(0, 85);
        ctx.lineTo(30, 68); ctx.lineTo(55, 75); ctx.lineTo(80, 58);
        ctx.lineTo(110, 72); ctx.lineTo(140, 62); ctx.lineTo(165, 70);
        ctx.lineTo(195, 55); ctx.lineTo(220, 65); ctx.lineTo(250, 60);
        ctx.lineTo(280, 70); ctx.lineTo(305, 63); ctx.lineTo(320, 72);
        ctx.lineTo(320, 90); ctx.lineTo(0, 90);
        ctx.closePath(); ctx.fill();

        // 近山（更暗）
        ctx.fillStyle = '#091020';
        ctx.beginPath();
        ctx.moveTo(0, 92);
        ctx.lineTo(25, 80); ctx.lineTo(50, 86); ctx.lineTo(75, 78);
        ctx.lineTo(100, 85); ctx.lineTo(130, 76); ctx.lineTo(160, 83);
        ctx.lineTo(185, 75); ctx.lineTo(210, 82); ctx.lineTo(240, 78);
        ctx.lineTo(265, 84); ctx.lineTo(290, 77); ctx.lineTo(320, 85);
        ctx.lineTo(320, 95); ctx.lineTo(0, 95);
        ctx.closePath(); ctx.fill();

        // —— 水面 ——
        var waterY = 90;
        var waterGrad = ctx.createLinearGradient(0, waterY, 0, h);
        waterGrad.addColorStop(0, '#0a1530');
        waterGrad.addColorStop(1, '#060e20');
        ctx.fillStyle = waterGrad;
        ctx.fillRect(0, waterY, w, h - waterY);

        // 月光倒影（水面竖直光柱）
        var refX = moonX;
        for (var ri = 0; ri < 20; ri++) {
            var ry = waterY + 3 + ri * 4;
            var rw = 2 + Math.sin(t * 0.03 + ri * 0.8) * 1.5;
            var ra = 0.12 - ri * 0.005;
            if (ra > 0) {
                ctx.fillStyle = 'rgba(255,245,210,' + ra + ')';
                ctx.fillRect(Math.floor(refX - rw + Math.sin(t * 0.02 + ri) * 2), ry, Math.ceil(rw * 2), 1);
            }
        }

        // 水面波纹线
        for (var wl = 0; wl < 10; wl++) {
            var wy = waterY + 5 + wl * 9;
            var wa = 1 + Math.sin(t * 0.015 + wl * 1.5) * 0.8;
            var wf = 0.025 + wl * 0.004;
            var ws = 0.4 + wl * 0.08;
            ctx.strokeStyle = 'rgba(80,120,180,' + (0.06 + Math.sin(t * 0.012 + wl * 2.5) * 0.025) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (var x2 = 0; x2 <= w; x2 += 2) {
                var wyy = wy + Math.sin(x2 * wf + t * ws * 0.04) * wa
                    + Math.sin(x2 * wf * 0.6 + t * ws * 0.025 + 2) * (wa * 0.4);
                if (x2 === 0) ctx.moveTo(x2, wyy);
                else ctx.lineTo(x2, wyy);
            }
            ctx.stroke();
        }

        // 水面碎光
        for (var sp = 0; sp < 15; sp++) {
            var sx = (sp * 29 + t * 0.2) % (w + 20) - 10;
            var sy = waterY + 4 + sp * 6 + Math.sin(t * 0.018 + sp * 2.3) * 3;
            var sa2 = 0.08 + Math.sin(t * 0.025 + sp * 1.9) * 0.06;
            if (sa2 > 0 && sy < h) {
                ctx.fillStyle = 'rgba(180,210,255,' + sa2 + ')';
                ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 1);
            }
        }

        // —— 小船（像素风） ——
        var boatX = 155;
        var boatY = 120 + Math.sin(t * 0.03) * 2.5 + Math.sin(t * 0.048) * 1.2;
        var boatTilt = Math.sin(t * 0.03) * 0.025;

        ctx.save();
        ctx.translate(boatX, boatY);
        ctx.rotate(boatTilt);

        // 船体
        ctx.fillStyle = '#3a2a18';
        ctx.beginPath();
        ctx.moveTo(-18, 0); ctx.lineTo(-14, 8); ctx.lineTo(14, 8); ctx.lineTo(18, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#5a4228';
        ctx.beginPath();
        ctx.moveTo(-16, 0); ctx.lineTo(-12, 5); ctx.lineTo(12, 5); ctx.lineTo(16, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#6a5238'; ctx.fillRect(-16, -1, 32, 1);
        ctx.fillStyle = '#4a3220'; ctx.fillRect(-19, -1, 3, 2); ctx.fillRect(16, -1, 3, 2);

        // 船夫（斗笠白衣剑客）
        ctx.fillStyle = '#5c4533'; ctx.fillRect(-3, -16, 14, 2);
        ctx.fillStyle = '#3a2a1e'; ctx.fillRect(-1, -18, 10, 2);
        ctx.fillStyle = '#4a3828'; ctx.fillRect(1, -17, 6, 1);
        ctx.fillStyle = '#d4a574'; ctx.fillRect(1, -14, 6, 3);
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(5, -13, 1, 1);
        ctx.fillStyle = '#e8e0d0'; ctx.fillRect(0, -11, 8, 4);
        ctx.fillStyle = '#c8c0b0'; ctx.fillRect(3, -11, 2, 4);
        ctx.fillStyle = '#8b6914'; ctx.fillRect(0, -7, 8, 1);
        ctx.fillStyle = '#d4af37'; ctx.fillRect(3, -8, 2, 1);
        ctx.fillStyle = '#d0c8b8'; ctx.fillRect(1, -6, 6, 3);
        ctx.fillStyle = '#2a2420'; ctx.fillRect(1, -3, 2, 2); ctx.fillRect(5, -3, 2, 2);
        ctx.fillStyle = '#b0b8c0'; ctx.fillRect(8, -18, 1, 12);
        ctx.fillStyle = '#8b6914'; ctx.fillRect(7, -9, 3, 1);
        ctx.fillStyle = '#e0e8f0'; ctx.fillRect(8, -18, 1, 2);

        ctx.restore();

        // 船周水花
        for (var splash = 0; splash < 4; splash++) {
            var spx = boatX - 18 + splash * 12 + Math.sin(t * 0.04 + splash) * 2.5;
            var spy = boatY + 6 + Math.sin(t * 0.055 + splash * 2) * 1.5;
            ctx.fillStyle = 'rgba(150,190,230,' + (0.08 + Math.sin(t * 0.04 + splash) * 0.04) + ')';
            ctx.fillRect(Math.floor(spx), Math.floor(spy), 3, 1);
        }

        // —— 金色装饰边框 ——
        ctx.strokeStyle = 'rgba(180,150,60,0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, w - 8, h - 8);
        ctx.strokeStyle = 'rgba(180,150,60,0.25)';
        ctx.lineWidth = 1;
        ctx.strokeRect(7, 7, w - 14, h - 14);
        var cornerLen = 12;
        ctx.strokeStyle = 'rgba(200,170,70,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(4, 4 + cornerLen); ctx.lineTo(4, 4); ctx.lineTo(4 + cornerLen, 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w - 4 - cornerLen, 4); ctx.lineTo(w - 4, 4); ctx.lineTo(w - 4, 4 + cornerLen); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(4, h - 4 - cornerLen); ctx.lineTo(4, h - 4); ctx.lineTo(4 + cornerLen, h - 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w - 4 - cornerLen, h - 4); ctx.lineTo(w - 4, h - 4); ctx.lineTo(w - 4, h - 4 - cornerLen); ctx.stroke();

        ctx.restore(); // 恢复seaAlpha

        // —— 滚动字幕 ——
        if (this.phase === 2 && this.phaseTick > this.SCROLL_START) {
            ctx.save();
            var creditsAlpha = Math.min(1, (this.phaseTick - this.SCROLL_START) / 60);
            ctx.globalAlpha = creditsAlpha;
            ctx.font = "11px 'FZPixel'";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            var lineH = 20;
            var totalH = this.credits.length * lineH;

            for (var i = 0; i < this.credits.length; i++) {
                var line = this.credits[i];
                var ly = this.scrollY + i * lineH + 60; // +60让内容从偏下开始滚

                if (ly < -20 || ly > 200) continue; // 超出画面不画

                // "完"字特殊处理：大号金色
                if (line === '完') {
                    ctx.font = "bold 28px 'FZPixel'";
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillText(line, 160, ly);
                    ctx.font = "11px 'FZPixel'";
                }
                else if (line.indexOf('按任意键') >= 0) {
                    ctx.font = "9px 'FZPixel'";
                    var hintA = 0.4 + Math.sin(t * 0.025) * 0.2;
                    ctx.fillStyle = 'rgba(200,168,0,' + hintA + ')';
                    ctx.fillText(line, 160, ly);
                    ctx.font = "11px 'FZPixel'";
                }
                // 普通文字
                else if (line && line.length > 0) {
                    // 命格标题行：【xxx】·xxx
                    if (line.indexOf('【') >= 0 && line.indexOf('】') >= 0) {
                        ctx.font = "bold 14px 'FZPixel'";
                        ctx.fillStyle = '#ffd700';
                        ctx.shadowColor = 'rgba(255,215,0,0.4)';
                        ctx.shadowBlur = 6;
                        ctx.fillText(line, 160, ly);
                        ctx.shadowBlur = 0;
                        ctx.font = "11px 'FZPixel'";
                    }
                    // 命格代码行：（xxxx）
                    else if (line.indexOf('（') >= 0 && line.indexOf('）') >= 0) {
                        ctx.font = "9px 'FZPixel'";
                        ctx.fillStyle = 'rgba(200,180,100,0.6)';
                        ctx.fillText(line, 160, ly);
                        ctx.font = "11px 'FZPixel'";
                    }
                    // 数据统计行（包含中文冒号）
                    else if (line.indexOf('：') >= 0 && line.indexOf('次') >= 0 || line.indexOf('：') >= 0 && line.indexOf('人') >= 0) {
                        ctx.font = "9px 'FZPixel'";
                        ctx.fillStyle = 'rgba(180,170,140,0.7)';
                        ctx.fillText(line, 160, ly);
                        ctx.font = "11px 'FZPixel'";
                    }
                    // 长描述文字（命格描述，可能很长，需换行）
                    else if (line.length > 18) {
                        ctx.font = "9px 'FZPixel'";
                        ctx.fillStyle = '#a09880';
                        // 自动换行：每16个字符一行
                        var maxChars = 18;
                        var row = 0;
                        for (var ci = 0; ci < line.length; ci += maxChars) {
                            var subLine = line.substring(ci, ci + maxChars);
                            var sly = ly + row * 14;
                            if (sly < -20 || sly > 200) { row++; continue; }
                            ctx.fillText(subLine, 160, sly);
                            row++;
                        }
                        ctx.font = "11px 'FZPixel'";
                    }
                    else {
                        ctx.fillStyle = '#c8c0a8';
                        ctx.fillText(line, 160, ly);
                    }
                }
            }

            ctx.restore();
        }

        // phase 3：静止显示最终状态
        if (this.phase === 3) {
            ctx.save();
            var hintA2 = 0.4 + Math.sin(t * 0.025) * 0.2;
            ctx.globalAlpha = hintA2;
            ctx.font = "9px 'FZPixel'";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#c8a832';
            ctx.fillText('按任意键回到主页', 160, 155);
            ctx.restore();
        }
    }
};

/* ==================== 玩家江湖命格统计系统 ==================== */
var PlayerStats = {
    totalDeaths: 0,        // ① 总死亡次数
    trapFalls: 0,          // ② 跌落陷阱次数
    knifeKilled: 0,        // ③ 被飞刀击杀次数（单把）
    multiKnifeKilled: 0,   // ④ 被多飞刀同时击杀次数
    rockCrushed: 0,        // ⑤ 被石头压扁次数
    bossKills: 0,          // ⑥ 击杀Boss次数
    rewindUsed: 0,         // ⑦ 时间回溯使用次数
    timeStopKills: 0       // ⑧ 时间静止中击杀敌人数量
};

/* 玩家2（双人模式）江湖命格统计 */
var PlayerStats2 = {
    totalDeaths: 0, trapFalls: 0, knifeKilled: 0, multiKnifeKilled: 0,
    rockCrushed: 0, bossKills: 0, rewindUsed: 0, timeStopKills: 0
};

/* 当前正在死亡的玩家索引（1或2），用于respawnAtCheckpoint区分记录 */
var dyingPlayerIdx = 1;

/* 命格计算 */
function calcPlayerFate() {
    var s = PlayerStats;
    // 特殊命格：八项数据全为0 → 外挂仙人
    if (s.totalDeaths === 0 && s.trapFalls === 0 && s.knifeKilled === 0 &&
        s.multiKnifeKilled === 0 && s.rockCrushed === 0 && s.bossKills === 0 &&
        s.rewindUsed === 0 && s.timeStopKills === 0) {
        return {
            prefix: '初入江湖',
            code: '无字天书',
            nickname: '外挂仙人',
            desc: '恭喜你，你是一位完美的侠客——从未死过，从未受伤，从未杀生，甚至连时间都未曾为你波动。你的江湖战绩是一片纯净的虚空。要么你是佛祖转世，要么……你的修改器开得有点明显。建议关掉外挂，体验一下"被石头压扁"的乐趣，那才是真武侠。'
        };
    }
    // 步骤1：轮回前缀
    var prefix;
    if (s.totalDeaths <= 2) prefix = '初入江湖';
    else if (s.totalDeaths <= 7) prefix = '百死余生';
    else if (s.totalDeaths <= 15) prefix = '千劫不灭';
    else prefix = '万冢之主';
    // 步骤2：身法字
    var body = s.trapFalls > 5 ? '惘魄' : '定魄';
    // 步骤3：历战字
    var battle = s.bossKills > 3 ? '魁首' : '稚子';
    // 步骤4：宿命字
    var fate = s.rewindUsed > 2 ? '逆命' : '凡骨';
    // 步骤5：杀性字
    var killIndex = s.knifeKilled * 0.5 + s.multiKnifeKilled * 1 + s.rockCrushed * 0.8 - s.timeStopKills * 1.2;
    var kill = killIndex > 5 ? '仁侠' : '魔罗';
    // 步骤6：合成
    var fateCode = body + battle + fate + kill;
    // 步骤7：查表
    var info = FATE_TABLE[fateCode] || { nickname: '无名散人', desc: '你的江湖之路，尚未被命格簿记载。' };
    return { prefix: prefix, code: fateCode, nickname: info.nickname, desc: info.desc };
}

/* 16种命格对照表 */

function generateFateSummaryText() {
    var f = calcPlayerFate();
    var s = PlayerStats;
    var lines = [];
    lines.push('');
    lines.push('【' + f.prefix + '】·' + f.nickname);
    lines.push('（' + f.code + '）');
    lines.push('');
    // 动态描述：融合实际数据
    var desc = f.desc;
    // 替换通用描述中的占位数据（部分命格描述已含数据暗示）
    lines.push(desc);
    lines.push('');
    // 附上真实数据
    lines.push('总死亡：' + s.totalDeaths + '次');
    lines.push('陷阱跌落：' + s.trapFalls + '次');
    lines.push('飞刀击杀：' + s.knifeKilled + '次');
    lines.push('万箭穿心：' + s.multiKnifeKilled + '次');
    lines.push('落石压扁：' + s.rockCrushed + '次');
    lines.push('Boss击杀：' + s.bossKills + '次');
    lines.push('时间回溯：' + s.rewindUsed + '次');
    lines.push('时停击杀：' + s.timeStopKills + '人');
    lines.push('');
    return lines;
}

/* 获取单个玩家的四个命格字 */
function getPlayerFateChars(s) {
    var body = s.trapFalls > 5 ? '惘魄' : '定魄';
    var battle = s.bossKills > 3 ? '魁首' : '稚子';
    var fate = s.rewindUsed > 2 ? '逆命' : '凡骨';
    var killIndex = s.knifeKilled * 0.5 + s.multiKnifeKilled * 1 + s.rockCrushed * 0.8 - s.timeStopKills * 1.2;
    var kill = killIndex > 5 ? '仁侠' : '魔罗';
    return { body: body, battle: battle, fate: fate, kill: kill };
}

/* 计算双人命格 */
function calcDualFate() {
    var a = PlayerStats, b = PlayerStats2;
    // 维度1：双人总受难指数
    var totalSuffer = (a.totalDeaths + b.totalDeaths) * 0.5
        + (a.trapFalls + b.trapFalls) * 0.3
        + (a.knifeKilled + b.knifeKilled) * 0.2
        + (a.multiKnifeKilled + b.multiKnifeKilled) * 0.4
        + (a.rockCrushed + b.rockCrushed) * 0.3;
    // 维度2：双人总杀性指数
    var totalKill = (a.timeStopKills + b.timeStopKills) * 1.2
        - (a.knifeKilled + b.knifeKilled) * 0.5
        - (a.multiKnifeKilled + b.multiKnifeKilled) * 0.8;
    // 维度3：默契差值（四字是否相同）
    var ca = getPlayerFateChars(a), cb = getPlayerFateChars(b);
    var diff = 0;
    if (ca.body !== cb.body) diff++;
    if (ca.battle !== cb.battle) diff++;
    if (ca.fate !== cb.fate) diff++;
    if (ca.kill !== cb.kill) diff++;
    // 查表
    for (var i = 0; i < DUAL_FATE_TABLE.length; i++) {
        if (DUAL_FATE_TABLE[i].check(totalSuffer, totalKill, diff)) {
            return {
                nickname: DUAL_FATE_TABLE[i].nickname,
                desc: DUAL_FATE_TABLE[i].desc,
                totalSuffer: Math.round(totalSuffer * 10) / 10,
                totalKill: Math.round(totalKill * 10) / 10,
                diff: diff
            };
        }
    }
    return { nickname: '塑料队友', desc: DUAL_FATE_TABLE[5].desc, totalSuffer: totalSuffer, totalKill: totalKill, diff: diff };
}
